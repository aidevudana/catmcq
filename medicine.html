tment for established HRS."},{"label":"B","text":"IV Dopamine","rationale":"False — dopamine has not been shown to be effective for HRS."},{"label":"C","text":"IV terlipressin","rationale":"True — IV terlipressin (a splanchnic vasoconstrictor), usually combined with albumin, is the standard treatment for hepatorenal syndrome."},{"label":"D","text":"Larger volume paracentesis","rationale":"False — large volume paracentesis doesn't treat HRS and could worsen renal perfusion if not accompanied by albumin replacement."},{"label":"E","text":"IV antibiotics","rationale":"False — antibiotics would be relevant if infection/SBP were the trigger, but aren't the definitive HRS treatment itself."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2021 March","questions":[{"num":"01","text":"Deep jaundice is/are seen in,","options":[{"label":"A","text":"Hepatitis A infection","rationale":"False — Hepatitis A typically causes mild-to-moderate, not classically 'deep,' jaundice."},{"label":"B","text":"Non-alcoholic fatty liver","rationale":"False — NAFLD doesn't typically cause deep jaundice."},{"label":"C","text":"Alcoholic hepatitis","rationale":"True — severe alcoholic hepatitis can cause deep jaundice."},{"label":"D","text":"Carcinoma of head of pancreas","rationale":"True — carcinoma of the head of pancreas causes progressive obstructive jaundice, often deep."},{"label":"E","text":"Mucocele of gallbladder","rationale":"False — a gallbladder mucocele (cystic duct obstruction) doesn't obstruct the common bile duct, so it doesn't typically cause jaundice."}],"reviewed_answer":["C","D"],"explanation":"Correct answer(s): C, D — see the reasoning under each option below."},{"num":"30","text":"A 55 year old male who is diagnosed to have alcoholic cirrhosis on clinic follow up, presents with acute hematemesis. He was restless. BP 90/60 mmHg, PR 100bpm. Treated with 2 boluses of Normal saline and IV Terlipressin. His Hb is 8 g/dL. INR was 4.5 in his last clinic visit. What is the next step in the management?","options":[{"label":"A","text":"Fresh frozen plasma","rationale":"True — with a markedly elevated INR (4.5) before an active bleed, fresh frozen plasma is used to help correct the coagulopathy alongside other measures."},{"label":"B","text":"IV vitamin K","rationale":"False — vitamin K acts too slowly to correct coagulopathy in this acute bleeding scenario."},{"label":"C","text":"IV pantoprazole","rationale":"False — pantoprazole is a reasonable adjunct in UGI bleeding generally but doesn't address the coagulopathy highlighted here."},{"label":"D","text":"IV propranolol","rationale":"False — propranolol is for prophylaxis, not acute bleeding management, and could worsen haemodynamics acutely."},{"label":"E","text":"Blood transfusion","rationale":"False — blood transfusion may be needed depending on ongoing losses/Hb trend, but correcting the very high INR is the specific next step highlighted."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"32","text":"A 50 year old male presented with swelling in the bilateral lower limbs. Which one of the following is mostly suggestive of an aetiology related to liver?","options":[{"label":"A","text":"Spider naevi","rationale":"True — spider naevi are a classic, relatively liver-specific cutaneous stigma of chronic liver disease."},{"label":"B","text":"Alcohol consumption","rationale":"False — alcohol consumption is a risk factor/history point, not itself a specific clinical sign of liver-related oedema."},{"label":"C","text":"Presence of jaundice","rationale":"False — jaundice can occur in liver disease but isn't as specifically 'liver stigma'-pointing in the context of leg swelling as spider naevi."},{"label":"D","text":"White nails","rationale":"False — white nails (leukonychia) reflect hypoalbuminaemia, which can occur in liver disease but also in other causes of low albumin (e.g. nephrotic syndrome, malnutrition)."},{"label":"E","text":"Ascites","rationale":"False — ascites can result from liver disease but also from cardiac, renal, or malignant causes, making it less specific than spider naevi."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2020 June","questions":[{"num":"37","text":"55 year old male presented with fever, malaise & right hypochondrial pain for 1 week duration. He is a social drinker. DM for several years. On oral hypoglycaemic drugs with atorvastatin. AST & ALT around 200 ALP marginally elevated (There were more investigations) What is the diagnosis?","options":[{"label":"A","text":"Liver abscess","rationale":"False — a liver abscess would typically show a more localised, often cystic finding on imaging and a different inflammatory picture, and less of this specific transaminase pattern."},{"label":"B","text":"Viral hepatitis","rationale":"True — fever, malaise, RUQ pain with a hepatocellular pattern (AST/ALT markedly raised, ALP only mildly elevated) fits viral hepatitis best among the given options, especially as she's only a 'social' (not heavy) drinker."},{"label":"C","text":"Alcoholic hepatitis","rationale":"False — alcoholic hepatitis is less likely given she's only a social drinker (not a heavy/chronic drinker)."},{"label":"D","text":"Statin induce hepatitis","rationale":"False — statin-induced hepatitis typically causes milder transaminitis without fever/malaise as prominent features."},{"label":"E","text":"Leptospirosis","rationale":"False — leptospirosis usually also shows more systemic features (myalgia, conjunctival suffusion, renal involvement) alongside the hepatic picture, which aren't emphasised here."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"41","text":"56 year old cirrhotic patient presented with upper GI bleeding. His pulse rate was 120bpm and blood pressure was 86/52 mmHg. Which of the following is the best initial management option?","options":[{"label":"A","text":"IV fluid resuscitation","rationale":"True — with hypotension and tachycardia from active UGI bleeding, IV fluid resuscitation is the best initial step before other specific measures."},{"label":"B","text":"IV terlipressin 2mg bolus","rationale":"False — terlipressin is important but resuscitation of the haemodynamically unstable patient takes priority as the very first step."},{"label":"C","text":"IV pantaprazole 80mg","rationale":"False — pantoprazole is a reasonable adjunct but isn't the best INITIAL step given haemodynamic instability."},{"label":"D","text":"Urgent blood transfusion","rationale":"False — blood transfusion may follow depending on response to initial fluids/Hb, but isn't necessarily the very first step before assessing response to crystalloid."},{"label":"E","text":"Emergency upper GI endoscopy","rationale":"False — endoscopy is essential but follows initial haemodynamic stabilisation, not the first step."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"45","text":"A 39 year old man who is a heavy alcoholic for 20 years, still using 1/2 a bottle per day, was investigated for abdominal distention. No past history of melena or upper GI bleeding. No peripheral stigmata of CLCD. On upper GI endoscopy three lines of varices were seen. AST 80 ALT 40 Bilirubin 45 Plt 120 Bleeding time prolonged (Some other investigations were given. They are normal). What is the most appropriate method to prevent upper gi bleeding?","options":[{"label":"A","text":"Isosorbide mono nitrate","rationale":"False — ISMN alone is not the preferred first-line measure for primary prophylaxis of variceal bleeding."},{"label":"B","text":"sclerotherapy","rationale":"False — sclerotherapy has largely been superseded by banding for endoscopic prophylaxis due to a better safety profile with banding."},{"label":"C","text":"liver transplantation","rationale":"False — liver transplantation is a much larger step, not the standard immediate measure to prevent bleeding from these varices."},{"label":"D","text":"Banding","rationale":"True — with large ('three lines of') varices at high risk of bleeding, endoscopic band ligation is a preferred method for primary prophylaxis."},{"label":"E","text":"Carvedilol","rationale":"True — non-selective beta-blockers (e.g. carvedilol) are also a standard, evidence-based option for primary variceal bleeding prophylaxis, and are frequently used alongside or instead of banding."}],"reviewed_answer":["D","E"],"explanation":"Correct answer(s): D, E — see the reasoning under each option below."}]},{"date":"2019 November","questions":[{"num":"17","text":"Regarding ascites,","options":[{"label":"A","text":"500ml ascitic fluid causes shifting dullness","rationale":"False — around 1000-1500ml of ascitic fluid is typically needed before shifting dullness becomes clinically detectable; 500ml would generally be missed on exam."},{"label":"B","text":"More than 100ml of ascetic fluid can be seen in USS","rationale":"True — ultrasound can detect ascitic fluid volumes as low as ~100ml (much more sensitive than clinical examination)."},{"label":"C","text":"Polymorphs 250/microliter is diagnostic of bacterial peritonitis","rationale":"True — an ascitic fluid neutrophil count of ≥250 cells/microlitre is the diagnostic threshold for spontaneous bacterial peritonitis."},{"label":"D","text":"For TB diagnosis Adenosine Deaminase can be used","rationale":"True — ascitic fluid adenosine deaminase (ADA) is used to support a diagnosis of TB peritonitis."},{"label":"E","text":"Portal hypertension has a SAAG score more than 1.1","rationale":"True — a serum-ascites albumin gradient (SAAG) greater than 1.1g/dl indicates portal hypertension as the cause."}],"reviewed_answer":["B","C","D","E"],"explanation":"Correct answer(s): B, C, D, E — see the reasoning under each option below."},{"num":"19","text":"Regarding hepatitis serology,","options":[{"label":"A","text":"HBs Ag indicates an ongoing infection","rationale":"True — HBsAg positivity indicates an ongoing (active) hepatitis B infection."},{"label":"B","text":"IgM antibodies to Hepatitis B core antigen is positive in acute infection","rationale":"True — IgM anti-HBc is positive during acute infection."},{"label":"C","text":"Hepatitis B surface antigen and anti-Hep B antibodies can co-exist","rationale":"False — HBsAg and anti-HBs (surface antibody) do not typically coexist; their coexistence would be unusual (seen only rarely, e.g. with certain escape mutants)."},{"label":"D","text":"Presence of HBe antigen indicates infectivity","rationale":"True — HBeAg positivity indicates high infectivity/active viral replication."},{"label":"E","text":"Presence of HBs Ab indicates immunity","rationale":"True — anti-HBs (HBsAb) positivity indicates immunity (either from vaccination or past cleared infection)."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."},{"num":"34","text":"35-year-old female present with icterus and generalized pruritus. Her INR 2.5, bilirubin 2.5 & ALP 800. USS is suggestive of CLCD. What is the best investigation to come to an etiology?","options":[{"label":"A","text":"Anti-mitochondrial antibody","rationale":"True — with icterus, pruritus and a markedly cholestatic pattern (high ALP) in a young/middle-aged woman with CLCD, testing for anti-mitochondrial antibody (for primary biliary cirrhosis) is the key investigation to establish the aetiology."},{"label":"B","text":"Hepatitis B surface antibody","rationale":"False — Hep B surface antibody indicates immunity/past exposure, not the cause of this cholestatic picture."},{"label":"C","text":"Hepatitis C antibody","rationale":"False — Hepatitis C antibody wouldn't explain this predominantly cholestatic (rather than hepatocellular) pattern as classically as PBC."},{"label":"D","text":"Serum ceruloplasmin level","rationale":"False — ceruloplasmin would be checked for Wilson's disease, which doesn't fit this cholestatic pattern as well."},{"label":"E","text":"Anti-smooth muscle antibody","rationale":"False — anti-smooth muscle antibody is used for autoimmune hepatitis, which is typically more hepatocellular than cholestatic in pattern."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"38","text":"15 years old girl comes with history of intermittent jaundice for last few years... Investigations are as follows, Hb - 13.2, WBC - 6.3 N - 62% L- 34% Platelet- 282 LDH- 200 Direct bilirubin – 6 Indirect bilirubin – 34 AST- 14, ALT- 26 INR - 1.2 ALP- 140 Gama GT – 25 Most likely diagnosis","options":[{"label":"A","text":"Gilbert syndrome","rationale":"True — intermittent jaundice with isolated unconjugated (indirect) hyperbilirubinaemia, normal other LFTs and no haemolysis markers mentioned is the classic picture of Gilbert syndrome."},{"label":"B","text":"Biliary artesian","rationale":"False — biliary atresia presents in infancy with conjugated hyperbilirubinaemia, not intermittent unconjugated jaundice in a teenager."},{"label":"C","text":"Dubin Johnson syndrome","rationale":"False — Dubin-Johnson syndrome causes conjugated (direct) hyperbilirubinaemia, not the predominantly unconjugated pattern seen here."},{"label":"D","text":"Choleycystitis","rationale":"False — cholecystitis would show a different clinical/biochemical picture (pain, possible cholestatic pattern), not this isolated unconjugated bilirubin elevation."},{"label":"E","text":"Rotor's syndrome","rationale":"False — Rotor's syndrome also causes conjugated hyperbilirubinaemia, unlike the unconjugated pattern here."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2019 March","questions":[{"num":"7","text":"Regarding Hepatic encephalopathy,","options":[{"label":"A","text":"Elevated serum ammonia is required for diagnosis","rationale":"False — hepatic encephalopathy is a clinical diagnosis; an elevated serum ammonia is supportive but not required for diagnosis."},{"label":"B","text":"Infection is a common precipitant","rationale":"True — infection is one of the most common precipitants of hepatic encephalopathy."},{"label":"C","text":"Strict protein restriction is recommended until recovery of consciousness","rationale":"False — modern guidelines recommend AGAINST strict protein restriction; adequate protein intake is encouraged to avoid malnutrition."},{"label":"D","text":"Lactulose is contraindicated in unconscious patients","rationale":"False — lactulose is not contraindicated in unconscious patients; it can still be given (e.g. via NG tube) with appropriate airway protection."},{"label":"E","text":"Rifaximine is 2ry prophylaxis","rationale":"True — rifaximin is used as secondary prophylaxis to reduce recurrence of hepatic encephalopathy."}],"reviewed_answer":["B","E"],"explanation":"Correct answer(s): B, E — see the reasoning under each option below."},{"num":"8","text":"Non alcoholic fatty liver disease associated with","options":[{"label":"A","text":"obesity","rationale":"True — obesity is a major risk factor for NAFLD."},{"label":"B","text":"DM","rationale":"True — diabetes mellitus is strongly associated with NAFLD (part of metabolic syndrome)."},{"label":"C","text":"OCP","rationale":"False — oral contraceptive use is not a classic recognised risk factor for NAFLD."},{"label":"D","text":"hyperlipidemia","rationale":"True — hyperlipidaemia is associated with NAFLD (metabolic syndrome component)."},{"label":"E","text":"hypertension","rationale":"True — hypertension is associated with NAFLD as part of the metabolic syndrome cluster."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."},{"num":"30","text":"40 year old male tourist guide presented with progressive difficulty in breathing for 3 months duration. On his past medical history, diabetic for 4 years, on gliclazide and metfo rmin. He is a teetotaler. On examination mild icterus, ankle edema, bi basal crepts, shrun ken liver, splenomegaly, mild ascites. Hb 10.2 (MCV 97) WBC 3.5 PLT 98 SGOT 68 SCPT 84 T. BIL 66 ALP 110 CXR Upper lobe venous congestion and cardiomegaly. What is the likely diagnosis,","options":[{"label":"A","text":"Cardiac cirrhosis","rationale":"False — cardiac cirrhosis (from long-standing right heart failure) doesn't explain the diabetes, skin changes or the combination of hepatic and cardiac findings this well together as a single underlying cause."},{"label":"B","text":"Haemachromatosis","rationale":"True — a teetotaler (excluding alcohol) with diabetes, hepatomegaly progressing to a shrunken cirrhotic liver, splenomegaly, and cardiomegaly with heart failure fits the classic triad of hemochromatosis (liver, pancreas, heart involvement)."},{"label":"C","text":"Hepatitis B","rationale":"False — Hepatitis B doesn't explain the cardiomyopathy or diabetes as part of the same disease process."},{"label":"D","text":"NASH","rationale":"False — NASH doesn't explain the cardiomyopathy/heart failure component."},{"label":"E","text":"Willson's disease","rationale":"False — Wilson's disease typically presents at a younger age with neuropsychiatric features, not this cardiac-hepatic-diabetes triad."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2018 November","questions":[{"num":"7","text":"Liver diseases in pregnancy","options":[{"label":"A","text":"Acute Fatty liver disease","rationale":"True — acute fatty liver of pregnancy is a recognised pregnancy-specific liver disease."},{"label":"B","text":"Intrahepatic cholestasis","rationale":"True — intrahepatic cholestasis of pregnancy is a recognised pregnancy-specific liver disease."},{"label":"C","text":"HELLP syndrome","rationale":"True — HELLP syndrome is a recognised pregnancy-specific liver-related condition."},{"label":"D","text":"Autoimmune hepatitis","rationale":"False — autoimmune hepatitis is not a pregnancy-specific liver disease (though it can coincidentally occur during pregnancy)."},{"label":"E","text":"Granulomatous hepatitis","rationale":"False — granulomatous hepatitis is not a pregnancy-specific liver disease."}],"reviewed_answer":["A","B","C"],"explanation":"Correct answer(s): A, B, C — see the reasoning under each option below."},{"num":"31","text":"50 years old previously diagnosed patient with Liver Cirrhosis presented with Hemetemesis and malena. His Pulse rate 120bpm, BP = 86/52mmHg. What is the most appropriate immediate management option?","options":[{"label":"A","text":"IV 0.9% saline Bolus","rationale":"True — with hypotension and tachycardia from active GI bleeding, an IV fluid bolus is the most appropriate immediate first step."},{"label":"B","text":"IV Ceftriaxone stat","rationale":"False — ceftriaxone is important prophylaxis but isn't the most immediate priority before haemodynamic stabilisation."},{"label":"C","text":"Endoscopy and banding of varices","rationale":"False — endoscopy and banding follow initial resuscitation, not before it."},{"label":"D","text":"Transjugular intrahepatic portocaval shunt","rationale":"False — TIPS is a later, more invasive option for refractory/recurrent bleeding, not the immediate first step."},{"label":"E","text":"Tamponade with Sengstaken-Blakemore Tube","rationale":"False — balloon tamponade is reserved for uncontrolled bleeding not responding to initial measures, not the first immediate step."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2017 May","questions":[{"num":"8","text":"WOF is/are true regarding viral hepatitis?","options":[{"label":"A","text":"Hepatitis A causes cirrhosis","rationale":"False — Hepatitis A is self-limiting and does not cause chronic disease or cirrhosis."},{"label":"B","text":"Hepatitis B is a RNA virus","rationale":"False — Hepatitis B is a DNA virus, not an RNA virus."},{"label":"C","text":"Hepatitis C causes chronic hepatitis","rationale":"True — Hepatitis C has a high rate of chronicity and is a recognised cause of chronic hepatitis/cirrhosis."},{"label":"D","text":"Hepatitis E causes hepatocellular carcinoma","rationale":"False — Hepatitis E does not cause chronic infection or hepatocellular carcinoma in immunocompetent individuals (unlike Hep B/C)."},{"label":"E","text":"Hepatitis E infection during pregnancy has high mortality","rationale":"True — Hepatitis E infection during pregnancy is classically associated with a high risk of fulminant hepatic failure and mortality."}],"reviewed_answer":["C","E"],"explanation":"Correct answer(s): C, E — see the reasoning under each option below."},{"num":"26","text":"A 55 years old man with cirrhosis is admitted with a history of altered behavior and drowsiness for 3 days. He is found unconscious during the morning ward round. What is the most important immediate investigation?","options":[{"label":"A","text":"Full blood count","rationale":"False — FBC is useful supportive information but isn't the single most urgent immediate test."},{"label":"B","text":"CRP","rationale":"False — CRP is nonspecific and not the most urgent immediate test."},{"label":"C","text":"CT scan of the brain","rationale":"False — CT brain is important to exclude structural causes but isn't the very first bedside test that should be done immediately."},{"label":"D","text":"Blood ammonia level","rationale":"False — blood ammonia supports a diagnosis of hepatic encephalopathy but isn't the most urgent immediate test in an unconscious patient."},{"label":"E","text":"Capillary blood glucose","rationale":"True — capillary blood glucose is the classic first bedside test that must be checked immediately in ANY unconscious patient, to exclude rapidly reversible hypoglycaemia."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"32","text":"A patient with alcoholic cirrhosis has increasing ascites despite dietary sodium control and diuretics. A ascetic fluid paracentesis shows turbid fluid with 2300 WBC/mm3 and 150 red blood cells/mm3.The WBC different shows 75% lymphocytes. Ascetic fluid protein is 3.2g/dl, the serum ascites albumin gradient (SAAG) is 0.8g/dl. What is the most likely diagnosis?","options":[{"label":"A","text":"Spontaneous bacterial peritonitis","rationale":"False — spontaneous bacterial peritonitis classically shows a NEUTROPHIL-predominant fluid and a HIGH SAAG (since the underlying portal hypertension persists), not this low SAAG lymphocytic picture."},{"label":"B","text":"Portal vein thrombosis","rationale":"False — portal vein thrombosis doesn't specifically explain this inflammatory ascitic fluid picture."},{"label":"C","text":"Tuberculous peritonitis","rationale":"True — a low SAAG (<1.1) with a lymphocyte-predominant, high-protein exudative ascitic fluid is the classic picture of tuberculous peritonitis."},{"label":"D","text":"Budd Chairi syndrome","rationale":"False — Budd-Chiari syndrome doesn't classically produce this inflammatory lymphocytic exudate pattern."},{"label":"E","text":"Alcoholic hepatitis","rationale":"False — alcoholic hepatitis alone doesn't explain this specific ascitic fluid profile."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"38","text":"A 54 year old man presents with increased thirst and urinary frequency. He also complains of bilateral knee joint pain. He is pigmented and has hepatomegaly on examination. His fasting plasma glucose is 205mg/dl.What is the best investigation to confirm the diagnosis?","options":[{"label":"A","text":"Serum ferritin","rationale":"True — serum ferritin is the standard initial confirmatory test when hemochromatosis is suspected (pigmented skin, new diabetes, hepatomegaly, joint pains)."},{"label":"B","text":"Knee joint radiographs","rationale":"False — knee radiographs might show chondrocalcinosis (a recognised association) but don't confirm the underlying diagnosis."},{"label":"C","text":"Antinuclear antibody","rationale":"False — ANA would be relevant for autoimmune disease, not this presentation."},{"label":"D","text":"Full blood counts","rationale":"False — FBC doesn't confirm hemochromatosis."},{"label":"E","text":"Serum caeruloplasmin","rationale":"False — caeruloplasmin is used for Wilson's disease, which doesn't fit this presentation as well as hemochromatosis."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2015 November","questions":[{"num":"7","text":"Which of the following investigations are correctly matched with their cause for chronic liver cell disease?","options":[{"label":"A","text":"Primary biliary cirrhosis - anti ds DNA","rationale":"False — primary biliary cirrhosis is matched with anti-mitochondrial antibody, not anti-dsDNA (which is associated with SLE)."},{"label":"B","text":"Auto immune hepatitis - anti smooth muscle antibody","rationale":"True — autoimmune hepatitis is classically matched with anti-smooth muscle antibody."},{"label":"C","text":"Wilson’s disease – 24-hour urinary copper excretion","rationale":"True — Wilson's disease diagnosis is supported by 24-hour urinary copper excretion."},{"label":"D","text":"Hepatitis B - HepBsAg","rationale":"True — hepatitis B is correctly matched with HBsAg."},{"label":"E","text":"Hemochromatosis -24-hour hemosiderin excretion","rationale":"False — hemochromatosis is diagnosed via serum ferritin/transferrin saturation and genetic testing, not 24-hour urinary hemosiderin excretion (not a standard test)."}],"reviewed_answer":["B","C","D"],"explanation":"Correct answer(s): B, C, D — see the reasoning under each option below."},{"num":"8","text":"Causes of cirrhosis,","options":[{"label":"A","text":"Hepatitis E","rationale":"False — Hepatitis E does not cause chronic liver disease/cirrhosis in immunocompetent individuals."},{"label":"B","text":"After acute poisoning of methyl alcohol","rationale":"False — acute methanol poisoning causes acute toxic effects (metabolic acidosis, blindness), not chronic cirrhosis."},{"label":"C","text":"Asymptomatic gall stones without common bile duct obstruction","rationale":"False — asymptomatic gallstones without duct obstruction don't cause cirrhosis."},{"label":"D","text":"NASH","rationale":"True — NASH is a recognised, increasingly common cause of cirrhosis."},{"label":"E","text":"Portal vein thrombosis","rationale":"False — portal vein thrombosis is generally a consequence of (or separate from) cirrhosis/portal hypertension, not itself a recognised cause of cirrhosis."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"30","text":"A 50 year old patient with cirrhosis presented with variceal bleeding. He was managed with octreotide and banding. What is the most likely measure to prevent further variceal bleeding?","options":[{"label":"A","text":"Interval band ligation","rationale":"True — interval (repeated) band ligation is a standard endoscopic method for secondary prophylaxis of variceal bleeding."},{"label":"B","text":"Oral proton pump inhibitors","rationale":"False — oral PPIs don't have a specific role in preventing further variceal bleeding."},{"label":"C","text":"Interval sclerotherapy","rationale":"False — sclerotherapy has largely been superseded by banding due to a better safety profile with banding for this purpose."},{"label":"D","text":"Oral nitrates","rationale":"False — oral nitrates alone are not an effective standard measure for preventing further variceal bleeding."},{"label":"E","text":"Oral beta blockers","rationale":"True — oral non-selective beta-blockers are a standard, evidence-based measure for secondary prophylaxis of variceal bleeding, often combined with interval banding."}],"reviewed_answer":["C"],"explanation":"This one asks about post-needle-stick protocol; the standard textbook answer checks the exposed student's existing immunity (HBsAb) and the source patient's status for other bloodborne viruses (HIV) — though in real practice, the source patient's HBsAg would also typically be checked."},{"num":"32","text":"A 3rd year medical student had an accidental prick injury to the hand while taking a blood sample of a patient, suspected with Hep B infection. What is/are the most appropriate investigation/s that should be performed subsequently?","options":[{"label":"A","text":"HepBsAg of the patient","rationale":"Partially relevant — checking the source patient's HBsAg (infectivity) is also usually part of standard protocol, though not explicitly listed as this option's full description."},{"label":"B","text":"HepBsAg of the student and HIV antibody of the patient","rationale":"False — checking the STUDENT's HBsAg makes little sense (we want to know if the student is protected/immune, not whether they're infected at this point); the patient's HIV antibody is relevant though."},{"label":"C","text":"HepBsAb of the student and HIV antibody of the patient","rationale":"True — checking the exposed student's HBsAb (to assess existing immunity, e.g. from prior vaccination) alongside the source patient's HIV antibody status reflects a standard broader occupational post-exposure risk assessment."},{"label":"D","text":"HepBsAb & HIV antibody of the patient","rationale":"False — checking the PATIENT's HBsAb doesn't address the patient's infectivity for Hepatitis B (the patient's HBsAg would be more relevant for that purpose)."},{"label":"E","text":"HepBsAb & HIV antibody in both","rationale":"Excessive/less standard as a single first step compared to option C, though comprehensive testing of both individuals for both markers can be part of a fuller occupational health workup over time."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2015 May","questions":[{"num":"23","text":"A 55 year old male with cirrhosis admitted with gross ascites. Next morning he was found unconscious. The immediate step of Ix","options":[{"label":"A","text":"FBC","rationale":"False — FBC is useful supportive information but isn't the single most urgent immediate test."},{"label":"B","text":"CRP","rationale":"False — CRP is nonspecific and not the most urgent immediate test."},{"label":"C","text":"CT brain","rationale":"False — CT brain is important but isn't the very first bedside test that should be checked immediately."},{"label":"D","text":"Serum NH3","rationale":"False — serum ammonia supports a hepatic encephalopathy diagnosis but isn't the most immediately urgent bedside test."},{"label":"E","text":"CBS","rationale":"True — capillary blood sugar (CBS) is the classic first bedside test that must be checked immediately in any unconscious patient, to exclude rapidly reversible hypoglycaemia."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"31","text":"55 year old patient presented with worsening abdominal distension. He had generalized mild abdominal pain. He is icteric but not pale. On examination he hd ascites & abdominal tenderness. He was drowsy & flapping tremors. Most appropriate Ix","options":[{"label":"A","text":"FBC","rationale":"False — FBC gives supportive information but doesn't directly identify the likely SBP precipitant."},{"label":"B","text":"Ascites fluid analysis","rationale":"True — with ascites, abdominal tenderness, drowsiness and flapping tremor (encephalopathy), ascitic fluid analysis is the key investigation to look for spontaneous bacterial peritonitis as the precipitant."},{"label":"C","text":"Blood ammonia level","rationale":"False — blood ammonia supports the encephalopathy diagnosis but doesn't identify the underlying precipitant (infection) as directly as ascitic fluid analysis."},{"label":"D","text":"SE","rationale":"False — serum electrolytes (SE) give supportive information but aren't the key test to identify the likely precipitant here."},{"label":"E","text":"CRP","rationale":"False — CRP is nonspecific and doesn't replace ascitic fluid analysis for diagnosing SBP."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2014 November","questions":[{"num":"7","text":"Regarding hepatic encephalopathy,","options":[{"label":"A","text":"Slow waves in EEG","rationale":"True — slow (triphasic) waves on EEG are a classic finding in hepatic encephalopathy."},{"label":"B","text":"Causes asterixis","rationale":"True — asterixis (flapping tremor) is a hallmark clinical sign of hepatic encephalopathy."},{"label":"C","text":"Treat with metronidazole","rationale":"True — metronidazole has historically been used as an alternative gut-decontamination therapy in hepatic encephalopathy (alongside/instead of lactulose or rifaximin)."},{"label":"D","text":"Dietary restriction of protein","rationale":"False — modern guidelines discourage strict dietary protein restriction; adequate protein intake is now recommended to avoid malnutrition."},{"label":"E","text":"Precipitated by constipation","rationale":"True — constipation is a recognised precipitant of hepatic encephalopathy (increases ammonia absorption/production in the gut)."}],"reviewed_answer":["A","B","C","E"],"explanation":"Correct answer(s): A, B, C, E — see the reasoning under each option below."},{"num":"8","text":"Poor prognostic factors of CLCD?","options":[{"label":"A","text":"Elevated serum bilirubin","rationale":"True — elevated bilirubin is a component of the Child-Pugh prognostic score."},{"label":"B","text":"Low serum albumin","rationale":"True — low serum albumin is a component of the Child-Pugh score."},{"label":"C","text":"Elevated globulin","rationale":"False — elevated globulin is not part of standard CLCD prognostic scoring systems (Child-Pugh/MELD)."},{"label":"D","text":"Prolonged INR","rationale":"True — a prolonged INR is a component of both Child-Pugh and MELD scores."},{"label":"E","text":"Low serum sodium","rationale":"True — hyponatraemia is a recognised poor prognostic factor, incorporated into the MELD-Na score."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."},{"num":"32","text":"54 year old known patient with alcoholic cirrhosis, presented with altered sleep pattern, ascites and ankle oedema. O/E his abdomen is tensed and tender. FBC - Hb-11g/dl, WBC -15,000(N-80%), PLT 150,000. Ascitic fluid- 450/mm3 of neutrophils. What is the best management for this patient?","options":[{"label":"A","text":"Cefotaxime","rationale":"True — with a raised WBC and ascitic fluid neutrophil count of 450/mm3 (above the 250/microlitre diagnostic threshold), this is spontaneous bacterial peritonitis, treated with cefotaxime."},{"label":"B","text":"Frusemide","rationale":"False — frusemide treats fluid overload but doesn't address the underlying infection driving this presentation."},{"label":"C","text":"Salt poor plasma","rationale":"False — salt-poor albumin can be an adjunct in some SBP management protocols but antibiotics (cefotaxime) are the primary treatment."},{"label":"D","text":"Large volume paracentesis","rationale":"False — large volume paracentesis doesn't treat the underlying infection."},{"label":"E","text":"Low salt diet","rationale":"False — a low salt diet doesn't address the acute infective process here."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2014 May","questions":[{"num":"8","text":"Features of compensated liver disease","options":[{"label":"A","text":"Testicular atopy","rationale":"True — testicular atrophy (from hyperoestrogenism due to reduced hepatic clearance) can occur even in compensated chronic liver disease."},{"label":"B","text":"Ascitis","rationale":"False — ascites is a marker of DEcompensation, not compensated disease."},{"label":"C","text":"Flapping tremors","rationale":"False — flapping tremor indicates hepatic encephalopathy, a feature of decompensation, not compensated disease."},{"label":"D","text":"Clubbing","rationale":"True — clubbing can occur in chronic liver disease even at the compensated stage."},{"label":"E","text":"Parotid swelling","rationale":"True — parotid swelling is a classic sign of chronic alcoholic liver disease that can be present even in the compensated stage."}],"reviewed_answer":["A","D","E"],"explanation":"Correct answer(s): A, D, E — see the reasoning under each option below."},{"num":"32","text":"55 yr old male known patient with chronic liver disease, presented with progressive abdominal distension, edema & confusion for 5 days duration. On examination jaundice, fever 38oC drowsy. He is on spironolactone 100 mg, Frusemide 40mg & propranolol. WOF is the best next step of Mx?","options":[{"label":"A","text":"IV antibiotics","rationale":"True — with fever, worsening ascites/oedema and confusion (raising concern for infection precipitating hepatic encephalopathy) in a known cirrhotic, starting IV antibiotics (for presumed SBP) is the best next step."},{"label":"B","text":"Lactulose","rationale":"False — lactulose treats the encephalopathy but doesn't address the likely infective precipitant (fever) driving this deterioration."},{"label":"C","text":"Abdominal pancreatitis","rationale":"False — 'abdominal pancreatitis' isn't a coherent diagnosis/step and doesn't fit as the best next management action."},{"label":"D","text":"Increase the dose of propronolol","rationale":"False — increasing propranolol doesn't address the acute infective/encephalopathic presentation."},{"label":"E","text":"Increase the dose of spironolactone","rationale":"False — increasing spironolactone doesn't address the likely infective precipitant either."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2013 November","questions":[{"num":"5","text":"T/f which of the following causes cirrhosis as a consequence or complication?","options":[{"label":"A","text":"Hep E infection","rationale":"False — Hepatitis E does not cause chronic liver disease/cirrhosis."},{"label":"B","text":"Alcoholic steatohepatitis","rationale":"True — alcoholic steatohepatitis is a recognised precursor/cause of cirrhosis."},{"label":"C","text":"Acute PCM poisoning","rationale":"False — acute paracetamol poisoning causes acute liver failure/necrosis, not chronic cirrhosis (cirrhosis requires a chronic fibrotic process)."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"6","text":"T/F","options":[{"label":"A","text":"Liver receives 80% of blood supply by hepatic artery","rationale":"False — it's the reverse: the portal vein supplies roughly 70-75% of hepatic blood flow, with the hepatic artery providing the remainder (~25-30%)."},{"label":"B","text":"Encephalopathy in apt with cirrhosis indicate poor prognosis","rationale":"True — the development of encephalopathy in a cirrhotic patient is a recognised marker of poor prognosis."},{"label":"C","text":"Commonest cause for cirrhosis in Sri Lanka is Hep B","rationale":"Uncertain/likely false in the Sri Lankan context — alcohol is generally considered the most common cause of cirrhosis locally, rather than Hepatitis B, though this can vary by population studied."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2013 Eastern","questions":[{"num":"BOF 12","text":"%% year old man known cirrhotic patient came with altered consciousness, ascites, jaundice. Which of the following will relive his altered consciousness?","options":[{"label":"1","text":"Propranolol","rationale":"False — propranolol doesn't treat encephalopathy; it's used for variceal bleeding prophylaxis."},{"label":"2","text":"Abdominal paracentices","rationale":"False — paracentesis can relieve symptoms from tense ascites but doesn't directly treat the underlying encephalopathy."},{"label":"3","text":"Treatment with ceftriaxone","rationale":"True — if an underlying infection (a common precipitant) is present, treating it (e.g. with ceftriaxone) helps resolve the encephalopathy."},{"label":"4","text":"Lactulose therapy","rationale":"True — lactulose is the mainstay treatment for hepatic encephalopathy."},{"label":"5","text":"Diuretic therapy","rationale":"False — diuretic therapy treats ascites, not the encephalopathy itself, and can even precipitate encephalopathy if it causes electrolyte disturbance."}],"reviewed_answer":["3","4"],"explanation":"Correct answer(s): 3, 4 — see the reasoning under each option below."},{"num":"TOF 25","text":"What are the measures used in acute variceal bleeding","options":[{"label":"1","text":"Spironolactone","rationale":"False — spironolactone is used for ascites management, not acute variceal bleeding."},{"label":"2","text":"Octreotide","rationale":"True — octreotide (a splanchnic vasoconstrictor) is a standard measure in acute variceal bleeding."},{"label":"3","text":"Banding","rationale":"True — endoscopic banding provides direct haemostasis in acute variceal bleeding."},{"label":"4","text":"Terlipressin","rationale":"True — terlipressin (a vasoconstrictor) is a standard measure in acute variceal bleeding."},{"label":"5","text":"Propranolol","rationale":"False — propranolol is used for prophylaxis (primary/secondary), not during an acute bleeding episode, where beta-blockade could worsen the haemodynamic compensation to hypotension."}],"reviewed_answer":["2","3","4"],"explanation":"Correct answer(s): 2, 3, 4 — see the reasoning under each option below."}]},{"date":"2012 November","questions":[{"num":"33","text":"51 year old man who is diagnosed as having chronic alcoholic liver disease, presented with a history of abdominal distension and ankle oedema. On examination he was febrile, icteric and mild abdominal tenderness was there with an ascites. Which of the following step is best to find out the cause for his presentation?","options":[{"label":"A","text":"Blood culture","rationale":"False — blood culture may be useful but ascitic fluid analysis more directly investigates the likely cause (SBP) of this presentation."},{"label":"B","text":"Peritoneal fluid aspiration","rationale":"True — with fever, icterus and abdominal tenderness with ascites in a cirrhotic patient, peritoneal (ascitic) fluid aspiration is the best step to find the cause (looking for spontaneous bacterial peritonitis)."},{"label":"C","text":"Full blood count","rationale":"False — FBC gives supportive information but doesn't directly identify the cause."},{"label":"D","text":"Urine full report","rationale":"False — urine full report doesn't investigate the most likely intra-abdominal cause here."},{"label":"E","text":"USS abdomen","rationale":"False — USS assesses the liver/ascites but doesn't diagnose an infective process within the ascitic fluid itself."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]}],"count":44},{"topic":"Toxicology","sections":[{"date":"2024 January","questions":[{"num":"47","text":"3 men were admitted to the hospital after consuming home distilled alcohol 12 h ago. They are conscious and hyperventilated. One man is complaining of poor vision. Initial ABG reveals metabolic acidosis. The best initial mx?","options":[{"label":"A","text":"Gastric lavage followed by activated charcoal","rationale":"False — gastric lavage/activated charcoal have limited value this many hours after ingestion, and charcoal doesn't bind alcohols well."},{"label":"B","text":"Ethanol and dialysis","rationale":"True — home-distilled alcohol causing metabolic acidosis, hyperventilation and visual disturbance is classic methanol poisoning; ethanol (as a competitive substrate for alcohol dehydrogenase) plus haemodialysis (to remove methanol/toxic metabolites and correct acidosis) is the standard comprehensive treatment, especially given visual symptoms signal significant toxicity."},{"label":"C","text":"Bicarbonate and folinic acid","rationale":"False — bicarbonate and folinic acid are useful adjuncts (folinic acid enhances formate metabolism) but alone don't address the underlying alcohol dehydrogenase pathway driving toxic metabolite formation."},{"label":"D","text":"IV Bicarbonate and dialysis","rationale":"False — dialysis is appropriate but this combination omits the antidote (ethanol/fomepizole) needed to block further toxic metabolite formation."},{"label":"E","text":"IV carbonate and ethanol","rationale":"False — bicarbonate plus ethanol addresses the acidosis and metabolism, but omits dialysis, which is indicated given the significant toxicity (visual symptoms)."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2023 February","questions":[{"num":"44","text":"A 16-year-old boy presented with nausea, vomiting and abdominal pain. He has taken 4 tablets of paracetamol 4 hourly during the last 36 h for a toothache. He presented with nausea, vomiting and right hypochondriac tenderness. The plasma paracetamol level was measured, and it was below the treatment threshold. What is the next step in the management?","options":[{"label":"A","text":"Reassure","rationale":"False — reassurance is inappropriate given symptomatic hepatotoxicity signs (RUQ tenderness, nausea/vomiting) despite a low single-point level."},{"label":"B","text":"Administer activated charcoal.","rationale":"False — activated charcoal has no role this many hours after a staggered ingestion pattern."},{"label":"C","text":"Plot serum paracetamol level in nomogram in 4 hours.","rationale":"False — the standard nomogram is only valid for a single acute ingestion at a known time; it doesn't apply to this staggered/repeated supratherapeutic dosing pattern, so plotting a delayed level on it isn't appropriate."},{"label":"D","text":"Start NAC infusion.","rationale":"True — because this is a staggered overdose (repeated supratherapeutic dosing over 36 hours), the single-level nomogram doesn't reliably predict risk; given the symptomatic presentation (nausea, vomiting, RUQ tenderness), treatment with NAC should proceed on clinical grounds rather than relying on the (inapplicable) nomogram."},{"label":"E","text":"Start oral methionine.","rationale":"False — oral methionine is a less preferred, less reliable alternative to NAC and isn't the standard next step here."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"45","text":"A 24-year-old woman on multiple drugs for a psychiatric illness was brought to the hospital by her family members with suspected poisoning that had occurred about 2 hours ago. He was severely drowsy and the SpO2 was 84% on room air. Pulse rate 110 bpm. Blood pressure 90/60 mmHg. What is the most appropriate next step in the management?","options":[{"label":"A","text":"Activated charcoal","rationale":"False — activated charcoal isn't the priority when the airway itself is at risk (severe drowsiness with hypoxia)."},{"label":"B","text":"Endotracheal intubation","rationale":"True — with SpO2 84% and severe drowsiness (airway/respiratory compromise), securing the airway with endotracheal intubation takes priority over any decontamination measure."},{"label":"C","text":"Gastric lavage","rationale":"False — gastric lavage isn't appropriate before airway protection is secured, and carries aspiration risk in a drowsy patient."},{"label":"D","text":"Induced vomiting","rationale":"False — induced vomiting is generally avoided in poisoning management and is inappropriate with reduced consciousness (aspiration risk)."},{"label":"E","text":"Non-invasive positive pressure ventilation","rationale":"False — NIV requires a cooperative, protectable airway, which this severely drowsy, hypoxic patient cannot reliably provide; intubation is safer."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2022 March","questions":[{"num":"08","text":"True regarding following therapies","options":[{"label":"A","text":"Metformin is contraindicated when eGFR is less than 60","rationale":"False — metformin is not simply contraindicated at eGFR<60; current guidance allows continued use with dose reduction down to around eGFR 30, with full contraindication only at lower eGFR."},{"label":"B","text":"In OP poisoning giving pralidoxime is recommended as level A evidence","rationale":"False — evidence for pralidoxime's benefit in organophosphate poisoning is actually contested/uncertain (not level A); trial evidence has been mixed."},{"label":"C","text":"intravenous sodium bicarbonate is indicated in severe tricyclic antidepressants toxicity","rationale":"True — IV sodium bicarbonate is the standard treatment for severe tricyclic antidepressant cardiotoxicity (widened QRS/arrhythmia)."},{"label":"D","text":"Penicillamine is used for treatment of Wilson’s disease","rationale":"True — penicillamine (a copper chelator) is used in the treatment of Wilson's disease."},{"label":"E","text":"Methanol is used for treatment of ethanol toxicity SBA","rationale":"False — it's the reverse: ethanol is used to treat methanol (and ethylene glycol) toxicity, not methanol used to treat ethanol toxicity."}],"reviewed_answer":["C","D"],"explanation":"Correct answer(s): C, D — see the reasoning under each option below."},{"num":"23","text":"A 28 year old female presented 3 hours following ingestion of unknown amount of iron tablets. She complains of abdominal pain and vomiting otherwise vital parameters are normal. What is the next step in management?","options":[{"label":"A","text":"Gastric lavage","rationale":"False — gastric lavage has limited value this many hours post-ingestion."},{"label":"B","text":"Activated charcoal","rationale":"False — activated charcoal does not effectively bind/adsorb iron, so it isn't useful in iron overdose."},{"label":"C","text":"Hemodialysis","rationale":"False — haemodialysis isn't the first step with normal vital parameters; it's reserved for severe toxicity."},{"label":"D","text":"Induce emesis","rationale":"False — induced emesis is generally avoided in modern poisoning management."},{"label":"E","text":"Polyglycolic acid","rationale":"True — whole bowel irrigation (using a polyethylene glycol-based solution) is the recommended decontamination method for significant iron ingestion, since charcoal is ineffective for iron."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"27","text":"A 20 years old women was admitted 30 hours following ingesting yellow oleander seeds. Her pulse rate was 48 bpm on admission. ECG showed a 2 degree heart block. What is the next step in management?","options":[{"label":"A","text":"Intravenous atropine","rationale":"True — with symptomatic bradycardia and 2nd degree heart block from cardiac glycoside (oleander) toxicity, IV atropine is the first-line step to try to increase heart rate."},{"label":"B","text":"Gastric lavage","rationale":"False — gastric lavage has limited value 30 hours post-ingestion."},{"label":"C","text":"Insertion of a temporary pacemaker","rationale":"False — temporary pacing is reserved for cases not responding to atropine or with higher-grade block, not the immediate first step here."},{"label":"D","text":"Observation only","rationale":"False — observation alone is inappropriate given the significant bradyarrhythmia (2nd degree block)."},{"label":"E","text":"Activated charcoal","rationale":"False — activated charcoal has limited value this many hours after ingestion."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"42","text":"unknown dose drug overdose.RR-8 no, constricted pupils,gcs5/15.no neurological weaknesses.most appropriate mx option?","options":[{"label":"A","text":"Dextrose","rationale":"False — dextrose would be given if hypoglycaemia were suspected, not indicated by this picture (constricted pupils, low RR)."},{"label":"B","text":"naloxon","rationale":"True — low respiratory rate, constricted (pinpoint) pupils, and reduced GCS without focal neurological weakness is the classic opioid toxidrome; naloxone is the appropriate treatment."},{"label":"C","text":"activated charcol","rationale":"False — activated charcoal isn't the priority management for a reduced-consciousness patient with respiratory depression."},{"label":"D","text":"Flumazenil","rationale":"False — flumazenil reverses benzodiazepines, not opioids; this picture (pinpoint pupils, low RR) is not classic for benzodiazepine toxicity."},{"label":"E","text":"NaHCO3","rationale":"False — bicarbonate isn't indicated by this clinical picture."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2021 March","questions":[{"num":"44","text":"A 24-year-old woman who was previously well, found to be unconscious by her husband and he has discovered amitriptyline tablets beside her. She has developed a tonic clonic seizure, lasting for 2 minutes while being taken to the hospital. ECG shows broad complex tachycardia. What is the most appropriate immediate treatment option?","options":[{"label":"A","text":"Carbamazepine","rationale":"False — carbamazepine isn't used to manage an acute seizure in this emergency setting."},{"label":"B","text":"Lorazepam","rationale":"True — the ongoing tonic-clonic seizure is the most immediately life-threatening active problem; lorazepam (a benzodiazepine) is the appropriate first-line treatment for TCA-associated seizures."},{"label":"C","text":"DC cardioversion","rationale":"False — DC cardioversion is reserved for haemodynamically unstable arrhythmia, not the immediate priority for an actively seizing patient (and the broad complex tachycardia here needs medical management, notably sodium bicarbonate, rather than cardioversion as first step)."},{"label":"D","text":"Phenytoin sodium","rationale":"False — phenytoin is generally avoided in TCA-related arrhythmia/seizures due to shared sodium-channel effects that can worsen cardiotoxicity."},{"label":"E","text":"Amiodarone","rationale":"False — amiodarone (and other class Ia/Ic antiarrhythmics) can worsen TCA-induced cardiotoxicity and should be avoided."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"45","text":"A 28 year old university student was admitted with a reduced level of consciousness. She has a past history of long term traumatic back pain, for which she is on multiple analgesics. On examination GCS =10/15, with pinpoint pupils, PR50bpm, BP-100/70mmHg, RR-6 breaths/min, lungs were clear on auscultation. Most appropriate management for the likely diagnosis is?","options":[{"label":"A","text":"IV Bicarbonate","rationale":"False — bicarbonate isn't indicated by this picture (this isn't TCA-type toxicity)."},{"label":"B","text":"Naloxone","rationale":"True — pinpoint pupils, reduced GCS, bradycardia, hypotension and a very low respiratory rate in a patient on long-term analgesics is classic opioid toxicity; naloxone is the appropriate treatment."},{"label":"C","text":"Pralidoxime","rationale":"False — pralidoxime treats organophosphate poisoning, not fitting this history (analgesic use, not agrochemical exposure)."},{"label":"D","text":"Flumazenil","rationale":"False — flumazenil reverses benzodiazepines, not opioids; the clinical picture here (pinpoint pupils) points to opioids, not benzodiazepines."},{"label":"E","text":"Atropine","rationale":"False — atropine treats bradycardia/muscarinic excess from organophosphate poisoning, not opioid toxicity."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2020 June","questions":[{"num":"39","text":"45 year old man was treated for organophosphate poisoning. On the second day of treatment he was found to be confused & pyretic. Pulse rate was 120bpm & blood pressure was 160/100 mmHg. Chest was clear. What is the next step in the management?","options":[{"label":"A","text":"Intubate & ventilate","rationale":"False — intubation/ventilation isn't indicated; the chest is clear and there's no respiratory failure described — this is anticholinergic delirium from atropine, not worsening OP toxicity."},{"label":"B","text":"stop atropine","rationale":"True — confusion, fever, tachycardia and hypertension on day 2 of OP treatment (with a clear chest, i.e. no ongoing cholinergic crisis) suggests atropine toxicity (anticholinergic delirium from over-treatment); stopping/reducing atropine is the appropriate step."},{"label":"C","text":"Give IV diazepam","rationale":"False — IV diazepam doesn't address the underlying cause (atropine excess)."},{"label":"D","text":"Give IM haloperidol","rationale":"False — IM haloperidol treats agitation symptomatically but doesn't address the underlying cause."},{"label":"E","text":"","rationale":"(Option text missing/illegible in the original source PDF.)"}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"43","text":"24 years old boy was brought to the ward fallowing self-ingestion of a agrochemical. He is agitated and confused. He was given O2 via a face mask. SpoO2 is 72%.Despite the above measures he is tachypneic and cyanosed. Arterial blood gas O2 level is 180mmHg. What is the agrochemical he has ingested?","options":[{"label":"A","text":"Glyphosate","rationale":"False — glyphosate doesn't classically cause this SpO2/PaO2 discordance (methemoglobinemia pattern)."},{"label":"B","text":"Carbamate","rationale":"False — carbamate causes a cholinergic toxidrome (similar to OP) but not this SpO2/PaO2 mismatch."},{"label":"C","text":"Organophosphate","rationale":"False — organophosphate also causes a cholinergic toxidrome, not this specific discordant hypoxia pattern."},{"label":"D","text":"Parquet","rationale":"False — paraquat causes severe pulmonary fibrosis and multi-organ toxicity, but not this acute SpO2/PaO2 discordance pattern."},{"label":"E","text":"Propanil","rationale":"True — a low pulse oximetry reading with a much higher measured arterial PaO2 (a classic discordance) points to methemoglobinemia, and propanil (a herbicide) is a well-recognised cause of methemoglobinemia in agrochemical poisoning."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."}]},{"date":"2019 November","questions":[{"num":"36","text":"A 20 years old, previously healthy women presented to hospital after 3 hours of consuming an unknown number of paracetamol tablets. What is the best management option?","options":[{"label":"A","text":"Gastric lavage and then start NAC","rationale":"False — starting NAC immediately without a level isn't standard for a straightforward acute single ingestion at only 3 hours."},{"label":"B","text":"N- Acetyl Cysteine","rationale":"False — NAC isn't started immediately without first assessing the level against the nomogram (for a single acute ingestion at a known time)."},{"label":"C","text":"Active charcoal","rationale":"False — activated charcoal could be considered within 1 hour of ingestion, but that window has passed."},{"label":"D","text":"Methionine","rationale":"False — methionine is a less preferred alternative and isn't the standard next step here."},{"label":"E","text":"Wait for 1 more hour and do according to the nomogram","rationale":"True — since paracetamol levels are only reliably interpreted on the nomogram from 4 hours post-ingestion, and she's currently at 3 hours, the appropriate step is to wait until 4 hours, check the level, and manage according to the nomogram."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"40","text":"Patient presented 4 hours after ingestion of OP his BP - 80/50, PR - 56, RR - 23, SpO2 88%. On auscultation crackles were heard. What is the next most appropriate management?","options":[{"label":"A","text":"250ml N/S bolus","rationale":"False — a fluid bolus alone doesn't address the underlying cholinergic excess causing bradycardia/hypotension/secretions."},{"label":"B","text":"Nebulize with 0.5ml salbutamol","rationale":"False — salbutamol nebulisation isn't the core treatment for OP-induced bronchial secretions/bradycardia."},{"label":"C","text":"Oxygen via venturi mask","rationale":"False — oxygen alone doesn't address the underlying muscarinic toxicity driving the hypoxia (bronchial secretions)."},{"label":"D","text":"Atropine 3mg IV bolus","rationale":"True — bradycardia, hypotension, and crackles (bronchial secretions) 4 hours after OP ingestion reflect muscarinic cholinergic excess; IV atropine is the core, most appropriate immediate treatment."},{"label":"E","text":"Pralidoxime 1g IV over 30min","rationale":"False — pralidoxime is a useful adjunct but atropine is the more immediately life-saving step for the muscarinic toxicity present."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."}]},{"date":"2019 March","questions":[{"num":"45","text":"30 year old female presented with 6 hours after ingestion of a poison. on examination her GCS is 8/15,pupils constricted,RR-6 breaths/min ,blood pressure 90/70,fine crepitation in both lung fields. What is the most likely should have ingested.","options":[{"label":"A","text":"midazolam","rationale":"False — midazolam (a benzodiazepine) doesn't classically cause pinpoint pupils."},{"label":"B","text":"morphine","rationale":"True — reduced GCS, pinpoint (constricted) pupils, and a very low respiratory rate, with bilateral fine crepitations (from opioid-associated non-cardiogenic pulmonary oedema), is classic for opioid (morphine) toxicity."},{"label":"C","text":"organophosphate","rationale":"False — organophosphate poisoning would typically also show bradycardia, excess secretions, sweating, and other muscarinic features not mentioned here as prominently as this pure opioid picture."},{"label":"D","text":"heroin","rationale":"False — heroin is also an opioid and would give a similar picture, but morphine fits this presentation as commonly taught/tested in this context."},{"label":"E","text":"amitriptyline","rationale":"False — amitriptyline (TCA) toxicity would show dilated (not pinpoint) pupils, and typically tachycardia/arrhythmia rather than this pattern."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"46","text":"24 year old girl found unconscious. Her RR 8/min. PR 60 bpm. Pin point pupil. What is the treatment option?","options":[{"label":"A","text":"Atropine","rationale":"False — atropine treats bradycardia from cholinergic excess, not opioid toxicity."},{"label":"B","text":"Flumanazile","rationale":"False — flumazenil reverses benzodiazepines, not opioids."},{"label":"C","text":"Methadone","rationale":"False — methadone is itself an opioid, not a treatment."},{"label":"D","text":"Nalaxone","rationale":"True — unconsciousness with a low respiratory rate and pinpoint pupils is classic opioid toxicity; naloxone is the treatment."},{"label":"E","text":"naltrexone","rationale":"False — naltrexone is used for longer-term opioid dependence management, not acute reversal of overdose (naloxone is used for that)."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."}]},{"date":"2018 November","questions":[{"num":"45","text":"36 year old female patient was admitted to the ward after ingestion of 40 tablets of diazepam (one tablet -5mg) and 5 tablets of paracetamol. she is drowsy and having respiratory depression. Respiratory rate is 6 per min and Sp02 is 88%. What is the most appropriate next step of the management?","options":[{"label":"A","text":"Intravenous Adrenaline","rationale":"False — adrenaline isn't indicated by this presentation (respiratory depression from sedative overdose)."},{"label":"B","text":"Intravenous Flumazenil","rationale":"False — flumazenil is risky in this setting (mixed overdose, unknown chronicity of benzodiazepine use) as it can precipitate seizures, and it doesn't reliably reverse this degree of respiratory depression safely."},{"label":"C","text":"Intravenous N-Acetyl Cystein","rationale":"False — NAC addresses the paracetamol component but doesn't address the immediate life-threatening respiratory depression (RR 6, SpO2 88%)."},{"label":"D","text":"Inravenous Atropine","rationale":"False — atropine isn't indicated here (no muscarinic toxidrome described)."},{"label":"E","text":"Intubation and Ventilation","rationale":"True — given the severity of respiratory depression (RR 6/min, SpO2 88%) from a large benzodiazepine overdose, securing the airway with intubation and ventilation is the safest and most appropriate next step, rather than the riskier option of flumazenil."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"46","text":"24 man came six hours after poisoning of unknown substance. He had excessive sweating, diarrhea and shortness of breath. On examination, Bi lateral basal lung crepitations, Pin point pupils, Pulse rate is 45bpm, Blood pressure 80/50mmHg. What is the most appropriate next step in the management?","options":[{"label":"A","text":"Intravenous Atropine","rationale":"True — sweating, diarrhoea, SOB, bilateral crepitations, pinpoint pupils, bradycardia and hypotension is the classic cholinergic (muscarinic) toxidrome of organophosphate poisoning; IV atropine is the core immediate treatment."},{"label":"B","text":"20ml/kg 0.9% NaCl bolus","rationale":"False — a plain fluid bolus alone doesn't address the underlying muscarinic excess."},{"label":"C","text":"Intravenous Pralidoxime","rationale":"False — pralidoxime is a useful adjunct but atropine remains the more immediately life-saving first step for the muscarinic toxicity."},{"label":"D","text":"Intravenous Nalaxone","rationale":"False — naloxone treats opioid toxicity, not this cholinergic OP toxidrome."},{"label":"E","text":"Intubation and Ventilation","rationale":"False — intubation/ventilation may be needed if the patient deteriorates further despite atropine, but isn't the first immediate step here."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"48","text":"30 years old female patient is taken to the hospital after ingestion of unknown plant. She is unconscious with dilated pupils, having jerky movements, dry mouth, hypotension, tachycardia, urinary retention. What is the most likely plant she has ingested?","options":[{"label":"A","text":"Gloriosa superba","rationale":"False — Gloriosa superba (glory lily) causes a colchicine-like toxicity (GI symptoms, multi-organ failure), not this anticholinergic picture."},{"label":"B","text":"Datura stramonium","rationale":"True — dilated pupils, dry mouth, tachycardia, urinary retention, jerky movements and altered consciousness is the classic anticholinergic toxidrome caused by Datura stramonium (thorn apple)."},{"label":"C","text":"Nerium Oleander","rationale":"False — Nerium oleander causes cardiac glycoside toxicity (bradyarrhythmia), not this anticholinergic picture."},{"label":"D","text":"Strychnosnux vomica","rationale":"False — Strychnos nux vomica causes strychnine poisoning with severe muscle spasms/rigidity (not this anticholinergic picture)."},{"label":"E","text":"Rinicus communicus","rationale":"False — Ricinus communis (castor bean) causes ricin toxicity with severe GI symptoms, not this anticholinergic picture."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2017 May","questions":[{"num":"30","text":"A 36 old man present with organophosphate poisoning. He is treated with atropine and pralidoxime. On day 2 develops high fever and becomes confused. Pulse rate is 120 beats /min and the blood pressure is 160/100mmHg.Lungs are clear on auscultation. What is the most appropriate immediate step in management?","options":[{"label":"A","text":"Intravenous co-amoxyclav","rationale":"False — co-amoxiclav isn't indicated; there's no clear infective source described, and this fits anticholinergic delirium from atropine rather than sepsis."},{"label":"B","text":"Intravenous diazepam","rationale":"False — diazepam doesn't address the underlying cause (atropine excess)."},{"label":"C","text":"Intramuscular haloperidol","rationale":"False — haloperidol treats agitation symptomatically but doesn't address the underlying cause."},{"label":"D","text":"Stop atropine","rationale":"True — high fever, confusion, tachycardia and hypertension with clear lungs on day 2 of OP treatment is anticholinergic delirium from atropine over-treatment; stopping atropine is the appropriate immediate step."},{"label":"E","text":"Repeat pralidoxime","rationale":"False — repeating pralidoxime doesn't address this atropine-toxicity picture."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"50","text":"A 23year old woman is admitted with a Hx of taking 28 tablets of PCM (500mg) 4hours before admission. Her weight is 52 Kg. She is asymptomatic and clinical Ex is normal. What is the most appropriate Mx?","options":[{"label":"A","text":"Supportive care with monitoring of Liver functions","rationale":"True — with a substantial overdose (28 x 500mg tablets, ~270mg/kg), supportive care with monitoring (including liver function) is appropriate while further management is guided by the paracetamol level/nomogram."},{"label":"B","text":"Treat with NAC infusion if PT is prolonged","rationale":"False — treating based on prolonged PT alone (rather than the standard nomogram-based level assessment) isn't the standard initial approach at 4 hours with an asymptomatic patient."},{"label":"C","text":"Treat with oral methionine","rationale":"False — oral methionine is a less preferred, less reliable alternative to NAC."},{"label":"D","text":"Treat with NAC only if the blood PCM level is above treatment line in the normogram","rationale":"Reasonable alternative phrasing of the standard approach (treat with NAC if the level is above the treatment line), similar in principle to the correct answer, but 'supportive care with monitoring' better captures the overall initial approach while awaiting the definitive level-based decision."},{"label":"E","text":"Treat with NAC continue if the blood PCM level is above treatment line in the normogram","rationale":"Similar reasoning to D — the emphasis on 'continuing' NAC assumes NAC has already started, which isn't yet established as necessary at this asymptomatic 4-hour stage before the level is known."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2015 November","questions":[{"num":"21","text":"A 49 year old male was found unconscious on road. On arrival his temperature is 370C, BP – 160/90 mmHg, PR- 90 bpm. Cardiac auscultation findings are normal. His RR-20/min, lungs clear. There is no neck stiffness. B/L pupils are 1mm in diameter, poorly reactive to light reflex and fundus is difficult to examine. B/L lower limb reflexes are normal except B/L plantar responses, which are extensors. What is the most likely diagnosis?","options":[{"label":"A","text":"Snake bite envenomation","rationale":"False — snake bite envenomation doesn't classically cause bilateral extensor plantar responses (a corticospinal/UMN sign) in this pattern."},{"label":"B","text":"Organophosphate poisoning","rationale":"False — while OP poisoning can cause miosis, it doesn't typically explain bilateral extensor plantar responses, and there's no cholinergic toxidrome (secretions, bradycardia) described here."},{"label":"C","text":"Pontine hemorrhage","rationale":"True — bilateral pinpoint pupils (from disrupted sympathetic pathways) together with bilateral extensor plantar responses (bilateral corticospinal tract involvement) in an unconscious patient found down is the classic picture of pontine haemorrhage."},{"label":"D","text":"Myasthenic crisis","rationale":"False — myasthenic crisis doesn't cause pinpoint pupils or extensor plantar responses."},{"label":"E","text":"Botulinum toxicity","rationale":"False — botulinum toxicity causes descending flaccid paralysis with dilated (not pinpoint) pupils, not this picture."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"44","text":"A 34 year old farmer was poisoned with organophosphate and is on treatment with IV atropine and pralidoxime. On the 2nd day he was flushed & agitated. He had dilated pupils, PR-120 bpm and BP -160 mmHg. Which of the following is the best treatment option?","options":[{"label":"A","text":"IV fluid","rationale":"False — more IV fluid doesn't address the underlying cause (atropine excess causing anticholinergic delirium)."},{"label":"B","text":"Stop pralidoxime","rationale":"False — stopping pralidoxime doesn't address this presentation, which reflects atropine excess rather than pralidoxime toxicity."},{"label":"C","text":"Connect to CPAP","rationale":"False — CPAP isn't indicated by this presentation (no respiratory failure described)."},{"label":"D","text":"Stop atropine","rationale":"True — flushed, agitated, dilated pupils, tachycardia and hypertension on day 2 of OP treatment reflects atropine toxicity (anticholinergic excess from treatment); stopping atropine is the appropriate step."},{"label":"E","text":"Give metronidazole","rationale":"False — metronidazole isn't indicated; there's no evidence of an infective process here."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"45","text":"An 18 year old girl presented following ingestion of 20 tablets of paracetamol. After 3 hours she had recurrent episodes of vomiting. Her weight is 45kg. What is the most appropriate management?","options":[{"label":"A","text":"Gastric lavage","rationale":"False — gastric lavage isn't the standard approach for paracetamol overdose management at this stage."},{"label":"B","text":"Observe without any intervention","rationale":"False — simple observation without checking the level and following the nomogram-based approach isn't appropriate given a significant ingestion."},{"label":"C","text":"Check plasma paracetamol level","rationale":"True — with recurrent vomiting complicating oral treatment and a significant timeframe elapsed, checking the plasma paracetamol level (once past the 4-hour mark) to guide nomogram-based treatment is the appropriate next step."},{"label":"D","text":"Give NAC","rationale":"False — starting NAC without first checking the level isn't the standard approach for a straightforward single acute ingestion at this point."},{"label":"E","text":"Give methionine","rationale":"False — methionine is a less preferred, less reliable alternative to NAC-based nomogram management."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2015 May","questions":[{"num":"43","text":"40 year old male presented to casualty ward following ingestion of 40 tablets of PCM & his weight is 50kg. He is continuously vomiting & drowsy. Best next management option is","options":[{"label":"A","text":"Oral methionine","rationale":"False — oral methionine is a less preferred, less reliable option, especially given ongoing vomiting (limiting oral absorption) in this severe overdose."},{"label":"B","text":"Activated charcoal","rationale":"False — activated charcoal has limited additional value at this point and doesn't address the significant risk from this massive ingestion."},{"label":"C","text":"LFTs","rationale":"False — LFTs are useful monitoring but don't constitute the definitive next management step for this large, symptomatic (vomiting, drowsy) overdose."},{"label":"D","text":"PDM levels in blood","rationale":"False — waiting for a paracetamol level introduces unnecessary delay given the massive dose (~400mg/kg) and concerning symptoms (drowsiness)."},{"label":"E","text":"IV NAC infusion","rationale":"True — given the massive overdose (~400mg/kg) with concerning symptoms (persistent vomiting, drowsiness), starting IV NAC infusion empirically without waiting for levels is the appropriate next step."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"45","text":"30 year old female presented with 6 hours after ingestion of a n unknown drug. On examination her GCS is 8/15, pupils are constricted, RR – 6r breaths/min, BP – 89/70mmHg & fine crepitations in both lung fields. What is the most likely drug she should have ingested?","options":[{"label":"A","text":"Midazolam","rationale":"False — midazolam doesn't classically cause pinpoint pupils."},{"label":"B","text":"Morphine","rationale":"True — reduced GCS, pinpoint pupils, very low respiratory rate and bilateral fine crepitations (opioid-associated pulmonary oedema) is classic for opioid (morphine) toxicity."},{"label":"C","text":"Organophosphate","rationale":"False — organophosphate poisoning would typically show additional muscarinic features (bradycardia, excess secretions, sweating) not emphasised here."},{"label":"D","text":"Heroin","rationale":"False — heroin is also an opioid and could fit, but morphine is the classic teaching answer for this presentation."},{"label":"E","text":"Amitriptyline","rationale":"False — amitriptyline toxicity would show dilated pupils and tachycardia/arrhythmia, not this pattern."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2014 November","questions":[{"num":"20","text":"T/F,","options":[{"label":"A","text":"Opioid withdrawal causes decreased salivation","rationale":"False — opioid withdrawal classically causes INCREASED (not decreased) secretions, including salivation, lacrimation and rhinorrhoea, as part of autonomic hyperactivity."},{"label":"B","text":"Disulfiram is given to detoxify alcohol","rationale":"Debatable phrasing — disulfiram doesn't 'detoxify' alcohol; it acts as a deterrent by causing an aversive reaction (acetaldehyde accumulation) when alcohol is consumed, discouraging further drinking rather than aiding detoxification itself."},{"label":"C","text":"Cannabis elevate the existing mood","rationale":"True — cannabis is known to elevate/enhance existing mood (euphoriant effect)."},{"label":"D","text":"Benzodiazepine withdrawal causes anxiety","rationale":"True — anxiety is a classic feature of benzodiazepine withdrawal."},{"label":"E","text":"Acamprosate is used as an anti-craving agent","rationale":"True — acamprosate is used as an anti-craving agent in alcohol dependence treatment."}],"reviewed_answer":["C","D","E"],"explanation":"Correct answer(s): C, D, E — see the reasoning under each option below."},{"num":"44","text":"34 yr old farmer was poisoned with organophosphate is treating with i/v atropine and pralidoxime. On the 2 day he was flushed. He has fever, PR-120
