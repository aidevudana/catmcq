ol strategy, not a rate control strategy."},{"label":"E","text":"can cause acute limb ischemia.","rationale":"True — AF can cause systemic embolisation, including acute limb ischaemia."}],"reviewed_answer":["B","C","E"],"explanation":"Correct answer(s): B, C, E — see the reasoning under each option below."},{"num":"4","text":"WOF true and false regarding rheumatic fever?","options":[{"label":"A","text":"is caused by beta hemolytic streptococcus","rationale":"True — rheumatic fever follows group A beta-haemolytic streptococcal infection."},{"label":"B","text":"Frequently affect myocardium","rationale":"True — rheumatic fever commonly causes pancarditis, including myocarditis."},{"label":"C","text":"Treated by iv ceftriaxone","rationale":"False — rheumatic fever (and the preceding streptococcal infection) is treated with penicillin, not ceftriaxone."},{"label":"D","text":"Chorea is a common feature","rationale":"True — Sydenham's chorea is one of the major Jones criteria and a recognised feature."},{"label":"E","text":"Usually affect small joints","rationale":"False — rheumatic fever classically causes migratory polyarthritis of LARGE joints, not small joints."}],"reviewed_answer":["A","B","D"],"explanation":"Correct answer(s): A, B, D — see the reasoning under each option below."},{"num":"20","text":"Regarding cardiac cycle","options":[{"label":"A","text":"MV, TV closes at early diastole","rationale":"False — the mitral and tricuspid valves close at the START of systole (not early diastole) — their closure is what marks the beginning of systole."},{"label":"B","text":"Atria contracts during late diastole","rationale":"True — atrial contraction ('atrial kick') occurs in late diastole, just before ventricular systole begins."},{"label":"C","text":"PV closes before AV during systole","rationale":"False — it's actually the reverse: the aortic valve closes before the pulmonary valve during the cardiac cycle (explaining physiological splitting of the second heart sound)."},{"label":"D","text":"Ventricular filling is a passive process","rationale":"True — ventricular filling is predominantly a passive process during early-to-mid diastole (with the atrial kick adding an active component at the end)."},{"label":"E","text":"Blood supply to cardiac muscle occurs during systole","rationale":"False — coronary blood flow to the myocardium occurs predominantly during DIASTOLE, not systole, since systolic compression of intramural vessels impedes flow."}],"reviewed_answer":["B","D"],"explanation":"Correct answer(s): B, D — see the reasoning under each option below."},{"num":"24","text":"50 Year old smoker diagnosed with inferior STEMI with right infarction. On examinati on, BP 80/60, PR-80. What is the initial management to increase his BP?","options":[{"label":"A","text":"dopamine","rationale":"False — dopamine could be considered but IV fluids are the first-line step in RV-infarct-related hypotension, which is preload-dependent."},{"label":"B","text":"Dobutamine","rationale":"False — dobutamine is an inotrope used later if fluids alone are insufficient."},{"label":"C","text":"Normal saline","rationale":"True — RV infarction causes preload-dependent hypotension; IV fluids (normal saline) are the first-line treatment to increase BP."},{"label":"D","text":"noradrenaline","rationale":"False — noradrenaline is reserved for refractory hypotension after fluid challenge."},{"label":"E","text":"temporary pacing","rationale":"False — temporary pacing would be for significant bradyarrhythmia/heart block, not the immediate first step for BP here."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"25","text":"A 45y old male have HTN,DL presented with SOB B/L bi basal crepitation with elevated JVP and orthopnea. what is the most appropriate treatment option?","options":[{"label":"A","text":"ACEI +statin +BB +spironolactone","rationale":"False — starting a beta-blocker acutely during decompensation can worsen the acute picture; it's typically introduced once the patient is stabilised."},{"label":"B","text":"ACEI + statin + furosemide + spironolactone","rationale":"True — ACEI + statin + furosemide + spironolactone treats the acute decompensation and underlying risk factors without the risk of acutely starting a beta-blocker."},{"label":"C","text":"ACEI + statin + furosemide + BB","rationale":"False — this omits spironolactone, which has proven benefit, in favour of a beta-blocker which is best deferred until stable."},{"label":"D","text":"BB+ statin + furosemide + spironolactone","rationale":"False — starting with a beta-blocker rather than an ACEI first isn't the preferred acute approach."},{"label":"E","text":"ACEI + statin + furosemide + GTN","rationale":"False — GTN can help acute symptoms but the core combination of ACEI+statin+furosemide+spironolactone addresses the underlying HF management better as the 'appropriate treatment option' overall."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"26","text":"22 years old girl presented to the medical clinic complaining palpitations, oligomenorr hea and lethargy for 3 months duration. on examination she was flushed sweaty PR 122 b pm and BP 80/60mmHg . on ECG regular pattern narrow QRS with absent P waves present What is the most appropriate next step in the management ?","options":[{"label":"A","text":"carotid sinus massaging","rationale":"False — vagal manoeuvres are first-line only in a haemodynamically STABLE patient; this patient is hypotensive (BP 80/60)."},{"label":"B","text":"adenosine infusion","rationale":"False — adenosine could be tried but with hypotension present, the priority shifts to addressing haemodynamic instability directly."},{"label":"C","text":"amlodipine infusion","rationale":"False — amlodipine is not used to treat SVT."},{"label":"D","text":"amiodarone","rationale":"False — amiodarone is not the first step for an unstable narrow-complex tachycardia."},{"label":"E","text":"cardio version","rationale":"True — with hypotension (BP 80/60) indicating haemodynamic instability, DC cardioversion is the appropriate next step per tachyarrhythmia management protocols."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"27","text":"35 yrs British lady came to ETU with SOB, palpitation. She came from England last week. She is healthy other than Hx of 2 miscarriages. What is the diagnostic investigation","options":[{"label":"A","text":"HRCT","rationale":"False — HRCT looks at lung parenchyma (e.g. interstitial disease), not specifically PE."},{"label":"B","text":"CT pulmonary angiogram","rationale":"True — CT pulmonary angiogram is the definitive diagnostic investigation for suspected PE."},{"label":"C","text":"D-dimer","rationale":"False — D-dimer is a screening/rule-out test, not the definitive diagnostic investigation."},{"label":"D","text":"CXR","rationale":"False — a plain CXR doesn't diagnose PE (though it's often done to exclude other causes)."},{"label":"E","text":"ECG","rationale":"False — ECG can show supportive signs (e.g. S1Q3T3, sinus tachycardia) but isn't diagnostic for PE."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"40","text":"A 65 year old man was diagnosed with right proximal lower limb deep vein thrombosis following total hip replacement. He was started with warfarin and the target INR is 2.5 What is the most appropriate next step in the management?","options":[{"label":"A","text":"Arrange IVC filter","rationale":"False — an IVC filter isn't needed here; there's no contraindication to anticoagulation mentioned."},{"label":"B","text":"Continue anticoagulant indefinitely","rationale":"False — indefinite anticoagulation isn't standard for a provoked DVT (following surgery)."},{"label":"C","text":"Discontinue warfarin after 3 weeks and do thrombophilia screening","rationale":"False — 3 weeks is too short a duration for treatment, and thrombophilia screening isn't routinely needed for a clearly provoked (post-surgical) DVT."},{"label":"D","text":"Stop warfarin in 2 weeks and start aspirin","rationale":"False — switching to aspirin at 2 weeks is inadequate treatment for DVT."},{"label":"E","text":"Give anticoagulant for 3 months","rationale":"True — for a provoked DVT following a major surgical risk factor (hip replacement), the standard treatment duration is around 3 months of anticoagulation."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."}]},{"date":"2018 November","questions":[{"num":"3","text":"Associations of cardiac arrhythmias:","options":[{"label":"A","text":"Hypomagnesemia- ventricular fibrillation","rationale":"True — hypomagnesaemia predisposes to ventricular arrhythmias, including VF."},{"label":"B","text":"Ventricular ectopic - hyperkalemia","rationale":"True — hyperkalaemia is associated with ventricular ectopy and other arrhythmias."},{"label":"C","text":"Atrial fibrillation - mitral stenosis","rationale":"True — mitral stenosis causing left atrial enlargement is a classic cause of atrial fibrillation."},{"label":"D","text":"Supraventricular tachycardia- Wolf Parkinson White syndrome","rationale":"True — Wolff-Parkinson-White syndrome predisposes to SVT (AVRT)."},{"label":"E","text":"2nd degree heart block- Acute myocardial infarction","rationale":"True — acute MI (especially inferior) can cause 2nd degree (and other) AV block."}],"reviewed_answer":["A","B","C","D","E"],"explanation":"Correct answer(s): A, B, C, D, E — see the reasoning under each option below."},{"num":"4","text":"Hypotension with elevated CVP","options":[{"label":"A","text":"Right heart failure","rationale":"True — right heart failure causes elevated CVP with reduced cardiac output/hypotension."},{"label":"B","text":"Septic shock","rationale":"False — septic shock classically presents with LOW CVP initially (vasodilation/relative hypovolaemia), not elevated."},{"label":"C","text":"Tricuspid regurgitation","rationale":"True — severe tricuspid regurgitation can elevate CVP and, in severe cases, contribute to reduced forward flow/hypotension."},{"label":"D","text":"Cardiac tamponade","rationale":"True — cardiac tamponade classically causes hypotension with elevated CVP (part of Beck's triad)."},{"label":"E","text":"Coarctation of aorta","rationale":"False — coarctation of the aorta causes upper-limb hypertension, not hypotension with elevated CVP."}],"reviewed_answer":["A","C","D"],"explanation":"Correct answer(s): A, C, D — see the reasoning under each option below."},{"num":"22","text":"A 50 year old patient presented with prolonged fever. On examination, there is a new onset pan systolic murmur at the cardiac apex which radiates to axilla, finger clubbing and spleenomegaly. He is having a chronic leg wound over the left leg for 1-month duration. What is the most appropriate antibiotic combination to this patient?","options":[{"label":"A","text":"Cefotaxime and gentamycine","rationale":"False — cefotaxime/gentamicin doesn't provide the empirical Gram-positive (staphylococcal, including possible MRSA) cover most relevant given the skin wound source."},{"label":"B","text":"Pencilline and gentamycin","rationale":"False — penicillin/gentamicin targets streptococci well but not staphylococci, which is a key concern given the skin wound."},{"label":"C","text":"Vancomycine and Gentamycine","rationale":"True — vancomycin (broad Gram-positive, including MRSA) with gentamicin (synergy, Gram-negative/enterococcal cover) is a reasonable broad empirical choice given the possible skin source of infection."},{"label":"D","text":"Cefotaxime and Vancomycine","rationale":"False — cefotaxime/vancomycin omits the aminoglycoside synergy useful while cultures are pending."},{"label":"E","text":"Vancomycin/ Cefotaxime/ Ampicilline","rationale":"False — a triple combination is broader than typically needed as first empirical choice; vancomycin+gentamicin is the more standard empirical answer here."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"24","text":"52 years old woman presented with sudden onset shortness of breath for 3 hours duration. She is on treatment for breast cancer for last 6 months. Chest X ray was normal on admission. What is the most likely diagnosis in this patient?","options":[{"label":"A","text":"Acute left ventricular failure","rationale":"True — acute left ventricular failure can present with sudden SOB but is less specifically linked to her malignancy risk factor."},{"label":"B","text":"Dissection of aortic aneurysm","rationale":"False — aortic dissection doesn't fit this presentation as well given the malignancy context and normal initial CXR."},{"label":"C","text":"Malignant pleural effusion","rationale":"False — malignant pleural effusion would usually show an abnormality on CXR, unlike here."},{"label":"D","text":"Primary pulmonary hypertension","rationale":"False — primary pulmonary hypertension wouldn't present this acutely."},{"label":"E","text":"Pulmonary embolism","rationale":"True — active malignancy is a major risk factor for venous thromboembolism, and sudden SOB with a normal initial CXR is classic for pulmonary embolism, the most likely diagnosis here."}],"reviewed_answer":["A","E"],"explanation":"Correct answer(s): A, E — see the reasoning under each option below."},{"num":"25","text":"A 25 years old previously healthy male patient presented with sudden onset central chest pain which is worsened with respiration and relieved with leaning forward. He went on a trip and participated in camping recently. ECG shows ST elevations in leads V3-V6, lead l, aVL, lead Il, Ill, aVE What is the most likely diagnosis?","options":[{"label":"A","text":"Acute left ventricular failure","rationale":"False — LV failure doesn't cause pleuritic pain relieved by leaning forward."},{"label":"B","text":"Acute Pericarditis","rationale":"True — pleuritic chest pain relieved by leaning forward, with widespread ST elevation, is classic for acute pericarditis (often post-viral, as suggested by the recent camping trip)."},{"label":"C","text":"Lobar pneumonia","rationale":"False — lobar pneumonia doesn't cause this diffuse ST elevation pattern."},{"label":"D","text":"Pneumothorax","rationale":"False — pneumothorax doesn't cause this ECG pattern."},{"label":"E","text":"Pulmonary embolism","rationale":"False — PE doesn't classically cause pain relieved by leaning forward or this ECG pattern."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2017 May","questions":[{"num":"1","text":"A 65 year old male seeks your advice on prevention of future heart attacks. He had a history of myocardial infarction 2 years ago and a 10 years history of diabetes mellitus. His body mass index is 33.5kg/m2 ,blood pressure is 152/92 mmHg and the total cholesterol is 220mg/L Which is the following drug/s would reduce the risk of future myocardial infarction?","options":[{"label":"A","text":"Aspirin","rationale":"True — aspirin has proven secondary prevention (mortality) benefit post-MI."},{"label":"B","text":"Enalapril","rationale":"True — an ACE inhibitor (enalapril) has proven benefit in secondary prevention, especially with comorbidities like diabetes and hypertension."},{"label":"C","text":"Metformin","rationale":"False — metformin manages glucose but isn't proven to specifically reduce future MI risk in this context."},{"label":"D","text":"Nitrates","rationale":"False — nitrates provide symptomatic relief without proven mortality/secondary-prevention benefit."},{"label":"E","text":"Spironolactone","rationale":"False — spironolactone's benefit is specific to HFrEF, not general secondary MI prevention absent heart failure here."}],"reviewed_answer":["A","B"],"explanation":"Correct answer(s): A, B — see the reasoning under each option below."},{"num":"16","text":"An uncomplicated ventricular septal defect(VSD) in an 18 years old boy is associated with","options":[{"label":"A","text":"Collapsing pulsas","rationale":"False — a collapsing pulse is associated with aortic regurgitation or PDA, not VSD."},{"label":"B","text":"Pansystolic murmur heard in the left lower sternal edge","rationale":"True — a pansystolic murmur at the left lower sternal edge is the classic VSD finding."},{"label":"C","text":"Clubbing the fingers","rationale":"False — clubbing isn't a feature of uncomplicated VSD (it would suggest Eisenmenger syndrome with cyanosis, a later complication)."},{"label":"D","text":"Wide splitting of the second heart sound","rationale":"False — wide splitting of S2 is more typical of ASD, not VSD."},{"label":"E","text":"ECG showing left ventricular hypertrophy","rationale":"True — chronic volume overload of the LV in VSD can lead to ECG evidence of LVH."}],"reviewed_answer":["B","E"],"explanation":"Correct answer(s): B, E — see the reasoning under each option below."},{"num":"21","text":"A 75 years old man presents with palpitations and shortens of breath. He did not have any heart disease in the past. His heart rate is between 70-80 beats per minute and irregular. The ECG shows atrial fibrillation. Blood pressure is 130/90 mmHg. Echocardiogram shows mild left ventricular hypertrophy with normal sized atrial with preserved left ventricular function and no valvular lesions. What is the most appropriate next step in the management?","options":[{"label":"A","text":"Start an ACE inhibitor","rationale":"False — an ACE inhibitor doesn't address the AF or its stroke risk."},{"label":"B","text":"Anticoagulate with warfarin","rationale":"True — with new AF at age 75 (a stroke risk factor by itself via CHA2DS2-VASc), anticoagulation with warfarin is the appropriate next step."},{"label":"C","text":"Use Dc shock to reverse the rhythm","rationale":"False — DC cardioversion isn't the most appropriate immediate next step without first considering anticoagulation status/duration of AF."},{"label":"D","text":"Start diagoxin","rationale":"False — starting digoxin addresses rate control but not the more pressing stroke prevention need."},{"label":"E","text":"Start atenolol","rationale":"False — atenolol addresses rate control similarly, but anticoagulation is the priority answer here."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"29","text":"70 years old male with calf pain in 100 m distance is on treatments for hypertension for 10 years. Now he is resistant to 3 medications for 6 months. What is the likely cause for his resistant hypertension","options":[{"label":"A","text":"Fibromuscular dysplasia of renal artery","rationale":"False — fibromuscular dysplasia is a cause of renal artery stenosis (a valid answer to consider) but the clinical context (claudication from PAD in this age group) points more towards atherosclerosis as the driver."},{"label":"B","text":"Atheresclerosis","rationale":"True — evidence of peripheral arterial disease (claudication) suggests atherosclerotic renal artery stenosis as the likely cause of his resistant hypertension."},{"label":"C","text":"Cushing’s syndrome","rationale":"False — Cushing's syndrome doesn't specifically explain the claudication finding here."},{"label":"D","text":"Thyrotoxicosis","rationale":"False — thyrotoxicosis doesn't classically cause resistant hypertension with claudication in this pattern."},{"label":"E","text":"Addison’s disease","rationale":"False — Addison's disease causes hypotension, not hypertension."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"34","text":"A 65 old woman is referred to the cardiology department with intermitte palpitations and “feeling flushed”. She also suffers from paroxysmal orthopnea There are no risk factors for ischemic heart disease or history of rhenuefever. On examination she appears well.There rae prominent “v” waves noted on inspection of jugular venous pulse. A pansystolic murmur is audine at the left sternal edge. The chest is clear on auscultation. Which of the following investigations is most likely to yield the underlying diagnosis?","options":[{"label":"A","text":"24-h urine 5-hydroxyindoleacetioacid (5 HIAA) estimation","rationale":"True — 24-hour urine 5-HIAA is the key diagnostic test for carcinoid syndrome, which explains the flushing, tricuspid regurgitation (prominent V waves, pansystolic murmur) and paroxysmal symptoms."},{"label":"B","text":"Echocardiogram","rationale":"False — an echocardiogram would help characterise the valve lesion but wouldn't identify the underlying systemic cause (carcinoid)."},{"label":"C","text":"24-h electrocardiogram","rationale":"False — a 24-hour ECG assesses arrhythmia, not the underlying systemic diagnosis suggested by the flushing and TR findings."},{"label":"D","text":"Chest radiography","rationale":"False — a chest radiograph wouldn't identify carcinoid syndrome as the cause."},{"label":"E","text":"Abdominal ultrasound","rationale":"False — abdominal ultrasound might show a primary carcinoid tumour eventually but isn't the most direct initial diagnostic test."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"45","text":"A 45 year old carpenter presented with progressive SOB with headache for 3 days. On Ex he was tachypnoic with a respiratory rate of 40/ min and blood pressure of 250/140mmHg. Examination of the lungs revealed the bilateral fine crepitation up to the mid zone. Flame shaped hemorrhage were noted on fundoscopy. He was propped up and treated with 60% o2, morphine 5mg with metachlopromide and frusemide 80mg intravenously. 30minutes later his clinical parameter remained unchanged. What is the next most appropriate treatment?","options":[{"label":"A","text":"Another IV bolus of frusemide","rationale":"False — another bolus of frusemide without addressing the severely elevated BP driving the pulmonary oedema and encephalopathy is unlikely to help further."},{"label":"B","text":"Increasing the O2 to 80%","rationale":"False — increasing oxygen alone doesn't address the underlying malignant hypertension."},{"label":"C","text":"GTN infusion","rationale":"True — with malignant hypertension (headache, papilloedema-type flame haemorrhages implied) causing pulmonary oedema unresponsive to initial diuretic/opioid therapy, an IV GTN infusion for controlled BP reduction is the next appropriate step."},{"label":"D","text":"Additional dose of morphine","rationale":"False — more morphine doesn't address the underlying severely elevated BP."},{"label":"E","text":"Immediate intubation and ventilation","rationale":"False — intubation would be considered if the patient deteriorates further/tires, but isn't the next most appropriate step before trying more targeted BP control."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2016 May","questions":[{"num":"07","text":"Causes of hypotension includes","options":[{"label":"A","text":"Acute adrenal insufficiency","rationale":"True — acute adrenal insufficiency (Addisonian crisis) causes hypotension."},{"label":"B","text":"Congenital adrenal hyperplasia","rationale":"True — the salt-wasting forms of congenital adrenal hyperplasia cause hypotension."},{"label":"C","text":"Cushing disease","rationale":"False — Cushing's disease causes hypertension (from excess cortisol), not hypotension."},{"label":"D","text":"Pituitary infarction","rationale":"True — pituitary infarction causes secondary adrenal insufficiency, leading to hypotension."},{"label":"E","text":"Myxedema coma","rationale":"True — myxedema coma (severe hypothyroidism) causes hypotension."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."}]},{"date":"2015 November","questions":[{"num":"3","text":"On examination BP 120/50 mmHg recorded in the right upper arm. What are the possibilities?","options":[{"label":"A","text":"AR","rationale":"True — aortic regurgitation causes a wide pulse pressure (collapsing pulse)."},{"label":"B","text":"MR","rationale":"False — mitral regurgitation doesn't classically cause a wide pulse pressure."},{"label":"C","text":"AS","rationale":"False — aortic stenosis causes a narrow pulse pressure, not wide."},{"label":"D","text":"PDA","rationale":"True — PDA causes diastolic runoff into the pulmonary circulation, widening the pulse pressure."},{"label":"E","text":"VSD","rationale":"False — VSD doesn't classically cause a wide pulse pressure."}],"reviewed_answer":["A","D"],"explanation":"Correct answer(s): A, D — see the reasoning under each option below."},{"num":"4","text":"Regarding aortic stenosis","options":[{"label":"A","text":"Can present with angina","rationale":"True — angina is part of the classic AS symptom triad (angina, syncope, dyspnoea) from increased myocardial demand with fixed outflow obstruction."},{"label":"B","text":"ECG may show left ventricular hypertrophy","rationale":"True — pressure overload from AS causes LVH, visible on ECG."},{"label":"C","text":"In severe disease there can be narrow pulse pressure.","rationale":"True — in severe AS, the pulse pressure narrows as the stroke volume becomes fixed/reduced."},{"label":"D","text":"Has a thrusting apex.","rationale":"False — AS classically causes a heaving/sustained (not thrusting/hyperdynamic) apex beat; a thrusting apex is more typical of volume-overload lesions like MR/AR."},{"label":"E","text":"Has a loud 2nd heart sound.","rationale":"False — severe AS causes a soft or absent second heart sound (due to a calcified, poorly mobile valve), not a loud one."}],"reviewed_answer":["A","B","C"],"explanation":"Correct answer(s): A, B, C — see the reasoning under each option below."},{"num":"24","text":"A 55 year old male who is a diagnosed patient with rheumatic heart disease, presented with drowsiness and faintishness. On examination he has irregularly irregular pulse, PR-160 bpm, and BP 70/50 mmHg. What is the most appropriate management for this patient?","options":[{"label":"A","text":"IV amiodarone","rationale":"False — amiodarone acts too slowly for this haemodynamically unstable presentation."},{"label":"B","text":"IV dobutamine","rationale":"False — dobutamine doesn't address the underlying arrhythmia causing instability."},{"label":"C","text":"DC cardioversion","rationale":"True — with PR 160, BP 70/50 and drowsiness (haemodynamic instability), DC cardioversion is the appropriate immediate management."},{"label":"D","text":"N/S intravenous infusion","rationale":"False — fluids alone don't address the tachyarrhythmia driving the instability."},{"label":"E","text":"IV digoxin","rationale":"False — IV digoxin acts too slowly for this acute unstable presentation."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"25","text":"A 60 year old previously well male complained of progressive breathlessness, abdominal discomfort and swelling of the legs. On examination there was gross ascites, elevated JVP, bi basal crepitations and an enlarged liver. BP 180/80 mmHg, RR - 25/min, PR – 36 BPM. On ECG heart rate was 96bpm. What is the best management option?","options":[{"label":"A","text":"Digoxin","rationale":"False — digoxin alone doesn't address the profound bradycardia contributing to the low cardiac output here."},{"label":"B","text":"Digoxin + Furosemide","rationale":"False — digoxin+furosemide doesn't address the bradycardia component."},{"label":"C","text":"Furosemide","rationale":"False — furosemide alone treats congestion but not the bradycardic component limiting cardiac output."},{"label":"D","text":"Abdominal paracentesis","rationale":"False — paracentesis addresses ascites symptomatically but not the underlying haemodynamic problem."},{"label":"E","text":"Transthoracic pacemaker","rationale":"True — the marked discrepancy between the palpated pulse (36) and the ECG heart rate (96) suggests many beats aren't perfusing effectively (e.g. high-grade block/poor stroke volume), and severe congestive failure with symptomatic bradycardia warrants pacing."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"26","text":"A 55 year old male with history of diabetes mellitus and hypertension presented with retrosternal chest pain. ECG showed 4mm ST elevations in lead V1 to V6. Streptokinase was given after excluding contraindications. After 2 hours, pain persists and ECG shows 3mm ST elevations. What is the best management option?","options":[{"label":"A","text":"Urgent coronary artery bypass grafting","rationale":"False — urgent CABG isn't the standard next step immediately after failed thrombolysis; rescue PCI is preferred where available."},{"label":"B","text":"Rescue percutaneous coronary interventions","rationale":"True — persistent chest pain and failure of ST elevation to resolve after thrombolysis indicates failed reperfusion, for which rescue PCI is the appropriate next step."},{"label":"C","text":"Repeat thrombolysis with alteplase","rationale":"False — repeating thrombolysis carries increased bleeding risk and is not preferred over rescue PCI."},{"label":"D","text":"Subcutaneous enoxaparin","rationale":"False — enoxaparin alone doesn't address the ongoing occluded vessel."},{"label":"E","text":"IV GTN","rationale":"False — IV GTN provides symptomatic relief but doesn't address the failed reperfusion requiring mechanical intervention."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"33","text":"A 35 year old male presents with bilateral ankle swelling to his routine medical checkup. BP160/105 mmHg, PR- 78bpm, UFR- protein ++, RBC – 2hpf, serum creatinine-increased, blood urea- increased, Na+- normal, K+-normal, GFR-40, USS-increased cortical echogenicity, normal size kidney. What will be the best drug?","options":[{"label":"A","text":"Methyldopa","rationale":"False — methyldopa doesn't provide the renoprotective benefit needed here."},{"label":"B","text":"Nifedipine","rationale":"False — nifedipine controls BP but doesn't specifically address proteinuria/renoprotection."},{"label":"C","text":"Captopril","rationale":"True — with proteinuria and reduced GFR, an ACE inhibitor (captopril) is preferred for its renoprotective effect alongside BP control."},{"label":"D","text":"Prazocin","rationale":"False — prazosin doesn't offer the renoprotective benefit of ACEI in CKD with proteinuria."},{"label":"E","text":"Sildenafil","rationale":"False — sildenafil is not an antihypertensive used for this indication."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"42","text":"An 80 year old male presented with 4 weeks history of fever. During last 2 years he had similar lower urinary tract symptoms. Symptoms disappear after treating with norfloxacilin. But fever persists. He has hypertension, diabetes and prostatism and is on metformin and prazocin. He has mild pallor and a splenomegaly. A diagnosis of infective endocarditis is made. What is the most likely causative organism for infective endorcarditis in this patient?","options":[{"label":"A","text":"Enterococci","rationale":"True — enterococci are the classic cause of IE arising from a genitourinary source, fitting this patient's recurrent UTIs and prostatism."},{"label":"B","text":"Gram negative organism","rationale":"False — Gram-negative organisms are a less common cause of IE overall compared with enterococci in this GU-source context."},{"label":"C","text":"Salmonella","rationale":"False — Salmonella IE is uncommon and not specifically linked to recurrent UTI/prostatism."},{"label":"D","text":"Staphylococci","rationale":"False — Staphylococci are more associated with skin sources or IVDU, not specifically this GU history."},{"label":"E","text":"Viridans Streptococci","rationale":"False — viridans streptococci are classically linked to dental/oral sources, not a GU portal of entry."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2015 May","questions":[{"num":"02","text":"50 year old patient had a ischaemic storke. Which of the following Ix/s are helpful to find out that the cause due to cardiac pathology?","options":[{"label":"A","text":"24 hour ECG monitoring","rationale":"True — 24-hour ECG monitoring can detect paroxysmal AF as an embolic source."},{"label":"B","text":"2D echo","rationale":"True — 2D echo can detect a cardiac source of embolism (e.g. mural thrombus, valvular disease)."},{"label":"C","text":"FBS","rationale":"False — FBS assesses a risk factor (diabetes), not a specific cardiac embolic source."},{"label":"D","text":"Lipid profile","rationale":"False — lipid profile similarly assesses a risk factor, not the cardiac cause itself."},{"label":"E","text":"Carotid Doppler","rationale":"False — carotid Doppler assesses a vascular (not cardiac) source of embolism."}],"reviewed_answer":["A","B"],"explanation":"Correct answer(s): A, B — see the reasoning under each option below."},{"num":"03","text":"What are the treatment options in patient with NSTEMI?","options":[{"label":"A","text":"Streptokinase","rationale":"False — thrombolysis (streptokinase) is not used in NSTEMI; it's reserved for STEMI."},{"label":"B","text":"Heparin","rationale":"True — heparin (anticoagulation) is part of standard NSTEMI management."},{"label":"C","text":"Clopidogrel","rationale":"True — clopidogrel (dual antiplatelet therapy) is standard in NSTEMI management."},{"label":"D","text":"Warfarin","rationale":"False — warfarin isn't part of standard acute NSTEMI treatment."},{"label":"E","text":"Atrovastatin","rationale":"True — statin therapy (atorvastatin) is standard in ACS management."}],"reviewed_answer":["B","C","E"],"explanation":"Correct answer(s): B, C, E — see the reasoning under each option below."},{"num":"04","text":"Which of the following statements regarding hypertension is/are true?","options":[{"label":"A","text":"ACEI is drug of choice in HTN associated with systemic sclerosis","rationale":"True — ACE inhibitors are particularly important in hypertension associated with systemic sclerosis (preventing/treating scleroderma renal crisis)."},{"label":"B","text":"ARB is contraindicated in diabetic nephropathy","rationale":"False — ARBs are actually recommended (not contraindicated) in diabetic nephropathy for their renoprotective effect."},{"label":"C","text":"Prazocin causes postural hypotension","rationale":"True — prazosin (an alpha-blocker) classically causes postural hypotension."},{"label":"D","text":"CCB are safe during pregnancy.","rationale":"True — calcium channel blockers (e.g. nifedipine) are considered safe and commonly used in pregnancy-related hypertension."},{"label":"E","text":"Thiazides are contraindicated in elderly","rationale":"False — thiazides are actually effective and generally well-tolerated in the elderly, not contraindicated."}],"reviewed_answer":["A","C","D"],"explanation":"Correct answer(s): A, C, D — see the reasoning under each option below."},{"num":"25","text":"35 year old male with a previous history of STEMI presented with SOB & ankle oedema after 2/52. Echo showed scarring of the L/ventricle. What is the best drug with survival benefit for this patient?","options":[{"label":"A","text":"ISMN","rationale":"False — ISMN provides symptom relief, not proven survival benefit."},{"label":"B","text":"Carvadilol","rationale":"True — carvedilol (a beta-blocker) has proven mortality benefit in HFrEF following MI with LV scarring."},{"label":"C","text":"Diltiazem","rationale":"False — diltiazem is a negative inotrope and is generally avoided in HFrEF."},{"label":"D","text":"Warfarin","rationale":"False — warfarin would only be relevant if there were a specific indication like LV thrombus or AF, not general survival benefit in HFrEF itself."},{"label":"E","text":"Frusemide","rationale":"False — frusemide is symptomatic, without proven survival benefit."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"41","text":"26 year old lady presented with 2 day history of calf swelling which is painful. She has a history of 2 miscarriages. She is a diagnosed patient with SLE. What is the most appropriate Ix in immediate management?","options":[{"label":"A","text":"Lupus anticoagulants","rationale":"False — lupus anticoagulant testing is relevant to the underlying diagnosis (antiphospholipid syndrome) but isn't the immediate priority over confirming the acute DVT."},{"label":"B","text":"2D echo","rationale":"False — echo isn't the immediate test needed for a painful swollen calf."},{"label":"C","text":"Anti cardiolipin antibiotics","rationale":"False — anticardiolipin antibody testing, similarly, is relevant to the underlying cause but not the immediate management priority."},{"label":"D","text":"Duplex scan of the left leg","rationale":"True — with a painful swollen calf, a duplex scan of the leg is the immediate investigation needed to confirm or exclude DVT."},{"label":"E","text":"D dimers","rationale":"False — D-dimer has poor specificity in a patient with a high pre-test probability and known SLE/recurrent miscarriages; imaging (duplex) is more appropriate as the immediate step."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."}]},{"date":"2014 November","questions":[{"num":"3","text":"Which of the following has mortality benefit in CCF?","options":[{"label":"A","text":"Spironolactone","rationale":"True — spironolactone has proven mortality benefit in heart failure."},{"label":"B","text":"Captopril","rationale":"True — captopril (ACEI) has proven mortality benefit in heart failure."},{"label":"C","text":"Isosorbide mononitrate","rationale":"False — ISMN provides symptomatic benefit only."},{"label":"D","text":"Frusemide","rationale":"False — frusemide is symptomatic, without proven mortality benefit."},{"label":"E","text":"Metoprolol","rationale":"True — metoprolol (beta-blocker) has proven mortality benefit in heart failure."}],"reviewed_answer":["A","B","E"],"explanation":"Correct answer(s): A, B, E — see the reasoning under each option below."},{"num":"4","text":"22yr old girl with BP – 160/100 mmHg. Which of the causes are correctly matched,","options":[{"label":"A","text":"Hypokalemia – Crohn’s disease","rationale":"False — hypokalaemia is not a classic association with Crohn's disease in the context of hypertension causes (that pairing is more classically linked to conditions like Conn's syndrome)."},{"label":"B","text":"Café au lait spots – Pheochromocytoma","rationale":"True — café-au-lait spots are associated with neurofibromatosis type 1, which predisposes to phaeochromocytoma."},{"label":"C","text":"","rationale":"(Option text is blank/illegible in the original source PDF.)"},{"label":"D","text":"Short lower limbs – Coarctation of aorta","rationale":"False — coarctation of the aorta is classically associated with radiologically notched ribs and differential upper/lower limb blood pressure, not 'short lower limbs' as such."},{"label":"E","text":"Presence of red cells – Renal artery stenosis","rationale":"False — renal artery stenosis doesn't classically cause haematuria; that finding points more towards a glomerular cause."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"24","text":"28yr old man with known valvular heart disease presented with fever for 2 weeks durationand SOB. O/E - temperature -38.3C, harsh pansystolic murmur and mild bibasal crepitations. Blood cultures were taken. What is the most appropriate next step in management,","options":[{"label":"A","text":"ECG","rationale":"False — ECG is a routine part of workup but not the key next step for confirming the suspected diagnosis here."},{"label":"B","text":"IV antibiotics","rationale":"False — IV antibiotics could be started empirically but the vignette specifically asks for the most appropriate NEXT step in a diagnostic sense following blood cultures."},{"label":"C","text":"throat swab","rationale":"False — throat swab isn't relevant to this presentation."},{"label":"D","text":"frusemide","rationale":"False — frusemide treats symptomatic fluid overload but doesn't address establishing the diagnosis."},{"label":"E","text":"2D – Echo","rationale":"True — with known valvular disease, fever, a new pansystolic murmur and blood cultures already taken, a 2D echo is the key next step to look for vegetations and confirm infective endocarditis."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"25","text":"25 yr primigravida mother in T3 of pregnancy, admitted to emergency medical clinic withprogressive worsening of SOB for 3 days. O/E-BP-90/60 mm HR. PR-100 with fine basal crepitations. oxygen saturation on room air - 90%. What is the most appropriate Investigation?","options":[{"label":"A","text":"Troponin I","rationale":"False — troponin might be checked but isn't the most useful initial test to differentiate the range of possible causes here (PE, pneumonia, cardiomyopathy)."},{"label":"B","text":"Chest x-ray","rationale":"True — a chest X-ray (with appropriate shielding) is a safe, useful initial investigation in pregnancy to look at differentials like pneumonia, effusion, or cardiomegaly before further specific imaging."},{"label":"C","text":"ABG","rationale":"False — an ABG quantifies hypoxia but doesn't establish the underlying cause."},{"label":"D","text":"Transthoracic Echocardiogram","rationale":"False — an echo would be useful too, but CXR is the simpler, safe first-line initial test in this acute pregnant presentation."},{"label":"E","text":"FBC","rationale":"False — FBC doesn't help establish the cause of acute hypoxic breathlessness here."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"26","text":"43 yr old female presented with severe headache. O/E-BP - 230/120mm Hg and papilloedema. What is the best treatment option?","options":[{"label":"A","text":"Sublingual GTN","rationale":"False — sublingual GTN provides only brief symptomatic relief, not the controlled reduction needed for a hypertensive emergency."},{"label":"B","text":"Sublingual nifedipine","rationale":"False — sublingual nifedipine causes unpredictable, potentially dangerous rapid BP drops and is avoided in hypertensive emergencies."},{"label":"C","text":"Prazosin And atenolol","rationale":"False — oral agents act too slowly for a hypertensive emergency with papilloedema."},{"label":"D","text":"IV GTN","rationale":"True — with BP 230/120 and papilloedema (malignant hypertension), a controlled IV GTN infusion is the appropriate treatment."},{"label":"E","text":"Frusemide infusion","rationale":"False — frusemide alone doesn't address the severely elevated BP driving this emergency."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."}]},{"date":"2014 May","questions":[{"num":"4","text":"Features of pulmonary hypertension.","options":[{"label":"A","text":"RBBB","rationale":"True — right bundle branch block is a recognised ECG feature reflecting right heart strain in pulmonary hypertension."},{"label":"B","text":"Loud 2nd heart sound","rationale":"True — a loud pulmonary component of the second heart sound (loud t":"HCT","rationale":"False — hydrochlorothiazide doesn't provide the same combined HF-prognostic benefit as an ACEI."},{"label":"D","text":"Spironolactone","rationale":"False — spironolactone is a later add-on once on ACEI/beta-blocker, not the first next step here."},{"label":"E","text":"Verapamil","rationale":"False — verapamil is a negative inotrope generally avoided in heart failure."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"26","text":"Patient with small complexes in ECG, increased JVP, hypotension, muffled heart sound, X-ray showed dilated","options":[{"label":"A","text":"Constrictive pericarditis","rationale":"False — constrictive pericarditis can show similar signs but not classically 'small complexes with dilated silhouette' as vividly as tamponade with effusion."},{"label":"B","text":"Cardiac tamponade","rationale":"True — small ECG complexes (low voltage from the surrounding fluid), elevated JVP, hypotension, muffled heart sounds and an enlarged (dilated/globular) cardiac silhouette on X-ray together indicate cardiac tamponade from pericardial effusion."},{"label":"C","text":"Restrictive pericarditis","rationale":"False — restrictive pericarditis doesn't typically show a dilated cardiac silhouette on X-ray in this way."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"36","text":"23 yr old female presented with BP 190/110 mmHg, FBS 120 mg/dl, Na+ 138, K+ 3.1 What is the cause for her hypertension.","options":[{"label":"A","text":"Co-arctation of aorta","rationale":"False — coarctation doesn't explain the hypokalaemia here."},{"label":"B","text":"Conn’s disease","rationale":"True — hypertension with hypokalaemia (K+ 3.1) in a young patient is classic for Conn's syndrome (primary hyperaldosteronism)."},{"label":"C","text":"Metabolic syndrome","rationale":"False — metabolic syndrome doesn't classically cause this degree of hypokalaemia."},{"label":"D","text":"Pheochromocytoma","rationale":"False — phaeochromocytoma classically causes paroxysmal hypertension with palpitations/sweating, not this hypokalaemic pattern as the leading clue."},{"label":"E","text":"Oral contraceptive pills","rationale":"False — oral contraceptive pills can cause hypertension but not this hypokalaemic pattern."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"42","text":"70 years old male presented with fever for 2 weeks, anorexia & weakness. But no weight loss or evening pyrexia. He has a hx of hypertension, chronic asthma, BPH with recurrent UTI. On examination he is pale, soft systolic murmur present with basal crepitus and bilateral wheezes. Most predictive sing of infective endocarditis in the patient is,","options":[{"label":"A","text":"Conjunctival petichiae","rationale":"True — conjunctival petechiae are a classic peripheral stigma highly suggestive of infective endocarditis."},{"label":"B","text":"General maculopapular rash","rationale":"False — a general maculopapular rash is nonspecific and not a classic IE stigma."},{"label":"C","text":"Hepatomegaly","rationale":"False — hepatomegaly is nonspecific and not a discriminating IE sign."},{"label":"D","text":"Loin tenderness","rationale":"False — loin tenderness would suggest a renal source rather than being a predictive sign of IE itself."},{"label":"E","text":"Tender prostate in DRE","rationale":"False — a tender prostate suggests active prostatitis (a possible portal of entry) but isn't itself a predictive stigma of IE."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2013 November","questions":[{"num":"8","text":"T/f which of the following are recognized cases of pulmonary hypertension?","options":[{"label":"A","text":"Obstructive sleep apnoea","rationale":"True — obstructive sleep apnoea causes chronic hypoxia leading to pulmonary vasoconstriction and pulmonary hypertension."},{"label":"B","text":"Mitral Stenosis","rationale":"True — mitral stenosis raises left atrial pressure, causing pulmonary venous hypertension."},{"label":"C","text":"Pericardial effusion","rationale":"False — pericardial effusion is not a recognised cause of pulmonary hypertension."},{"label":"D","text":"COPD","rationale":"True — COPD causes hypoxic pulmonary vasoconstriction, a classic cause of pulmonary hypertension (cor pulmonale)."},{"label":"E","text":"Recurrent pulmonary embolization","rationale":"True — recurrent pulmonary embolisation causes chronic thromboembolic pulmonary hypertension (CTEPH)."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."},{"num":"9","text":"Which of the following are true?","options":[{"label":"A","text":"Psychogenic breathłessness mainly disturbs sleep","rationale":"False — psychogenic/hyperventilation-related breathlessness typically does NOT disturb sleep (organic causes are more likely to wake patients)."},{"label":"B","text":"Thromboembolism alone caúses chronic breathlessness","rationale":"False — a single/isolated thromboembolic event causes acute (not chronic) breathlessness; chronic breathlessness from thromboembolic disease usually requires recurrent emboli (CTEPH)."}],"reviewed_answer":[],"explanation":"Source text is truncated here (only 2 of the presumed 5 options survive in the PDF), and neither surviving option is a correct statement as written — treat this one as unresolved from the available source text."},{"num":"10","text":"T/f 78 yr old man sudden onset black outs while exercising at gymnasium lasted 2 minutes were reviled by cardiac massage,which of the following are appropriate in investigating to diagnose?","options":[{"label":"A","text":"Plain CT","rationale":"False — plain CT isn't useful for diagnosing the cause of an arrhythmic collapse."},{"label":"B","text":"ECG","rationale":"True — a baseline ECG is an essential first investigation."},{"label":"C","text":"ECHO","rationale":"True — echocardiography assesses for structural heart disease that could explain exercise-related collapse."},{"label":"D","text":"Ex- { ECG","rationale":"True — exercise ECG can help assess for exercise-induced ischaemia or arrhythmia."},{"label":"E","text":"Halter monitoring","rationale":"True — Holter monitoring helps detect intermittent arrhythmias responsible for the collapse."}],"reviewed_answer":["B","C","D","E"],"explanation":"Correct answer(s): B, C, D, E — see the reasoning under each option below."},{"num":"SBA 5","text":"A 79 yr old female presented with a Hx of recurrent falis and transient LOC, on ex- no neurologicat signs ,BP- 110/90, pules 75, on auscultation there was a systolic murmur in aortic area which radiates to neck, which of the following ix would help in diagnosis ?(SBR)","options":[{"label":"A","text":"Contrast CT","rationale":"False — a contrast CT isn't the key investigation for a suspected valvular cause of syncope."},{"label":"B","text":"EEG","rationale":"False — EEG would be relevant if a seizure were suspected, but the murmur points to a cardiac cause."},{"label":"C","text":"Echo","rationale":"True — with recurrent falls/syncope and a systolic murmur radiating to the neck (aortic area), an echocardiogram is the key investigation to confirm aortic stenosis as the cause."},{"label":"D","text":"ECG","rationale":"False — ECG can show LVH but isn't diagnostic of the valvular lesion itself."},{"label":"E","text":"CXR","rationale":"False — CXR isn't the key diagnostic investigation for suspected AS-related syncope."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"6","text":"26 yr old female with a Hx of palpitions, past Hx of M, conscious, BP-110/900 mmHg, ECG- broad QRS complexes. What is the next ntervention?(SBR)","options":[{"label":"A","text":"IV amiadarone","rationale":"True — with a past MI (substrate for VT), broad complex tachycardia, but the patient conscious and BP reasonably maintained, IV amiodarone (medical rhythm control) is appropriate before considering DC shock."},{"label":"B","text":"IV digoxin","rationale":"False — digoxin isn't used for VT management."},{"label":"C","text":"IV adenosine","rationale":"False — adenosine is used for narrow-complex SVT, not broad-complex VT."},{"label":"D","text":"Carotid massage","rationale":"False — carotid massage is a vagal manoeuvre for narrow-complex SVT, not appropriate for broad-complex VT."},{"label":"E","text":"DC shock","rationale":"False — DC shock is reserved for when the patient is haemodynamically unstable; here she remains conscious with a maintained BP, so medical treatment is tried first."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2013 Eastern","questions":[{"num":"BOF 2","text":"75 year old women who has recurrent angina on GTN spray, aspirin, atorvastatin, enapril and verapamil came to clinic. On examination her BP 196/80 pulse 60bpm.to prevent the above problem what is your appropriate next management.","options":[{"label":"1","text":"Changing verapamil to diltiazem","rationale":"Uncertain — switching verapamil to diltiazem doesn't clearly address her elevated systolic BP or recurrent angina."},{"label":"2","text":"Changing enapril to captopril","rationale":"Uncertain — switching enalapril to captopril is a lateral move within the same drug class and doesn't improve BP/anginal control."},{"label":"3","text":"Add beta blocker","rationale":"Caution — adding a beta-blocker while she remains on verapamil risks significant bradycardia/heart block, since combining a non-dihydropyridine CCB with a beta-blocker is a recognised hazardous combination."},{"label":"4","text":"Give daily oral GTN","rationale":"Plausible — adding daily oral GTN could help symptomatic anginal control without the interaction risk of option 3."},{"label":"5","text":"Reassure that it is normal","rationale":"False — a BP of 196/80 with ongoing symptoms is not something to simply reassure as normal."}],"reviewed_answer":["4"],"explanation":"Genuinely tricky one: she's already on several agents, and the safest read is that adding daily oral GTN (option 4) helps symptomatically without the bradycardia/heart-block risk of combining a beta-blocker with her existing verapamil (option 3) — but this call carries real uncertainty; cross-check against your lecture notes."},{"num":"BOF 7","text":"A 28 year old obese female presented with BP 190/110,blood sugar -120g/dl, Na+-138mmol/l, K+-3.1mmol/l. What is the most likely diagnosis?","options":[{"label":"1","text":"CKD","rationale":"False — CKD doesn't typically produce this degree of hypokalaemia as the leading feature."},{"label":"2","text":"Conn’s disease","rationale":"True — hypertension with hypokalaemia (K+ 3.1) in a young patient is classic for Conn's syndrome (primary hyperaldosteronism)."},{"label":"3","text":"Metabolic syndrome","rationale":"False — metabolic syndrome doesn't classically cause this degree of hypokalaemia."},{"label":"4","text":"Phaechromocytoma","rationale":"False — phaeochromocytoma classically presents with paroxysmal hypertension/palpitations, not this hypokalaemic biochemical pattern as the leading clue."},{"label":"5","text":"Oral contraceptive pills","rationale":"False — oral contraceptive pills can raise BP but don't cause this hypokalaemic pattern."}],"reviewed_answer":["2"],"explanation":"Correct answer(s): 2 — see the reasoning under each option below."},{"num":"TOF 21","text":"In JVP","options":[{"label":"1","text":"a wave indicates atrial contraction","rationale":"True — the 'a' wave in the JVP reflects atrial contraction."},{"label":"2","text":"There are 3 positive waves","rationale":"True (by common teaching) — the JVP waveform is classically described with three components (a, c, v waves)."},{"label":"3","text":"V wave indicates TR","rationale":"True — a large 'v' wave in the JVP is characteristic of tricuspid regurgitation."},{"label":"4","text":"V wave indicates SVC obstruction","rationale":"False — SVC obstruction causes a persistently elevated, non-pulsatile JVP without a specific 'v' wave association; it doesn't fall with inspiration but isn't characterised by v-wave changes."},{"label":"5","text":"a wave absent in atrial fibrillation","rationale":"True — since there's no coordinated atrial contraction in atrial fibrillation, the 'a' wave is absent."}],"reviewed_answer":["1","2","3","5"],"explanation":"Correct answer(s): 1, 2, 3, 5 — see the reasoning under each option below."}]},{"date":"2012 November","questions":[{"num":"12","text":"Regarding hypertension","options":[{"label":"A","text":"Spironolactone is used to treat resistant hypertension","rationale":"True — spironolactone is a recognised, evidence-based add-on treatment for resistant hypertension."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"SBR 4","text":"A 45 year old man present with recurrent episodes of left sided chest pain on exertion. What is the next step of investigation for diagnosis of his condition,","options":[{"label":"A","text":"Coronaryangiography","rationale":"False — coronary angiography is more invasive and typically follows a positive non-invasive test, not the first-line investigation."},{"label":"B","text":"Echocardiograph","rationale":"False — echocardiography assesses structure/function but isn't the standard first diagnostic test for suspected angina."},{"label":"C","text":"Stress ECG","rationale":"True — exercise (stress) ECG is the standard initial investigation for diagnosing stable angina from recurrent exertional chest pain."},{"label":"D","text":"Troponin","rationale":"False — troponin is used to rule out acute myocardial injury (ACS), not to diagnose stable exertional angina."},{"label":"E","text":"ANP level","rationale":"False — ANP level isn't used in the diagnostic workup of angina."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"SBR 5","text":"65 year old male was admitted with community acquired pneumonia and started on antibiotics. Next day he developed palpitatiorns and pulse was irregular. BP= 110/80. What is the most likely cause?","options":[{"label":"A","text":"Atrial flutter with 2:1 block","rationale":"False — atrial flutter with 2:1 block typically gives a regular, not irregular, pulse."},{"label":"B","text":"Atrial fibrillation","rationale":"True — new-onset atrial fibrillation is a well-recognised complication of an acute illness like pneumonia/sepsis, and its irregularly irregular pulse fits here."},{"label":"C","text":"Sinus tachycardia","rationale":"False — sinus tachycardia gives a regular pulse, not an irregular one."},{"label":"D","text":"SVT","rationale":"False — SVT typically gives a regular (not irregular) pulse."},{"label":"E","text":"VT","rationale":"False — VT would usually cause more haemodynamic compromise and a regular broad-complex pattern, not simply 'palpitations with an irregular pulse' at this BP."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"SBR 6","text":"58 year oid male with hypertension and heart failure has breathlessness on exertion. PR-80/min. BP- 110/80mmHg. He is on furosemide and captopril. What is the next drug that needs to be started?","options":[{"label":"A","text":"HCT","rationale":"False — adding another diuretic class doesn't address the next standard step in HFrEF therapy."},{"label":"B","text":"Atenolof","rationale":"False — 'atenolof' as written is likely intended as atenolol, but option D (metoprolol) more directly represents the standard beta-blocker add-on used in this HF context; treat this option with caution given the apparent typo."},{"label":"C","text":"Enalapri!","rationale":"False — 'enalapri!' (likely enalapril) would duplicate the ACEI he's already on (captopril)."},{"label":"D","text":"Metoprolol","rationale":"True — with the patient already on furosemide and an ACEI, adding a beta-blocker (metoprolol) is the standard next step in HFrEF management for its proven mortality benefit."},{"label":"E","text":"ISMN","rationale":"False — ISMN offers symptomatic benefit, not the mortality benefit provided by adding a beta-blocker."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"SBR 24","text":"Patient presents with recurrent left sided chest pain on exertion. Resting ECG is normal. What is the next step in his management?","options":[{"label":"A","text":"2D ECHO","rationale":"False — echo isn't the standard first-line test for suspected stable angina with a normal resting ECG."},{"label":"B","text":"Exercise ECG","rationale":"True — with recurrent exertional chest pain and a normal resting ECG, exercise ECG is the standard next diagnostic step."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]}],"count":98},{"topic":"Respiratory Disorders","sections":[{"date":"2024 January","questions":[{"num":"5","text":"Regarding bronchiectasis","options":[{"label":"A","text":"Pseusomanas areuginosa is considered in treatment resistant cases","rationale":"True — Pseudomonas aeruginosa colonisation is classically considered in treatment-resistant/non-resolving bronchiectasis exacerbations."},{"label":"B","text":"Amiloidosis is a long term complication","rationale":"True — AA amyloidosis is a recognised long-term complication of chronic suppurative bronchiectasis."},{"label":"C","text":"Smoking is a risk factor","rationale":"False — smoking is not a classic specific risk factor for bronchiectasis (post-infective causes, CF, immunodeficiency and ciliary dyskinesia are the recognised causes)."},{"label":"D","text":"It is a complication of primary pulmonary TB","rationale":"True — bronchiectasis is a recognised complication of primary pulmonary TB (post-TB scarring/damage)."},{"label":"E","text":"Empyema is a complication","rationale":"True — empyema is a recognised complication of bronchiectasis."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."},{"num":"6","text":"T/F regarding interstitial Lung Disease:","options":[{"label":"A","text":"Idiopathic Pulmonary Fibrosis responds well to Steroids.","rationale":"False — idiopathic pulmonary fibrosis is notoriously poorly responsive to steroids."},{"label":"B","text":"Spirometry shows restrictive patterns.","rationale":"True — ILD classically shows a restrictive pattern on spirometry."},{"label":"C","text":"HRCT has a diagnostic value.","rationale":"True — HRCT has strong diagnostic value in ILD (characteristic patterns like UIP)."},{"label":"D","text":"Pneumothorax is a complication.","rationale":"True — (secondary) pneumothorax is a recognised complication of ILD."},{"label":"E","text":"O2 Treatment reduce the disease progression","rationale":"False — oxygen therapy improves symptoms/hypoxaemia but does not alter or reduce disease progression."}],"reviewed_answer":["B","C","D"],"explanation":"Correct answer(s): B, C, D — see the reasoning under each option below."},{"num":"10","text":"Regarding bronchiectasis:","options":[{"label":"A","text":"Pseudomonas aeruginosa should be considered in non-resolving exacerbations.","rationale":"True — Pseudomonas aeruginosa should be considered in non-resolving exacerbations."},{"label":"B","text":"Empyema is a complication.","rationale":"True — empyema is a recognised complication."},{"label":"C","text":"Smoking is a risk factor.","rationale":"False — smoking is not a classic specific risk factor for bronchiectasis."},{"label":"D","text":"Amyloidosis is a chronic complication.","rationale":"True — amyloidosis is a recognised chronic complication."},{"label":"E","text":"Primary pulmonary TB is a causative factor.","rationale":"True — primary pulmonary TB is a recognised causative factor."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."},{"num":"18","text":"Features of Obstructive sleep apnea syndrome include","options":[{"label":"A","text":"Hypopnoeas","rationale":"True — hypopnoeas are part of the diagnostic definition of OSA."},{"label":"B","text":"Polysomnography","rationale":"True — polysomnography is the definitive diagnostic test for OSA."},{"label":"C","text":"Pulse oximetry","rationale":"True — pulse oximetry (overnight) is used in screening for OSA."},{"label":"D","text":"Snoring","rationale":"True — snoring is the classic presenting symptom."},{"label":"E","text":"Witnessed apnoeas","rationale":"True — witnessed apnoeas (reported by a bed partner) are a classic symptom."}],"reviewed_answer":["A","B","C","D","E"],"explanation":"Correct answer(s): A, B, C, D, E — see the reasoning under each option below."},{"num":"28","text":"A 45-year-old male presented with fever and yellow phlegm 3 days duration. There is mild coarse crepitation left lower zone, BP - 130/85, PR- 195 , RS - 18 Saturation- 97 temperature -98 F he has no history of asthma but allergy to penicillin. What is the best treatment:","options":[{"label":"A","text":"IV Ceftriaxone","rationale":"False — ceftriaxone is a beta-lactam and inappropriate given his penicillin allergy (cross-reactivity risk)."},{"label":"B","text":"Oral clarithromycin","rationale":"True — oral clarithromycin (a macrolide) avoids the beta-lactam allergy and is appropriate for this CAP presentation."},{"label":"C","text":"IV meropenem","rationale":"False — IV meropenem is a beta-lactam, also inappropriate given penicillin allergy, and is excessive for this presentation's severity."},{"label":"D","text":"Oral co-trimoxazole","rationale":"False — co-trimoxazole is not first-line for typical CAP."},{"label":"E","text":"Oral metronidazole","rationale":"False — metronidazole targets anaerobes, not the likely pathogens here."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"29","text":"A 62-year-old man with a history of 40 pack-years of smoking has been evaluated for COPD. What is the most likely feature that suggests an alternative diagnosis?","options":[{"label":"A","text":"Chronic cough","rationale":"False — chronic cough is a typical COPD feature, not suggestive of an alternative diagnosis."},{"label":"B","text":"Clubbing","rationale":"True — clubbing is NOT a typical feature of COPD; its presence should prompt consideration of an alternative diagnosis (e.g. lung cancer, bronchiectasis, fibrosis)."},{"label":"C","text":"Exertional breathlessness","rationale":"False — exertional breathlessness is typical of COPD."},{"label":"D","text":"Frequent episodes of bronchiolitis","rationale":"False — frequent bronchitic episodes are typical and expected in COPD."},{"label":"E","text":"Regular sputum production","rationale":"False — regular sputum production is a typical chronic bronchitis/COPD feature."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2023 February","questions":[{"num":"5","text":"Which of the following are seen in tuberculosis infection?","options":[{"label":"A","text":"Cervical lymphadenopathy with sinus formation","rationale":"True — cervical lymphadenopathy with sinus formation ('scrofula') is a recognised TB presentation."},{"label":"B","text":"Diaphragmatic paralysis","rationale":"False — diaphragmatic paralysis is not a recognised feature of TB infection."},{"label":"C","text":"PUO with splenomegaly","rationale":"True — PUO with splenomegaly can occur in disseminated/miliary TB."},{"label":"D","text":"Apical bronchiectasis","rationale":"True — apical bronchiectasis is a recognised sequela of TB scarring."},{"label":"E","text":"Aspergilloma","rationale":"True — aspergilloma classically forms within old TB cavities."}],"reviewed_answer":["A","C","D","E"],"explanation":"Correct answer(s): A, C, D, E — see the reasoning under each option below."},{"num":"6","text":"Causes for hemoptysis include,","options":[{"label":"A","text":"Tuberculosis.","rationale":"True — TB is a classic cause of haemoptysis."},{"label":"B","text":"Mitral stenosis.","rationale":"True — mitral stenosis causes pulmonary venous hypertension, which can cause haemoptysis."},{"label":"C","text":"Idiopathic pulmonary fibrosis.","rationale":"False — IPF is not a classic cause of haemoptysis."},{"label":"D","text":"Leptospirosis.","rationale":"True — severe leptospirosis is recognised to cause pulmonary haemorrhage."},{"label":"E","text":"Bronchiectasis","rationale":"True — bronchiectasis is a classic cause of haemoptysis."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."},{"num":"27","text":"A 35-year-old female was newly diagnosed with asthma. She had day symptoms only once a month and no awakening in the night due to shortness of breath. What is the best initial management option for her?","options":[{"label":"A","text":"As needed beclomethasone inhaler","rationale":"False — regular preventer inhaler isn't needed for such infrequent, mild symptoms (once monthly, no night symptoms)."},{"label":"B","text":"As needed budesonide and formoterol inhaler","rationale":"False — as-needed budesonide-formoterol is a reasonable modern option but as-needed SABA is the classic 'best initial' answer for this very mild, infrequent symptom pattern."},{"label":"C","text":"As needed fluticasone and salmeterol inhaler","rationale":"False — a combination LABA-ICS inhaler isn't needed at this very mild severity."},{"label":"D","text":"As needed salbutamol and beclamethasone inhaler","rationale":"False — this combination isn't the standard first step for such infrequent symptoms."},{"label":"E","text":"As needed salbutamol inhaler","rationale":"True — for very infrequent symptoms (once a month, no nocturnal symptoms), as-needed SABA alone is an appropriate initial management (GINA step 1)."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"28","text":"A 62-year-old male with a history of smoking of 40 pack-years, presented with dyspnoea and is being investigated for COPD. Which of the following would indicate an alternative diagnosis in this patient?","options":[{"label":"A","text":"Chronic cough","rationale":"False — chronic cough is typical of COPD."},{"label":"B","text":"Episodic nocturnal wheeze","rationale":"True — episodic nocturnal wheeze suggests asthma rather than COPD, indicating an alternative diagnosis."},{"label":"C","text":"Exertional dyspnea","rationale":"False — exertional dyspnoea is typical of COPD."},{"label":"D","text":"Frequent episodes of bronchitis","rationale":"False — frequent bronchitis episodes are typical and expected in COPD."},{"label":"E","text":"Regular sputum production","rationale":"False — regular sputum production is typical of COPD."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"29","text":"A 66-year-old male presented with a 2-month history of chronic cough. Which of the following pairs of clinical features is most suggestive of bronchial carcinoma?","options":[{"label":"A","text":"Finger clubbing and bibasal crepitations","rationale":"False — clubbing with bibasal crepitations is more suggestive of pulmonary fibrosis, not specifically carcinoma."},{"label":"B","text":"Cigarette smoking and bilateral rhonchi","rationale":"False — smoking with bilateral rhonchi is nonspecific, more suggestive of COPD generally."},{"label":"C","text":"Loss of weight and left lower lobe dullness","rationale":"True — weight loss (a systemic/constitutional symptom) together with localised dullness (suggesting a mass with collapse/effusion) is the pairing most suggestive of bronchial carcinoma."},{"label":"D","text":"Pleuritic chest pain with an area of bronchial breathing","rationale":"False — pleuritic pain with bronchial breathing suggests pneumonia/consolidation, not carcinoma specifically."},{"label":"E","text":"Production of a copious amount of sputum and clubbing","rationale":"False — copious sputum production suggests bronchiectasis, not classic for carcinoma."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2022 March","questions":[{"num":"19","text":"A 30year old male presented with shortness of breathing and cough for 6 weeks duration. He was diagnosed to have interstitial lung disease. What are the investigations to exclude 2ry causes for idiopathic lung fibrosis?","options":[{"label":"A","text":"Occupational history","rationale":"True — occupational history helps identify pneumoconiosis as a secondary cause."},{"label":"B","text":"Past drug history","rationale":"True — drug history helps identify drug-induced ILD as a secondary cause."},{"label":"C","text":"Spirometry","rationale":"False — spirometry assesses functional severity/pattern, it doesn't identify an underlying cause."},{"label":"D","text":"6 min walking test","rationale":"False — the 6-minute walk test assesses functional exercise capacity, not the underlying cause."},{"label":"E","text":"Antibody screening for connective tissue diseases SBA","rationale":"True — antibody screening helps identify connective tissue disease as an underlying secondary cause."}],"reviewed_answer":["A","B","E"],"explanation":"Correct answer(s): A, B, E — see the reasoning under each option below."},{"num":"21","text":"50 year old lady presented with 4 month history of dry cough and shortness of breath. She has tender subcutaneous nodules over shin. Wbc-7800 Hb-11 Plt- 400000 EsR-60 LDH- 250 Sodium-140 K+- 4.5 Cr- 95 Calcium-2.75 Cxr-bilateral hilar lymphadenopathy Mantoux negative Which of the following is the diagnosis.","options":[{"label":"A","text":"Rheumatoid arthritis","rationale":"False — rheumatoid arthritis doesn't explain the bilateral hilar lymphadenopathy or erythema-nodosum-type nodules as classically as sarcoidosis."},{"label":"B","text":"Pulmonary TB","rationale":"False — pulmonary TB is less likely given the negative Mantoux and the classic erythema-nodosum-type nodules."},{"label":"C","text":"Lymphoma","rationale":"False — lymphoma is possible but the combination of bilateral hilar lymphadenopathy with tender shin nodules (erythema nodosum) is much more classic for sarcoidosis."},{"label":"D","text":"Sarcoidosis","rationale":"True — bilateral hilar lymphadenopathy with erythema nodosum (tender shin nodules), elevated ESR and borderline-high calcium is the classic picture of sarcoidosis."},{"label":"E","text":"Bronchial cancer","rationale":"False — bronchial cancer doesn't explain the erythema-nodosum-type nodules or bilateral (rather than unilateral) hilar lymphadenopathy."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"36","text":"62 year old male underwent a repeat chest x ray following non resolving community acquired pneumonia. He is on IV co-amoxyclav 1.2g and oral clarithromycin 500mg for 6 days. Chest x ray showed a right sided consolidation with moderate pleural effusion. Pleural fluid report is as follows. His RBS was 120mg/dL. WBC 5300 Protein 65 Glucose 44 LDH 1290 PH 7.1 What is the most appropriate management?","options":[{"label":"A","text":"Add IV vancomycin","rationale":"False — adding vancomycin addresses possible resistant organisms but doesn't address the complicated (infected) pleural collection itself."},{"label":"B","text":"Change co-amoxyclav to meropenam","rationale":"False — changing antibiotics alone won't resolve an infected pleural collection that needs drainage."},{"label":"C","text":"Convert clarithromycin to IV route","rationale":"False — converting the route of clarithromycin doesn't address the pleural fluid findings."},{"label":"D","text":"Drain the pleural fluid","rationale":"False — 'draining the pleural fluid' is directionally correct but the definitive, specific answer is formal tube drainage given the criteria met (pH 7.1, low glucose, high LDH — an empyema/complicated parapneumonic effusion by Light's criteria)."},{"label":"E","text":"IC tube insertion","rationale":"True — pleural fluid pH <7.2 with low glucose and very high LDH meets criteria for a complicated parapneumonic effusion/empyema, requiring intercostal tube drainage."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"40","text":"35y man presented to medical unit with acute SOB.He is dyspnoeic,RR 40, PR 120, BP 80/50. Trachea deviated to Right side. Percussion of the lung was difficult due to pain, is resonant. There was diffuse mild abdominal tenderness. What is the next most appropriate step ?","options":[{"label":"A","text":"Rapid Bolus of normal saline","rationale":"False — fluid resuscitation alone won't address the underlying tension physiology causing the shock."},{"label":"B","text":"Urgent Chest X Ray","rationale":"False — an urgent CXR would delay life-saving treatment in a haemodynamically unstable patient with a likely clinical diagnosis of tension pneumothorax."},{"label":"C","text":"Urgent ultrasound","rationale":"False — ultrasound would also delay treatment unnecessarily in an unstable patient with a likely clinical diagnosis."},{"label":"D","text":"Insertion of an intercostal draining tube","rationale":"False — formal intercostal tube insertion takes longer to organise than emergency needle decompression, which should come first in an unstable patient."},{"label":"E","text":"Needle thoracentesis","rationale":"True — with signs of tension pneumothorax (tracheal deviation, haemodynamic instability, hyperresonance implied by difficult percussion) causing shock, immediate needle decompression (thoracentesis) is the appropriate next step, without waiting for imaging."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."}]},{"date":"2021 March","questions":[{"num":"08","text":"A 20-year-old female is being treated for pulmonary TB. What are the causes for sputum smear remaining to be positive after 2 months of anti TB treatment?","options":[{"label":"A","text":"Multidrug resistant TB","rationale":"True — multidrug-resistant TB can explain a persistently positive smear."},{"label":"B","text":"Passing dead bacilli in the sputum","rationale":"True — smears can remain positive by detecting dead/non-viable bacilli even as treatment succeeds (smear positivity can lag behind clinical/microbiological cure)."},{"label":"C","text":"Atypical mycobacterial infection","rationale":"True — atypical mycobacterial infection can explain persistent smear positivity."},{"label":"D","text":"Poor drug compliance","rationale":"True — poor drug compliance is a common cause of treatment failure/persistent positivity."},{"label":"E","text":"False positive for Mycoplasma","rationale":"False — a Mycoplasma species wouldn't cause a false-positive acid-fast smear; this option doesn't make microbiological sense."}],"reviewed_answer":["A","B","C","D"],"explanation":"Correct answer(s): A, B, C, D — see the reasoning under each option below."},{"num":"10","text":"Indications for non-invasive ventilation,","options":[{"label":"A","text":"Respiratory failure in Myasthenia gravis","rationale":"False — respiratory failure from myasthenia gravis carries a high risk of aspiration/bulbar compromise, so invasive ventilation is generally preferred over NIV."},{"label":"B","text":"Drowsiness after control of status epilepticus","rationale":
