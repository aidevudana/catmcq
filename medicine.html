<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicine — Categorized MCQ Review Panel</title>
<style>
:root{
  --navy-950:#0a1628;
  --navy-900:#0f1f38;
  --navy-800:#152a4a;
  --navy-700:#1c3a63;
  --navy-600:#254b7d;
  --teal-500:#0d9488;
  --teal-400:#2dd4bf;
  --teal-300:#5eead4;
  --amber-500:#d97706;
  --amber-400:#f59e0b;
  --amber-300:#fbbf24;
  --ink:#e8edf5;
  --ink-dim:#9fb0c9;
  --ink-faint:#657593;
  --card-bg:#12213c;
  --border:#223a5e;
  --danger:#e05252;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
  background:
    radial-gradient(1100px 600px at 100% -10%, rgba(45,212,191,0.08), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(217,119,6,0.07), transparent 60%),
    var(--navy-950);
  color:var(--ink);
  display:flex;
  min-height:100vh;
}

/* ---------- Sidebar ---------- */
#sidebar{
  width:290px;
  flex-shrink:0;
  background:linear-gradient(180deg, var(--navy-900), var(--navy-950));
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  height:100vh;
  position:sticky;
  top:0;
}
#brand{
  padding:20px 18px 14px;
  border-bottom:1px solid var(--border);
}
#brand .eyebrow{
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--teal-400);
  font-weight:700;
}
#brand h1{
  font-size:17px;
  margin:4px 0 2px;
  font-weight:700;
  letter-spacing:-.01em;
}
#brand .sub{
  font-size:11.5px;
  color:var(--ink-faint);
}
#search-wrap{
  padding:14px 16px 8px;
}
#search{
  width:100%;
  background:var(--navy-800);
  border:1px solid var(--border);
  color:var(--ink);
  padding:9px 12px;
  border-radius:8px;
  font-size:13px;
  outline:none;
}
#search:focus{border-color:var(--teal-500);}
#search::placeholder{color:var(--ink-faint);}

#topic-list{
  flex:1;
  overflow-y:auto;
  padding:6px 10px 14px;
}
.topic-btn{
  width:100%;
  text-align:left;
  background:transparent;
  border:none;
  color:var(--ink-dim);
  padding:9px 10px;
  border-radius:8px;
  font-size:13.2px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-bottom:2px;
  transition:background .12s, color .12s;
}
.topic-btn:hover{background:var(--navy-800); color:var(--ink);}
.topic-btn.active{
  background:linear-gradient(90deg, rgba(13,148,136,.22), rgba(13,148,136,.05));
  color:var(--teal-300);
  font-weight:600;
  box-shadow:inset 2px 0 0 var(--teal-400);
}
.topic-count{
  font-size:10.5px;
  color:var(--ink-faint);
  background:var(--navy-800);
  padding:1px 7px;
  border-radius:20px;
  min-width:26px;
  text-align:center;
}
.topic-btn.active .topic-count{ color:var(--teal-300); background:rgba(45,212,191,.12);}
.topic-progress{
  height:3px; background:var(--navy-800); border-radius:2px; overflow:hidden; margin-top:3px;
}
.topic-progress-fill{ height:100%; background:var(--teal-500); }

#sidebar-footer{
  padding:12px 16px;
  border-top:1px solid var(--border);
  font-size:11px;
  color:var(--ink-faint);
  display:flex;
  justify-content:space-between;
}

/* ---------- Main ---------- */
#main{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
}
#topbar{
  padding:18px 32px 14px;
  border-bottom:1px solid var(--border);
  background:rgba(15,31,56,.5);
  backdrop-filter:blur(6px);
}
#topbar h2{
  margin:0 0 3px;
  font-size:21px;
  letter-spacing:-.01em;
}
#topbar .meta{
  font-size:12.5px;
  color:var(--ink-faint);
}
#controls{
  display:flex;
  gap:8px;
  margin-top:12px;
  flex-wrap:wrap;
  align-items:center;
}
.chip-select{
  background:var(--navy-800);
  border:1px solid var(--border);
  color:var(--ink-dim);
  font-size:12.5px;
  padding:6px 10px;
  border-radius:20px;
  cursor:pointer;
}
select.chip-select{ appearance:none; padding-right:26px; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%239fb0c9'/></svg>"); background-repeat:no-repeat; background-position:right 9px center;}
.pill-btn{
  background:var(--navy-800);
  border:1px solid var(--border);
  color:var(--ink-dim);
  font-size:12px;
  padding:6px 12px;
  border-radius:20px;
  cursor:pointer;
  transition:all .12s;
}
.pill-btn:hover{border-color:var(--teal-500); color:var(--teal-300);}
.pill-btn.active{background:rgba(13,148,136,.18); border-color:var(--teal-500); color:var(--teal-300);}
.spacer{flex:1;}
#stats-strip{
  display:flex; gap:16px; font-size:11.5px; color:var(--ink-faint);
}
#stats-strip b{color:var(--teal-300); font-weight:700;}
#stats-strip .amber{color:var(--amber-400);}

#question-scroll{
  padding:22px 32px 60px;
}
.empty-state{
  text-align:center;
  color:var(--ink-faint);
  padding:80px 20px;
  font-size:14px;
}

.section-heading{
  display:flex; align-items:center; gap:10px;
  margin:26px 0 12px;
  color:var(--amber-400);
  font-size:12.5px;
  font-weight:700;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.section-heading:first-child{margin-top:0;}
.section-heading::after{
  content:"";
  flex:1;
  height:1px;
  background:linear-gradient(90deg, var(--border), transparent);
}

.qcard{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 18px 14px;
  margin-bottom:14px;
  position:relative;
  transition:border-color .15s;
}
.qcard.flagged{border-color:var(--amber-500);}
.qcard.reviewed{border-left:3px solid var(--teal-500);}
.qhead{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:8px;
}
.qnum{
  font-size:11px;
  font-weight:700;
  color:var(--teal-400);
  background:rgba(45,212,191,.08);
  border:1px solid rgba(45,212,191,.25);
  padding:2px 8px;
  border-radius:20px;
  white-space:nowrap;
}
.qtext{
  font-size:14.5px;
  line-height:1.5;
  color:var(--ink);
  flex:1;
}
.qactions{
  display:flex; gap:6px; flex-shrink:0;
}
.icon-btn{
  background:transparent;
  border:1px solid var(--border);
  color:var(--ink-faint);
  width:26px; height:26px;
  border-radius:7px;
  cursor:pointer;
  font-size:13px;
  display:flex; align-items:center; justify-content:center;
  transition:all .12s;
}
.icon-btn:hover{color:var(--ink); border-color:var(--ink-faint);}
.icon-btn.flag-on{color:var(--amber-400); border-color:var(--amber-500); background:rgba(217,119,6,.12);}
.icon-btn.review-on{color:var(--teal-300); border-color:var(--teal-500); background:rgba(13,148,136,.12);}

.options{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:8px;
}
.opt{
  display:flex;
  gap:10px;
  align-items:flex-start;
  padding:7px 10px;
  border-radius:7px;
  border:1px solid transparent;
  cursor:pointer;
  font-size:13.5px;
  line-height:1.45;
  color:var(--ink-dim);
  transition:background .1s, border-color .1s;
}
.opt:hover{background:var(--navy-800);}
.opt-label{
  flex-shrink:0;
  width:20px; height:20px;
  border-radius:5px;
  background:var(--navy-800);
  border:1px solid var(--border);
  color:var(--ink-faint);
  font-size:11px;
  font-weight:700;
  display:flex; align-items:center; justify-content:center;
}
.opt.marked{
  background:rgba(45,212,191,.07);
  border-color:rgba(45,212,191,.35);
  color:var(--ink);
}
.opt.marked .opt-label{
  background:var(--teal-500);
  border-color:var(--teal-500);
  color:var(--navy-950);
}
.opt.correct-reveal{
  background:rgba(34,197,94,.10);
  border-color:rgba(34,197,94,.45);
}
.opt.correct-reveal .opt-label{
  background:#16a34a;
  border-color:#16a34a;
  color:#08210f;
}
.opt.incorrect-reveal.marked{
  background:rgba(224,82,82,.10);
  border-color:rgba(224,82,82,.45);
}
.opt.incorrect-reveal.marked .opt-label{
  background:var(--danger);
  border-color:var(--danger);
  color:#2a0808;
}
.answer-toggle-row{
  display:flex; justify-content:flex-end; margin-top:6px;
}
.answer-toggle{
  background:transparent;
  border:1px dashed var(--border);
  color:var(--ink-faint);
  font-size:11.5px;
  padding:5px 12px;
  border-radius:20px;
  cursor:pointer;
  transition:all .12s;
}
.answer-toggle:hover{ color:var(--teal-300); border-color:var(--teal-500);}
.answer-toggle.open{ color:var(--teal-300); border-color:var(--teal-500); border-style:solid; background:rgba(13,148,136,.08);}
.answer-panel{
  margin-top:10px;
  padding:12px 14px;
  border-radius:8px;
  background:rgba(45,212,191,.05);
  border:1px solid rgba(45,212,191,.2);
  font-size:13px;
  line-height:1.55;
  color:var(--ink-dim);
  display:none;
}
.answer-panel.show{display:block;}
.answer-panel .ans-label{
  color:var(--teal-300);
  font-weight:700;
  font-size:11.5px;
  text-transform:uppercase;
  letter-spacing:.04em;
  margin-bottom:5px;
}
.answer-panel .ans-value{
  color:var(--ink);
  font-weight:700;
  margin-bottom:6px;
}
.opt-body{ display:flex; flex-direction:column; gap:3px; flex:1; min-width:0; }
.opt-rationale{
  font-size:12px;
  line-height:1.45;
  color:var(--ink-faint);
  padding-left:1px;
}
.opt.correct-reveal .opt-rationale{ color:#7fd99a; }
.opt.incorrect-reveal.marked .opt-rationale{ color:#e59a9a; }
.reviewed-badge{
  font-size:10px;
  color:var(--teal-300);
  background:rgba(45,212,191,.12);
  border:1px solid rgba(45,212,191,.3);
  padding:1px 7px;
  border-radius:20px;
  margin-left:6px;
  vertical-align:middle;
}

mark{
  background:rgba(251,191,36,.35);
  color:var(--ink);
  border-radius:3px;
  padding:0 1px;
}

/* Jump to top */
#jump-top{
  position:fixed;
  right:28px; bottom:28px;
  width:42px; height:42px;
  border-radius:50%;
  background:var(--teal-500);
  color:var(--navy-950);
  border:none;
  font-size:16px;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,.35);
  display:none;
  align-items:center; justify-content:center;
}
#jump-top.show{display:flex;}

::-webkit-scrollbar{width:9px; height:9px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--navy-700); border-radius:6px;}
::-webkit-scrollbar-thumb:hover{background:var(--navy-600);}

@media (max-width: 860px){
  #sidebar{position:fixed; z-index:20; transform:translateX(-100%); transition:transform .2s; width:78vw;}
  #sidebar.open{transform:translateX(0);}
  #main{width:100%;}
  #topbar{padding:14px 16px;}
  #question-scroll{padding:16px;}
  #menu-btn{display:inline-flex !important;}
}
#menu-btn{display:none;}
</style>
</head>

<script id="mcq-data" type="application/json">[{"topic":"CNS Disorders","sections":[{"date":"2024 January","questions":[{"num":"1","text":"Regarding thrombolysis in acute ischemic stroke:","options":[{"label":"A","text":"Hemorrhagic transformation is a common complication.","rationale":"True — haemorrhagic transformation is a recognised, relatively common complication of thrombolysis."},{"label":"B","text":"tPA should be given within 6 hours of symptom onset.","rationale":"False — the standard window is 4.5 hours from onset, not 6 hours."},{"label":"C","text":"The blood pressure should be below 185/110 mmHg before starting tPA.","rationale":"True — BP must be brought below 185/110 mmHg before tPA is given."},{"label":"D","text":"Contraindications include recent surgery within 2 weeks.","rationale":"True — major surgery within the preceding 2 weeks is a contraindication to thrombolysis."},{"label":"E","text":"NIH Stroke Scale is used to assess eligibility.","rationale":"True — the NIH Stroke Scale is used to quantify severity and assess eligibility."}],"reviewed_answer":["A","C","D","E"],"explanation":"B is false — the thrombolysis window is 4.5h, not 6h. A (haemorrhagic transformation), C (BP <185/110 before tPA), D (surgery <2wks is a contraindication) and E (NIHSS used for eligibility/severity) are all correct."},{"num":"2","text":"A 45-year-old man presented with gross, irregular, semi-purposeful movements of face and limbs. Underlying causes include,","options":[{"label":"A","text":"Huntington disease","rationale":"True — Huntington's disease is a classic cause of chorea."},{"label":"B","text":"Hypothyroidism","rationale":"False — hypothyroidism causes slowing/bradykinesia, not chorea (hyperthyroidism can cause chorea)."},{"label":"C","text":"Infarction in subthalamic nucleus","rationale":"True — infarction of the subthalamic nucleus classically causes hemiballismus, a related violent involuntary movement."},{"label":"D","text":"Salbutamol therapy","rationale":"False — salbutamol causes a fine tremor, not chorea."},{"label":"E","text":"Wilson disease","rationale":"True — Wilson's disease can present with chorea/dystonia due to basal ganglia copper deposition."}],"reviewed_answer":["A","C","E"],"explanation":"This is chorea/hemiballismus. Huntington's (A) and Wilson's disease (E) are classic chorea causes; subthalamic nucleus infarction (C) causes hemiballismus. Hypothyroidism (B) causes slowing, not chorea, and salbutamol (D) causes fine tremor, not chorea."},{"num":"21","text":"56 yr old, in morning unable to move his R upper limb, couldn't speaking O/E - R side face paralysis but wrinkling is spared in both sides, R upper limb paralysis and hyper reflexes, Mild sensory loss, expressive aphasia, which will be the CT affected vessel finding?","options":[{"label":"A","text":"Left anterior cerebral artery","rationale":"False — left ACA territory affects leg more than face/arm, and doesn't typically cause expressive aphasia."},{"label":"B","text":"Left middle cerebral artery","rationale":"True — face+arm>leg weakness with expressive (Broca's) aphasia is the classic dominant (left) MCA territory picture."},{"label":"C","text":"Basillar artery","rationale":"False — basilar artery occlusion causes brainstem signs (quadriparesis, cranial nerve palsies, coma), not this pattern."},{"label":"D","text":"Left vertebral artery","rationale":"False — vertebral artery territory affects the brainstem/cerebellum, not cortical language/motor areas."},{"label":"E","text":"Left Posterior Cerebellar artery","rationale":"False — PICA/posterior circulation causes cerebellar/brainstem signs, not aphasia with this weakness pattern."}],"reviewed_answer":["B"],"explanation":"Face+arm>leg weakness, expressive (Broca's) aphasia = dominant (left) MCA territory."},{"num":"22","text":"35 years old lady presents with weakness of body for 3weeks. On examination diplopia & ptosis was found. Diagnosis of myesthinia gravis is likely","options":[{"label":"A","text":"There is urinary incontinence","rationale":"False — urinary incontinence is not a feature of myasthenia gravis (no autonomic/sphincter involvement)."},{"label":"B","text":"L/ pinpoint pupils","rationale":"False — pinpoint pupils suggest opioid toxicity or a pontine lesion, not MG."},{"label":"C","text":"Dry Mouth","rationale":"False — dry mouth is more typical of Lambert-Eaton myasthenic syndrome (autonomic involvement), not MG."},{"label":"D","text":"Ptosis improve with ice pack","rationale":"True — the 'ice pack test': cooling improves neuromuscular transmission, so ptosis visibly improves — a bedside diagnostic clue for MG."},{"label":"E","text":"Global areflexia","rationale":"False — MG causes fatigable weakness with preserved reflexes; global areflexia points to GBS instead."}],"reviewed_answer":["D"],"explanation":"Ptosis improving with an ice pack is the classic 'ice pack test' for myasthenia gravis (cold improves neuromuscular transmission). Incontinence, pinpoint pupils and global areflexia are not MG features."},{"num":"46","text":"48 years old sales representative, who is a chronic alcohol consumer, presents with confusion and fall due to unstable gait. He has double vision. Neurological examination can not be performed because he is confused. His vitals are stable. What is the next step of management?","options":[{"label":"A","text":"Intramuscular haloperidol","rationale":"False — haloperidol doesn't address the underlying thiamine deficiency and can worsen confusion."},{"label":"B","text":"IV cefrioxone and IV acyclovir","rationale":"False — antibiotics/antivirals are for infective causes; nothing here suggests meningoencephalitis over Wernicke's."},{"label":"C","text":"IV Dectrose 50%","rationale":"False — giving glucose before thiamine can precipitate or worsen Wernicke's encephalopathy by consuming remaining thiamine stores."},{"label":"D","text":"IV diazepam","rationale":"False — diazepam would help alcohol withdrawal/seizures, not the ataxia+confusion+diplopia triad here."},{"label":"E","text":"IV Thiamine","rationale":"True — confusion + ataxia + ophthalmoplegia in a chronic alcoholic is Wernicke's encephalopathy; IV thiamine is the emergency treatment, given before or with glucose."}],"reviewed_answer":["E"],"explanation":"Confusion + ataxia + ophthalmoplegia in a chronic alcoholic = Wernicke's encephalopathy. IV thiamine must be given (before/with glucose) to prevent precipitating or worsening Wernicke's."}]},{"date":"2023 February","questions":[{"num":"1","text":"Features of complete third nerve palsy are,","options":[{"label":"A","text":"Absent corneal reflex.","rationale":"False — corneal reflex depends on CN V (afferent) and CN VII (efferent), not CN III."},{"label":"B","text":"Constricted pupils.","rationale":"False — a complete CN III palsy causes a dilated (not constricted) pupil due to loss of parasympathetic fibres."},{"label":"C","text":"Divergent squint.","rationale":"True — with CN III out, the unopposed lateral rectus (CN VI) pulls the eye out — a divergent squint, classically 'down and out'."},{"label":"D","text":"Lateral gaze palsy.","rationale":"False — lateral gaze palsy relates to CN VI or a conjugate gaze centre lesion, not CN III."},{"label":"E","text":"Ptosis.","rationale":"True — CN III supplies levator palpebrae superioris, so its palsy causes ptosis."}],"reviewed_answer":["C","E"],"explanation":"Complete CN III palsy: ptosis (levator palsy) and a 'down and out' eye from unopposed CN IV/VI action, giving a divergent squint. Pupil is dilated (not constricted), corneal reflex and lateral gaze are CN V/VI functions."},{"num":"2","text":"Wasting and fasciculations of the tongue are both seen in,","options":[{"label":"A","text":"Pseudobulbar palsy.","rationale":"False — pseudobulbar palsy is an UMN process; it doesn't cause wasting or fasciculations."},{"label":"B","text":"Myasthenia gravis.","rationale":"False — MG causes fatigable weakness, not wasting or fasciculations."},{"label":"C","text":"Motor neuron disease.","rationale":"True — motor neuron disease directly damages the hypoglossal LMN, causing tongue wasting and fasciculation."},{"label":"D","text":"Nasopharyngeal carcinoma.","rationale":"True — nasopharyngeal carcinoma can invade the skull base and compress CN XII, causing LMN tongue signs."},{"label":"E","text":"Paget’s disease of the skull","rationale":"True — Paget's disease can cause basilar invagination, compressing CN XII and producing the same picture."}],"reviewed_answer":["C","D","E"],"explanation":"LMN tongue wasting+fasciculation: motor neuron disease, nasopharyngeal carcinoma (skull base invasion of CN XII), and Paget's disease (basilar invagination compressing CN XII) are the classic triad. Pseudobulbar palsy is UMN (no fasciculations); MG doesn't cause wasting."},{"num":"21","text":"A 55-year-old woman presented with shoulder pain and weakness that increased towards the end of the day. Her acetylcholine receptor antibodies were positive, and the EMG showed a reducing potential with repeated muscle contractions. What is the best treatment to improve her symptoms?","options":[{"label":"A","text":"IV cyclophosphamide","rationale":"False — cyclophosphamide is not standard MG therapy."},{"label":"B","text":"IV Ig","rationale":"False — IVIG is reserved for myasthenic crisis/rapid worsening, not first-line symptom control."},{"label":"C","text":"IV Methyl prednisolone","rationale":"False — methylprednisolone treats the underlying autoimmune process but is not the fastest way to 'improve symptoms' and carries early risk of transient worsening."},{"label":"D","text":"Oral Azathioprine","rationale":"False — azathioprine is a slow-acting steroid-sparing agent, not for symptomatic relief."},{"label":"E","text":"Oral Pyridostigmine","rationale":"True — oral pyridostigmine (an anticholinesterase) is the standard first-line symptomatic treatment for MG."}],"reviewed_answer":["E"],"explanation":"Decremental EMG response + AChR antibodies = myasthenia gravis. Oral pyridostigmine is the symptomatic treatment of choice; the others are used for severe/refractory disease or crisis, not first-line symptom control."},{"num":"22","text":"A 33-year-old woman presented with severe left shoulder pain. It increased gradually during the initial 24 hours after onset. The pain occurred 2 weeks after being administered the influenza vaccine. It is a dull pain for which she was given analgesics. There is a mild weakness in left shoulder movements, reduced biceps jerk and reduced pin prick sensations in C5 and C6 dermatomes. What is the most likely diagnosis?","options":[{"label":"A","text":"Brachial neuritis","rationale":"True — acute severe shoulder pain preceding weakness, especially post-vaccination, is the classic picture of brachial neuritis (Parsonage–Turner syndrome)."},{"label":"B","text":"Cervical radiculopathy","rationale":"False — cervical radiculopathy usually has neck pain with a dermatomal pattern and is less acutely severe at onset."},{"label":"C","text":"Syringomyelia","rationale":"False — syringomyelia has an insidious course with dissociated sensory loss, not an acute post-viral/vaccine presentation."},{"label":"D","text":"Herpes zoster related neuralgia","rationale":"False — post-herpetic neuralgia follows a vesicular rash, which isn't described here."},{"label":"E","text":"Transverse myelitis","rationale":"False — transverse myelitis causes bilateral cord-level signs (sensory level, sphincter involvement), not a unilateral shoulder/arm mononeuropathy picture."}],"reviewed_answer":["A"],"explanation":"Acute severe shoulder pain post-vaccination evolving into weakness = brachial neuritis (Parsonage–Turner syndrome)."},{"num":"23","text":"A 76-year-old lady with a history of ischemic heart disease, presented following an embolic stroke. She complains of severe pain in the right side of the body. She describes it as a burning pain. What is the most likely site that is affected?","options":[{"label":"A","text":"Frontal lobe","rationale":"False — frontal lobe lesions cause weakness/behavioural change, not a burning contralateral pain syndrome."},{"label":"B","text":"Hypothalamus","rationale":"False — hypothalamic lesions cause autonomic/endocrine disturbance, not this pain syndrome."},{"label":"C","text":"Temporal lobe","rationale":"False — temporal lobe lesions cause memory/language or seizure phenomena, not central pain."},{"label":"D","text":"Pons","rationale":"False — pontine lesions can cause sensory disturbance but the classic 'central post-stroke pain' localises higher."},{"label":"E","text":"Thalamus","rationale":"True — thalamic infarction/haemorrhage classically causes Dejerine–Roussy syndrome: contralateral burning central pain."}],"reviewed_answer":["E"],"explanation":"Central post-stroke (thalamic) pain — burning contralateral pain following a stroke — localises to the thalamus (Dejerine–Roussy syndrome)."}]},{"date":"2022 March","questions":[{"num":"01","text":"20yr old present with waddling gait, Which of the following are possible causes?","options":[{"label":"A","text":"Acute vestibular neuritis","rationale":"False — vestibular neuritis causes vertigo and an ataxic/unsteady gait, not a waddling (proximal myopathic) gait."},{"label":"B","text":"Duchene muscular dystrophy","rationale":"True — Duchenne muscular dystrophy causes proximal weakness and a classic waddling gait."},{"label":"C","text":"Cerebellar stroke","rationale":"False — cerebellar stroke causes a broad-based ataxic gait, not waddling."},{"label":"D","text":"Osteomalacia","rationale":"True — osteomalacia causes a proximal myopathy, producing a waddling gait."},{"label":"E","text":"Spinal muscular atrophy","rationale":"True — spinal muscular atrophy causes proximal weakness and waddling gait."}],"reviewed_answer":["B","D","E"],"explanation":"Waddling gait = proximal myopathy: Duchenne MD, osteomalacia (osteomalacic myopathy) and spinal muscular atrophy all cause proximal weakness. Vestibular neuritis causes vertigo/ataxic gait, cerebellar stroke causes ataxic (not waddling) gait."},{"num":"12","text":"In a patient with flaccid paraparesis, what are the features that this is an intramedullary lesion rather than an extradural lesion?","options":[{"label":"A","text":"Early onset urinary incontinence","rationale":"True — early sphincter/urinary disturbance is characteristic of an intramedullary (central cord) lesion."},{"label":"B","text":"There's girdle pain before the onset of limb pain","rationale":"False — girdle pain preceding limb pain is typical of a root/extradural compressive lesion, not intramedullary."},{"label":"C","text":"There's intact sensations in buttock","rationale":"True — 'sacral sparing' (intact buttock/perianal sensation) occurs because sacral fibres lie peripherally in the spinothalamic tract, spared by a central intramedullary lesion."},{"label":"D","text":"Position sensations are lost in toes.","rationale":"False — early loss of toe position sense suggests dorsal column/extrinsic compression rather than a central intramedullary process."},{"label":"E","text":"Weakness is more in proximal muscles compared to deep muscles. SBA","rationale":"True — intramedullary lesions often affect proximal more than distal muscles due to the somatotopic (laminated) organisation of the corticospinal tract."}],"reviewed_answer":["A","C","E"],"explanation":"Intramedullary cord lesions classically show early sphincter disturbance, sacral sparing (buttock sensation intact, since sacral fibres lie peripherally in the spinothalamic tract), and proximal>distal weakness. Girdle pain before limb pain and early loss of toe position sense favour an extrinsic/compressive (extradural) lesion instead."},{"num":"24","text":"64 year male presented with right side hemiparesis and aphasia for 1 hour. BP 174/120. NCCT taken within 30 minutes of admission. It was unremarkable. What is the next best management option?","options":[{"label":"A","text":"Aspirin","rationale":"False — aspirin is used once haemorrhage is excluded and thrombolysis isn't proceeding/appropriate, not as the immediate next step here."},{"label":"B","text":"continuous iv heparin","rationale":"False — continuous heparin is not standard acute ischaemic stroke management and risks haemorrhage."},{"label":"C","text":"Intraarticular thrombolysis","rationale":"False — intra-arterial thrombolysis is a specialised option, not the standard next step, and BP still needs controlling first."},{"label":"D","text":"IV labetalol","rationale":"True — BP 174/120 (diastolic >110) exceeds the 185/110 threshold for thrombolysis, so IV labetalol is needed to lower BP first."},{"label":"E","text":"IV rTPA","rationale":"False — tPA cannot be given until BP is controlled below threshold."}],"reviewed_answer":["D"],"explanation":"BP 174/120 exceeds the 185/110 threshold for thrombolysis, so BP must be controlled first — IV labetalol — before tPA can be considered."},{"num":"39","text":"25y old previously healthy medical student admitted to the acute medical unit following fever and headache for 1week duration. He has fever of 39C. Pulse rate 110 blood pressure 115/80 respiratory rate 22 GCS 15/15 no papilo oedema no opthalmoscopic examination. His left side lower limb power 3/5. Which of the following ix would most helpful in diagnosis?","options":[{"label":"A","text":"Serum meningococcal antibody","rationale":"False — CT brain is done first if there's concern for raised ICP/mass effect, but isn't itself the most diagnostic test here."},{"label":"B","text":"CT of brain","rationale":"False — same reasoning as CT; useful to exclude a mass but not the definitive diagnostic step."},{"label":"C","text":"MRI lumbo sacral spine","rationale":"False — MRI spine would be relevant if isolated cord pathology were suspected, but fever+headache point to CNS infection."},{"label":"D","text":"Lumbar puncture","rationale":"True — with no papilloedema (safer for LP) and a fever+headache picture, lumbar puncture is the key test to diagnose meningitis/encephalitis."},{"label":"E","text":"EEG","rationale":"False — EEG helps characterise encephalitis (e.g. temporal changes in HSV encephalitis) but isn't the primary diagnostic test."}],"reviewed_answer":["D"],"explanation":"Fever+headache with no papilloedema and no clear focal mass — lumbar puncture is the key investigation to diagnose the underlying meningitis/encephalitis."},{"num":"43","text":"38 year old female presented with 5 month history of headache, it was treated several with analgesia by her GP. But it was not settled. Headache is B/L supraorbital, persists several hours and worse towards the evening. Her household activities are not affected and no history of sleep disturbances. What is the probable type of headache?","options":[{"label":"A","text":"Migraine","rationale":"False — migraine is typically unilateral, pulsatile, with photophobia/nausea — not described here."},{"label":"B","text":"Cluster headache","rationale":"False — cluster headache is severe, unilateral, periorbital, with autonomic features — doesn't fit this bilateral picture."},{"label":"C","text":"Temporal arteritis","rationale":"False — temporal arteritis occurs in older patients with scalp tenderness/jaw claudication and raised ESR — not suggested here."},{"label":"D","text":"Sinusitis","rationale":"False — sinusitis headache is typically frontal, associated with nasal symptoms, not simply worse in the evening for months."},{"label":"E","text":"Tension headache","rationale":"True — bilateral, band-like, evening-predominant, chronic headache without red flags or functional impairment = tension-type headache."}],"reviewed_answer":["E"],"explanation":"Bilateral, band-like, evening-predominant headache with no red flags and preserved function = tension-type headache."}]},{"date":"2021 March","questions":[{"num":"12","text":"Regarding Idiopathic Parkinson disease,","options":[{"label":"A","text":"Onset is unilateral","rationale":"True — asymmetric/unilateral onset is a hallmark of idiopathic Parkinson's disease."},{"label":"B","text":"Intentional tremor is a feature","rationale":"False — PD tremor is a resting tremor, not an intention tremor (which suggests cerebellar disease)."},{"label":"C","text":"There is stiffness on passive limb movements","rationale":"True — rigidity (stiffness on passive movement, often cogwheel) is a core PD feature."},{"label":"D","text":"It causes extensor plantar response","rationale":"False — an extensor plantar (Babinski) response implies a pyramidal lesion, which is not part of idiopathic PD."},{"label":"E","text":"Impaired upward gaze is a feature","rationale":"False — impaired upward/vertical gaze is more suggestive of progressive supranuclear palsy (PSP), a Parkinson-plus syndrome, not idiopathic PD."}],"reviewed_answer":["A","C"],"explanation":"Idiopathic PD: unilateral onset and rigidity (stiffness on passive movement) are core features. Tremor is resting (not intentional), plantars stay flexor (no pyramidal signs), and impaired upward gaze suggests PSP, not idiopathic PD."},{"num":"15","text":"What are the features compatible with complete oculomotor nerve palsy?","options":[{"label":"A","text":"Pinpoint pupils","rationale":"False — pinpoint pupils suggest opioids or a pontine lesion; CN III palsy causes a dilated pupil."},{"label":"B","text":"Partial ptosis","rationale":"False — ptosis in a complete CN III palsy is usually complete, not partial."},{"label":"C","text":"Superior oblique muscle weakness","rationale":"False — the superior oblique is supplied by CN IV, which is spared in an isolated CN III palsy."},{"label":"D","text":"Lateral rectus muscle weakness","rationale":"False — the lateral rectus is supplied by CN VI, also spared here."},{"label":"E","text":"Weakness in levator palpebrae superioris","rationale":"True — CN III supplies the levator palpebrae superioris, so its palsy directly causes ptosis."}],"reviewed_answer":["E"],"explanation":"Complete CN III palsy weakens the levator palpebrae superioris (causing ptosis). Superior oblique (CN IV) and lateral rectus (CN VI) are spared, and the pupil is dilated, not pinpoint."},{"num":"21","text":"A 75-year-old man presented with recurrent falls. What is the most suggestive diagnostic feature of Parkinson’s disease?","options":[{"label":"A","text":"Intentional tremor","rationale":"False — intentional tremor is a cerebellar sign, not part of PD."},{"label":"B","text":"Urinary incontinence","rationale":"False — urinary incontinence is non-specific and not a core diagnostic PD feature."},{"label":"C","text":"Cogwheel rigidity","rationale":"True — cogwheel rigidity is a specific, classic sign strongly pointing to Parkinson's disease."},{"label":"D","text":"Seizures","rationale":"False — seizures are not a feature of PD."},{"label":"E","text":"Waddling gait","rationale":"False — waddling gait suggests proximal myopathy, not PD (PD gait is shuffling/festinant)."}],"reviewed_answer":["C"],"explanation":"Of the options, cogwheel rigidity is the most specific sign pointing to Parkinson's disease; falls, incontinence and seizures are non-specific."},{"num":"22","text":"A 77-year-old male presented to the neurology clinic with progressive deterioration of cognitive functions. He's a known patient with Parkinson's disease for 2 years and is being treated with Levodopa. His MMSE is 8. He complains of visual hallucinations and frequent falls. He has dyskinesia, rigidity and resting tremor. Other examination findings are normal. Blood investigations and CT brain was normal. What is the most likely diagnosis?","options":[{"label":"A","text":"Frontotemporal Dementia","rationale":"False — frontotemporal dementia presents with early behavioural/personality change, not this parkinsonism-plus-hallucinations picture."},{"label":"B","text":"Vascular dementia","rationale":"False — vascular dementia has a stepwise course with vascular risk factors/imaging changes, not this pattern."},{"label":"C","text":"Alzheimer's disease","rationale":"False — Alzheimer's disease presents with early memory loss, not prominent early hallucinations plus parkinsonism."},{"label":"D","text":"Lewy Body dementia","rationale":"True — fluctuating cognition, early/prominent visual hallucinations, and parkinsonism together suggest Lewy Body Dementia."},{"label":"E","text":"Adverse effects of Levodopa","rationale":"False — Levodopa adverse effects (dyskinesia) don't typically explain progressive cognitive decline and hallucinations as the core problem."}],"reviewed_answer":["D"],"explanation":"Established PD + fluctuating cognition, visual hallucinations, and falls = Lewy Body Dementia (note: if cognitive decline appears within a year of parkinsonism, DLB is favoured over PD-dementia)."},{"num":"24","text":"A 55yr old woman came with proximal muscle weakness and blurred vision for 3 month duration Her symptoms increased towards the evening. After coming to the hospital, she has undergone EMG which showed reduced conduction and she was also found to be positive for Ach receptor antibodies. What is the best management option for this woman?","options":[{"label":"A","text":"Intravenous immunoglobulin","rationale":"True in general as one management option — but not the single best answer here; IVIG is reserved for crisis/rapid deterioration, not routine symptom control."},{"label":"B","text":"Oral azathioprine","rationale":"False — azathioprine is a slow-onset steroid-sparing agent, not for symptomatic relief."},{"label":"C","text":"Intravenous methylprednisolone","rationale":"False — methylprednisolone is used for refractory/crisis situations, with a risk of early transient worsening."},{"label":"D","text":"IV cyclophosphamide","rationale":"False — cyclophosphamide is not standard MG therapy."},{"label":"E","text":"Oral pyridostigmine","rationale":"True — oral pyridostigmine is the appropriate first-line symptomatic treatment for fatigable weakness in MG."}],"reviewed_answer":["E"],"explanation":"Fatigable proximal weakness + AChR antibodies + decremental EMG = MG. Oral pyridostigmine is the appropriate symptomatic treatment here."}]},{"date":"2020 June","questions":[{"num":"1","text":"True or false regarding subarachnoid hemorrhages","options":[{"label":"A","text":"Normal non contrast CT excludes SAH","rationale":"False — a normal non-contrast CT does NOT reliably exclude SAH, especially if done late or the bleed is small; LP for xanthochromia is still needed if suspicion remains."},{"label":"B","text":"Xanthochromia present in CSF after 24 hours.","rationale":"True — xanthochromia develops in CSF from about 12 hours after the bleed and can persist up to 2 weeks, so it's present at 24 hours."},{"label":"C","text":"Nimodipine is given to prevent vascular spasm","rationale":"True — nimodipine (a calcium channel blocker) is given to reduce the risk of cerebral vasospasm after SAH."},{"label":"D","text":"Prophylactically anticonvulsants are routinely given.","rationale":"False — prophylactic anticonvulsants are not given routinely; they're used only if seizures occur."},{"label":"E","text":"Percutaneous evacuation of hematoma is done.","rationale":"False — SAH from a ruptured aneurysm is treated by securing the aneurysm (surgical clipping or endovascular coiling), not by percutaneous evacuation of a haematoma."}],"reviewed_answer":["B","C"],"explanation":"Xanthochromia appears in CSF from ~12h and persists up to 2 weeks (best sensitivity after 12h) — true. Nimodipine is given to prevent vasospasm — true. A normal CT does NOT exclude SAH (especially if delayed or small bleed) — false. Anticonvulsants are not routine — false. SAH is treated by clipping/coiling the aneurysm, not percutaneous haematoma evacuation — false."},{"num":"3","text":"Regarding acute ischemic stroke","options":[{"label":"A","text":"Atrial fibrillation is a causative factor","rationale":"True — atrial fibrillation is a major cause of cardioembolic ischaemic stroke."},{"label":"B","text":"Catheter-based retrieval of clot is a treatment option","rationale":"True — mechanical (catheter-based) thrombectomy is now standard treatment for large-vessel occlusion strokes."},{"label":"C","text":"Thrombolysis should be done within 4.5h from the onset of symptom.","rationale":"True — the standard IV thrombolysis window is within 4.5 hours of symptom onset."},{"label":"D","text":"Can cause dementia","rationale":"True — stroke is a recognised cause of vascular dementia."},{"label":"E","text":"A CT Scan of the brain is required for the diagnosis","rationale":"True — CT brain is required to exclude haemorrhage before considering thrombolysis/other treatment."}],"reviewed_answer":["A","B","C","D","E"],"explanation":"All are accepted true statements about acute ischaemic stroke: AF is a major cause, mechanical thrombectomy is now standard for large-vessel occlusion, the thrombolysis window is 4.5h, stroke is a recognised cause of vascular dementia, and CT is required to exclude haemorrhage before treatment."},{"num":"5","text":"A medical student touches a piece of ice with his left index finger. What are the components needed for the correct direction of the cold sensation?","options":[{"label":"A","text":"Nociceptors","rationale":"False — nociceptors mediate pain/noxious stimuli; cold in the physiological range is carried by dedicated cold thermoreceptors, not nociceptors."},{"label":"B","text":"Pacinian corpuscle","rationale":"False — Pacinian corpuscles detect vibration/deep pressure, not temperature."},{"label":"C","text":"A-delta fibers","rationale":"True — A-delta fibres carry fast, well-localised cold sensation."},{"label":"D","text":"Spinothalamic tract","rationale":"True — temperature sensation ascends via the (lateral) spinothalamic tract after crossing near the level of entry."},{"label":"E","text":"Post central gyrus","rationale":"True — the postcentral gyrus (primary somatosensory cortex) is where conscious temperature sensation is processed."}],"reviewed_answer":["C","D","E"],"explanation":"Cold sensation: A-delta fibres carry fast cold sensation, ascending via the (lateral) spinothalamic tract to the postcentral gyrus (primary somatosensory cortex). Nociceptors and Pacinian corpuscles (vibration/pressure) are not the primary cold pathway."},{"num":"30","text":"35 year old man presented with back pain & bilateral lower limb weakness for 1 week duration. No history of trauma. On examination knee jerk & ankle jerk are brisk. Power 3/5 in both lower limb. There is severe spinal tenderness over T8. Also temperature & pain sensations are lost in both lower limb. What is the most likely diagnosis?","options":[{"label":"A","text":"Transverse myelitis","rationale":"False — transverse myelitis is typically inflammatory without severe focal spinal tenderness as a leading feature."},{"label":"B","text":"Anterior spinal artery occlusion","rationale":"False — anterior spinal artery occlusion presents with acute painless (or less tender) infarction rather than severe point tenderness."},{"label":"C","text":"Intervertebral disk prolapse","rationale":"False — disc prolapse usually has a history of trauma/mechanical strain, not emphasised here, and less severe point tenderness."},{"label":"D","text":"Spinal epidural abscess","rationale":"True — severe, localised spinal tenderness together with rapidly progressive cord compression signs strongly suggests an infective process — epidural abscess."},{"label":"E","text":"Paraneoplastic myelopathy","rationale":"False — paraneoplastic myelopathy has a more insidious, subacute course, not this acute tender presentation."}],"reviewed_answer":["D"],"explanation":"Severe focal spinal tenderness plus rapidly progressive cord signs points to an infective/compressive cause — spinal epidural abscess — rather than a vascular (anterior spinal artery) or purely inflammatory (transverse myelitis) process, which don't typically cause severe point tenderness."},{"num":"34","text":"60 years old man presented with sudden onset ataxia. CT scan shows cerebellar ataxia. One day after the admission he become drowsy. Examination shows one pupil of 5mm & other pupil of 3mm. blood pressure is 200/100mmHg. What can be the cause for his drowsiness?","options":[{"label":"A","text":"Hydrocephalus","rationale":"True — a cerebellar lesion causing fourth-ventricle compression leads to obstructive hydrocephalus, explaining delayed drowsiness with rising BP (raised ICP) and anisocoria."},{"label":"B","text":"Hypertensive encephalopathy","rationale":"False — hypertensive encephalopathy doesn't typically evolve exactly this way after a cerebellar event with anisocoria."},{"label":"C","text":"Hypoglycemia","rationale":"False — hypoglycaemia would show a different, non-focal, rapidly reversible picture, and doesn't explain anisocoria."},{"label":"D","text":"Hyponatremia","rationale":"False — hyponatraemia can cause drowsiness/seizures but doesn't explain the anisocoria and rising BP pattern here."},{"label":"E","text":"Seizures","rationale":"False — seizures aren't mentioned and don't specifically explain anisocoria plus rising BP."}],"reviewed_answer":["A"],"explanation":"Cerebellar lesion with anisocoria and rising BP a day later, becoming drowsy — obstructive hydrocephalus from fourth-ventricle compression is the classic complication to worry about."},{"num":"38","text":"36 years old obese women presented with progressive early morning headache & blurring of vision. She has undergone a CT scan & it was normal. What is the most appropriate next investigation?","options":[{"label":"A","text":"EEG","rationale":"False — EEG isn't relevant to this headache/visual disturbance picture."},{"label":"B","text":"CSF manometry","rationale":"False — CSF manometry (opening pressure via LP) is indeed needed to confirm IIH, but venous sinus thrombosis must be excluded first (with a normal CT already done, imaging the veins is the next logical step)."},{"label":"C","text":"CT venography","rationale":"False — CT venography is an alternative to MRV but MR venography is the standard next investigation of choice in this context."},{"label":"D","text":"Magnetic resonance venography","rationale":"True — MR venography excludes venous sinus thrombosis (which mimics IIH) before proceeding to LP for opening pressure."},{"label":"E","text":"Fluorescein angiography of retinal vein","rationale":"False — fluorescein angiography assesses retinal vasculature, not the underlying cause of raised intracranial pressure."}],"reviewed_answer":["D"],"explanation":"Obese woman, morning headache, blurred vision, normal CT = suspected idiopathic intracranial hypertension. Before doing an LP with opening pressure, venous sinus thrombosis must be excluded — MR venography."},{"num":"42","text":"56 years old female presented with high fever for 2 days duration followed by left sided hemiplegia. She has undergone mitral valve replacement 3 years back and on warfarin since then. She is in atrial fibrillation and her INR is","options":[],"reviewed_answer":null,"explanation":"Source text is truncated here (the INR value and remainder of the stem are missing from the original PDF) — this fragment has no options to answer; the continuation appears as the next question below."},{"num":"2","text":"Most likely cause for the hemiplegia is,","options":[{"label":"A","text":"ICH","rationale":"False — intracerebral haemorrhage doesn't fit the febrile, prosthetic-valve, AF-on-warfarin context as well as embolism does."},{"label":"B","text":"Cortical vein thrombosis","rationale":"False — cortical vein thrombosis doesn't typically present with fever and sudden hemiplegia in this context."},{"label":"C","text":"septic emboli","rationale":"True — fever with a new hemiplegia in a patient with a prosthetic mitral valve and AF strongly suggests infective endocarditis with septic (infected) embolisation to the brain."},{"label":"D","text":"cerebral abscess","rationale":"False — cerebral abscess would usually develop over a longer, more indolent course, not as an acute hemiplegia."},{"label":"E","text":"encephalitis","rationale":"False — encephalitis would typically cause diffuse features (confusion, seizures) rather than a discrete hemiplegia."}],"reviewed_answer":["C"],"explanation":"Fever + new hemiplegia in a patient with a prosthetic mitral valve and AF on warfarin (context of the missing INR value) suggests cardioembolic stroke from infective endocarditis — septic emboli."}]},{"date":"2019 November","questions":[{"num":"14","text":"Regarding a lesion in the posterior column","options":[{"label":"A","text":"…….","rationale":"(No text captured in source for option A — appears blank/illegible in the original PDF.)"},{"label":"B","text":"Ipsilateral joint position sensation loss is a feature","rationale":"True — dorsal columns don't decussate until the medulla, so joint position sense loss from a cord-level posterior column lesion is ipsilateral."},{"label":"C","text":"Contralateral motor weakness is a feature","rationale":"False — the posterior columns are purely sensory; motor weakness is not a feature of an isolated posterior column lesion."},{"label":"D","text":"Tendon reflexes are absent","rationale":"True — loss of the proprioceptive afferent limb can reduce/abolish the reflex arc, so reflexes are often diminished or absent."},{"label":"E","text":"Rhomberg sign is positive","rationale":"True — a positive Romberg sign (unsteadiness worsened with eyes closed) is the classic bedside sign of sensory/posterior column ataxia."}],"reviewed_answer":["B","D","E"],"explanation":"Isolated dorsal column lesion: ipsilateral loss of joint position sense (dorsal columns don't cross until the medulla), reduced/absent reflexes (loss of the sensory/afferent arc), and a positive Romberg sign (sensory ataxia unmasked with eyes closed). Motor weakness is not a feature of a pure posterior column lesion."},{"num":"16","text":"In Gillian Barre syndrome","options":[{"label":"A","text":"Sensory level is a characteristic feature","rationale":"False — GBS does not produce a discrete sensory level (that would suggest a cord lesion like transverse myelitis instead)."},{"label":"B","text":"Exaggerated tendon reflexes","rationale":"False — GBS causes hyporeflexia/areflexia, not exaggerated reflexes."},{"label":"C","text":"CSF protein levels are elevated b","rationale":"True — elevated CSF protein with a normal cell count ('albuminocytologic dissociation') is the classic CSF finding in GBS."},{"label":"D","text":"MRI is essential for diagnosis","rationale":"False — MRI is not essential for diagnosis; GBS is diagnosed clinically, supported by nerve conduction studies and CSF findings."},{"label":"E","text":"High dose prednisolone is the mainstay of treatment","rationale":"False — high-dose steroids have not been shown to be effective in GBS; IVIG or plasmapheresis are the evidence-based treatments."}],"reviewed_answer":["C"],"explanation":"Elevated CSF protein with a normal cell count (albuminocytologic dissociation) is the classic CSF finding in GBS. GBS causes areflexia (not exaggerated reflexes), no true sensory level, MRI is not essential for diagnosis, and steroids are not effective treatment."},{"num":"21","text":"35-year-old women presented with low grade fever and headache for 1month. MRI shows bilateral ventricular enlargement and basal exudate. CSF report could be,","options":[{"label":"A","text":"Lymphocytic predominance, low glucose, high protein","rationale":"True — lymphocytic predominance with LOW glucose and HIGH protein is the classic CSF profile of tuberculous meningitis."},{"label":"B","text":"Lymphocytic predominant, low protein, normal sugar","rationale":"False — normal protein doesn't fit a basal exudative process like TB meningitis."},{"label":"C","text":"Lymphocytic predominant, normal protein, normal sugar","rationale":"False — normal protein and normal sugar would suggest a non-infective or resolving process, not active TB meningitis."},{"label":"D","text":"Neutrophil predominant, normal protein, normal sugar","rationale":"False — neutrophil predominance suggests acute bacterial meningitis, not TB (which is typically lymphocytic, though early TB meningitis can rarely show neutrophils)."},{"label":"E","text":"Neutrophil predominant, high protein, low sugar","rationale":"False — this profile (neutrophils, high protein, low sugar) fits acute bacterial meningitis rather than TB."}],"reviewed_answer":["A"],"explanation":"Basal exudate + hydrocephalus + CSF showing lymphocytic predominance, low glucose, high protein = tuberculous meningitis."},{"num":"25","text":"56 years old diagnosed patient with DM & rheumatic heart disease presented with acute onset lower limb weakness, flaccid paralysis, reduced sensation upto umbilicus. Proprioception was intact. What is the most probable diagnosis?","options":[{"label":"A","text":"Guillain-Barre syndrome","rationale":"False — GBS doesn't produce a sharp sensory level; it's a symmetric ascending polyneuropathy."},{"label":"B","text":"Cauda equina syndrome","rationale":"False — cauda equina syndrome affects the lower nerve roots (perianal/saddle sensory loss, bladder/bowel involvement), not a clean sensory level at the umbilicus with a cardiac-embolic risk context."},{"label":"C","text":"Transverse myelitis","rationale":"False — transverse myelitis usually involves loss of most/all sensory modalities below the level, not sparing proprioception specifically."},{"label":"D","text":"Anterior spinal artery occlusion","rationale":"True — anterior spinal artery occlusion classically spares the dorsal columns (so proprioception is preserved) while causing motor and pain/temperature loss below the lesion — fitting the DM/valvular disease embolic risk context."},{"label":"E","text":"Diabetic amyotropy","rationale":"False — diabetic amyotrophy causes asymmetric proximal lower limb pain/weakness, not a sharp sensory level with acute flaccid paralysis."}],"reviewed_answer":["D"],"explanation":"DM + rheumatic heart disease + acute flaccid paraparesis with a sensory level but intact proprioception = anterior spinal artery occlusion (spares the dorsal columns)."},{"num":"29","text":"A 50-year-old man presented with sudden onset aphasia and mouth deviation to left side.There was motor paralysis and loss of the sensation on the right side of the body that developed within 2 hours. On admission the BP was 170/110 mmHg and PR – 88 bpm. What is the most appropriate management option?","options":[{"label":"A","text":"Oral warfarin","rationale":"False — oral warfarin doesn't act fast enough and isn't appropriate for acute stroke management."},{"label":"B","text":"IV labetalol infusion","rationale":"False — this BP (170/110) is below the 185/110 thrombolysis threshold, so lowering it first with labetalol infusion is not the priority here."},{"label":"C","text":"IV tissue plasminogen activator","rationale":"True — within the treatment window with BP below the exclusion threshold and no other contraindications noted, IV tPA is appropriate."},{"label":"D","text":"Infusion of heparin 5mg/ day","rationale":"False — heparin infusion is not standard acute ischaemic stroke therapy and increases bleeding risk."},{"label":"E","text":"S/C enoxaparin","rationale":"False — subcutaneous enoxaparin (prophylactic anticoagulation) isn't the acute treatment for ischaemic stroke."}],"reviewed_answer":["C"],"explanation":"Acute hemiparesis/aphasia, BP 170/110 (below the 185/110 thrombolysis threshold) within the treatment window — IV tPA is appropriate."}]},{"date":"2019 March","questions":[{"num":"1","text":"A large lesion in dominant parietal lobe can cause,","options":[{"label":"A","text":"Contralateral hemiparesis","rationale":"False — contralateral hemiparesis is a motor cortex/frontal lobe finding, not a primary parietal lobe feature."},{"label":"B","text":"right left distortion.","rationale":"True — right–left disorientation is part of Gerstmann syndrome, from a dominant (usually left) parietal lesion."},{"label":"C","text":"receptive aphasia","rationale":"True — if the lesion extends toward the temporoparietal junction (Wernicke's area) in the dominant hemisphere, receptive aphasia can occur."},{"label":"D","text":"contralateral inferior quadranopia","rationale":"True — parietal lobe optic radiation carries superior retinal fibres, so a parietal lesion causes a contralateral inferior quadrantanopia."},{"label":"E","text":"disorganized behavior","rationale":"False — disorganised/impulsive behaviour is a frontal lobe feature, not parietal."}],"reviewed_answer":["B","C","D"],"explanation":"Dominant parietal lobe (Gerstmann syndrome): right–left disorientation, acalculia/agraphia/finger agnosia, plus a contralateral inferior quadrantanopia (parietal radiation carries superior retinal fibres). Pure parietal lesions don't typically cause hemiparesis or disorganised behaviour (frontal)."},{"num":"2","text":"Elevated protein, increase polymorphoneuclear cell count, decrease glucose level in the CSF compatible with.","options":[{"label":"A","text":"Herpes simplex meningitis","rationale":"False — herpes simplex meningitis/encephalitis typically shows a lymphocytic CSF, not neutrophilic with low glucose."},{"label":"B","text":"Cryptococcus meningitis","rationale":"False — cryptococcal meningitis usually shows lymphocytic pleocytosis, often in immunocompromised patients."},{"label":"C","text":"Tuberculosis meningitis","rationale":"False — TB meningitis is classically lymphocytic, not polymorphonuclear."},{"label":"D","text":"Cerebral malaria","rationale":"False — cerebral malaria doesn't typically produce this CSF picture (CSF is often relatively unremarkable)."},{"label":"E","text":"Meningococal meningitis","rationale":"True — elevated protein, neutrophil (polymorphonuclear) predominance, and low glucose is the classic picture of acute bacterial meningitis — meningococcal meningitis fits among the options given."}],"reviewed_answer":["E"],"explanation":"High protein, low glucose, polymorphonuclear predominance in CSF = bacterial meningitis; of the options, Neisseria meningitidis is the bacterial cause."},{"num":"21","text":"65 years old male came to the A& E with aphasia & B/L hemiparesis. O/E his BP 178/9 4 mmHg, PR 80,Rhythem is irregular. what is the most appropriate next step of management?","options":[{"label":"A","text":"Mechanical thrombolectomy","rationale":"False — mechanical thrombectomy is specifically for large-vessel occlusion identified on vascular imaging, not the default next step without that information."},{"label":"B","text":"Intra arterial tPA","rationale":"False — intra-arterial tPA is a specialised option, not the standard next step."},{"label":"C","text":"IV labetalol","rationale":"False — BP here (178/94) is below the 185/110 threshold, so IV labetalol to lower BP isn't the priority."},{"label":"D","text":"IV tPA","rationale":"True — with BP already below the thrombolysis threshold, IV tPA is appropriate if within the treatment time window (which the stem implies)."},{"label":"E","text":"Low dose aspirin","rationale":"False — low-dose aspirin is used once thrombolysis isn't appropriate/available or after the acute treatment window, not as the immediate next step in a fresh, treatable stroke."}],"reviewed_answer":["D"],"explanation":"Bilateral hemiparesis/aphasia with AF and BP below the thrombolysis threshold — if within the treatment window, IV tPA is the appropriate next step (time-window dependent)."},{"num":"23","text":"60 year old female presented with progressive dysphagia & dysathria for 2 months. On examination her hand muscles are wasted. Both upper limbs & lower limbs are hypertonic and there is no sensory loss. What is the most likely diagnosis","options":[{"label":"A","text":"Brainstem stroke","rationale":"False — brainstem stroke would have an acute onset, not a 2-month progressive course."},{"label":"B","text":"Cervical disk prolapse","rationale":"False — cervical disc prolapse can cause UMN limb signs but wouldn't typically cause progressive dysphagia/dysarthria without sensory symptoms."},{"label":"C","text":"Motor neuron disease","rationale":"True — progressive bulbar symptoms with mixed UMN (hypertonia) and LMN (wasting) signs and NO sensory loss is the classic picture of motor neuron disease."},{"label":"D","text":"Multiple sclerosis","rationale":"False — multiple sclerosis usually has sensory involvement and a relapsing-remitting course, unlike this description."},{"label":"E","text":"Myotonic dystrophy","rationale":"False — myotonic dystrophy causes myotonia and characteristic facial/distal weakness, not this bulbar-predominant UMN+LMN picture."}],"reviewed_answer":["C"],"explanation":"Progressive bulbar symptoms (dysphagia/dysarthria) with UMN limb signs and NO sensory loss = motor neuron disease (mixed UMN+LMN, sensory sparing is the key discriminator)."}]},{"date":"2018 November","questions":[{"num":"1","text":"Regarding epilepsy:","options":[{"label":"A","text":"Diagnosis of an epilepsy syndrome has an effect on prognosis","rationale":"True — the specific epilepsy syndrome diagnosed does influence prognosis (e.g. some childhood syndromes remit, others don't)."},{"label":"B","text":"EEG is essential in diagnosis","rationale":"False — EEG is supportive, not essential — epilepsy is a clinical diagnosis, and EEG can be normal between seizures."},{"label":"C","text":"Diagnosed when a patient has a tendency to have recurrent seizures","rationale":"True — this is the accepted definition: a tendency to have recurrent unprovoked seizures."},{"label":"D","text":"Occurrence of three seizures in 24 hours is characteristic","rationale":"False — three seizures in 24 hours describes a seizure cluster, not the definition of epilepsy."},{"label":"E","text":"Drug combination is preferred over monotherapy","rationale":"False — monotherapy, not combination therapy, is the preferred initial approach."}],"reviewed_answer":["A","C","D"],"explanation":"Epilepsy syndrome diagnosis does affect prognosis; the definition of epilepsy is a tendency to recurrent unprovoked seizures; the majority achieve remission on antiepileptics. EEG is supportive, not essential, for diagnosis; 3 seizures/24h describes seizure clusters, not the definition; monotherapy — not combination therapy — is preferred first-line."},{"num":"2","text":"Parkinson Disease,","options":[{"label":"A","text":"Resting tremor is a feature.","rationale":"True — resting tremor is a core PD feature."},{"label":"B","text":"Memory loss is characteristic.","rationale":"False — memory loss is not an early or characteristic feature of PD (cognitive decline, when it occurs, is typically late)."},{"label":"C","text":"Freezing gait is an early feature.","rationale":"False — freezing gait typically occurs later in the disease course, not early."},{"label":"D","text":"Cogwheel rigidity","rationale":"True — cogwheel rigidity is a classic PD sign."},{"label":"E","text":"Postural reflexes are lost early.","rationale":"False — loss of postural reflexes (postural instability) is a late feature, not early."}],"reviewed_answer":["A","D"],"explanation":"Resting tremor and cogwheel rigidity are core PD features. Memory loss is not an early/characteristic feature, freezing gait and loss of postural reflexes are late, not early, features."},{"num":"21","text":"60 years old man was admitted to the hospital with the sudden onset of severe vertigo, hiccups and vomiting. On examination, the soft palate was drawn up to the left side when patient is saying 'Ah', associated dysarthria, ptosis, constricted right pupil. There is an impairment of the pain and temperature sensation in the left side of the trunk. Upper limb and lower limb motor examination is normal. What is the most likely reason for this presentation?","options":[{"label":"A","text":"Anterior cerebral artery territory Infarction","rationale":"False — ACA territory infarction causes contralateral leg weakness and behavioural change, not this brainstem picture."},{"label":"B","text":"Anterior inferior cerebellar artery infarction","rationale":"False — AICA infarction causes ipsilateral facial weakness and deafness plus vertigo, a different pattern (though can overlap)."},{"label":"C","text":"Anterior spinal Artery infarction","rationale":"False — anterior spinal artery infarction affects the cord (bilateral motor/sensory below the lesion), not this brainstem picture."},{"label":"D","text":"Posterior Inferior cerebellar artery infarction","rationale":"True — vertigo, hiccups, ipsilateral palatal weakness/dysarthria, ptosis, Horner's, and contralateral pain/temperature loss with normal limb power is the classic PICA-territory lateral medullary (Wallenberg) syndrome."},{"label":"E","text":"Posterior cerebral artery infarction","rationale":"False — PCA infarction causes visual field defects (occipital lobe), not this brainstem cranial nerve picture."}],"reviewed_answer":["D"],"explanation":"Vertigo, hiccups, ipsilateral palatal weakness, dysarthria, Horner's, contralateral pain/temperature loss with normal limb power = lateral medullary (Wallenberg) syndrome from PICA territory infarction."},{"num":"23","text":"32 years old female bank worker presents with a history with migraine. She is getting few migrain attacks per month and affect her work. She is on Nifedipine for the treatment for hypertension; On inhalers for Bronchial Asthma; Hormonal therapy for Poly cystic ovarian syndrome. BMI =23kg/m2 . She is a mother of one child. What is the best drug for Migrain Prophylaxis in this patient?","options":[{"label":"A","text":"Flunarazine","rationale":"False — flunarizine causes weight gain and can cause depression/drowsiness, making it a less ideal first choice here."},{"label":"B","text":"Topiramate","rationale":"True — topiramate is an effective, commonly used first-line migraine prophylactic and, importantly, doesn't carry the strong teratogenicity concerns that valproate does."},{"label":"C","text":"Na valporate","rationale":"False — sodium valproate should be avoided in women of childbearing age due to teratogenicity."},{"label":"D","text":"Sumatriptan","rationale":"False — sumatriptan is an acute abortive treatment, not a prophylactic agent."},{"label":"E","text":"Pizotifen","rationale":"False — pizotifen is a reasonable option but causes weight gain, a less ideal choice than topiramate here."}],"reviewed_answer":["B"],"explanation":"Migraine prophylaxis in a woman of childbearing age: sodium valproate should be avoided (teratogenic). Topiramate is a reasonable, effective first-line choice here (also avoiding beta-blockers, appropriately, given her asthma)."},{"num":"44","text":"A 55 year old male patient presented with right unilateral headache for 2 days. On the next day, he developed a pustular eruption over the right forehead. What is the most appropriate treatment option for this patient?","options":[{"label":"A","text":"IV Acyclovir","rationale":"True — with a V1 (ophthalmic) distribution rash and risk of ocular complications, IV aciclovir is the favoured treatment to reduce the risk of serious eye involvement."},{"label":"B","text":"Oral acyclovir","rationale":"False — oral aciclovir is used in uncomplicated dermatomal zoster elsewhere on the body; ophthalmic involvement usually warrants the IV route/ophthalmology involvement."},{"label":"C","text":"Oral prednisolone","rationale":"False — oral prednisolone may be used adjunctively for pain in some cases but isn't the primary antiviral treatment needed here."},{"label":"D","text":"","rationale":"(Option D text is missing/blank in the original source PDF.)"},{"label":"E","text":"Oral Gabapentine","rationale":"False — gabapentin may help post-herpetic neuralgia later, but isn't the acute treatment for active zoster ophthalmicus."}],"reviewed_answer":["A"],"explanation":"Unilateral headache followed by a vesicular/pustular rash in the V1 (ophthalmic) distribution = herpes zoster ophthalmicus; given the risk of ocular complications, IV aciclovir is favoured in this setting."}]},{"date":"2017 May","questions":[{"num":"4","text":"The following are seen with lower motor neuron lesions of the 7th nerve","options":[{"label":"A","text":"Ptosis","rationale":"False — ptosis is not a facial nerve (CN VII) sign; it relates to CN III or sympathetic (Horner's) pathways."},{"label":"B","text":"Downward movement of the eyeball on attempt to close the eye","rationale":"True — Bell's phenomenon (the eye rolling upward/outward on attempted forced closure, visible because the eyelid can't close) is seen in LMN facial palsy."},{"label":"C","text":"Wrinkling of the forehead on looking up","rationale":"False — in an LMN lesion, forehead wrinkling is LOST on the affected side (not preserved) — this is the key sign distinguishing LMN from UMN facial palsy, where the forehead is spared."},{"label":"D","text":"Reduced hearing","rationale":"True — the facial nerve also supplies the stapedius muscle, so its palsy can cause hyperacusis/altered hearing."},{"label":"E","text":"Horizontal nystagmus","rationale":"False — horizontal nystagmus relates to vestibular/CN VIII or brainstem pathways, not the facial nerve."}],"reviewed_answer":["B","D"],"explanation":"LMN facial palsy: Bell's phenomenon (eye rolls up/out on attempted closure) is present, and hyperacusis/altered hearing occurs from stapedius paralysis. Ptosis is not a facial nerve sign, and forehead wrinkling is LOST (not preserved) in an LMN lesion — that's the key difference from a UMN (central) facial palsy, which spares the forehead."},{"num":"7","text":"Shingles","options":[{"label":"A","text":"Is caused by herpes simplex","rationale":"False — shingles is caused by reactivation of Varicella Zoster Virus, not herpes simplex virus."},{"label":"B","text":"Is treated with acyclovir","rationale":"True — aciclovir (or valaciclovir/famciclovir) is the standard antiviral treatment for shingles."},{"label":"C","text":"Usually affects a single dermatome","rationale":"True — shingles classically affects a single dermatome, reflecting reactivation in one dorsal root/cranial nerve ganglion."},{"label":"D","text":"When severe , causes persistent neuralgic pain","rationale":"True — severe cases can leave post-herpetic neuralgia, a persistent neuralgic pain."},{"label":"E","text":"Occurs from the reactivation of virus latent within the dorsal root ganglia","rationale":"True — VZV lies latent in the dorsal root ganglia after primary infection (chickenpox) and reactivates to cause shingles."}],"reviewed_answer":["B","C","D","E"],"explanation":"Shingles is due to Varicella Zoster Virus (not HSV), reactivating from latency in the dorsal root ganglia, usually affecting a single dermatome, treated with aciclovir, and — when severe — can leave post-herpetic neuralgia."},{"num":"11","text":"The presence of ataxia suggests","options":[{"label":"A","text":"Vestibule cerebellum","rationale":"True — vestibulocerebellar dysfunction causes truncal/gait ataxia."},{"label":"B","text":"Spino cerebellum","rationale":"True — spinocerebellar dysfunction causes limb ataxia (dysmetria, intention tremor)."},{"label":"C","text":"Dorsal column","rationale":"True — dorsal column (proprioceptive) loss causes sensory ataxia, worsened with eyes closed (Romberg positive)."},{"label":"D","text":"Vestibule system","rationale":"True — vestibular system dysfunction causes vestibular ataxia with vertigo/imbalance."},{"label":"E","text":"Thalamus","rationale":"False — the thalamus is not a classic ataxia-generating structure in standard teaching."}],"reviewed_answer":["A","B","C","D"],"explanation":"Ataxia can arise from the vestibulocerebellum (truncal/gait ataxia), spinocerebellum (limb ataxia), dorsal columns (sensory ataxia), or the vestibular system itself. The thalamus is not a classic ataxia-generating structure."},{"num":"33","text":"A 57 old man presents with difficulty in identifying familiar faces such as family members. However, when they speak ,he can identify them by voice. A lesion resulting in this syndrome would typically localize to which of the following structures/","options":[{"label":"A","text":"Prefrontal cortex","rationale":"False — the prefrontal cortex relates to executive function/personality, not face recognition."},{"label":"B","text":"Non-dominant occipitotemporal lobe","rationale":"True — prosopagnosia (face blindness with intact recognition by voice) localises to the non-dominant (usually right) occipitotemporal/fusiform region."},{"label":"C","text":"Non-dominant occipitoparietal lobe","rationale":"False — occipitoparietal regions are more associated with spatial processing, not specifically face recognition."},{"label":"D","text":"Occipital cortex","rationale":"False — isolated occipital cortex lesions cause visual field loss, not selective face-recognition deficits."},{"label":"E","text":"Dominant occipitoparietal lobe","rationale":"False — the dominant hemisphere is typically responsible for language, not face recognition (which is right/non-dominant lateralised)."}],"reviewed_answer":["B"],"explanation":"Prosopagnosia (face blindness with intact voice recognition) localises to the non-dominant (usually right) occipitotemporal/fusiform region."},{"num":"36","text":"A 20 year old woman presents with a history of fever for 3 days and headache for 1 day. As she has fainted, she is brought to the hospital. On examination she has faint erythematous rash and mild neck stiffness and blood pressure of 80/60mmhg. Her platelets count is 82x109/L and CRP is 167mg/dl What is the most likely causative organism?","options":[{"label":"A","text":"Listeria monocytogenes","rationale":"False — Listeria typically affects neonates, elderly, or immunocompromised patients, and doesn't classically cause this rash."},{"label":"B","text":"Mycobacterium tuberculosis","rationale":"False — TB meningitis has a subacute course, not this acute fulminant picture with rash and hypotension."},{"label":"C","text":"Streptococcus pneumoniae","rationale":"False — pneumococcal meningitis doesn't classically present with a petechial rash and this degree of acute shock."},{"label":"D","text":"Neisseria meningitides","rationale":"True — fever, petechial rash, neck stiffness, hypotension (septic shock), thrombocytopenia and very high CRP together strongly suggest meningococcal disease (Neisseria meningitidis)."},{"label":"E","text":"Haemophilus influenza","rationale":"False — H. influenzae is less associated with this fulminant rash/shock picture, especially in vaccinated populations."}],"reviewed_answer":["D"],"explanation":"Fever, petechial rash, hypotension, thrombocytopenia and very high CRP with neck stiffness = meningococcal disease/meningitis — Neisseria meningitidis."},{"num":"44","text":"A 48 year old lady with a history of hypertension, DM & atrial fibrillation presented to the ward with cellulitis. Her cellulitis was treated with IV antibiotics. But on the day prior to discharge she developed a sudden loss of vision of one eye. She regained vision back after a while. What is the most probable diagnosis that explains the cause of her loss of vision?","options":[{"label":"A","text":"Giant cell arteritis","rationale":"False — GCA (temporal arteritis) can cause vision loss but this vignette doesn't mention the typical scalp tenderness/jaw claudication/age-specific ESR clues pointing specifically to GCA over TIA."},{"label":"B","text":"Vitreous haemorrhage","rationale":"False — vitreous haemorrhage doesn't typically fully and rapidly reverse in this fashion tied to vascular risk factors."},{"label":"C","text":"Transient ischaemic attack","rationale":"True — sudden, painless, fully-reversible monocular vision loss in a patient with HTN/DM/AF is amaurosis fugax, a retinal TIA."},{"label":"D","text":"Diabetic maculopathy","rationale":"False — diabetic maculopathy causes gradual, not sudden and reversible, vision changes."},{"label":"E","text":"Central retinal vein occlusion","rationale":"False — central retinal vein occlusion typically causes a more persistent, not fully reversible, vision loss."}],"reviewed_answer":["C"],"explanation":"Sudden, painless, fully-reversible monocular vision loss in a patient with vascular risk factors (HTN/DM/AF) = amaurosis fugax, a form of TIA."}]},{"date":"2016 May","questions":[{"num":"02","text":"Causes for peripheral neuropathy","options":[{"label":"A","text":"Vitamin A deficiency","rationale":"False — vitamin A deficiency is not a recognised cause of peripheral neuropathy (vitamin A deficiency classically causes night blindness)."},{"label":"B","text":"Cryoglobulinemia","rationale":"True — cryoglobulinaemia can cause a vasculitic peripheral neuropathy."},{"label":"C","text":"Cervical spondylosis","rationale":"False — cervical spondylosis causes radiculopathy/myelopathy from nerve root or cord compression, not a peripheral neuropathy."},{"label":"D","text":"Alcohol abuse","rationale":"True — chronic alcohol abuse is a well-recognised cause of peripheral (typically sensory, length-dependent) neuropathy."},{"label":"E","text":"Vitamin B12 deficiency","rationale":"True — vitamin B12 deficiency causes peripheral neuropathy (and subacute combined degeneration of the cord)."}],"reviewed_answer":["B","D","E"],"explanation":"Peripheral neuropathy causes: cryoglobulinaemia (vasculitic neuropathy), alcohol abuse, and B12 deficiency are classic causes. Vitamin A deficiency is not a recognised cause, and cervical spondylosis causes radiculopathy/myelopathy rather than a peripheral neuropathy."},{"num":"SBA 1","text":"A 48year old man presented with acute onset dizziness and vomiting. He stated that the world is spinning around and he has poor balance. His hearing is normal. No similar family history. On examination he had right lateral gaze palsy. Apart from that other examination findings are normal. What is the most probable diagnosis?","options":[{"label":"A","text":"Fredriech ataxia","rationale":"False — Friedreich's ataxia is a chronic progressive hereditary ataxia, not an acute vertigo presentation."},{"label":"B","text":"Meniere's disease","rationale":"False — Ménière's disease causes recurrent vertigo WITH fluctuating hearing loss/tinnitus — hearing here is normal."},{"label":"C","text":"Verstbulobasilar insufficiency","rationale":"True — acute vertigo/vomiting with normal hearing PLUS a CN VI (lateral gaze) palsy indicates brainstem involvement — vertebrobasilar insufficiency — rather than a purely peripheral vestibular cause."},{"label":"D","text":"Vestibular neuronitis","rationale":"False — vestibular neuronitis is a peripheral cause and wouldn't produce a CN VI palsy."},{"label":"E","text":"Acoustic neuroma","rationale":"False — acoustic neuroma typically causes progressive hearing loss/tinnitus, not acute vertigo with a gaze palsy and normal hearing."}],"reviewed_answer":["C"],"explanation":"Acute vertigo/vomiting with normal hearing PLUS a CN VI (lateral gaze) palsy points to a central (brainstem) cause — vertebrobasilar insufficiency — rather than a purely peripheral vestibular lesion, since cranial nerve involvement implies brainstem pathology."},{"num":"SBA 2","text":"20years old gentleman presented with 2 episodes of fits over 2 months duration. EEG shows generalized epileptiform discharges. What is the drug of choice?","options":[{"label":"A","text":"lamotrigine","rationale":"False — lamotrigine is effective but not traditionally the first-choice for generalised epilepsy in a young man where teratogenicity isn't a limiting factor."},{"label":"B","text":"sodium valproate","rationale":"True — sodium valproate is the traditional first-line agent for generalised epilepsy, especially where pregnancy risk isn't a concern (as here, a young man)."},{"label":"C","text":"carbamazepine","rationale":"False — carbamazepine can worsen certain generalised seizure types (e.g. absence, myoclonic) and is p
