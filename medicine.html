referred for focal epilepsy instead."},{"label":"D","text":"topiramide","rationale":"False — topiramate is a second-line option, not the classic first choice here."},{"label":"E","text":"vigarbartin","rationale":"False — vigabatrin has significant visual field toxicity and is reserved for specific indications (e.g. infantile spasms), not first-line generalised epilepsy."}],"reviewed_answer":["B"],"explanation":"Generalised epileptiform discharges on EEG (generalised epilepsy) in a young man — sodium valproate is the traditional first-line choice (teratogenicity concerns don't apply here)."}]},{"date":"2015 November","questions":[{"num":"1","text":"Regarding GBS","options":[{"label":"A","text":"Type 1 respiratory failure is a feature.","rationale":"False — GBS causes type 2 (hypoventilatory, due to respiratory muscle weakness) respiratory failure, not type 1 (hypoxaemic)."},{"label":"B","text":"Global areflexia is typical.","rationale":"True — global areflexia is a hallmark clinical finding in GBS."},{"label":"C","text":"Distal demyelination is a feature.","rationale":"False — GBS demyelination is patchy and multifocal along peripheral nerves, not specifically 'distal'."},{"label":"D","text":"Elevated CSF protein is a feature.","rationale":"True — elevated CSF protein (with normal cell count) is the classic finding."},{"label":"E","text":"Treated with IV methyl prednisolone.","rationale":"False — high-dose steroids are not an effective treatment for GBS; IVIG/plasmapheresis are the evidence-based options."}],"reviewed_answer":["B","D"],"explanation":"GBS: global areflexia and elevated CSF protein (with normal cell count) are classic. GBS causes type 2 (hypoventilatory) respiratory failure, not type 1; demyelination is patchy/multifocal rather than purely 'distal'; and steroids are not an effective treatment."},{"num":"2","text":"WOF are true about myasthenia gravis","options":[{"label":"A","text":"Muscle wasting is a prominent feature.","rationale":"False — prominent muscle wasting is NOT typical of MG — this is a key feature distinguishing it from primary myopathies."},{"label":"B","text":"Fluctuating muscle weakness is seen.","rationale":"True — fluctuating (fatigable) weakness, worse with sustained activity, is the hallmark of MG."},{"label":"C","text":"Heart is not affected.","rationale":"True — cardiac (smooth/cardiac) muscle is not affected in MG; it's a disease of skeletal muscle neuromuscular junctions."},{"label":"D","text":"Proximal muscles are mostly affected.","rationale":"True — proximal muscles (and ocular/bulbar muscles) are predominantly affected in MG."},{"label":"E","text":"Associated with thymic hyperplasia.","rationale":"True — MG is strongly associated with thymic hyperplasia or thymoma."}],"reviewed_answer":["B","C","D","E"],"explanation":"MG: fluctuating (fatigable) weakness, cardiac muscle spared, proximal muscles predominantly affected, and association with thymic hyperplasia/thymoma are all classic. Prominent muscle wasting is NOT typical of MG — that's a key feature distinguishing it from myopathies."},{"num":"23","text":"A 28 year old prisoner was brought to the medical ward with an acute fever episode. His CSF analysis findings were, Polymorphs 2 Lymphocytes 48 Protein 458mg/dl Sugar 28mg/dl RBS 200 mg/dl What is the most probable diagnosis?","options":[{"label":"A","text":"Partially treated meningitis","rationale":"False — partially treated bacterial meningitis can sometimes show a lymphocytic shift, but the very low glucose and high protein here fit TB meningitis more classically, especially with the epidemiological risk (prisoner, subacute course)."},{"label":"B","text":"Tuberculous meningitis","rationale":"True — lymphocytic predominance with low glucose (relative to RBS 200) and high protein in a subacute febrile illness is the classic CSF picture of tuberculous meningitis."},{"label":"C","text":"Viral meningoencephalitis","rationale":"False — viral meningoencephalitis usually shows a normal or only mildly reduced glucose, not this degree of hypoglycorrhachia."},{"label":"D","text":"Leptospirosis","rationale":"False — leptospirosis CSF findings don't typically show this degree of low glucose/high protein pattern."},{"label":"E","text":"Viral encephalitis","rationale":"False — viral encephalitis CSF glucose is typically normal, unlike here."}],"reviewed_answer":["B"],"explanation":"Lymphocytic pleocytosis with high protein and LOW glucose (relative to RBS 200) in a young patient with subacute fever/headache = tuberculous meningitis."}]},{"date":"2015 May","questions":[{"num":"01","text":"49 year old male presented with intermittent dysphagia, ptosis & proximal muscle weakness which worsen towards evening. Which of the following are true about the management of this contion?","options":[{"label":"A","text":"Azathioprine","rationale":"True — azathioprine is used as a steroid-sparing immunosuppressant in MG."},{"label":"B","text":"IV immunoglobulin","rationale":"True — IVIG is used for rapid control, e.g. in myasthenic crisis."},{"label":"C","text":"Plasmaperesis","rationale":"True — plasmapheresis is used similarly for rapid control in crisis."},{"label":"D","text":"Prednisolone","rationale":"True — prednisolone is a mainstay immunosuppressive treatment in MG."},{"label":"E","text":"Neostigmine","rationale":"True — neostigmine (an anticholinesterase, like pyridostigmine) provides symptomatic relief."}],"reviewed_answer":["A","B","C","D","E"],"explanation":"MG management can include all of these depending on severity/context: pyridostigmine (symptomatic), prednisolone/azathioprine (immunosuppression), and IVIG/plasmapheresis (for crisis or rapid control)."},{"num":"18","text":"Regarding Neuromuscular transmission","options":[{"label":"A","text":"Ach receptors located on post synaptic membrane","rationale":"True — acetylcholine receptors are located on the postsynaptic (muscle) membrane."},{"label":"B","text":"Ca2+ influx activates Ach release","rationale":"True — calcium influx into the presynaptic terminal triggers vesicular acetylcholine release."},{"label":"C","text":"OP compounds inhibit Ach release","rationale":"False — organophosphate compounds INHIBIT acetylcholinesterase, causing ACCUMULATION (not inhibition of release) of acetylcholine at the synapse."},{"label":"D","text":"Krait venom acts on NM junction","rationale":"True — krait venom contains presynaptic neurotoxins that act at the neuromuscular junction."},{"label":"E","text":"Neostigmine inhibits Ach esterase","rationale":"True — neostigmine works by inhibiting acetylcholinesterase, increasing available acetylcholine."}],"reviewed_answer":["A","B","D","E"],"explanation":"AChR is postsynaptic, Ca2+ influx triggers presynaptic ACh release, krait venom acts presynaptically at the NMJ, and neostigmine inhibits acetylcholinesterase. Organophosphates INHIBIT acetylcholinesterase (causing ACh accumulation), they do not inhibit ACh release."},{"num":"22","text":"50 year old female patient presented with R/S hemiplegia, L/S horners xn, neck pain. Most likely diagnosis","options":[{"label":"A","text":"L/S internal capsular infraction","rationale":"False — an isolated internal capsule infarct wouldn't produce an ipsilateral Horner's syndrome or neck pain."},{"label":"B","text":"Lateral medullary Xn","rationale":"False — lateral medullary syndrome causes crossed brainstem signs (not a clean contralateral hemiplegia) and doesn't typically present with neck pain as the leading symptom."},{"label":"C","text":"Pancoat’s tumour","rationale":"False — Pancoast's tumour causes Horner's syndrome from apical lung tumour invasion of the sympathetic chain, but wouldn't cause a contralateral hemiplegia."},{"label":"D","text":"Vertebral artery dissection","rationale":"False — vertebral artery dissection causes posterior circulation (brainstem/cerebellar) signs, not a contralateral hemiplegia with ipsilateral Horner's in this pattern."},{"label":"E","text":"Carotid artery dissection","rationale":"True — contralateral hemiplegia (from cerebral ischaemia) with ipsilateral Horner's syndrome (sympathetic plexus disruption around the carotid) and neck pain is the classic triad of carotid artery dissection."}],"reviewed_answer":["E"],"explanation":"Contralateral hemiplegia with ipsilateral Horner's syndrome and neck pain = carotid artery dissection (sympathetic plexus disruption around the carotid plus cerebral ischaemia)."}]},{"date":"2014 November","questions":[{"num":"1","text":"Regarding epilepsy,","options":[{"label":"A","text":"Absence of EEG findings does not exclude a seizure","rationale":"True — EEG can be normal between seizures, so a normal EEG does not exclude epilepsy."},{"label":"B","text":"Phenobarbitone is a first line antiepileptic drug","rationale":"False — phenobarbitone is not considered first-line therapy in modern practice."},{"label":"C","text":"In a focal seizure brain imaging is indicated","rationale":"True — in focal seizures, brain imaging (MRI) is indicated to look for an underlying structural cause."},{"label":"D","text":"In majority, remissions are achieved using anti-epileptics","rationale":"True — the majority of patients with epilepsy achieve seizure remission with antiepileptic drugs."},{"label":"E","text":"Driving is allowed from one month after the last seizure","rationale":"False — driving restrictions typically require a much longer seizure-free interval (commonly 6–12 months depending on jurisdiction), not just 1 month."}],"reviewed_answer":["A","C","D"],"explanation":"EEG can be normal between seizures (doesn't exclude epilepsy); focal seizures warrant brain imaging to look for a structural cause; most patients achieve remission on antiepileptics. Phenobarbitone is not first-line in modern practice, and driving restrictions require a much longer seizure-free period (commonly 6–12 months, not 1 month)."},{"num":"2","text":"Which abnormalities correspond to the site of the lesion,","options":[{"label":"A","text":"Bitemporal hemianopia – Occipital lobe","rationale":"False — bitemporal hemianopia results from a chiasmal lesion (e.g. pituitary tumour), not the occipital lobe."},{"label":"B","text":"L/ superior homonymous quadrianopia – R/ temporal lobe","rationale":"True — Meyer's loop in the temporal lobe carries inferior retinal fibres; a right temporal lesion causes a left superior ('pie in the sky') homonymous quadrantanopia."},{"label":"C","text":"Left homonymous hemianopia – R/ occipital lobe","rationale":"True — a right occipital lobe lesion causes a left homonymous hemianopia (fibres from both eyes representing the left visual field converge there)."},{"label":"D","text":"L/ inferior quadrianopia – Early pituitary tumor","rationale":"False — pituitary tumours classically cause bitemporal hemianopia (compressing crossing chiasmal fibres), not an isolated inferior quadrantanopia."},{"label":"E","text":"R/ homonymous hemianopia – R/ occipital lobe","rationale":"False — a right occipital lesion causes a LEFT (not right) homonymous hemianopia, since the visual pathway crosses."}],"reviewed_answer":["B","C"],"explanation":"Meyer's loop in the temporal lobe carries inferior retinal (superior field) fibres, so a right temporal lesion gives a left superior homonymous quadrantanopia (true). A left homonymous hemianopia does localise to the right occipital lobe (true). Bitemporal hemianopia is a chiasmal (not occipital) finding; pituitary tumours classically cause bitemporal (not unilateral inferior) quadrantanopia/hemianopia; and a right occipital lesion causes a LEFT (not right) homonymous hemianopia."},{"num":"21","text":"65 yr old man presented with fever, headache and drowsiness for 2 days. He has history of recurrent ear Infection. What is the most appropriate investigation to come into diagnosis?","options":[{"label":"A","text":"Ear swab and culture","rationale":"False — ear swab/culture identifies a local organism but doesn't assess for intracranial complications like a brain abscess."},{"label":"B","text":"Blood culture","rationale":"False — blood culture is useful but not the key investigation for excluding a mass lesion before further management."},{"label":"C","text":"EEG","rationale":"False — EEG isn't the primary investigation for this presentation."},{"label":"D","text":"CT brain","rationale":"True — with recurrent ear infections and signs of possible intracranial extension (fever, headache, drowsiness), CT brain is needed to exclude an abscess/mass effect, especially before any LP."},{"label":"E","text":"Lumbar puncture","rationale":"False — LP should not be the first step here until a mass lesion/raised ICP has been excluded by CT, given the risk of coning."}],"reviewed_answer":["D"],"explanation":"Fever, headache, drowsiness with a history of recurrent ear infections raises concern for an otogenic brain abscess — CT brain is needed to exclude a mass lesion/raised ICP before any LP."},{"num":"22","text":"24 year old male presented with sudden onset dysphasia and R/S hemiplegia and R/Horner's syndrome. No cerebellar signs. What is the most likely diagnosis?","options":[{"label":"A","text":"Lacunar infarct of internal capsule","rationale":"False — a lacunar infarct of the internal capsule wouldn't cause an ipsilateral Horner's syndrome."},{"label":"B","text":"Syringomyelia","rationale":"False — syringomyelia has an insidious course with dissociated sensory loss, not this acute onset dysphasia/hemiplegia/Horner's picture."},{"label":"C","text":"lateral medullary Syndrome","rationale":"False — lateral medullary syndrome (which does cause Horner's) also involves cerebellar signs, which are explicitly absent here, and doesn't typically cause hemiplegia or dysphasia (cortical functions)."},{"label":"D","text":"Carotid artery dissection","rationale":"True — sudden dysphasia + hemiplegia (cortical/cerebral signs) with ipsilateral Horner's syndrome, and no cerebellar signs, points to carotid artery dissection with cerebral ischaemia plus sympathetic plexus disruption."},{"label":"E","text":"Pancoast tumour","rationale":"False — Pancoast tumour causes Horner's from apical lung disease, not acute dysphasia/hemiplegia."}],"reviewed_answer":["D"],"explanation":"Sudden dysphasia, hemiplegia and ipsilateral Horner's without cerebellar signs = carotid artery dissection."},{"num":"23","text":"39 year old obese female admitted with a 3 day history of rapidly developing weakness of all 4 limbs. O/E- LMN type B/L facial N. palsy with flaccid quadriparesis. Tendon reflexes are absent and plantar response is flexor. What is most appropriate therapeutic option","options":[{"label":"A","text":"IV immunoglobulin","rationale":"True — rapidly ascending flaccid quadriparesis with bilateral LMN facial palsy and areflexia is classic GBS; IV immunoglobulin is an appropriate evidence-based treatment."},{"label":"B","text":"steroids","rationale":"False — steroids alone are not shown to be effective in GBS."},{"label":"C","text":"IV antibiotics","rationale":"False — IV antibiotics would only be relevant if there were evidence of an ongoing bacterial infection driving the presentation, not for GBS itself."},{"label":"D","text":"Azathioprine","rationale":"False — azathioprine is not used for acute GBS management (its onset of action is far too slow)."},{"label":"E","text":"Physiotherapy","rationale":"False — physiotherapy is supportive but not a disease-modifying treatment for the acute presentation."}],"reviewed_answer":["A"],"explanation":"Rapidly ascending flaccid quadriparesis with bilateral LMN facial palsy and areflexia = GBS; IV immunoglobulin is the appropriate treatment."}]},{"date":"2014 May","questions":[{"num":"1","text":"Causes of unilateral facial nerve palsy","options":[{"label":"A","text":"HSV","rationale":"True — HSV reactivation is implicated in Bell's palsy, a common cause of unilateral LMN facial palsy."},{"label":"B","text":"Motor neurone disease","rationale":"False — MND doesn't typically cause an isolated unilateral LMN facial palsy as its presenting feature."},{"label":"C","text":"Syringomyelia","rationale":"False — syringomyelia doesn't affect the facial nerve unless it extends into the brainstem (syringobulbia), which is not the typical presentation implied here."},{"label":"D","text":"Acoustic neuroma","rationale":"True — acoustic neuroma can compress the facial nerve in the cerebellopontine angle, causing a unilateral facial palsy (often with hearing loss too)."},{"label":"E","text":"Cholesteaoma","rationale":"True — cholesteatoma can erode into the facial canal and directly damage the facial nerve."}],"reviewed_answer":["A","D","E"],"explanation":"Unilateral facial (Bell's) palsy causes: HSV reactivation (Bell's palsy), acoustic neuroma (cerebellopontine angle compression), and cholesteatoma (erosion into the facial canal). MND doesn't typically cause an isolated unilateral LMN facial palsy, and syringomyelia doesn't affect the facial nerve unless it extends to the brainstem (syringobulbia)."},{"num":"2","text":"65 yr old right hand dominant male had an ischemic infraction. WOF clinical features corresponding to infracted area","options":[{"label":"A","text":"Left homonymous hemianopia – R/S occipital lobe","rationale":"True — a right occipital lobe lesion causes a left homonymous hemianopia."},{"label":"B","text":"Acalculia – left parietal lobe","rationale":"True — a dominant (left) parietal lobe lesion can cause acalculia, part of Gerstmann syndrome."},{"label":"C","text":"R/S vigorous spasm – cerebellum","rationale":"Uncertain/likely false as phrased — standard teaching links cerebellar lesions with ipsilateral hypotonia/ataxia/intention tremor, not 'vigorous spasm'; this option doesn't match typical cerebellar sign descriptions."},{"label":"D","text":"Abnormal higher functions – frontal lobe","rationale":"True — frontal lobe lesions classically cause abnormal higher/executive function."},{"label":"E","text":"L/S weakness & R/S 3rd nerve palsy – mid brain","rationale":"True — ipsilateral CN III palsy with contralateral hemiparesis (crossed findings) localises to the midbrain — Weber's syndrome."}],"reviewed_answer":["A","B","D"],"explanation":"Right occipital lesion → left homonymous hemianopia (true); dominant (left) parietal lesion → acalculia (true, Gerstmann syndrome); frontal lobe lesion → abnormal higher/executive function (true). Ipsilateral CN III palsy with contralateral hemiparesis localises to the midbrain (Weber syndrome) — also true (E). Note: option C's description of 'vigorous spasm' with cerebellar lesions doesn't match standard teaching (cerebellar lesions cause ipsilateral hypotonia/ataxia, not spasm) and is best treated as false/uncertain."},{"num":"23","text":"A 25 year old previously well female presented with progressive weakness of lower limbs for 3 days duration. Now she complains of upper limb weakness also. On examination, all 4 limb weakness was present with absent reflexes. As her vital capacity is reduced, she was incubated & ventilated. What is the next step","options":[{"label":"A","text":"Nerve conduction study","rationale":"False — nerve conduction studies support the diagnosis but aren't a treatment step at this point."},{"label":"B","text":"MRI","rationale":"False — MRI isn't the priority once the diagnosis (GBS) is already clinically apparent and the patient is critically unwell."},{"label":"C","text":"IV antibiotic administration","rationale":"False — antibiotics aren't indicated for GBS itself."},{"label":"D","text":"IV lg administration","rationale":"True — once ventilated for respiratory failure from GBS, starting IV immunoglobulin is the appropriate next treatment step."},{"label":"E","text":"IV dexamethasone","rationale":"False — dexamethasone/steroids are not effective treatment for GBS."}],"reviewed_answer":["D"],"explanation":"Ascending paralysis with respiratory failure needing ventilation = GBS; having already intubated, IV immunoglobulin is the next treatment step."}]},{"date":"2013 November","questions":[{"num":"SBA 3","text":"17 year old male with fever and headache for 2 weeks, HB- 10, wbc-4000, plt- 14000, EEG- normal, ESR- 80, CSF- wbc -high, głucose - low, protein -high, lymphocytes -high, what is the next step in management (department)","options":[{"label":"A","text":"Anti TB drugs with steroids","rationale":"True — fever/headache over 2 weeks, low platelets/WBC, high ESR, and CSF showing high WBC with lymphocytic predominance, low glucose and high protein is the classic picture of TB meningitis; treatment is anti-TB drugs with adjunctive steroids."},{"label":"B","text":"IV acyclovir","rationale":"False — IV aciclovir treats HSV encephalitis, which doesn't match this CSF/systemic picture."},{"label":"C","text":"Ceftriaxone with steroids","rationale":"False — ceftriaxone with steroids would be for acute bacterial meningitis, which usually shows a neutrophilic CSF, not this lymphocytic/low-glucose picture over 2 weeks."},{"label":"D","text":"V ampicillin","rationale":"False — IV ampicillin covers Listeria, not the picture described here."},{"label":"E","text":"Oral artemesinin+lamefrentine","rationale":"False — antimalarials would be for cerebral malaria, not supported by this CSF picture."}],"reviewed_answer":["A"],"explanation":"Fever/headache 2 weeks, pancytopenic picture, high ESR, and CSF showing lymphocytic pleocytosis with high protein/low glucose = tuberculous meningitis — treat with anti-TB drugs plus steroids."},{"num":"SBA 11","text":"68 year old female presented with headache, drowsiness, fever for 2 days. She has a history of recurrent ear intections. Most important Ix for Dx?","options":[{"label":"A","text":"Ear swab","rationale":"False — ear swab identifies local flora but doesn't assess intracranial extension."},{"label":"B","text":"Blood culture","rationale":"False — blood culture is useful adjunctively but not the key investigation to exclude a mass lesion."},{"label":"C","text":"CT brain","rationale":"True — with recurrent ear infections and signs suggesting possible intracranial spread, CT brain is the key investigation before proceeding further (e.g. before LP)."},{"label":"D","text":"ESR","rationale":"False — ESR is nonspecific and doesn't localise or exclude a mass lesion."},{"label":"E","text":"Lumbar puncture","rationale":"False — LP shouldn't be the first step without first excluding a mass lesion by CT, given the risk of herniation."}],"reviewed_answer":["C"],"explanation":"Fever, headache, drowsiness with recurrent ear infections (possible otogenic abscess) — CT brain is the key investigation before considering LP."}]},{"date":"2013 Eastern","questions":[{"num":"BOF 3","text":"55 year old female presented with altered consciousness and dysplasia, conjugate eye deviation to right side and flaccid paralysis of lower limbs. Other examinations were normal. The lesion could be in?","options":[{"label":"1","text":"L-cerebellar infarction","rationale":"Not the best fit — a purely cerebellar infarction wouldn't typically cause this aphasia/consciousness/eye-deviation picture."},{"label":"2","text":"R-internal capsule","rationale":"Possible but less classic — internal capsule lesions usually cause pure motor/sensory deficits without conjugate eye deviation as a leading feature."},{"label":"3","text":"R-frontal lobe","rationale":"Most consistent with a large hemispheric lesion causing conjugate gaze deviation (frontal eye fields) plus depressed consciousness and contralateral limb involvement — though this call carries real uncertainty given the ambiguous/likely mistyped source text."},{"label":"4","text":"R-temporal lobe","rationale":"Less classic for this specific combination of conjugate eye deviation and consciousness change."},{"label":"5","text":"R-parietal lobe","rationale":"Less classic — parietal lesions more typically cause sensory/neglect syndromes rather than this global picture."}],"reviewed_answer":["3"],"explanation":"This one is genuinely ambiguous from the stem alone (source text also has an apparent typo — 'dysplasia' likely meant 'dysphagia' or 'dysphasia'). Conjugate eye deviation towards a hemisphere plus depressed consciousness and a large-lesion picture is most consistent with a large right frontal lesion (frontal eye fields drive conjugate gaze), so option 3 is the best fit — but treat this one with caution rather than certainty."}]},{"date":"2012 November","questions":[{"num":"T/F 34","text":"Which of the following result in clinical cranial nerve palsies?","options":[{"label":"A","text":"TB meningitis","rationale":"True — TB meningitis (a basal meningitic process) commonly causes lower cranial nerve palsies."},{"label":"B","text":"nasopharyngeal carcinoma","rationale":"True — nasopharyngeal carcinoma can invade the skull base and cause multiple cranial nerve palsies."},{"label":"C","text":"lateral medullary syndrome","rationale":"True — lateral medullary syndrome involves cranial nerves IX and X, causing dysphagia/hoarseness."},{"label":"D","text":"cervical spondylosis","rationale":"False — cervical spondylosis affects cervical nerve roots or the spinal cord, not the cranial nerves."},{"label":"E","text":"diabetes mellitus","rationale":"True — diabetes mellitus can cause mononeuropathies of cranial nerves III, IV, VI or VII (diabetic cranial mononeuropathy)."}],"reviewed_answer":["A","B","C","E"],"explanation":"Basal meningitic processes causing cranial nerve palsies: TB meningitis, nasopharyngeal carcinoma (skull base invasion), lateral medullary syndrome (IX/X involvement), and diabetic mononeuropathy (CN III/IV/VI/VII) are all recognised causes. Cervical spondylosis affects nerve roots/cord, not cranial nerves."},{"num":"SBR 1","text":"63 year old diabetic and hypertensive woman presenting with headache, anorexia and fatigue for 3 weeks duration. She developed sudden onset of left sided facial, upper limb, lower limb weakness. On examination left side facial muscles, UL/LL UMN weakness was present. Investigations revealed ESR- 98, mm/hr, WBC- 9000, Hb - 10, NCCT hydrocephalus and minor cortical infarcts, most possible diagnosis is,","options":[{"label":"A","text":"Athermoatous stroke","rationale":"False — atheromatous stroke wouldn't explain the very high ESR or the hydrocephalus seen on imaging."},{"label":"B","text":"TB meningitis","rationale":"True — subacute constitutional symptoms (headache, anorexia, fatigue), very high ESR, hydrocephalus (from basal exudates), and small cortical infarcts (from associated vasculitis) together fit TB meningitis with its known vascular/hydrocephalus complications better than the other options."},{"label":"C","text":"SLE","rationale":"False — SLE could cause vasculitic infarcts and a raised ESR, but doesn't classically explain hydrocephalus in this way, and is less likely given the overall clinical context."},{"label":"D","text":"Giant cell arthritis","rationale":"False — giant cell arteritis causes a very high ESR but doesn't typically cause hydrocephalus."},{"label":"E","text":"Polyarthritis nodosa","rationale":"False — polyarteritis nodosa can cause vasculitic strokes but doesn't typically produce hydrocephalus either."}],"reviewed_answer":["B"],"explanation":"Subacute headache/anorexia/fatigue with very high ESR, hydrocephalus and small cortical infarcts on CT in a diabetic/hypertensive patient — this constellation (basal exudate causing hydrocephalus + vasculitic small infarcts) fits tuberculous meningitis better than giant cell arteritis, which doesn't typically cause hydrocephalus."},{"num":"SBA 2","text":"A 40 year old farrmer presenting with acute lower limb weaknes, following acute flu like illness. On examination his lower limbs were paralyzed, reflexes were absent, extensor plantar response, bladder was palpable. What is the most likely diagnosis?","options":[{"label":"A","text":"Guiline-Barre syndrome","rationale":"False — GBS causes flaccid paralysis with AREFLEXIA and flexor (not extensor) plantar responses, and doesn't typically cause bladder involvement early."},{"label":"B","text":"Transverse myelitis","rationale":"False — transverse myelitis is possible but doesn't specifically explain the combination of extensor plantar (implying corticospinal involvement resolving from spinal shock) plus bladder retention as classically as a vascular cord event."},{"label":"C","text":"Anterior spinal artery thrombosis","rationale":"True — a spinal cord infarct (anterior spinal artery thrombosis) can produce this combination: initial LMN flaccidity, an extensor plantar response (pyramidal/UMN involvement) as spinal shock evolves, and bladder (autonomic) involvement."},{"label":"D","text":"CIDP","rationale":"False — CIDP has a more chronic/subacute (weeks-to-months) course, not this acute flu-like-illness-triggered presentation."},{"label":"E","text":"Poliomyelitis","rationale":"False — poliomyelitis causes pure LMN weakness (asymmetric, no sensory/bladder involvement, flexor plantars), not an extensor plantar or bladder retention."}],"reviewed_answer":["C"],"explanation":"Acute flaccid paralysis following a flu-like illness, with an extensor plantar response (an UMN sign) and a palpable (retention) bladder — this combination of LMN + UMN + autonomic/bladder involvement fits a spinal cord infarct (anterior spinal artery thrombosis) better than pure GBS or poliomyelitis, which don't produce extensor plantars or bladder involvement."},{"num":"SBA 3","text":"Most significant feature suggestive of idiopathic Parkinsonism,","options":[{"label":"A","text":"Asymmetrical tremor","rationale":"False — asymmetrical tremor is supportive but not as specific/required as bradykinesia for the core diagnosis."},{"label":"B","text":"Facial muscle weakness","rationale":"False — facial muscle weakness is not a feature of parkinsonism (facial expression is reduced/masked, but this is due to bradykinesia, not true weakness)."},{"label":"C","text":"Unilateral sensory impairment","rationale":"False — unilateral sensory impairment is not a parkinsonian feature at all (PD is a motor disorder)."},{"label":"D","text":"Bradykinesia","rationale":"True — bradykinesia is the core, required feature for a diagnosis of parkinsonism (per UK Brain Bank criteria), alongside at least one of resting tremor, rigidity, or postural instability."},{"label":"E","text":"Urinary incontinence","rationale":"False — urinary incontinence is a non-specific autonomic feature, not the most significant diagnostic clue for parkinsonism."}],"reviewed_answer":["D"],"explanation":"Bradykinesia is the core, most specific feature required for a diagnosis of parkinsonism (per UK Brain Bank criteria), more so than any single associated sign like tremor or urinary symptoms."}]}],"count":72},{"topic":"CVS Disorders","sections":[{"date":"2024 January","questions":[{"num":"3","text":"Regarding heart failure:","options":[{"label":"A","text":"Atrial fibrillation is a cause.","rationale":"True — AF can precipitate or cause tachycardia-induced heart failure."},{"label":"B","text":"Edema is due to RAAS.","rationale":"True — RAAS activation drives sodium/water retention, causing oedema in HF."},{"label":"C","text":"Degree of BNP elevation correlates with severity.","rationale":"True — BNP level correlates with the severity of heart failure."},{"label":"D","text":"Preserved ejection fraction heart failure indicates diastolic failure.","rationale":"True — heart failure with preserved ejection fraction reflects diastolic dysfunction."},{"label":"E","text":"Aldosterone antagonist has mortality benefit.","rationale":"True — aldosterone antagonists (spironolactone/eplerenone) have proven mortality benefit (RALES/EPHESUS)."}],"reviewed_answer":["A","B","C","D","E"],"explanation":"Correct answer(s): A, B, C, D, E — see the reasoning under each option below."},{"num":"4","text":"Non atherogenic causes for coronary syndrome?","options":[{"label":"A","text":"Coccaine use","rationale":"True — cocaine causes coronary vasospasm, a non-atherosclerotic cause of ACS."},{"label":"B","text":"Coronary emboli","rationale":"True — coronary embolism is a recognised non-atherogenic cause of MI."},{"label":"C","text":"High density lipoprotein","rationale":"False — HDL is protective against atherosclerosis, not a cause of ACS."},{"label":"D","text":"Coronary spasms","rationale":"True — coronary artery spasm (Prinzmetal angina) is non-atherogenic."},{"label":"E","text":"Stress cardiacmyopathy","rationale":"True — stress (Takotsubo) cardiomyopathy mimics ACS without atherosclerosis."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."},{"num":"16","text":"Features of Infective endocarditis","options":[{"label":"A","text":"Clubbing","rationale":"True — clubbing is a recognised chronic feature of infective endocarditis."},{"label":"B","text":"Microscopic haematuria","rationale":"True — microscopic haematuria occurs from immune-complex glomerulonephritis in IE."},{"label":"C","text":"Lymphadenopathy","rationale":"False — lymphadenopathy is not a classic feature of IE."},{"label":"D","text":"Pallor","rationale":"True — pallor from anaemia of chronic disease is common in IE."},{"label":"E","text":"Thrombocytosis","rationale":"False — IE is more associated with thrombocytopenia, not thrombocytosis."}],"reviewed_answer":["A","B","D"],"explanation":"Correct answer(s): A, B, D — see the reasoning under each option below."},{"num":"20","text":"Aspirin","options":[{"label":"A","text":"Inhibits cyclooxygenase 2","rationale":"False — aspirin predominantly and irreversibly inhibits COX-1 at low dose, not COX-2."},{"label":"B","text":"Inhibits platelet activation","rationale":"True — aspirin inhibits platelet activation via reduced thromboxane A2 synthesis."},{"label":"C","text":"Inhibits platelet aggregation","rationale":"True — this reduced thromboxane A2 leads to inhibited platelet aggregation."},{"label":"D","text":"Increases ADP release","rationale":"False — aspirin does not increase ADP release; this isn't part of its mechanism."},{"label":"E","text":"Increases endothelial thrombomodulin release","rationale":"False — increased endothelial thrombomodulin release is not a recognised aspirin effect."}],"reviewed_answer":["B","C"],"explanation":"Correct answer(s): B, C — see the reasoning under each option below."},{"num":"24","text":"70yr old male presented with sudden onset sob. He is a known Hpt with good bp control on losartan 50mg bd and hydrochlorothiazide 25mg marne. On ex BP 220/140mmhg. Bilateral crepitations were there. Which of the following drug is best to manage his high blood pressure??","options":[{"label":"A","text":"IV GTN","rationale":"True — IV GTN is preferred here as it also reduces preload, helping the pulmonary oedema alongside lowering BP."},{"label":"B","text":"IV labetolol","rationale":"False — labetalol is reasonable in some hypertensive emergencies but GTN is favoured specifically when pulmonary oedema is present."},{"label":"C","text":"IV Sodium nitroprusside","rationale":"False — nitroprusside is used in hypertensive emergencies generally but isn't first-line when pulmonary oedema dominates the picture."},{"label":"D","text":"Oral methyldopa","rationale":"False — oral methyldopa acts too slowly for this emergency."},{"label":"E","text":"Oral Nifedipine","rationale":"False — oral nifedipine is not appropriate for hypertensive emergency (unpredictable, rapid BP drops)."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"25","text":"27 year old woman presented with a history of low grade fever,boday aches, joint pains for 2 weeks. On examination she is febrile and had a pansystolic murmur at the apex. Hemodynamically stable. Most appropriate next step,","options":[{"label":"A","text":"Initial empirical antibiotics","rationale":"False — empirical antibiotics should not be started before blood cultures are taken, or the causative organism may be missed."},{"label":"B","text":"Measure CRP level","rationale":"False — CRP is nonspecific and not the most appropriate next step."},{"label":"C","text":"Chest radiograph","rationale":"False — a chest radiograph doesn't help diagnose the suspected valvular infection here."},{"label":"D","text":"Perform transthoracic echo","rationale":"False — echo is important but blood cultures should be secured first since they're time-sensitive and easily missed if antibiotics are given first."},{"label":"E","text":"Do 3 sets of blood culture","rationale":"True — with fever, joint pains and a new murmur suggesting IE, 3 sets of blood cultures should be taken before starting antibiotics."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"26","text":"55 year old patient present with giddiness. On examination pulse rate is 150 with irregularly irregular pulse rhythm. Blood pressure 70/50 What is the immediate management,","options":[{"label":"A","text":"DC cardioversion","rationale":"True — with a rate of 150 and BP 70/50 (haemodynamically unstable), immediate DC cardioversion is indicated."},{"label":"B","text":"Digoxin 0.5mg","rationale":"False — digoxin acts too slowly for haemodynamic instability."},{"label":"C","text":"Metoprolol 5mg","rationale":"False — metoprolol could worsen hypotension in this unstable patient."},{"label":"D","text":"Noradrenaline","rationale":"False — noradrenaline doesn't address the underlying arrhythmia causing the instability."},{"label":"E","text":"Verapamil 5mg","rationale":"False — verapamil risks worsening hypotension and isn't appropriate when unstable."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"45","text":"Causes of secondary hypertension include:","options":[{"label":"A","text":"Congenital renal hypoplasia","rationale":"True — congenital renal hypoplasia is a recognised renal cause of secondary hypertension."},{"label":"B","text":"Atherosclerotic renal artery stenosis","rationale":"True — atherosclerotic renal artery stenosis is a classic cause of secondary hypertension."},{"label":"C","text":"PCKD","rationale":"True — polycystic kidney disease is a recognised cause of secondary hypertension."}],"reviewed_answer":["A","B","C"],"explanation":"Correct answer(s): A, B, C — see the reasoning under each option below."},{"num":"52","text":"60 years old male diagnosed with type 2 diabetes mellitus is on metformin 500 mg bd, empagliflozin 10 mg mane, and atorvastatin 20 mg nocte. His blood pressure is 145 / 85 mmHg. Rest of the examination is normal. Investigations are as follows. HbA1c - 7.0%, eGFR - 50 mL/min/1.73 m2,         Urine albumin / creatinine ratio - 98 mg/g (<30) on two separate occasions. The next most appropriate management step is","options":[{"label":"A","text":"Start amlodipine.","rationale":"False — amlodipine doesn't provide the renoprotective benefit needed given albuminuria."},{"label":"B","text":"Start hydrochlorothiazide.","rationale":"False — hydrochlorothiazide doesn't address the underlying albuminuria/renal protection need."},{"label":"C","text":"Start diltiazem.","rationale":"False — diltiazem doesn't offer renoprotection in diabetic nephropathy."},{"label":"D","text":"Start enalapril.","rationale":"True — with reduced eGFR and confirmed albuminuria, an ACE inhibitor (enalapril) is indicated for renoprotection in diabetic nephropathy."},{"label":"E","text":"Stop metformin.","rationale":"False — metformin can generally continue at eGFR 50 (dose adjustment only needed at lower eGFR); stopping isn't the most appropriate next step here."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."}]},{"date":"2023 February","questions":[{"num":"3","text":"Regarding heart failure,","options":[{"label":"A","text":"Arrhythmia is a cause.","rationale":"True — arrhythmia (e.g. AF) is a recognised cause of heart failure."},{"label":"B","text":"Oedema is due to salt and water retention.","rationale":"True — oedema in HF results from salt and water retention."},{"label":"C","text":"An elevated BNP level helps in the diagnosis.","rationale":"True — elevated BNP supports the diagnosis of heart failure."},{"label":"D","text":"NSAIDs worsen the condition.","rationale":"True — NSAIDs cause fluid retention and can worsen heart failure."},{"label":"E","text":"Frusemide improves survival.","rationale":"False — frusemide improves symptoms but has not been shown to improve survival in HF."}],"reviewed_answer":["A","B","C","D"],"explanation":"Correct answer(s): A, B, C, D — see the reasoning under each option below."},{"num":"4","text":"A 53-year-old man presented with central chest pain. ECG showed ST elevations in leads LII, LIII and aVF. Regarding this clinical scenario,","options":[{"label":"A","text":"Troponin is required to make a diagnosis.","rationale":"False — STEMI is diagnosed by ECG plus clinical picture; treatment should not be delayed to wait for troponin."},{"label":"B","text":"Sublingual GTN has a prognostic benefit.","rationale":"False — sublingual GTN provides symptomatic relief but no proven prognostic (mortality) benefit."},{"label":"C","text":"Thrombolytic therapy is superior to PCI.","rationale":"False — primary PCI is superior to thrombolysis when available within the appropriate time frame."},{"label":"D","text":"Caused by a 100% occlusion.","rationale":"True — STEMI is typically caused by complete (100%) occlusion of the culprit vessel."},{"label":"E","text":"Is due to eruption of an atherosclerotic plaque","rationale":"True — STEMI results from rupture of an atherosclerotic plaque with thrombus formation."}],"reviewed_answer":["D","E"],"explanation":"Correct answer(s): D, E — see the reasoning under each option below."},{"num":"24","text":"A 36-year-old woman who was in bereavement after losing her husband 2 weeks ago, presented to the emergency department with central chest pain. Her troponin was elevated, and the ECG showed ST elevations in the anterior leads. Transthoracic ECHO showed apical hypokinesia with an ejection fraction of 40%. Her coronary angiogram was entirely normal. What is the most probable diagnosis?","options":[{"label":"A","text":"Acute STEMI","rationale":"False — a fully normal coronary angiogram excludes acute STEMI from atherosclerotic occlusion."},{"label":"B","text":"Acute pericarditis","rationale":"False — pericarditis doesn't cause focal apical hypokinesia or elevated troponin in this pattern."},{"label":"C","text":"Brugada syndrome","rationale":"False — Brugada syndrome shows a specific ECG pattern (not ST elevation from wall motion abnormality) and doesn't cause apical hypokinesia."},{"label":"D","text":"Aortic dissection","rationale":"False — aortic dissection would show a different clinical/imaging picture, not apical hypokinesia with normal coronaries."},{"label":"E","text":"Takatsubo cardiomyopathy","rationale":"True — acute stress (bereavement), elevated troponin, ST elevation, apical hypokinesia (ballooning) with normal coronary arteries is classic Takotsubo cardiomyopathy."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"25","text":"A female on thyroxine presented with difficulty in breathing. She also complained of a pleuritic type chest pain. On examination, she had an elevated JVP, bilateral ankle oedema and clear lungs. Her blood pressure was 70/50 mmHg. ECG showed a narrow complex bradycardia and CXR revealed cardiomegaly. The following investigations were also done. WBC: 5.6 x 109 /l Hb: 12.6 g/dl Platelets: 210 000 /µl TSH: 6 mIU/l CRP: 11 mg/l Serum creatinine: 92 mmol/l Na+: 138 mmol/l K+: 4.4 mmol/l What is the most likely diagnosis?","options":[{"label":"A","text":"Congestive cardiac failure","rationale":"False — congestive cardiac failure doesn't typically explain the bradycardia and biochemical picture together as well as hypothyroidism does."},{"label":"B","text":"Myxedema","rationale":"True — a patient on thyroxine with bradycardia, hypotension, cardiomegaly and clinical features of fluid retention (with a borderline-high TSH suggesting under-replacement) fits myxedema, which can cause a pericardial effusion producing this picture."},{"label":"C","text":"Right heart failure","rationale":"False — isolated right heart failure doesn't explain the bradycardia or thyroid-related clues."},{"label":"D","text":"Cardiac tamponade","rationale":"False — tamponade is possible but the vignette's emphasis on thyroid status points more specifically to myxedema as the underlying cause."},{"label":"E","text":"Pulmonary embolism","rationale":"False — PE typically causes tachycardia, not bradycardia, and wouldn't explain the cardiomegaly."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"26","text":"A 79-year-old man, who was active and enjoyed walking presented with palpitations for one day. He has a history of several similar episodes in past few weeks. On examination, his pulse was irregular with a rate of 130 bpm and his blood pressure was 140/80 mmhg. He had clear lungs and normal heart sounds. He has a past history of hypertension and ischaemic heart disease. ECG revealed an atrial fibrillation but no signs of ischemia. His chest x-ray was also normal. What is next best drug to be used in this patient?","options":[{"label":"A","text":"Amiodarone","rationale":"False — amiodarone carries more side-effect burden and isn't the first choice here for straightforward rate control."},{"label":"B","text":"Ivabradine","rationale":"False — ivabradine is not indicated for AF rate control."},{"label":"C","text":"Digoxin","rationale":"False — digoxin is less effective for rate control during exertion (an active, walking patient) compared to a beta-blocker."},{"label":"D","text":"Diltiazem","rationale":"False — diltiazem is reasonable but a beta-blocker is preferred given his coexisting ischaemic heart disease."},{"label":"E","text":"Metoprolol","rationale":"True — a beta-blocker (metoprolol) is preferred for rate control in AF, especially with coexisting ischaemic heart disease."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"35","text":"A 56-year-old patient with acute onset chest pain was diagnosed to have acute extensive anterior ST elevation myocardial infarction, and thrombolysed. Several hours later, he was found to have hypotension of 80/60 mmHg and needed inotropic support for 24 h. His, Day 1 serum creatinine: 119 µmol/l Day 2 serum creatinine: 411 µmol/l UFR: protein: +, RBC: nil, casts: granular casts What could be the reason for this presentation?","options":[{"label":"A","text":"Bilateral renal artery stenosis","rationale":"False — bilateral renal artery stenosis wouldn't present acutely like this tied to a hypotensive episode."},{"label":"B","text":"Drug induced interstitial nephritis","rationale":"False — interstitial nephritis is usually drug-related with eosinophilia/rash, not this acute post-hypotensive course."},{"label":"C","text":"Acute tubular necrosis","rationale":"True — a hypotensive episode requiring inotropes, followed by rapidly rising creatinine with granular casts on urinalysis, is the classic picture of acute tubular necrosis from ischaemic renal injury."},{"label":"D","text":"Renal vein thrombosis","rationale":"False — renal vein thrombosis doesn't fit this acute hypotension-triggered picture."},{"label":"E","text":"Acute glomerulonephritis","rationale":"False — acute glomerulonephritis would show red cells/red cell casts, not granular casts, and doesn't fit the ischaemic trigger."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2022 March","questions":[{"num":"06","text":"Regarding left ventricular dysfunction","options":[{"label":"A","text":"Valvular dysfunction is known aetiology","rationale":"True — valvular disease is a recognised cause of LV dysfunction."},{"label":"B","text":"Fatigue is a recognized feature","rationale":"True — fatigue is a recognised symptom of LV dysfunction/heart failure."},{"label":"C","text":"Beta blockers are best avoided if systolic dysfunction is less than 40%","rationale":"False — beta-blockers are actually beneficial and recommended in HFrEF (EF<40%), not avoided — they're just started cautiously at low dose."},{"label":"D","text":"ACE inhibitors has no prognostic benefit","rationale":"False — ACE inhibitors have well-proven prognostic (mortality) benefit in LV dysfunction."},{"label":"E","text":"CRT is a treatment option","rationale":"True — cardiac resynchronisation therapy (CRT) is an established treatment option in selected HF patients."}],"reviewed_answer":["A","B","E"],"explanation":"Correct answer(s): A, B, E — see the reasoning under each option below."},{"num":"09","text":"Which of following has survival benefits in a patient with stable angina","options":[{"label":"A","text":"aspirin","rationale":"True — aspirin has proven mortality/secondary prevention benefit."},{"label":"B","text":"Atorvastatin","rationale":"True — statins (atorvastatin) reduce cardiovascular mortality."},{"label":"C","text":"Isosorbide mononitrate","rationale":"False — isosorbide mononitrate provides symptom relief only, no survival benefit."},{"label":"D","text":"Verapamil","rationale":"False — verapamil is for symptom control, no proven survival benefit in stable angina."},{"label":"E","text":"ACEI","rationale":"True — ACE inhibitors provide prognostic benefit, especially with comorbidities (diabetes, LV dysfunction)."}],"reviewed_answer":["A","B","E"],"explanation":"Correct answer(s): A, B, E — see the reasoning under each option below."},{"num":"10","text":"Postural hypotension is a feature of,","options":[{"label":"A","text":"Acromegaly","rationale":"False — acromegaly is not classically associated with postural hypotension."},{"label":"B","text":"Addison's diseases","rationale":"True — Addison's disease (adrenal insufficiency) classically causes postural hypotension."},{"label":"C","text":"Diabetic neuropathy","rationale":"True — diabetic autonomic neuropathy is a recognised cause of postural hypotension."},{"label":"D","text":"Pheochromocytoma","rationale":"True — pheochromocytoma, despite causing hypertension, can paradoxically cause postural hypotension due to volume contraction and autonomic dysregulation."},{"label":"E","text":"Sheehan syndrome","rationale":"True — Sheehan syndrome causes pituitary/secondary adrenal insufficiency, leading to postural hypotension."}],"reviewed_answer":["B","C","D","E"],"explanation":"Correct answer(s): B, C, D, E — see the reasoning under each option below."},{"num":"11","text":"Increased sympathetic output to the heart results in","options":[{"label":"A","text":"Reduced stroke volume","rationale":"False — sympathetic stimulation increases contractility, increasing (not reducing) stroke volume."},{"label":"B","text":"Increased cardiac output","rationale":"True — increased heart rate and contractility together increase cardiac output."},{"label":"C","text":"Decreased coronary perfusion","rationale":"False — at physiological levels sympathetic activation increases coronary blood flow via increased metabolic demand (autoregulation), rather than simply decreasing perfusion."},{"label":"D","text":"Increased oxygen demand.","rationale":"True — increased heart rate and contractility increase myocardial oxygen demand."},{"label":"E","text":"Reduced ejection fraction","rationale":"False — sympathetic stimulation increases (not reduces) ejection fraction via increased contractility."}],"reviewed_answer":["B","D"],"explanation":"Correct answer(s): B, D — see the reasoning under each option below."},{"num":"13","text":"33 year old man presented with bilateral ankle edema for 2 weeks duration. bp- 160/90mmhg. Following investigation are done S.cr-elevated S sodium -normal S .potassium-normal USS-b/l contracted kidney What are the management options?","options":[{"label":"A","text":"Avoid cannulations in non-dominant forearm without","rationale":"True — preserving the non-dominant forearm veins for potential future AV fistula creation is standard CKD care."},{"label":"B","text":"Arrange renal biopsy","rationale":"False — renal biopsy is not useful/indicated in small, chronically contracted kidneys — the diagnostic information is limited and there's added bleeding risk."},{"label":"C","text":"Blood transfusion","rationale":"False — nothing in the vignette (normal Na/K, no mention of anaemia) supports a need for blood transfusion."},{"label":"D","text":"Advice renal replacement therapy","rationale":"Uncertain — whether RRT is needed depends on the actual GFR/stage, which isn't fully specified here."},{"label":"E","text":"Starting ACE inhibitors SBA","rationale":"Uncertain/context-dependent — ACE inhibitors help proteinuria and BP control in CKD, but caution is needed if bilateral renal artery stenosis is a possibility given the bilateral contracted kidneys."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"28","text":"68 year old man transferred from a peripheral hospital to medical casualty unit with tightening chest pain and ECG evidence of acute anterior STEMI. He is clammy and sweaty, rapid deterioration. Cardiac monitor shows broad complex tachycardia with rate of 200, femoral pulse impalpable and BP 60/30. What is the next step?","options":[{"label":"A","text":"IV MgSo4","rationale":"False — magnesium is used for torsades de pointes, not this broad-complex tachycardia with an impalpable pulse."},{"label":"B","text":"immediate PCI","rationale":"False — immediate PCI is important but the immediate life-threatening issue (pulseless arrest) must be addressed first."},{"label":"C","text":"IV adrenaline 1mg bolus","rationale":"False — adrenaline is used for cardiac arrest per ALS protocol, but with a shockable rhythm (VT), defibrillation takes priority first."},{"label":"D","text":"IV amiodarone 300mg","rationale":"False — amiodarone is used for stable VT/adjunct in ALS, but with an impalpable pulse this is essentially pulseless VT requiring immediate defibrillation."},{"label":"E","text":"DC cardioversion","rationale":"True — broad complex tachycardia at 200/min with an impalpable pulse and BP 60/30 is effectively pulseless VT — this needs immediate (unsynchronised) DC shock/defibrillation."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"32","text":"76 year old male diagnosed patient with heart failure with irregularly irregular pulse.bp 110/70.spo2 96%.WOF most appropriate for him?","options":[{"label":"A","text":"Digoxin","rationale":"True — digoxin is useful for rate control in AF with heart failure, especially when borderline BP limits beta-blocker/CCB use."},{"label":"B","text":"Ivabradine","rationale":"False — ivabradine is used in sinus rhythm HF, not indicated for AF rate control."},{"label":"C","text":"Nitrate","rationale":"False — nitrates don't address rate control of AF."},{"label":"D","text":"Verapamil","rationale":"False — verapamil risks worsening HF (negative inotrope) and isn't preferred here."},{"label":"E","text":"GTN","rationale":"False — GTN doesn't address the arrhythmia."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"35","text":"A 45 year old man diagnosed with hypertension for 10 years presents to medical clinic with blood pressure of 190/110 mmHg. His medication adherence is good. Ambulatory blood pressure monitoring confirms uncontrolled hypertension. A secondary cause is not identified. His routine medications are Amlodipine 10mg daily, Losartan 50mg bd, Hydroxychlorothiazide 25mg daily. What is the next best management option?","options":[{"label":"A","text":"Increase HCT to 50mg","rationale":"False — increasing the thiazide dose further has limited additional benefit and more side effects once already at 25mg."},{"label":"B","text":"Add Atenolol 25 mg daily","rationale":"False — atenolol could be added but is not the standard 4th-line agent of choice in resistant hypertension."},{"label":"C","text":"Add Spironolactone 50mg daily","rationale":"True — spironolactone is the evidence-based 4th-line add-on for resistant hypertension already on an ACEI/ARB, CCB and thiazide (PATHWAY-2 trial)."},{"label":"D","text":"Add Prasozin 1mg tds","rationale":"False — prazosin is a later option, not the standard next step."},{"label":"E","text":"Substitute HCT with Frusemide","rationale":"False — simply substituting the thiazide for a loop diuretic isn't the standard next step in resistant HTN without evidence of fluid overload."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"47","text":"A 35 year old previously well woman presented with worsening breathlessness over 1 week. At the initial phase of the illness she had mild fever, malaise, body weakness with arthralgia and myalgia. She also complains of orthopnea and paroxysmal nocturnal dyspnea. On examination she is dyspneic with elevated jugular venous pulse and bilateral pitting ankle oedema. On auscultation there are final crepitation and bilateral lung bases, S3 gallop rhythm and mild systolic murmur heard on the apex. Other examinations were unremarkable. Investigations, there was lymphocytic leukocytosis, increased ESR. ECG shows atrial fibrillation with T inversions in all limb and chest leads. What is the most likely cause for her presentation?","options":[{"label":"A","text":"Infective endocarditis","rationale":"False — infective endocarditis doesn't explain the preceding flu-like prodrome or diffuse T wave inversions in this pattern."},{"label":"B","text":"Ischemic heart disease","rationale":"False — ischaemic heart disease is less likely in a previously well young woman with a preceding viral-type illness."},{"label":"C","text":"Thyrotoxic cardiomyopathy","rationale":"False — nothing suggests thyrotoxicosis here (no relevant symptoms/signs mentioned)."},{"label":"D","text":"Uremic cardiomyopathy","rationale":"False — nothing suggests uraemia as the cause here."},{"label":"E","text":"Viral myocarditis","rationale":"True — a preceding viral-type prodrome (fever, myalgia, arthralgia) followed by heart failure signs, S3 gallop, AF and diffuse T wave inversion with lymphocytic leukocytosis fits viral myocarditis."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."}]},{"date":"2021 March","questions":[{"num":"05","text":"Regarding complications of aortic dissection,","options":[{"label":"A","text":"Acute kidney injury","rationale":"True — dissection can compromise renal artery blood flow, causing AKI."},{"label":"B","text":"Aortic regurgitation","rationale":"True — proximal dissection can disrupt the aortic valve, causing regurgitation."},{"label":"C","text":"Cardiac tamponade","rationale":"True — dissection can rupture into the pericardium, causing tamponade."},{"label":"D","text":"ST elevation myocardial infarction","rationale":"True — dissection can involve a coronary ostium (usually the right), causing STEMI."},{"label":"E","text":"Stroke","rationale":"True — dissection can involve the carotid arteries, causing stroke."}],"reviewed_answer":["A","B","C","D","E"],"explanation":"Correct answer(s): A, B, C, D, E — see the reasoning under each option below."},{"num":"14","text":"Factors that increase the left ventricular filling, during exercise in a normal healthy individual?","options":[{"label":"A","text":"Dilatation of capacitance vessels","rationale":"False — during exercise, venous capacitance vessels constrict (not dilate) to enhance venous return."},{"label":"B","text":"Greater increase in negative intra thoracic pressure","rationale":"True — greater negative intrathoracic pressure swings during exercise augment venous return and LV filling."},{"label":"C","text":"Increased contraction of muscles in exercising limbs","rationale":"True — the skeletal muscle pump from contracting exercising limb muscles boosts venous return."},{"label":"D","text":"Increased heart rate","rationale":"False — increased heart rate shortens diastolic filling time, which reduces (not increases) ventricular filling per beat."},{"label":"E","text":"Increased blood flow in splanchnic circulation","rationale":"False — splanchnic blood flow is reduced during exercise, as blood is diverted to working muscles."}],"reviewed_answer":["B","C"],"explanation":"Correct answer(s): B, C — see the reasoning under each option below."},{"num":"23","text":"A 76-year-old male is being treated in an acute care coronary unit for unstable angina. He's on drugs for his ischemic condition. He has hypertension, FBS is 144 (70110), cholesterol is normal. In the recent clinic visit he was found to have AF. What is the most appropriate drug to prevent future stroke?","options":[{"label":"A","text":"Digoxin","rationale":"False — digoxin doesn't reduce stroke risk in AF."},{"label":"B","text":"Metoprolol","rationale":"False — metoprolol helps rate control but doesn't reduce stroke risk."},{"label":"C","text":"Verapamil","rationale":"False — verapamil similarly doesn't reduce stroke risk."},{"label":"D","text":"Captopril","rationale":"False — captopril treats hypertension/IHD risk factors but doesn't specifically prevent AF-related stroke."},{"label":"E","text":"Warfarin","rationale":"True — anticoagulation (warfarin) is the appropriate treatment to prevent stroke in AF, especially with additional risk factors (age, HTN, DM)."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"25","text":"A 45-year-old male who is on treatment for acute coronary syndrome developed acute onset breathlessness after 3 days. Pulse rate 130/min Blood pressure 88/67mmHg. Lung bases had diffuse inspiratory crackles and a systolic murmur was heard on the precordium. What best explains this condition?","options":[{"label":"A","text":"Papillary muscle rupture","rationale":"True — a new systolic murmur with acute pulmonary oedema and hypotension days after ACS is classic for papillary muscle rupture causing acute severe MR."},{"label":"B","text":"Severe left ventricular failure","rationale":"False — severe LV failure alone wouldn't typically produce a new systolic murmur."},{"label":"C","text":"Acute pericarditis","rationale":"False — acute pericarditis doesn't cause a new systolic murmur or this pattern of acute pulmonary oedema/hypotension."},{"label":"D","text":"Cardiac tamponade","rationale":"False — tamponade would show elevated JVP and muffled heart sounds, not a new systolic murmur with crackles."},{"label":"E","text":"Pulmonary embolism","rationale":"False — PE doesn't typically produce a new systolic murmur at the precordium in this fashion."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"26","text":"60 year old woman with acute coronary syndrome,and currently on aspirin 150mg and atorvastatin 20mg presented with chest pain. Thrombolytic therapy has been given. 2D showed EF 35%. What are the drugs that can be added to her with prognostic benefit?","options":[{"label":"A","text":"Metoprolol, Furosemide, Enalapril","rationale":"False — this combination lacks a mineralocorticoid receptor antagonist, which has proven mortality benefit at EF<40% (EPHESUS)."},{"label":"B","text":"Enalapril, Atenolol, Furosemide","rationale":"False — same issue: no spironolactone/aldosterone antagonist included."},{"label":"C","text":"Enalapril, Metoprolol, ISMN","rationale":"False — ISMN provides symptomatic benefit, not the mortality benefit expected from an aldosterone antagonist here."},{"label":"D","text":"Enalapril, Metoprolol, Spironolactone","rationale":"True — ACEI + beta-blocker + spironolactone together provide the proven mortality benefit combination for post-MI HFrEF (EF<40%)."},{"label":"E","text":"Enalapril, Metoprolol, Digoxin","rationale":"False — digoxin doesn't have proven mortality benefit; the aldosterone antagonist should be used instead."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"27","text":"A 36y old woman was presented with coughing up frothy white sputum. Recently it contains a small amount of blood. O/E diffuse crackles on inspiration and she was found to have a mid diastolic murmur on the precordium with a loud first heart sound. She was also diagnosed to have pulmonary oedema on the chest X Ray. WOTF is the likely, underlying cause for her presentation?","options":[{"label":"A","text":"A lower respiratory tract infection","rationale":"False — a lower respiratory tract infection doesn't explain the mid-diastolic murmur and loud S1."},{"label":"B","text":"Mitral stenosis","rationale":"True — a mid-diastolic murmur with a loud first heart sound, haemoptysis and pulmonary oedema is classic for mitral stenosis."},{"label":"C","text":"Bronchial carcinoma","rationale":"False — bronchial carcinoma doesn't explain the cardiac murmur findings."},{"label":"D","text":"Left ventricular failure","rationale":"False — LVF doesn't classically cause a mid-diastolic murmur with loud S1."},{"label":"E","text":"Pulmonary embolism","rationale":"False — PE doesn't produce this murmur pattern."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"50","text":"A 60-year-old office clerk recently diagnosed with hypertension with a past history of developing ankle oedema with Nifedipine. She has poor compliance as she forgets to take the tablet during lunch at the office. BP - 170/90mmHg, PR - 52bpm, S. Cr normal, K - 3.5, Na – normal. What is the best antihypertensive that can be prescribed to her?","options":[{"label":"A","text":"Amlodipine","rationale":"False — amlodipine already caused ankle oedema previously (intolerance)."},{"label":"B","text":"Atenolol","rationale":"False — atenolol risks further bradycardia given her pulse of 52."},{"label":"C","text":"Captopril","rationale":"True — an ACE inhibitor (captopril) is a reasonable choice, avoiding the oedema (CCB) and bradycardia (beta-blocker) issues, with once-daily-type dosing helping compliance concerns."},{"label":"D","text":"Hydrochlorothiazide","rationale":"False — thiazide could worsen her borderline-low potassium (3.5)."},{"label":"E","text":"Losartan","rationale":"False — losartan (ARB) is also reasonable, but among the given options captopril is the more classic 'next step' answer; either represents a similar renin-angiotensin approach."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2020 June","questions":[{"num":"11","text":"Causes of weak or absent left radial pulse.","options":[{"label":"A","text":"Takayasu disease","rationale":"True — Takayasu arteritis (large vessel vasculitis) affects the aortic arch/subclavian vessels, causing absent pulses."},{"label":"B","text":"Atherosclerosis","rationale":"True — atherosclerosis can cause subclavian artery stenosis."},{"label":"C","text":"Aortic regurgitation","rationale":"False — aortic regurgitation causes a collapsing pulse, not an absent one."},{"label":"D","text":"Dissection of the descending aorta","rationale":"True — a descending aortic dissection extending to involve the left subclavian origin can reduce the pulse."},{"label":"E","text":"Subclavian steal syndrome","rationale":"True — subclavian steal syndrome by definition involves reduced flow/pulse in the affected subclavian artery."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."},{"num":"14","text":"Isolated systolic hypertension,","options":[{"label":"A","text":"Treated with beta blockers","rationale":"False — beta-blockers are not the treatment of choice for isolated systolic hypertension."},{"label":"B","text":"Less complications than systolic and diastolic hypertension together","rationale":"False — isolated systolic hypertension in the elderly is actually associated with significant cardiovascular risk, not fewer complications."},{"label":"C","text":"Best treated with beta blockers","rationale":"False — same reasoning as A — thiazides/CCBs, not beta-blockers, are preferred (per SHEP/HYVET evidence)."},{"label":"D","text":"Commonly occurs in young people","rationale":"False — isolated systolic hypertension is more common in the elderly (due to arterial stiffening), not young people."},{"label":"E","text":"Diagnosis is by 24-hour blood pressure monitoring","rationale":"True — 24-hour ambulatory BP monitoring can help confirm the diagnosis."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"46","text":"56 years old male who is taking losartan, diltiazem, hydrochlorothiazide for 6 months for hypertension, found to have blood pressure with 165/100mmHg in routine clinic visit. All other examination findings were normal. What is the next drug most add for best blood pressure control?","options":[{"label":"A","text":"Atenolol","rationale":"True — adding a beta-blocker (atenolol) is a reasonable next step when already on an ARB, CCB and thiazide."},{"label":"B","text":"Methyldopa","rationale":"False — methyldopa is not the standard next-step add-on in this combination."},{"label":"C","text":"Enalapril","rationale":"False — adding an ACEI on top of an ARB (losartan) is generally avoided (dual RAAS blockade increases adverse effects without added benefit)."},{"label":"D","text":"nifedepine","rationale":"False — nifedipine would duplicate the existing CCB (diltiazem) class rather than adding a new mechanism."},{"label":"E","text":"spironolactone","rationale":"False — spironolactone is typically reserved as a later resistant-hypertension option, though also reasonable; a beta-blocker is the more standard 'next step' here."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"50","text":"A 68 year old man is admitted to casualty medical unit with chest pain for 1 hour. On initial assessment he is in pain, heart rate 40 bpm and BP -86/50 mmHg. Which one of the coronary artery is most likely to be affected?","options":[{"label":"A","text":"Anterior interventricular artery","rationale":"False — 'anterior interventricular artery' is another name for the LAD, which supplies the anterior wall, not consistent with bradycardia/inferior pattern implied here."},{"label":"B","text":"Left anterior descending artery","rationale":"False — LAD occlusion causes anterior MI, not this inferior/bradycardic picture."},{"label":"C","text":"Left circumflex artery","rationale":"False — circumflex occlusion causes lateral MI, less classically associated with bradycardia from AV nodal ischaemia."},{"label":"D","text":"Obtuse marginal artery","rationale":"False — obtuse marginal branch occlusion causes lateral MI, similarly less associated with this bradycardic pattern."},{"label":"E","text":"Right coronary artery","rationale":"True — the right coronary artery supplies the inferior wall and (in most people) the AV node, so its occlusion classically causes inferior MI with bradycardia and hypotension."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."}]},{"date":"2019 November","questions":[{"num":"1","text":"The drugs are with survival benefits in cardiac failure","options":[{"label":"A","text":"Digoxin","rationale":"False — digoxin improves symptoms/reduces hospitalisation but has no proven mortality benefit."},{"label":"B","text":"Ivabradine","rationale":"False — ivabradine reduces hospitalisation in select patients but doesn't have the same robust mortality benefit as beta-blockers/MRAs."},{"label":"C","text":"Frusemide","rationale":"False — frusemide is for symptom control, no proven survival benefit."},{"label":"D","text":"Carvedilol","rationale":"True — carvedilol (beta-blocker) has proven mortality benefit in heart failure."},{"label":"E","text":"Spironolactone","rationale":"True — spironolactone has proven mortality benefit (RALES)."}],"reviewed_answer":["D","E"],"explanation":"Correct answer(s): D, E — see the reasoning under each option below."},{"num":"4","text":"In heart failure management renin angiotensin aldosterone system is influenced by,","options":[{"label":"A","text":"The use of Ramipril","rationale":"True — ramipril (an ACEI) is a standard way of influencing/blocking the RAAS in HF management."},{"label":"B","text":"…….","rationale":"(Option text is blank/illegible in the original source PDF.)"},{"label":"C","text":"Improves remodelling of heart","rationale":"True — ACEI/ARB therapy improves adverse cardiac remodelling in HF."},{"label":"D","text":"Should be considered in all the patients","rationale":"True — ACEI therapy should be considered in essentially all HFrEF patients unless contraindicated."},{"label":"E","text":"Is indefinitely used in patients with left ventricular failure","rationale":"True — ACEI therapy is continued indefinitely (long-term) in HF unless a contraindication develops."}],"reviewed_answer":["A","C","D","E"],"explanation":"Correct answer(s): A, C, D, E — see the reasoning under each option below."},{"num":"13","text":"Postural hypotension is a feature of","options":[{"label":"A","text":"Addison’s disease","rationale":"True — Addison's disease classically causes postural hypotension."},{"label":"B","text":"Prazocin therapy","rationale":"True — prazosin (alpha-blocker) classically causes first-dose and postural hypotension."},{"label":"C","text":"Diuretic therapy","rationale":"True — diuretic therapy causes volume depletion, leading to postural hypotension."},{"label":"D","text":"Pheochromocytoma","rationale":"True — pheochromocytoma can paradoxically cause postural hypotension due to volume contraction/autonomic effects."},{"label":"E","text":"Steroid therapy","rationale":"False — ongoing steroid therapy typically causes fluid retention and hypertension, not postural hypotension."}],"reviewed_answer":["A","B","C","D"],"explanation":"Correct answer(s): A, B, C, D — see the reasoning under each option below."},{"num":"28","text":"A 50-year-old foreigner from UK came presented with shortness of breath and left sided chest pain. BP – 110/70, PR – 96 bpm. ECG showed T inversion in leads V1 – V5 leads. He doesn’t have any significant past medical history than for asthma. What is the most probable diagnosis?","options":[{"label":"A","text":"Acute exacerbation of asthma","rationale":"False — asthma exacerbation doesn't typically cause anterior T wave inversion or chest pain in this pattern."},{"label":"B","text":"Acute exacerbation of COPD","rationale":"False — nothing suggests COPD here, and it doesn't explain the ECG findings."},{"label":"C","text":"Acute coronary syndrome","rationale":"False — while ACS is a differential, the travel history and anterior T inversions (right heart strain pattern) point more strongly towards PE."},{"label":"D","text":"Idiopathic pulmonary fibrosis","rationale":"False — idiopathic pulmonary fibrosis doesn't present acutely like this."},{"label":"E","text":"Pulmonary embolism","rationale":"True — a traveller with acute SOB and chest pain, and anterior T wave inversion (a right heart strain pattern), is classic for pulmonary embolism."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"33","text":"A 50-year-old man presented with acute onset of shortness of breath and central chest pain. ECG showed concave ST elevation on all the leads. What could be the most probable diagnosis","options":[{"label":"A","text":"….","rationale":"(Option text missing/illegible in the original source PDF.)"},{"label":"B","text":"Acute pericarditis","rationale":"True — concave (saddle-shaped) ST elevation across multiple/all leads is the classic ECG finding of acute pericarditis."},{"label":"C","text":"Pneumothorax","rationale":"False — pneumothorax doesn't cause this ECG pattern."},{"label":"D","text":"…..","rationale":"(Option text missing/illegible in the original source PDF.)"},{"label":"E","text":"…..","rationale":"(Option text missing/illegible in the original source PDF.)"}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"37","text":"A 45-year-old intravenous drug user presented with intermittent fever and a murmur on the left lower sternal edge, and was diagnosed to have infective endocarditis. What is the most possible causative organism could be,","options":[{"label":"A","text":"Streptococcus epidermitis","rationale":"False — Staphylococcus epidermidis is more associated with prosthetic valve/device-related IE, not classic IVDU-related IE."},{"label":"B","text":"Streptococcus bovis","rationale":"False — Streptococcus bovis IE is associated with colonic pathology, not IVDU."},{"label":"C","text":"Streptococcus viridans","rationale":"False — Streptococcus viridans is the classic organism in subacute IE on previously damaged native valves, not IVDU-related IE."},{"label":"D","text":"Pseudomembranous aeruginosa","rationale":"False — Pseudomonas is a less common cause overall, though it can occur in IVDU; it's not the most likely organism."},{"label":"E","text":"Staphylococcus aureus","rationale":"True — Staphylococcus aureus is the most common cause of IE in intravenous drug users, often affecting the tricuspid valve."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"41","text":"A 50 years old patient presented with central chest pain, that relieved on expiration.Clinical cardio respiratory examination is unremarkable. Prominent R wave and ST depression in V1 and V2. What is the most probable diagnosis?","options":[{"label":"A","text":"Brugada syndrome","rationale":"False — Brugada syndrome shows a specific right bundle branch block-like pattern with coved ST elevation in V1-V3, not this reciprocal pattern."},{"label":"B","text":"NSTEMI","rationale":"False — NSTEMI doesn't classically show this reciprocal pattern of tall R wave and ST depression in V1-V2."},{"label":"C","text":"Posterolateral MI","rationale":"False — posterolateral MI would show more widespread lateral changes, not this specific V1-V2 mirror pattern alone."},{"label":"D","text":"True posterior MI","rationale":"True — a tall R wave with ST depression in V1-V2 is the 'mirror image' of ST elevation, representing a true posterior MI."},{"label":"E","text":"Myocarditis","rationale":"False — myocarditis doesn't produce this specific reciprocal ECG pattern."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."}]},{"date":"2019 March","questions":[{"num":"3","text":"What are true /false following atrial fibrillation?","options":[{"label":"A","text":"metoprolol is contraindicated","rationale":"False — beta-blockers like metoprolol are commonly and safely used for rate control in AF, not contraindicated."},{"label":"B","text":"CHA2DSVAS score is use for anticoagulation","rationale":"True — the CHA2DS2-VASc score is used to guide the decision on anticoagulation in AF."},{"label":"C","text":"thyrotoxicosis is cause","rationale":"True — thyrotoxicosis is a recognised cause of AF."},{"label":"D","text":"cardio version is use for rate control","rationale":"False — cardioversion is a rhythm contr
