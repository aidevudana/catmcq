and BP-160/100 mm Which of the following is the best treatment of choice?","options":[{"label":"A","text":"IV fluids","rationale":"False — more IV fluid doesn't address the underlying anticholinergic delirium from atropine excess."},{"label":"B","text":"Stop pralidoxime","rationale":"False — stopping pralidoxime doesn't address this presentation."},{"label":"C","text":"CPAP","rationale":"False — CPAP isn't indicated by this presentation."},{"label":"D","text":"Stop atropine","rationale":"True — flushed appearance, fever, tachycardia and hypertension on day 2 of OP treatment reflects atropine toxicity; stopping atropine is the appropriate treatment of choice."},{"label":"E","text":"Give metronidazole","rationale":"False — metronidazole isn't indicated; there's no evidence of infection here."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"45","text":"14 yr old boy after 10hr history of 6 weeds of oleander poisoning presented to casualty ward. He is conscious and rational. C/o - vomiting and abdominal pain. HR -35. What is the most appropriate next step in Mx?","options":[{"label":"A","text":"Gastric lavage","rationale":"False — gastric lavage has limited value 10 hours post-ingestion."},{"label":"B","text":"IV atropine","rationale":"True — with severe symptomatic bradycardia (HR 35) from cardiac glycoside toxicity, IV atropine is the appropriate first-line next step."},{"label":"C","text":"IV isoprenaline","rationale":"False — isoprenaline is a second-line option if atropine is ineffective, not the immediate next step."},{"label":"D","text":"Give activated charcoal","rationale":"False — activated charcoal has limited value this many hours after ingestion."},{"label":"E","text":"Start temporary cardiac pacemaker","rationale":"False — pacemaker insertion is reserved for cases not responding to atropine, not the immediate first step."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2014 May","questions":[{"num":"45","text":"18 year old girl presented to ETU following deliberate ingestion of 04 oleander seeds. After initial resuscitation and stabilizing, her heart rate was 40 bpm and ECG showed intermittent complete heart block. What is the most appropriate management opinion for this patient,","options":[{"label":"A","text":"DC cardioversion","rationale":"False — DC cardioversion is for tachyarrhythmias, not appropriate for bradyarrhythmia/heart block."},{"label":"B","text":"IV atropine","rationale":"Reasonable initial trial — IV atropine can be tried, but with an established intermittent COMPLETE heart block (a higher-grade, more refractory block), definitive pacing is often needed."},{"label":"C","text":"Cardiac pacemaker","rationale":"True — intermittent complete heart block from cardiac glycoside toxicity, especially if not responsive to initial measures, warrants a cardiac pacemaker as the definitive management."},{"label":"D","text":"Do serum electrolytes","rationale":"False — checking electrolytes is useful supportive information but doesn't address the immediate arrhythmia management needed."},{"label":"E","text":"Start isoprenaline infusion","rationale":"False — isoprenaline is generally a second-line/temporising option, less definitive than pacing for complete heart block."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2013 Eastern","questions":[{"num":"BOF 8","text":"20year old female presented with unconsciousness and suspected drug overdose. She is a known psychiatric patient. Mother has DM. On examination RR-30bpm, BP-120/70mmhg, PR-90bpm. Lungs clear. She responds to deep pain.ABG: PO2-98, PCO2/30mmhg, pH-7.2, HCO3-12, urine –yellow precipitate to Benedict’s test. What is the poison?","options":[{"label":"A","text":"Amytroptalin","rationale":"False — amitriptyline (TCA) toxicity doesn't classically cause a reducing substance in urine or this specific acid-base pattern."},{"label":"B","text":"Salicylate","rationale":"True — a high anion gap metabolic acidosis (low pH, low HCO3, compensatory low PCO2/tachypnoea) together with a positive urine reducing substance test (a recognised false-positive finding with salicylates) fits salicylate poisoning."},{"label":"C","text":"Metformin","rationale":"False — metformin toxicity classically causes lactic acidosis but doesn't explain the reducing substance in urine."},{"label":"D","text":"Insulin","rationale":"False — insulin overdose causes hypoglycaemia, not this acid-base/urine picture."},{"label":"E","text":"Glibenclamide","rationale":"False — glibenclamide overdose also causes hypoglycaemia, not this picture."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2012 November","questions":[{"num":"13","text":"Farmer who has ingested an insecticide, presents with pinpoint pupils. Regarding the management,","options":[{"label":"A","text":"give atropine","rationale":"True — atropine is the core treatment for organophosphate (cholinergic) poisoning."},{"label":"B","text":"give naloxone","rationale":"False — naloxone treats opioid toxicity, not organophosphate poisoning (despite both causing pinpoint pupils, the underlying mechanism and treatment differ)."},{"label":"C","text":"tachycardia","rationale":"False — organophosphate poisoning classically causes BRADYCARDIA (from muscarinic excess), not tachycardia, making this an incorrect expected feature/management point."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"SBR 26","text":"Case scenario suggestive of benzodiazepine overdose (grandmother is taking treatment for insomnia). 26 year old female took handful of drugs. On admission - drowsy, RR 8/min","options":[{"label":"A","text":"Give iv flumezenil","rationale":"False — flumazenil is generally avoided in this setting, particularly with a possible history of longer-term benzodiazepine use (from the grandmother's supply), given the risk of precipitating seizures."},{"label":"B","text":"Insert an oropharyngeal airway","rationale":"True — with drowsiness and a reduced respiratory rate (RR 8/min) from benzodiazepine overdose, basic airway management (e.g. an oropharyngeal airway) alongside close monitoring is the appropriate supportive step."},{"label":"C","text":"Perform gastric larvage","rationale":"False — gastric lavage isn't recommended in modern poisoning management for benzodiazepine overdose."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]}],"count":32},{"topic":"Renal Disorders","sections":[{"date":"2024 January","questions":[{"num":"3","text":"Regarding PSGN","options":[{"label":"A","text":"Affect on kidneys symmetrically","rationale":"True — PSGN classically affects both kidneys symmetrically."},{"label":"B","text":"Due to an Immunoglobin response","rationale":"True — PSGN is an immune-complex mediated glomerulonephritis."},{"label":"C","text":"Serum C3 and C4 elevated","rationale":"False — C3 is typically LOW (consumed by immune complex activation) in PSGN, not elevated; C4 is usually normal."},{"label":"D","text":"Renal histology is compatible with Focal segmental glomerular nephritis","rationale":"False — PSGN classically shows diffuse proliferative glomerulonephritis on histology, not focal segmental glomerulosclerosis."},{"label":"E","text":"Pulmonary oedema is a complication","rationale":"True — pulmonary oedema can occur as a complication from fluid overload in the nephritic picture."}],"reviewed_answer":["A","B","E"],"explanation":"Correct answer(s): A, B, E — see the reasoning under each option below."},{"num":"13","text":"Regarding PCKD?","options":[{"label":"A","text":"Chromosome 16","rationale":"True — the PKD1 gene (the most common cause of autosomal dominant PKD) is located on chromosome 16."},{"label":"B","text":"Chromosome 17","rationale":"False — chromosome 4 is where PKD2 (the less common form) is located, not 17."},{"label":"C","text":"Chromosome 18","rationale":"False — chromosome 18 is not associated with ADPKD."},{"label":"D","text":"Chromosome 21","rationale":"False — chromosome 21 is not associated with ADPKD."},{"label":"E","text":"Chromosome 22","rationale":"False — chromosome 22 is not associated with ADPKD."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"33","text":"A 32-year-old man with painless hematuria for 1 week BP 160/100 B/L pitting ankle edema UFR pus cell 10- 15/hpf Red cells field full Protein ++ Upcr 2.8g/g. Feature most suggestive of glomerular pathology:","options":[{"label":"A","text":"Painless hematuria","rationale":"False — painless haematuria alone is nonspecific and can arise from non-glomerular sources."},{"label":"B","text":"Bilateral pitting edema","rationale":"False — bilateral oedema is nonspecific and can occur in many causes of fluid overload, not specific to glomerular disease."},{"label":"C","text":"Elevated creatinine","rationale":"False — elevated creatinine is nonspecific to renal impairment generally, not specifically glomerular in origin."},{"label":"D","text":"Elevated blood pressure","rationale":"False — elevated blood pressure is nonspecific, seen in many renal and non-renal conditions."},{"label":"E","text":"Increased protein creatinine ratio","rationale":"True — a markedly elevated urine protein-to-creatinine ratio (significant proteinuria) is the most specific finding among these pointing to glomerular pathology."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"34","text":"A 55 year old man with End stage Renal failure is admitted for AV fistula creation. Pulse rate=100 bpm,BP=160/80 mmHg,B/L leg edema up to knee was there.There was elevated JVP. Investigation findings: Serum Creatinine 600 Na+ 138 K+ 5.8 ECG Diffuse concave ST elevation The finding indicating the necessity for early haemodialysis;","options":[{"label":"A","text":"B/L leg swelling up to knee","rationale":"False — leg swelling reflects fluid overload generally but isn't itself the most urgent life-threatening indication for immediate dialysis."},{"label":"B","text":"Blood pressure 160/80mmHg","rationale":"False — BP 160/80 is elevated but not itself an absolute indication for urgent dialysis."},{"label":"C","text":"Diffuse concave ST elevation","rationale":"True — diffuse concave ST elevation indicates uraemic pericarditis, a recognised life-threatening complication (risk of tamponade) that is an absolute indication for urgent dialysis."},{"label":"D","text":"K+ level 5.8mmol/L","rationale":"False — K+ 5.8 is only mildly-moderately elevated, less urgent than the pericarditis finding."},{"label":"E","text":"S.Creatinine 600micromol/L","rationale":"False — a creatinine of 600 reflects chronic renal failure severity but isn't itself the acute finding necessitating urgent (rather than routine) dialysis."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"35","text":"63 year old patient presented with average BP of 180/110 mmHg for 3 months. His BP is difficult to control. On USS right kidney is smaller than the left kidney. He was a heavy smoker. Dorsalis pedis pulse is absent. Probable diagnosis is","options":[{"label":"A","text":"Reflex nephropathy","rationale":"False — reflux nephropathy typically presents from childhood with recurrent UTIs, not this acute-onset resistant hypertension picture in an elderly smoker."},{"label":"B","text":"Atherosclerotic renal artery stenosis","rationale":"True — resistant hypertension with asymmetric kidney size, heavy smoking history and evidence of peripheral vascular disease (absent dorsalis pedis pulse) points to atherosclerotic renal artery stenosis."},{"label":"C","text":"Fibromuscular dysplasia of renal artery stenosis","rationale":"False — fibromuscular dysplasia typically affects younger women, not an elderly heavy smoker with peripheral vascular disease."},{"label":"D","text":"Polycystic kidney disease","rationale":"False — polycystic kidney disease would show enlarged, cystic kidneys, not one kidney smaller than the other."},{"label":"E","text":"Congenital renal hypoplasia","rationale":"False — congenital renal hypoplasia would be a longstanding finding, not fitting this new-onset resistant hypertension with vascular risk factors."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2023 February","questions":[{"num":"9","text":"Lupus nephritis,","options":[{"label":"A","text":"It is a cause of nephrotic syndrome.","rationale":"True — lupus nephritis is a recognised cause of nephrotic syndrome."},{"label":"B","text":"Is seen in 90% of patients with SLE.","rationale":"False — clinically apparent renal involvement occurs in roughly 30-50% of SLE patients, not 90% (though subclinical involvement is more common)."},{"label":"C","text":"Will not cause end stage kidney disease.","rationale":"False — lupus nephritis, especially class IV, can progress to end-stage kidney disease."},{"label":"D","text":"There is a high risk of relapse during pregnancy.","rationale":"True — pregnancy is a recognised trigger for lupus flares, including renal flares."},{"label":"E","text":"There are 6 histological subtypes.","rationale":"True — the ISN/RPS classification recognises six histological classes of lupus nephritis."}],"reviewed_answer":["A","D","E"],"explanation":"Correct answer(s): A, D, E — see the reasoning under each option below."},{"num":"10","text":"Regarding IgA nephropathy,","options":[{"label":"A","text":"Occurs 10-14 days following an upper respiratory tract infection.","rationale":"False — IgA nephropathy classically causes 'synpharyngitic' haematuria occurring within 1-3 days of a URTI, not after a 10-14 day latent period (that longer latency is characteristic of PSGN instead)."},{"label":"B","text":"Known to occur in CLCD.","rationale":"True — secondary IgA nephropathy is a recognised association with chronic liver cell disease."},{"label":"C","text":"Is the commonest cause of glomerulonephritis worldwide.","rationale":"True — IgA nephropathy is the most common primary glomerulonephritis worldwide."},{"label":"D","text":"The commonest presentation is RPGN.","rationale":"False — the most common presentation is asymptomatic or recurrent macroscopic haematuria, not RPGN (which is a rare, severe presentation)."},{"label":"E","text":"Isolated haematuria needs treatment with steroids.","rationale":"False — isolated haematuria with preserved renal function and no significant proteinuria is typically observed/monitored, not treated with steroids."}],"reviewed_answer":["B","C"],"explanation":"Correct answer(s): B, C — see the reasoning under each option below."},{"num":"19","text":"Regarding the renin-angiotensin-aldosterone system,","options":[{"label":"A","text":"Renin secretion is induced by ANP.","rationale":"False — ANP actually INHIBITS renin secretion (it opposes the RAAS), rather than inducing it."},{"label":"B","text":"Angiotensin II is produced in the liver.","rationale":"False — angiotensinogen is produced in the liver, but angiotensin II itself is generated by ACE (mainly in the lungs) converting angiotensin I, not directly 'produced in the liver'."},{"label":"C","text":"Angiotensin II stimulates ADH release from the hypothalamus.","rationale":"True — angiotensin II stimulates thirst and ADH release, a recognised effect."},{"label":"D","text":"Aldosterone acts on the distal convoluted tubules.","rationale":"True — aldosterone acts on the distal convoluted tubule (and collecting duct) to promote sodium reabsorption and potassium secretion."},{"label":"E","text":"Activation of the RAAS is beneficial in chronic heart failure.","rationale":"False — chronic RAAS activation is actually maladaptive/detrimental in chronic heart failure, which is why ACEI/ARB blockade of the RAAS improves outcomes."}],"reviewed_answer":["C","D"],"explanation":"Correct answer(s): C, D — see the reasoning under each option below."},{"num":"20","text":"Thiazide diuretics result in,","options":[{"label":"A","text":"A decreased serum Na+ level","rationale":"True — thiazides can cause hyponatraemia."},{"label":"B","text":"An increased K+ level","rationale":"False — thiazides cause HYPOkalaemia, not an increased K+ level."},{"label":"C","text":"A reduced serum uric acid level","rationale":"False — thiazides INCREASE serum uric acid (can precipitate gout), not reduce it."},{"label":"D","text":"An increased serum Ca2+ level","rationale":"True — thiazides reduce urinary calcium excretion, causing a mild rise in serum calcium."},{"label":"E","text":"Increased serum pH","rationale":"True — thiazides can cause a mild metabolic alkalosis, raising serum pH."}],"reviewed_answer":["A","D","E"],"explanation":"Correct answer(s): A, D, E — see the reasoning under each option below."},{"num":"34","text":"A 26-year-old female with type 1 diabetes mellitus for 10 years presented with 1 episode of painless haematuria. In the UFR, Protein: trace RBC: field full Dysmorphic RBC: nil X-ray KUB was normal. USS showed large kidneys which were compatible with diabetic nephropathy. What is the most probable cause for her hematuria?","options":[{"label":"A","text":"Cystitis","rationale":"False — cystitis wouldn't explain the large kidneys or fit the chronic diabetic context as specifically."},{"label":"B","text":"Glomerulonephritis","rationale":"False — with non-dysmorphic RBCs and no significant proteinuria beyond trace, an active glomerulonephritis is less likely."},{"label":"C","text":"Papillary necrosis","rationale":"True — papillary necrosis is a recognised complication of diabetic nephropathy, causing painless haematuria with a non-glomerular urinary pattern (non-dysmorphic RBCs), fitting this presentation."},{"label":"D","text":"Renal cell carcinoma","rationale":"False — renal cell carcinoma is possible but less specifically suggested here than a recognised diabetic complication."},{"label":"E","text":"Renal calculi","rationale":"False — a normal KUB X-ray makes calculi less likely as the explanation."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2022 March","questions":[{"num":"02","text":"Regarding adult polycystic kidney disease","options":[{"label":"A","text":"Present as end stage kidney disease in 3rd decades","rationale":"False — ESRD in ADPKD typically presents later, around the 5th-6th decade for the more common PKD1 form, not the 3rd decade."},{"label":"B","text":"It is an autosomal dominant inheritance","rationale":"True — ADPKD is inherited in an autosomal dominant pattern."},{"label":"C","text":"Family members should be screened before 20 years of age","rationale":"False — family screening recommendations generally favour informed decision-making around adulthood (often ≥18) rather than a strict mandate 'before 20 years'; this isn't the standard recommendation as bluntly stated."},{"label":"D","text":"Abdominal aortic aneurysm is a common presentation","rationale":"False — intracranial (berry) aneurysm is the classic recognised vascular association with ADPKD, not abdominal aortic aneurysm as a 'common presentation'."},{"label":"E","text":"ACEI & ARB are the main stay of anti-hypertensive treatment","rationale":"True — ACE inhibitors/ARBs are the preferred first-line antihypertensive treatment in ADPKD."}],"reviewed_answer":["B","E"],"explanation":"Correct answer(s): B, E — see the reasoning under each option below."},{"num":"14","text":"Normal kidney function ,","options":[{"label":"A","text":"One third of filtered water is reabsorbed by PCT.","rationale":"False — the proximal convoluted tubule reabsorbs roughly 65-70% of filtered water, not one third."},{"label":"B","text":"Most of the potassium is reabsorbed by distal nephron.","rationale":"False — the majority of filtered potassium is reabsorbed in the proximal tubule/loop of Henle; the distal nephron is primarily responsible for potassium SECRETION (regulation), not the bulk of reabsorption."},{"label":"C","text":"ADH water absorption occur in collecting tubules","rationale":"True — ADH increases water permeability (via aquaporins) in the collecting tubules/ducts, promoting water reabsorption there."},{"label":"D","text":"Hypo perfusion is a significant stimulant for renin secretion","rationale":"True — reduced renal perfusion pressure is a significant stimulus for renin release from the juxtaglomerular apparatus."},{"label":"E","text":"Threshold for glucose is 180mg/dl SBA","rationale":"True — the renal threshold for glucose is classically around 180mg/dl, above which glucosuria occurs."}],"reviewed_answer":["C","D","E"],"explanation":"Correct answer(s): C, D, E — see the reasoning under each option below."},{"num":"29","text":"32 year old women, recently diagnosed diabetic patient, presented with 3 weeks history of gross ankle swelling and periorbital oedema, No history of joint pain or facial rash, No significant past medical or drug history. BP-120/80, PR- 88. Her investigations are as follows, WBC- 4500 Hb- 11 PLT- 220000 FBS- 140 S. Cholesterol- mildly elevated S. Albumin- reduced UFR- protein 4+ no red cells CXR- B/L pleural effusion What can be the cause for her presentation?","options":[{"label":"A","text":"Diabetes","rationale":"Possible but less likely — a newly diagnosed diabetic is unlikely to have already developed established nephrotic-range diabetic nephropathy, which typically takes years to develop."},{"label":"B","text":"Amyloidosis","rationale":"False — amyloidosis is possible but less likely than minimal change disease given the rapid (3-week) onset without other systemic clues."},{"label":"C","text":"SLE","rationale":"False — no joint pain or facial rash argues against SLE."},{"label":"D","text":"IgA nephropathy","rationale":"False — IgA nephropathy classically causes haematuria, but there are no red cells here, arguing against it."},{"label":"E","text":"Minimal change nephropathy","rationale":"True — rapid onset of nephrotic syndrome (oedema, heavy proteinuria, hypoalbuminaemia, pleural effusions) over just a few weeks, with a bland urine sediment (no red cells) and no other systemic clues, fits minimal change nephropathy — a cause not excluded by, and can occur alongside, new diabetes."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"33","text":"30 years old man presented after RTA with a fracture of femur. After admission he developed hematuria. Serum creatinine-3 RBC -30 No pus cells or cast cells What is the diagnosis?","options":[{"label":"A","text":"Fat embolism","rationale":"False — fat embolism typically causes respiratory distress/petechiae/neurological symptoms, not this isolated pattern of haematuria with elevated creatinine."},{"label":"B","text":"Retention","rationale":"False — urinary retention doesn't explain the elevated creatinine or apparent haematuria pattern with no casts."},{"label":"C","text":"Rhabdomyolysis.","rationale":"True — a long bone fracture followed by 'haematuria' (in fact myoglobinuria, causing a false-positive dipstick blood reading) with only mild RBCs on microscopy and rising creatinine, with no pus cells or casts, is classic for rhabdomyolysis-induced AKI."},{"label":"D","text":"Sepsis.","rationale":"False — sepsis isn't suggested here; there's no fever or infective signs described."},{"label":"E","text":"Hypovolemia.","rationale":"False — hypovolaemia alone doesn't explain the apparent haematuria/myoglobinuria pattern."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"37","text":"50 year old man presented for a medical checkup due to feeling unwell for the last few months. His serum creatinine is at 4.5 mg/dl (0.6 - 1.2).Which of the following could point more towards AKI than CKD in this man?","options":[{"label":"A","text":"24 hour urine protein 1g","rationale":"False — 24-hour urine protein is nonspecific and doesn't distinguish acute from chronic disease."},{"label":"B","text":"Hb 13.5g/dl","rationale":"True — a normal Hb argues AGAINST established CKD, since CKD typically causes anaemia from reduced erythropoietin production over time; a preserved Hb is more suggestive of an acute process (AKI)."},{"label":"C","text":"dysmorphic RBC on urine microscopy","rationale":"False — dysmorphic RBCs indicate a glomerular bleeding source but don't distinguish acute from chronic disease."},{"label":"D","text":"Recent history of odema","rationale":"False — recent oedema is nonspecific and can occur in both acute and chronic settings."},{"label":"E","text":"Shruken kidneys on USS Abdomen","rationale":"False — shrunken kidneys on ultrasound is a chronic structural change, pointing towards CKD, not AKI."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2021 March","questions":[{"num":"13","text":"The following is/are causes of chronic kidney disease with normal sized kidneys,","options":[{"label":"A","text":"Hypertension","rationale":"Uncertain — hypertensive nephrosclerosis classically causes shrunken kidneys over time, though early-stage disease could show relatively preserved size."},{"label":"B","text":"Diabetes","rationale":"True — diabetic nephropathy classically shows normal or even enlarged kidneys despite CKD, an important exception to the usual 'CKD = small kidneys' rule."},{"label":"C","text":"Amyloidosis","rationale":"True — amyloidosis classically shows normal or enlarged kidneys despite significant CKD, another recognised exception."},{"label":"D","text":"Polycystic kidney disease","rationale":"False — polycystic kidney disease causes ENLARGED (not simply normal-sized) kidneys due to the cysts."},{"label":"E","text":"Chronic glomerulonephritis","rationale":"False — chronic glomerulonephritis typically leads to shrunken kidneys over time in CKD."}],"reviewed_answer":["B","C"],"explanation":"Correct answer(s): B, C — see the reasoning under each option below."},{"num":"16","text":"What are the features of polycystic kidney disease?","options":[{"label":"A","text":"Increase in haematocrit","rationale":"True — cyst-related increased erythropoietin production can cause an increased haematocrit in ADPKD, unlike most other causes of CKD which cause anaemia."},{"label":"B","text":"Nephrotic range proteinuria","rationale":"False — ADPKD doesn't typically cause heavy nephrotic-range proteinuria."},{"label":"C","text":"Haematuria","rationale":"True — haematuria is a common presentation, often from cyst rupture/bleeding."},{"label":"D","text":"Pancreatic cysts","rationale":"True — pancreatic cysts are a recognised extrarenal manifestation of ADPKD."},{"label":"E","text":"Intracranial aneurysm","rationale":"True — intracranial (berry) aneurysm is a classic, well-recognised association with ADPKD."}],"reviewed_answer":["A","C","D","E"],"explanation":"Correct answer(s): A, C, D, E — see the reasoning under each option below."},{"num":"33","text":"A 30 years old previously healthy woman presented with shortness of breath for 3 days and reduced urine output for one day. On examination, her BP = 160/100 mmHg, PR-80 bpm and bilateral lung basal crepitations were found on auscultation. Her investigation results are as follows; Serum Creatinine 3.6 mg/dL (0.6-1.2) Na+ - 140 mEq/L K+- 5.6 mEq/L UFR - RBC 20/hpf ECG showed Sinus Tachycardia, SpO₂ - 92% What is the most appropriate management step to relieve her symptoms?","options":[{"label":"A","text":"Soluble insulin 10 units with 50ml of 50% dextrose IV","rationale":"False — insulin-dextrose treats hyperkalaemia but doesn't directly relieve her breathlessness from fluid overload."},{"label":"B","text":"IV benzylpenicillin","rationale":"False — benzylpenicillin isn't indicated; there's no evidence of infection described here."},{"label":"C","text":"Urgent Haemodialysis","rationale":"False — while dialysis may ultimately be needed, it isn't the step specifically aimed at rapidly relieving her breathlessness symptomatically."},{"label":"D","text":"IV Furosemide","rationale":"True — with SOB and bibasal crepitations from fluid overload (pulmonary oedema), IV furosemide is the appropriate step to relieve her symptoms."},{"label":"E","text":"Intravenous NaHCO₃","rationale":"False — bicarbonate doesn't address the fluid overload driving her breathlessness."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"34","text":"A 37 old woman presented with a passage of urine containing white colour particles, there were no other urinary symptoms. She also complained of lethargy and malaise and LOW over a few weeks. Her investigation results are as follows; UFR - Albumin +, RBC 4-5/hpf, Pus cells field full, Casts - epithelial and white cell casts Urine culture & ABST - No organism isolated S.Cr - 1.4 mg/dL (upper limit 1.3mg/dL) FBC - WBC normal, MCV normal, Hb 9.8g/dL USS KUB normal ESR - 100 CRP - 36 mg/L Most probable cause for this presentation?","options":[{"label":"A","text":"Renal tuberculosis","rationale":"True — sterile pyuria with white cell casts, systemic symptoms (lethargy, malaise, weight loss) and a markedly raised ESR, with no organism on standard culture, fits renal tuberculosis."},{"label":"B","text":"Non radiopaque renal stone","rationale":"False — a non-radiopaque stone wouldn't explain the systemic symptoms or markedly raised ESR/CRP."},{"label":"C","text":"Renal papillary necrosis","rationale":"False — papillary necrosis doesn't typically cause this sterile pyuria/systemic symptom combination as classically as renal TB."},{"label":"D","text":"Urinary tract infection","rationale":"False — standard UTI would typically show organisms on culture, which is negative here."},{"label":"E","text":"Transitional cell bladder CA","rationale":"False — bladder cancer doesn't typically cause this systemic symptom/sterile pyuria combination."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"35","text":"A 55 year old man presented following a seizure. His temperature is 39°C, BP 150/90 mmHg. His blood tests are as follows, WBC- 8.6 (4-11), Hb - 9, Plt - 70 (150-450), Blood picture - fragmented red cells Sr. Cr 2.4 mg/dl INR 1.2 CT scan of head – normal What is the most appropriate management for this patient?","options":[{"label":"A","text":"Plasma exchange","rationale":"True — seizure, thrombocytopenia, fragmented red cells (microangiopathic haemolysis) and renal impairment together fit thrombotic thrombocytopenic purpura (TTP); plasma exchange is the definitive treatment."},{"label":"B","text":"Haemodialysis","rationale":"False — haemodialysis addresses renal failure but not the underlying microangiopathic process driving this presentation."},{"label":"C","text":"Phenytoin infusion","rationale":"False — phenytoin might be used for ongoing seizures but doesn't address the underlying diagnosis."},{"label":"D","text":"Enalapril","rationale":"False — enalapril doesn't address the acute underlying process here."},{"label":"E","text":"Platelet transfusion","rationale":"False — platelet transfusion is generally AVOIDED in TTP as it can worsen microvascular thrombosis."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2020 June","questions":[{"num":"9","text":"Consequences following drainage of acute urinary retention","options":[{"label":"A","text":"Oliguria","rationale":"False — drainage of acute retention classically causes POST-obstructive DIURESIS (polyuria), not oliguria."},{"label":"B","text":"Hyponatremia","rationale":"True — excessive post-obstructive diuresis can cause hyponatraemia from salt/water losses."},{"label":"C","text":"Hematuria","rationale":"True — rapid decompression can cause 'decompression haematuria'."},{"label":"D","text":"Tubular damage","rationale":"True — prior obstruction can cause tubular dysfunction/damage, including a concentrating defect."},{"label":"E","text":"Hypertension","rationale":"False — post-obstructive diuresis is more associated with hypotension from volume loss, not hypertension."}],"reviewed_answer":["B","C","D"],"explanation":"Correct answer(s): B, C, D — see the reasoning under each option below."},{"num":"26","text":"A 35 year old woman with increased urinary frequency. She is on sertraline for depression. BMI 30/m2. Investigations showed high Ca2+, low phosphate and normal glucose levels. Urine analysis is normal. CXR normal. What is the most probable diagnosis?","options":[{"label":"A","text":"Lung carcinoma","rationale":"False — lung carcinoma (causing humoral hypercalcaemia via PTHrP) is less likely given a normal CXR."},{"label":"B","text":"Thyrotoxicosis","rationale":"False — thyrotoxicosis doesn't classically cause this specific hypercalcaemia/hypophosphataemia biochemical pattern."},{"label":"C","text":"tertiary hyperparathyroidism","rationale":"False — tertiary hyperparathyroidism occurs in the context of long-standing renal failure, which isn't described here."},{"label":"D","text":"Primary hyperparathyroidism","rationale":"True — elevated calcium with low phosphate (classic biochemistry of PTH excess) and a normal CXR (excluding a lung malignancy source) fits primary hyperparathyroidism."},{"label":"E","text":"Secondary hyperparathyroidism","rationale":"False — secondary hyperparathyroidism occurs in response to hypocalcaemia (e.g. from renal failure or vitamin D deficiency), not fitting this hypercalcaemic picture."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"36","text":"26 year old male presented with blood pressure of 140/90mmHg. Urine analysis shows protein 2+, no RBC or casts. Urine protein to creatinine ratio is 3.6 (high). Which of the following suggest glomerular pathology?","options":[{"label":"A","text":"Ankle edema","rationale":"False — ankle oedema is nonspecific and can occur in many conditions, not specific to glomerular disease."},{"label":"B","text":"Hypertension","rationale":"False — hypertension is nonspecific."},{"label":"C","text":"RBC in urine","rationale":"False — this patient has no RBCs in urine, so this isn't relevant here."},{"label":"D","text":"Urine protein 2+","rationale":"False — 2+ protein on dipstick is a fairly crude, nonspecific measure."},{"label":"E","text":"Urine protein to creatinine ratio > 3.5","rationale":"True — a urine protein-to-creatinine ratio above 3.5 (nephrotic range) is a specific quantitative marker pointing to significant glomerular pathology."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"40","text":"46 years old male patient presented with polyuria & bilateral renal calculi. Arterial blood gas revealed PH – 7.2 Bicarbonate – 10 PO2 & PCO2 normal range potassium – 2.8. What is the most likely diagnosis?","options":[{"label":"A","text":"Type 1 renal tubular acidosis","rationale":"True — polyuria, bilateral renal calculi (nephrocalcinosis, from alkaline urine promoting calcium phosphate stone formation), a primary metabolic acidosis (low HCO3 with inadequate respiratory compensation) and hypokalaemia together are classic for type 1 (distal) renal tubular acidosis."},{"label":"B","text":"Chronic kidney disease","rationale":"False — CKD doesn't specifically explain the combination of hypokalaemia with bilateral stones in this pattern."},{"label":"C","text":"Salt losing nephropathy","rationale":"False — salt-losing nephropathy doesn't specifically explain this acid-base/stone pattern."},{"label":"D","text":"Type 4 renal tubular acidosis","rationale":"False — type 4 RTA classically causes HYPERkalaemia (not hypokalaemia as seen here), the opposite pattern."},{"label":"E","text":"Diuretic use","rationale":"False — most diuretics cause metabolic alkalosis (not acidosis) and don't explain the stone formation."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"44","text":"A 69 years old man presented to emergency unit with dysuria, flank pain and fever for 2 days duration. On examination his BP-90/60 mmHg, PR-120 bpm, RR-28m-1 and had left side costovertebral angle tenderness, rest of the examination is normal. Blood and urine has sent for investigation. What is the next best management option?","options":[{"label":"A","text":"5% dextrose","rationale":"False — 5% dextrose is an inappropriate fluid choice for a septic, hypotensive patient (crystalloid like normal saline would be preferred for resuscitation)."},{"label":"B","text":"Ultrasound scan","rationale":"False — ultrasound is useful supportive imaging but doesn't address the immediate sepsis management priority."},{"label":"C","text":"Catheterization","rationale":"False — catheterisation isn't indicated by this presentation (no retention described)."},{"label":"D","text":"Dopamine infusion","rationale":"False — dopamine isn't the appropriate first-line management for septic shock from presumed pyelonephritis."},{"label":"E","text":"IV ceftriaxone","rationale":"True — fever, flank pain, CVA tenderness with hypotension and tachycardia suggests urosepsis/pyelonephritis; prompt IV antibiotics (ceftriaxone) is the key next management step (alongside fluid resuscitation)."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."}]},{"date":"2019 November","questions":[{"num":"3","text":"what are the renal diseases are correctly matched with the cause","options":[{"label":"A","text":"Membranous nephropathy - bronchial CA","rationale":"True — membranous nephropathy is a recognised paraneoplastic association with solid organ malignancies, including bronchial (lung) carcinoma."},{"label":"B","text":"Acute tubular intestinal nephritis - ibuprofen Treatment","rationale":"True — NSAIDs (e.g. ibuprofen) are a classic recognised cause of acute tubulointerstitial nephritis."},{"label":"C","text":"Acute tubular necrosis - low dose aspirin","rationale":"False — low-dose aspirin isn't a classic cause of acute tubular necrosis; higher-dose NSAIDs or specific nephrotoxins are more typical causes."},{"label":"D","text":"Acute cortical necrosis - Russel viper","rationale":"True — Russell's viper envenomation is a recognised cause of acute cortical necrosis."},{"label":"E","text":"Chronic interstitial nephritis – metformin","rationale":"False — metformin isn't a recognised cause of chronic interstitial nephritis; it's renally cleared and can accumulate in renal impairment (risking lactic acidosis), but doesn't itself cause interstitial nephritis."}],"reviewed_answer":["A","B","D"],"explanation":"Correct answer(s): A, B, D — see the reasoning under each option below."},{"num":"20","text":"Regarding AKI","options":[{"label":"A","text":"pre renal failure can be corrected fluid therapy alone","rationale":"True — prerenal AKI (from reduced perfusion) classically responds to and can be corrected with fluid therapy alone."},{"label":"B","text":"red brown muddy casts in the urine suggests glomerulorneheitis","rationale":"False — muddy brown/granular casts are classic for ACUTE TUBULAR NECROSIS, not glomerulonephritis (which shows red cell casts instead)."},{"label":"C","text":"Renal biopsy is contraindicated in the presence of anuria","rationale":"False — anuria itself is not a contraindication to renal biopsy; biopsy may still be needed/performed to establish the cause of AKI when the aetiology is unclear."},{"label":"D","text":"Acute pericarditis is a complication","rationale":"True — acute (uraemic) pericarditis is a recognised complication of AKI."},{"label":"E","text":"Diuresis therapy increase survival","rationale":"False — diuretic therapy can help manage fluid balance symptomatically but has not been shown to improve survival in AKI."}],"reviewed_answer":["A","D"],"explanation":"Correct answer(s): A, D — see the reasoning under each option below."},{"num":"31","text":"40yr male present with periorbital edema for 2days. On examination BP is 160/100mmHg with bilateral basal crepitation UFR- protein + RBC ++ Granular cast Pus cell nil Serum creatinine 1.8mmol/L What is most probable diagnosis?","options":[{"label":"A","text":"Acute interstitial nephritis","rationale":"False — acute interstitial nephritis typically shows pyuria/eosinophiluria rather than this prominent haematuria/HTN/oedema nephritic picture."},{"label":"B","text":"Acute glomerulonephritis","rationale":"True — periorbital oedema, hypertension, bibasal crepitations (fluid overload) with haematuria and granular casts (but no pyuria) is the classic nephritic syndrome picture of acute glomerulonephritis."},{"label":"C","text":"Acute interstitial nephropathy","rationale":"False — this is essentially a duplicate/alternative phrasing of A, similarly less fitting than acute glomerulonephritis."},{"label":"D","text":"Nephrotic syndrome","rationale":"False — nephrotic syndrome would show heavy proteinuria (4+ was not the dominant feature here — only '+') without this prominent haematuric/nephritic sediment."},{"label":"E","text":"Undiagnosed CKD","rationale":"False — an acute 2-day presentation doesn't fit 'undiagnosed CKD' as well as an acute nephritic process."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"35","text":"45y old male presented with a first episode UTI, culture positive for E. coli. What is the best next investigation?","options":[{"label":"A","text":"USS KUB","rationale":"True — a first UTI in an adult male warrants investigation for an underlying structural abnormality; renal tract ultrasound (USS KUB) is the appropriate first-line imaging."},{"label":"B","text":"cystoscopy","rationale":"False — cystoscopy is a more invasive investigation, not the first-line step."},{"label":"C","text":"DMSA","rationale":"False — DMSA scanning assesses renal scarring, more relevant in children with recurrent UTIs, not the first-line adult investigation."},{"label":"D","text":"STD screening","rationale":"False — STD screening isn't the standard next investigation for a straightforward E. coli UTI."},{"label":"E","text":"IVU","rationale":"False — IVU has largely been superseded by ultrasound as first-line imaging."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"39","text":"18y old school boy presents with 1-day history of reduced urine output. He is a long distance runner. No previous symptoms BU 10mmol/l S.Cr 900micromol/l Na 132mmol/l K 6mmol/l What is the etiology for his renal failure?","options":[{"label":"A","text":"CKD","rationale":"False — this is an acute presentation, not fitting chronic kidney disease."},{"label":"B","text":"Dehydration leading to hypotension","rationale":"False — dehydration/hypotension alone doesn't fully explain this degree of AKI without another precipitant, though it can contribute."},{"label":"C","text":"Interstitial nephritis","rationale":"False — interstitial nephritis isn't specifically suggested by this exertional history."},{"label":"D","text":"Rhabdomyolysis","rationale":"True — a long-distance runner with acute oliguric AKI, hyperkalaemia and a rise in creatinine is classic for exercise-induced rhabdomyolysis causing myoglobin-mediated tubular injury."},{"label":"E","text":"….","rationale":"(Option text missing/illegible in the original source PDF.)"}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."}]},{"date":"2019 March","questions":[{"num":"9","text":"Which of the following is/are true/false regarding Post Streptococcal Glomerular Nephritis.","options":[{"label":"A","text":"A positive ASOT is diagnostic.","rationale":"False — a positive ASOT supports evidence of a preceding streptococcal infection but is not itself diagnostic of PSGN."},{"label":"B","text":"Classically occur during an ongoing infection","rationale":"False — PSGN classically occurs AFTER a latent period (roughly 10-21 days) following the preceding infection, not during an ongoing infection (that pattern of hematuria coinciding with infection is more typical of IgA nephropathy)."},{"label":"C","text":"Renal biopsy will show a diffuse proliferative glomerular nephritis.","rationale":"True — PSGN classically shows diffuse proliferative glomerulonephritis on renal biopsy."},{"label":"D","text":"Steroid is the treatment of choice","rationale":"False — PSGN management is mainly supportive; steroids are not standard first-line treatment."},{"label":"E","text":"Typically presents with Nephrotic syndrome","rationale":"False — PSGN classically presents with a NEPHRITIC syndrome picture, not nephrotic syndrome."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"10","text":"Regarding AKI","options":[{"label":"A","text":"NSAID is a cause","rationale":"True — NSAIDs are a recognised cause of AKI (via prerenal, ATN, or interstitial nephritis mechanisms)."},{"label":"B","text":"cephalosporin use in intercurrent infection.","rationale":"True — cephalosporins used during intercurrent infection are a recognised (albeit less common) cause of AKI via acute interstitial nephritis."},{"label":"C","text":"red cell casts in urine suggest ATN","rationale":"False — red cell casts suggest GLOMERULAR pathology/glomerulonephritis, not ATN (which classically shows muddy brown granular casts)."},{"label":"D","text":"furosemide is improve survival.","rationale":"False — furosemide helps manage fluid overload symptomatically but has not been shown to improve survival in AKI."},{"label":"E","text":"severe acidosis is a indication for dialysis.","rationale":"True — severe metabolic acidosis refractory to medical management is a recognised indication for urgent dialysis."}],"reviewed_answer":["A","B","E"],"explanation":"Correct answer(s): A, B, E — see the reasoning under each option below."},{"num":"12","text":"Hypokalaemia is a Feature of,","options":[{"label":"A","text":"Addison's disease","rationale":"False — Addison's disease causes HYPERkalaemia (from aldosterone deficiency), not hypokalaemia."},{"label":"B","text":"Renal artery stenosis","rationale":"True — renal artery stenosis can cause secondary hyperaldosteronism, leading to hypokalaemia."},{"label":"C","text":"Adrenal tumour","rationale":"True — an aldosterone-secreting adrenal tumour (Conn's) causes hypokalaemia."},{"label":"D","text":"Cushing syndrome","rationale":"True — Cushing syndrome (excess cortisol with mineralocorticoid activity) can cause hypokalaemia, especially with very high cortisol levels."},{"label":"E","text":"Thyrotoxicosis","rationale":"True — thyrotoxicosis is associated with hypokalaemic periodic paralysis, a recognised complication."}],"reviewed_answer":["B","C","D","E"],"explanation":"Correct answer(s): B, C, D, E — see the reasoning under each option below."},{"num":"33","text":"18 y old female presented with acute heart failure..BP 220/ 110. Hb 8.5 g/dl Blood picture. Normocytic normochromic anemia. platelet normal. S. Cr.120 Ca.1.8 What is the cause?","options":[{"label":"A","text":"Ig A nephropathy","rationale":"Less likely — IgA nephropathy doesn't classically present with this severity of malignant hypertension and heart failure as the leading feature."},{"label":"B","text":"CKD","rationale":"Less likely — established CKD isn't specifically suggested by a single mildly-elevated creatinine (120) in a previously well young woman."},{"label":"C","text":"Post streptococcus glomerular nephritis","rationale":"Less likely — PSGN doesn't classically cause this degree of malignant hypertension/heart failure as the presenting feature."},{"label":"D","text":"Renal artery embolism","rationale":"Plausible — a renal vascular cause (e.g. fibromuscular dysplasia/renal artery pathology, more classically described as stenosis rather than 'embolism' at this young age) fitting severe young-onset hypertension, though the exact option wording ('embolism') doesn't perfectly match the more typical fibromuscular dysplasia/stenosis picture."},{"label":"E","text":"HUS","rationale":"Plausible alternative — HUS can cause malignant hypertension with anaemia and renal impairment in a young patient, though the normal platelet count stated here argues against active HUS, which typically causes thrombocytopenia; this makes the overall picture genuinely ambiguous and worth checking against your lecture notes."}],"reviewed_answer":[],"explanation":"Genuinely ambiguous case: severe young-onset hypertension with heart failure and anaemia could fit either a renal vascular cause (though the option says 'embolism' rather than the more classic fibromuscular dysplasia/stenosis) or HUS (though the stated normal platelet count argues against active HUS, which usually causes thrombocytopenia). Worth checking this one against your lecture notes rather than trusting a forced pick here."},{"num":"34","text":"A patient with AKI, Na+=140, k+=7.9,hco3=16,tall t wave, wide qrs complex. most appropriate next step of management,","options":[{"label":"A","text":"Iv calcium gluconate","rationale":"True — with severe hyperkalaemia (K+ 7.9) and dangerous ECG changes (tall T waves, wide QRS), IV calcium gluconate is the first priority to stabilise the cardiac membrane before other potassium-lowering measures."},{"label":"B","text":"iv furosemides","rationale":"False — furosemide can help increase potassium excretion but doesn't provide the immediate cardiac protection needed given the ECG changes."},{"label":"C","text":"inhalation of salbutamol","rationale":"False — salbutamol nebulisation helps shift potassium intracellularly but, like furosemide, doesn't provide the immediate cardiac membrane stabilisation that calcium gluconate does."},{"label":"D","text":"dextrose infusion","rationale":"False — dextrose alone (without insulin) doesn't shift potassium intracellularly effectively."},{"label":"E","text":"dextrose insulin infusion","rationale":"False — dextrose-insulin infusion shifts potassium intracellularly (an important subsequent step) but calcium gluconate takes priority first given the ECG changes indicating imminent arrhythmia risk."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"39","text":"65 year old man who is known patient COPD, he is on hydrochlorothiazide, presented with sob. He is plethoric, no cyanosis .Hb 19 ......... What is the cause for this condition?","options":[{"label":"A","text":"COPD","rationale":"True — chronic hypoxia from COPD stimulates erythropoietin production, causing secondary polycythaemia (plethora, elevated Hb, no cyanosis if compensated) — fitting his known COPD history."},{"label":"B","text":"primary polycythemia","rationale":"False — primary polycythaemia (polycythaemia vera) is a myeloproliferative disorder not specifically suggested here over his known COPD as the more directly explanatory cause."},{"label":"C","text":"CML","rationale":"False — CML isn't specifically suggested by this presentation (isolated raised Hb without other blood count abnormalities described)."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2018 November","questions":[{"num":"9","text":"Chronic kidney disease,","options":[{"label":"A","text":"Erythropoietin used to treat anaemia","rationale":"True — erythropoietin is used to treat the anaemia of CKD."},{"label":"B","text":"Serum phosphate is elevated","rationale":"True — CKD causes phosphate retention, elevating serum phosphate."},{"label":"C","text":"","rationale":"(Option text is blank/illegible in the original source PDF.)"},{"label":"D","text":"Early renal transplantation reduces mortality than dialysis","rationale":"True — early (including pre-emptive) renal transplantation is associated with better outcomes/lower mortality compared with prolonged dialysis."},{"label":"E","text":"Osteomalacia is a complication","rationale":"True — osteomalacia (as part of renal osteodystrophy) is a recognised complication of CKD."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."},{"num":"10","text":"Which of the following renal disease/manifestation is correctly matched with the given cause?","options":[{"label":"A","text":"Acute tubular necrosis – Rhabdomyolysis","rationale":"True — rhabdomyolysis (myoglobin-induced tubular injury) is a classic cause of acute tubular necrosis."},{"label":"B","text":"Nephrotic syndrome – Leptospirosis","rationale":"False — leptospirosis classically causes AKI/interstitial nephritis, not nephrotic syndrome."},{"label":"C","text":"Sterile pyuria - Renal TB","rationale":"True — sterile pyuria is classically associated with renal tuberculosis."},{"label":"D","text":"Acute glomerulonephritis-Streptococcus viridans","rationale":"False — post-streptococcal (acute) glomerulonephritis is caused by Group A beta-haemolytic Streptococcus (pyogenes), not Streptococcus viridans (which is more associated with subacute infective endocarditis)."},{"label":"E","text":"Microscopic hematuria- Infective endocarditis","rationale":"True — infective endocarditis can cause an immune-complex mediated glomerulonephritis presenting with microscopic haematuria."}],"reviewed_answer":["A","C","E"],"explanation":"Correct answer(s): A, C, E — see the reasoning under each option below."},{"num":"26","text":"45 healthy man presented with headache and muscle weakness. Fasting blood glucose - 5.3mmol/L Urine- Albumin- nil / Red Cells - 1-2hpf Serum Na+ - 140mmol/ltr Serum creatinine- 120mg/dl Serum - 2.8/ ECG- U waves What is the most appropriate next investigation,","options":[{"label":"A","text":"24 hour urinary potassium excretion","rationale":"Reasonable supportive test but not the standard first screening step — 24-hour urinary potassium helps confirm renal potassium wasting but doesn't identify the underlying cause as directly as the renin-aldosterone ratio."},{"label":"B","text":"Creatinine clearance","rationale":"False — creatinine clearance doesn't investigate the cause of hypokalaemia."},{"label":"C","text":"Serum renin aldosterone ratio","rationale":"True — with hypokalaemia (and implied hypertension from the headache), a serum renin-aldosterone ratio is the standard first-line screening test to look for primary hyperaldosteronism as the underlying cause."},{"label":"D","text":"Serum catecholamine assay","rationale":"False — catecholamine assay would be relevant for suspected phaeochromocytoma, not directly suggested by this biochemical picture."},{"label":"E","text":"USS abdomen","rationale":"False — abdominal ultrasound is a later step to localise a cause (e.g. adrenal adenoma) once the biochemical diagnosis is suspected, not the first investigation."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"32","text":"A 50 years old diagnosed patient with Chronic liver cell disease presented with reduced urine out put. Bladder cathetarization reveals anuria. Serum creatinine is elevated. Urine Na - <20mmol/l. Urine osmolality is high. Urine/Plasma creatinine ratio is elevated. What is the best management option for this patient?","options":[{"label":"A","text":"Fluid restriction","rationale":"False — fluid restriction alone doesn't reverse the underlying renal hypoperfusion of hepatorenal syndrome."},{"label":"B","text":"IV Terlipressin","rationale":"True — the described picture (avid sodium retention with low urine Na, high urine osmolality, elevated urine/plasma creatinine ratio and anuria in a cirrhotic) is classic hepatorenal syndrome; IV terlipressin (a splanchnic vasoconstrictor, usually with albumin) is the standard treatment."},{"label":"C","text":"IV Antibiotics","rationale":"False — antibiotics would be relevant if infection/SBP were the trigger, but aren't the definitive HRS treatment itself."},{"label":"D","text":"IV Octreotide","rationale":"False — octreotide alone (without terlipressin) is not the standard definitive HRS treatment."},{"label":"E","text":"IV 0.9% Saline bolus","rationale":"False — a simple saline bolus doesn't address the underlying splanchnic vasodilation driving HRS, and the described urine findings (high osmolality, sodium avidity) indicate a functional (not simple volume-depleted) renal failure."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"34","text":"45 Years old Man presented to the ward with passage of red coloured urine and frothy urine. After few days, he developed anuria and hypertension and needs haemodialysis. IJFR reveals, plenty of red cells/hpf, 3+ Proteinuria on dipstick test 24 Hr urine excretion is 2000grms. Serum creatimne is 2.5 mmol/l. What is the most likely diagnosis?","options":[{"label":"A","text":"Chronic kidney disease of unknown origin","rationale":"False — this is a subacute, rapidly progressive presentation, not fitting 'chronic kidney disease of unknown origin' as the primary diagnosis."},{"label":"B","text":"Post streptococcal Glomurulonephritis","rationale":"False — while PSGN can rarely progress rapidly, this pattern of rapid progression to anuria/dialysis need is more classic for RPGN as a category."},{"label":"C","text":"Minimal change nephrotic syndrome","rationale":"False — minimal change disease doesn't typically cause this degree of haematuria or rapid progression to renal failure."},{"label":"D","text":"Membrano proliferative Glomurulonephritis","rationale":"False — MPGN is possible but the rapid progression to anuria and dialysis need described here is the hallmark specifically of RPGN."},{"label":"E","text":"RPGN","rationale":"True — red urine/proteinuria progressing rapidly to anuria, hypertension and the need for dialysis is the classic definition and presentation of rapidly progressive glomerulonephritis (RPGN)."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"35","text":"56 year old man presented with bilateral ankle oedema and periorbital swelling. He is not a diabetic and had no similar past episodes. 4 weeks back, he had eczema with an ulcer on his left foot. On examination, BP 150/90mmHg ; PR 76bpm; Bibasal lung fine crepitations and elevated JVP. Serum Creatninine 2.1 mg/dl; IJFR - Urine protein +1 and 30-40 hpf of RBC. What is the most appropriate next step of management?","options":[{"label":"A","text":"20% salt free albumin","rationale":"False — salt-free albumin isn't indicated by this predominantly nephritic (rather than severely nephrotic/hypoalbuminaemic) picture."},{"label":"B","text":"Haemodialysis","rationale":"False — haemodialysis isn't yet indicated based on the information given (creatinine only mildly elevated)."},{"label":"C","text":"IV methyl prednisolone","rationale":"False — starting IV methylprednisolone empirically without a tissue diagnosis isn't the most appropriate next step when the exact glomerular pathology (and thus specific treatment need) is still unclear."},{"label":"D","text":"Oral cyclophosphamide","rationale":"False — similarly, empirical cyclophosphamide isn't appropriate without first establishing the specific diagnosis."},{"label":"E","text":"Renal biopsy","rationale":"True — given a nephritic picture (oedema, hypertension, haematuria, mild renal impairment) following a preceding skin infection (consistent with a post-infectious glomerulonephritis timeline), renal biopsy is the appropriate next step to establish the exact pathology and guide specific treatment."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."}]},{"date":"2017 May","questions":[{"num":"5","text":"Clinical/ biochemical feature of nephritic syndrome include","options":[{"label":"A","text":"Dyslipidaemia","rationale":"False — dyslipidaemia is a NEPHROTIC syndrome feature (from hepatic response to hypoalbuminaemia), not nephritic."},{"label":"B","text":"Hypertension","rationale":"True — hypertension is a classic nephritic syndrome feature, from volume overload/activation of the renin-angiotensin system."},{"label":"C","text":"Elevated JVP","rationale":"True — elevated JVP reflects the fluid overload seen in nephritic syndrome."},{"label":"D","text":"Pleural effusion","rationale":"True — pleural effusion can occur as part of the fluid overload picture."},{"label":"E","text":"Proteinuria of 3 g per 24 hour","rationale":"False — proteinuria of 3g/24h is at the nephrotic-range threshold; nephritic syndrome typically causes sub-nephrotic-range proteinuria."}],"reviewed_answer":["B","C","D"],"explanation":"Correct answer(s): B, C, D — see the reasoning under each option below."},{"num":"9","text":"Metabolic acidosis results in","options":[{"label":"A","text":"Potassium retention","rationale":"True — acidosis causes a shift of potassium out of cells (via H+/K+ exchange), contributing to hyperkalaemia/potassium retention."},{"label":"B","text":"Rise in plasma chloride","rationale":"True — in hyperchloraemic (normal anion gap) metabolic acidosis, plasma chloride rises to compensate for reduced bicarbonate."},{"label":"C","text":"Low pCO2","rationale":"True — respiratory compensation for metabolic acidosis involves hyperventilation, lowering pCO2."},{"label":"D","text":"Peripheral vasoconstriction","rationale":"False — acidosis tends to cause systemic peripheral VASODILATION, not vasoconstriction."},{"label":"E","text":"Tetany","rationale":"False — acidosis increases ionised calcium, which actually REDUCES the risk of tetany; alkalosis (not acidosis) is associated with tetany."}],"reviewed_answer":["A","B","C"],"explanation":"Correct answer(s): A, B, C — see the reasoning under each option below."},{"num":"35","text":"A 50 year old woman with poorly controlled type 2 diabetes mellitus presents with frothy urine. She is on regular medication for hypertension. She has also been on disease modifying genes and NSAIDs for the rheumatoid arthritis for several years. She has pre proliferative diabetic retinopathy. HbA1c………………………………….-9% Serum Creatinine………………….-220μmol/l Urine…………………………………….-blood+, protein++ What is the likely diagnosis?","options":[{"label":"A","text":"Amyloidosis","rationale":"Possible but incomplete — diabetic nephropathy is supported by the retinopathy, but the presence of significant haematuria isn't typical of pure diabetic nephropathy (which usually causes isolated proteinuria without prominent haematuria)."},{"label":"B","text":"Diabetic nephropathy","rationale":"Possible but incomplete — see A; diabetic nephropathy alone doesn't fully explain the haematuria."},{"label":"C","text":"Chronic intestinal nephritis","rationale":"False — 'chronic intestinal nephritis' doesn't fit as a standard diagnostic entity matching this picture as well as analgesic nephropathy."},{"label":"D","text":"Renal tuberculosis","rationale":"False — renal TB doesn't specifically fit this history as well as the long-term NSAID exposure clue."},{"label":"E","text":"Analgesic nephropathy","rationale":"True — long-term combined analgesic (NSAID) use is a strong clue pointing to analgesic nephropathy, which classically causes both haematuria and proteinuria with renal impairment — a picture not fully explained by diabetic nephropathy alone given the prominent haematuria."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."}]},{"date":"2016 May","questions":[{"num":"06","text":"Regarding 12 year old nephrotic syndrome child,","options":[{"label":"A","text":"Serum LDL increased","rationale":"True — elevated LDL (dyslipidaemia) is a classic nephrotic syndrome feature."},{"label":"B","text":"Lipiduria is a feature","rationale":"True — lipiduria (oval fat bodies/fatty casts) is a classic nephrotic syndrome finding."},{"label":"C","text":"Protenuria is treated with ACE inhibitors","rationale":"True — ACE inhibitors are used to reduce proteinuria in nephrotic syndrome via their effect on intraglomerular pressure."},{"label":"D","text":"","rationale":"(Option text is blank/illegible in the original source PDF.)"},{"label":"E","text":"Prolong bed rest recommend","rationale":"False — prolonged bed rest is actually discouraged in nephrotic syndrome, since immobility combined with the hypercoagulable state increases thrombosis risk."}],"reviewed_answer":["A","B","C"],"explanation":"Correct answer(s): A, B, C — see the reasoning under each option below."},{"num":"11","text":"The following features are of rennin angiotensin system activation","options":[{"label":"A","text":"Vasoconstriction","rationale":"True — angiotensin II causes vasoconstriction."},{"label":"B","text":"Hypertension","rationale":"True — the net effect of RAAS activation (vasoconstriction plus fluid retention) is hypertension."},{"label":"C","text":"Hyperkalemia","rationale":"False — aldosterone (part of RAAS) promotes potassium EXCRETION, causing hypokalaemia, not hyperkalaemia."},{"label":"D","text":"Fluid retention","rationale":"True — aldosterone promotes sodium and water retention."},{"label":"E","text":"Oliguria","rationale":"False — oliguria isn't a primary classic direct feature of RAAS activation itself, though it can occur secondarily in some contexts."}],"reviewed_answer":["A","B","D"],"explanation":"Correct answer(s): A, B, D — see the reasoning under each option below."},{"num":"SBA 5","text":"47 year old lady presented with SOB, ABG results show hypoxia reduced PCO2 respiratory alkalosis","options":[{"label":"A","text":"acute severe asthma","rationale":"True — hypoxaemia WITH a low PCO2 (true hypoxia driving compensatory hyperventilation) fits acute severe asthma in its earlier/moderate stage, before fatigue causes CO2 retention."},{"label":"B","text":"emphysema","rationale":"False — emphysema (COPD) more classically causes chronic hypercapnia/type 2 pattern rather than this acute hypoxic-hyperventilation picture."},{"label":"C","text":"scoliosis","rationale":"False — scoliosis causes a restrictive pattern with eventual hypoventilation (type 2 failure), not this acute hypoxic-hyperventilation picture."},{"label":"D","text":"hyperventilation","rationale":"False — pure (psychogenic) hyperventilation would show a low PCO2 WITHOUT true hypoxia, unlike here where hypoxia is present."},{"label":"E","text":"opiate overdose","rationale":"False — opiate overdose causes hypoventilation (raised PCO2, respiratory acidosis), the opposite pattern to what's described."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"SBA 6","text":"60 year old woman with DM presented with SOB & reduced urine output. Most suggestive feature of CKD in this patient","options":[{"label":"A","text":"Anaemia","rationale":"False — anaemia is a common CKD feature but is less specific/definitive as a single indicator compared to a structural finding."},{"label":"B","text":"Hyperphosphataemia","rationale":"False — hyperphosphataemia occurs in CKD but is less structurally definitive."},{"label":"C","text":"Contracted kidneys","rationale":"True — contracted (shrunken) kidneys on imaging is the most specific, definitive structural marker distinguishing CKD from AKI."},{"label":"D","text":"Osteoporosis","rationale":"False — osteoporosis isn't the classic CKD bone finding (renal osteodystrophy, including osteomalacia, is more specific)."},{"label":"E","text":"","rationale":"(Option text is blank/illegible in the original source PDF.)"}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"SBA 7","text":"45 year old lady presented with anuria for 48 hours. She had past hx of painful hematuria 1 year ago what is the best investigation to find the etiology","options":[{"label":"A","text":"SE","rationale":"False — serum electrolytes give supportive information but don't identify the underlying anatomical cause."},{"label":"B","text":"S.Cr","rationale":"False — serum creatinine confirms renal impairment but doesn't identify the cause."},{"label":"C","text":"XRAY KUB","rationale":"False — a plain KUB X-ray can miss non-radiopaque stones and is less sensitive than ultrasound for detecting obstruction."},{"label":"D","text":"US abdomen","rationale":"True — with anuria and a history suggestive of recurrent stone disease, ultrasound abdomen is the appropriate first-line, non-invasive investigation to look for obstruction/hydronephrosis."},{"label":"E","text":"IVU","rationale":"False — IVU has largely been superseded by ultrasound as the first-line imaging investigation."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."}]},{"date":"2015 November","questions":[{"num":"9","text":"A 35-year-old male presents with haematuria of 1-day duration. He has had a similarepisode 1 1/2 years back. He is on treatment for diabetes mellitus. On examination there is no edema. Blood pressure is elevated. UFR-RBC 200, pus cells 3-4, protein nil. No RBC casts and dysmorphic red cells. Serum creatinine and bood urea normal. Which of the following can be a cause?","options":[{"label":"A","text":"Post streptococcal glomerulonephritis.","rationale":"False — PSGN typically presents as a single event following an infection, not classically recurrent episodes over years."},{"label":"B","text":"UTI","rationale":"Possible differential — recurrent UTI could cause recurrent haematuria, though the absence of dysuria/other urinary symptoms makes this less classic than a glomerular cause."},{"label":"C","text":"Renal cell carcinoma","rationale":"Possible differential — renal cell carcinoma is worth considering given age, but tends to cause persistent/progressive rather than episodic recurrent haematuria."},{"label":"D","text":"IgA nephropathy","rationale":"True — recurrent episodes of macroscopic haematuria over an extended period is the classic presentation pattern of IgA nephropathy."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"10","text":"Metabolic acidosis is seen in,","options":[{"label":"A","text":"Severe vomiting","rationale":"False — severe vomiting causes metabolic ALKALOSIS (from loss of gastric acid), not acidosis."},{"label":"B","text":"Severe diarrhea.","rationale":"True — severe diarrhoea causes loss of bicarbonate-rich fluid, leading to metabolic acidosis."},{"label":"C","text":"Ketosis","rationale":"True — ketosis (e.g. diabetic ketoacidosis) is a classic cause of metabolic acidosis."},{"label":"D","text":"Diuretic abuse","rationale":"False — most diuretics (loop/thiazide) cause metabolic ALKALOSIS from volume contraction/chloride loss, not acidosis."},{"label":"E","text":"Treatment with acetazolamide","rationale":"True — acetazolamide (a carbonic anhydrase inhibitor) causes bicarbonate wasting, leading to metabolic acidosis."}],"reviewed_answer":["B","C","E"],"explanation":"Correct answer(s): B, C, E — see the reasoning under each option below."},{"num":"31","text":"What is the best management option for hepatorenal syndrome?","options":[{"label":"A","text":"Reduce diuretic therapy","rationale":"False — reducing diuretics is a supportive step but not the definitive treatment for established HRS."},{"label":"B","text":"IV fluid resuscitation with normal saline","rationale":"False — plain fluid resuscitation doesn't address the underlying splanchnic vasodilation driving HRS."},{"label":"C","text":"IV terlipressin","rationale":"True — IV terlipressin (a splanchnic vasoconstrictor, usually combined with albumin) is the standard treatment for hepatorenal syndrome."},{"label":"D","text":"Repeated large volume paracentesis","rationale":"False — repeated large volume paracentesis doesn't treat HRS and can worsen renal perfusion if not accompanied by albumin replacement."},{"label":"E","text":"IV ceftriaxone","rationale":"False — antibiotics would only be relevant if infection/SBP were the trigger, not the definitive HRS treatment."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2015 May","questions":[{"num":"10","text":"Causes for metabolic acidosis include","options":[{"label":"A","text":"Severe vomiting","rationale":"False — severe vomiting causes metabolic alkalosis, not acidosis."},{"label":"B","text":"Severe diarrhoea","rationale":"True — severe diarrhoea causes bicarbonate loss, leading to metabolic acidosis."},{"label":"C","text":"Frusemide therapy","rationale":"False — frusemide (loop diuretic) causes metabolic alkalosis, not acidosis."},{"label":"D","text":"Antacid abuse","rationale":"False — antacid abuse (especially calcium/magnesium-based, causing milk-alkali-type effects) more classically causes alkalosis, not acidosis."},{"label":"E","text":"Acetazolamide","rationale":"True — acetazolamide causes bicarbonate wasting, leading to metabolic acidosis."}],"reviewed_answer":["B","E"],"explanation":"Correct answer(s): B, E — see the reasoning under each option below."},{"num":"21","text":"A 50 year old lady with DM patient is admitted with GTC seizure following severe vomiting & fever for 1 day duration. On examination she is moderately dehydrated, PR – 110bpm, BP – 100/70mmHg. No focal neurological signs. His Ix results as follows. RBS - 300mg/dl WBC - 6* 103 PLT - 220 Hb - 11g/dl Na+ - 100mmol/l K+ - 4.2mmol/l CRP - 6 UFR - 5-10 pus cells, 2-3 RBC, albumin trace BU - 8 She was treated with 3% saline. Following day she was found drowsy, qudriperesis & restricted eye movements. What is the most likely cause for her presentation?","options":[{"label":"A","text":"BrainstemEncephalitis","rationale":"False — brainstem encephalitis doesn't specifically fit this history of severe hyponatraemia treated with hypertonic saline followed by delayed neurological deterioration."},{"label":"B","text":"Basilar meningitis","rationale":"False — basilar meningitis doesn't fit this specific temporal pattern tied to sodium correction."},{"label":"C","text":"Central pontine myelinolysis","rationale":"True — severe hyponatraemia (Na 100) treated with hypertonic (3%) saline, followed the next day by drowsiness, quadriparesis and restricted eye movements, is the classic picture of central pontine myelinolysis (osmotic demyelination) from overly rapid sodium correction."},{"label":"D","text":"Wernicke,s encephalopathy","rationale":"False — Wernicke's encephalopathy doesn't fit this specific temporal relationship with sodium correction, and there's no alcohol history given."},{"label":"E","text":"Multiple scelrosis","rationale":"False — multiple sclerosis doesn't present acutely in this temporal pattern tied to sodium correction."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"33","text":"65 year old farmer presented with fatigue, anorexia, SOB. His BP is 220/110mmHg & has gross oedema. What is the best indicator to detect this patient is having CKD?","options":[{"label":"A","text":"S.Creatinine 400mg/l","rationale":"False — a single creatinine value alone doesn't distinguish acute from chronic disease."},{"label":"B","text":"Hb – 9mg/dl","rationale":"False — anaemia (Hb 9) is suggestive of CKD but less definitive/specific than a structural finding."},{"label":"C","text":"Granular casts with crescent formation","rationale":"False — granular casts with crescents suggest an active glomerulonephritis process but don't specifically indicate chronicity."},{"label":"D","text":"B/L contracted kidneys","rationale":"True — bilateral contracted kidneys on imaging is the best, most specific structural indicator of chronic kidney disease."},{"label":"E","text":"Renal artery stenosis in duplex scan","rationale":"False — renal artery stenosis on duplex indicates a specific cause but doesn't itself confirm chronicity of the underlying kidney disease."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"34","text":"36 year old female presented with B/L ankle oedema. Her BP is 130/80mmHg. Her Ix results are as follows. S.Cr - Normal UFR - protein 3+ Red cell/hyaline/granular casts 24 hr urinary protein - 3.4g What is the most likely histological type in renal biopsy?","options":[{"label":"A","text":"Minimal change GN","rationale":"False — minimal change disease typically shows a bland urine sediment (no significant casts), unlike the active sediment (RBC/hyaline/granular casts) described here."},{"label":"B","text":"Post streptococcal GN","rationale":"False — post-streptococcal GN typically presents acutely with a nephritic (not predominantly nephrotic-range proteinuria) picture, and typically shows some renal impairment/hypertension, less fitting this normotensive, normal-creatinine presentation."},{"label":"C","text":"Membranoproliferative GN","rationale":"True — nephrotic-range proteinuria (3.4g/24h) combined with an active urinary sediment (red cell/granular casts) reflects a mixed nephrotic-nephritic picture, classically seen with membranoproliferative glomerulonephritis."},{"label":"D","text":"Chronic interstitial nephritis","rationale":"False — chronic interstitial nephritis doesn't typically cause this degree of proteinuria or this cast pattern."},{"label":"E","text":"Diffuse mesangioproliferative with crescent formation","rationale":"False — diffuse mesangioproliferative GN with crescents would typically show more significant renal impairment/hypertension than described here."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"35","text":"45 year old female with poorly controlled DM presented with fever with chills for 2 days. There was no loin to groin pain, dysuria or haematuria. Most likely diagnosis","options":[{"label":"A","text":"Renal TB","rationale":"False — renal TB has a more subacute/chronic course, not this acute 2-day fever presentation."},{"label":"B","text":"LUTI","rationale":"True — diabetic patients are prone to UTIs which can present atypically/without classic localising symptoms (dysuria, loin pain); fever with chills over 2 days without these features can still represent a lower urinary tract infection in this at-risk population."},{"label":"C","text":"Renal calculi","rationale":"False — renal calculi would more typically cause loin-to-groin pain, which is specifically absent here."},{"label":"D","text":"Papillary necrosis","rationale":"False — papillary necrosis would more typically present with pain and/or haematuria, both absent here."},{"label":"E","text":"Renal cell CA","rationale":"False — renal cell carcinoma doesn't typically present acutely with fever/chills alone over just 2 days."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2014 November","questions":[{"num":"9","text":"Which of the following helps in diagnosis of CKD over AKI?","options":[{"label":"A","text":"Raised serum S.cr","rationale":"False — raised serum creatinine is nonspecific and occurs in both AKI and CKD."},{"label":"B","text":"Small kidneys","r
