ale with a previous history of TB, presented with with progressive enlargement of the abdomen. He has ascites, B/L LL oedema, ictures, wasting & elevated JVP. He is comfortable on lying down. Apex is situated at the 5th intercostal space. What is the most likely diagnosis?","options":[{"label":"A","text":"CCF"},{"label":"B","text":"Decompensated cirrhosis"},{"label":"C","text":"Constrictive pericarditis"},{"label":"D","text":"TB peritonitis"},{"label":"E","text":"CKD"}]}]},{"date":"2014 November","questions":[{"num":"18","text":"Regarding gastric acid secretion,","options":[{"label":"A","text":"G cells regulate acid secretion"},{"label":"B","text":"Parietal cells of gastric mucosa secrete HCL"},{"label":"C","text":"Somatostatin increases the acid secretion"},{"label":"D","text":"Histamine increases acid secretion"},{"label":"E","text":"Stimulated by vagus.N"}]},{"num":"31","text":"28 year old male presented with watery diarrhea for 6 weeks duration with loss of weightLOA, abdominal pain and low grade fever, O/E there was a right iliac fossa mass. What is the most suitable diagnosis,","options":[{"label":"A","text":"Coeliac disease"},{"label":"B","text":"Giardiasis"},{"label":"C","text":"Intestinal TB"},{"label":"D","text":"Irritable bowel syndrome."},{"label":"E","text":"Ulcerative colitis"}]}]},{"date":"2014 May","questions":[{"num":"13","text":"Neurological features appear in","options":[{"label":"A","text":"Clostridium botulinum"},{"label":"B","text":"Clostridium defficilae"},{"label":"C","text":"Bordetella burgdoferri"},{"label":"D","text":"Vibrio cholera"},{"label":"E","text":"Measles"}]},{"num":"15","text":"True false regarding nail changes","options":[{"label":"A","text":"Pitting nail – atopic eczema"},{"label":"B","text":"Yellow nail – lymphatic obstruction"},{"label":"C","text":"Thyrotoxicosis – onycholysis"},{"label":"D","text":"TB - clubbing"},{"label":"E","text":"Thick nails – Fungal infection"}]},{"num":"30","text":"40 yr old female is having foul smelly bulky stool for 6 months duration. She has significant weight loss. FBC, ESR normal. What is the most appropriate investigation to diagnose her condition,","options":[{"label":"A","text":"Barium enema"},{"label":"B","text":"Colonoscopy & biopsy"},{"label":"C","text":"Sigmoidoscopy & biopsy"},{"label":"D","text":"Colonoscopy & bx"},{"label":"E","text":"USS abdomen"}]}]},{"date":"2013 Eastern","questions":[{"num":"TOF 24","text":"Weight gain caused by","options":[{"label":"A","text":"COCP"},{"label":"B","text":"Depo provera"},{"label":"C","text":"Olanzapine"},{"label":"D","text":"Gliglazide"},{"label":"E","text":"Pitozifen"}]}]},{"date":"2012 November","questions":[{"num":"11","text":"Regarding body fluid volume control,","options":[{"label":"A","text":"Controlled by Sodium in the body"}]}]}],"count":36}]</script>
<script>
const DATA = JSON.parse(document.getElementById('mcq-data').textContent);

// ---------- State ----------
const STORAGE_KEY = 'mfsu-mcq-review-state-v1';
let state = { reviewed:{}, flagged:{}, marked:{}, revealed:{} };
try{
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  state = Object.assign(state, saved);
}catch(e){}

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

function qKey(topicIdx, sIdx, qIdx){ return topicIdx+'-'+sIdx+'-'+qIdx; }

let currentTopic = 0;
let currentFilter = 'all';
let currentSession = '';
let searchTerm = '';

// ---------- Sidebar ----------
const topicListEl = document.getElementById('topic-list');

function topicProgress(tIdx){
  const t = DATA[tIdx];
  let total=0, reviewed=0;
  t.sections.forEach((s,sIdx)=>{
    s.questions.forEach((q,qIdx)=>{
      total++;
      if(state.reviewed[qKey(tIdx,sIdx,qIdx)]) reviewed++;
    });
  });
  return {total, reviewed};
}

function topicHasAnswerKey(tIdx){
  return DATA[tIdx].sections.some(s=>s.questions.some(q=>q.reviewed_answer !== undefined));
}

function renderTopicList(){
  topicListEl.innerHTML = '';
  DATA.forEach((t, idx)=>{
    const btn = document.createElement('button');
    btn.className = 'topic-btn' + (idx===currentTopic ? ' active':'');
    const prog = topicProgress(idx);
    const reviewedBadge = topicHasAnswerKey(idx) ? '<span class="reviewed-badge">✓ keyed</span>' : '';
    btn.innerHTML = `
      <div style="flex:1; min-width:0;">
        <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${t.topic}${reviewedBadge}</div>
        <div class="topic-progress"><div class="topic-progress-fill" style="width:${prog.total? (prog.reviewed/prog.total*100):0}%"></div></div>
      </div>
      <span class="topic-count">${t.count}</span>
    `;
    btn.addEventListener('click', ()=>{
      currentTopic = idx;
      currentSession = '';
      searchTerm = '';
      document.getElementById('search').value = '';
      renderAll();
      window.scrollTo(0,0);
      document.getElementById('sidebar').classList.remove('open');
    });
    topicListEl.appendChild(btn);
  });
}

// ---------- Topbar ----------
function renderTopbar(){
  const t = DATA[currentTopic];
  document.getElementById('topic-title').textContent = t.topic;
  document.getElementById('topic-meta').textContent = `${t.count} questions · ${t.sections.length} exam sessions`;

  const sel = document.getElementById('session-filter');
  sel.innerHTML = '<option value="">All sessions</option>' +
    t.sections.map(s=>`<option value="${s.date}">${s.date}</option>`).join('');
  sel.value = currentSession;

  document.querySelectorAll('#controls .pill-btn[data-filter]').forEach(b=>{
    b.classList.toggle('active', b.dataset.filter === currentFilter);
  });

  let total=0, reviewed=0, flagged=0;
  t.sections.forEach((s,sIdx)=>{
    s.questions.forEach((q,qIdx)=>{
      total++;
      const k = qKey(currentTopic,sIdx,qIdx);
      if(state.reviewed[k]) reviewed++;
      if(state.flagged[k]) flagged++;
    });
  });
  document.getElementById('stat-reviewed').textContent = `${reviewed}/${total}`;
  document.getElementById('stat-flagged').textContent = flagged;
}

function renderFooter(){
  let totalAll=0, reviewedAll=0;
  DATA.forEach((t,tIdx)=>{
    t.sections.forEach((s,sIdx)=>{
      s.questions.forEach((q,qIdx)=>{
        totalAll++;
        if(state.reviewed[qKey(tIdx,sIdx,qIdx)]) reviewedAll++;
      });
    });
  });
  document.getElementById('footer-total').textContent = `${totalAll} questions`;
  document.getElementById('footer-reviewed').textContent = `${reviewedAll} reviewed`;
}

// ---------- Questions ----------
function highlight(text, term){
  if(!term) return escapeHtml(text);
  const esc = escapeHtml(text);
  const escTerm = escapeHtml(term).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return esc.replace(new RegExp('('+escTerm+')','ig'), '<mark>$1</mark>');
}
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function questionMatchesSearch(q, term){
  if(!term) return true;
  const t = term.toLowerCase();
  if(q.text.toLowerCase().includes(t)) return true;
  return q.options.some(o=>o.text.toLowerCase().includes(t));
}

function renderQuestions(){
  const container = document.getElementById('question-scroll');
  container.innerHTML = '';
  const t = DATA[currentTopic];
  let anyRendered = false;

  t.sections.forEach((s, sIdx)=>{
    if(currentSession && s.date !== currentSession) return;

    const cardsHtml = [];
    s.questions.forEach((q, qIdx)=>{
      const k = qKey(currentTopic, sIdx, qIdx);
      const isReviewed = !!state.reviewed[k];
      const isFlagged = !!state.flagged[k];

      if(currentFilter === 'flagged' && !isFlagged) return;
      if(currentFilter === 'reviewed' && !isReviewed) return;
      if(currentFilter === 'unreviewed' && isReviewed) return;
      if(!questionMatchesSearch(q, searchTerm)) return;

      anyRendered = true;
      const hasKey = Array.isArray(q.reviewed_answer) && q.reviewed_answer.length > 0;
      const isRevealed = !!state.revealed[k];
      const correctSet = hasKey ? new Set(q.reviewed_answer) : null;

      const optsHtml = q.options.map((o,oIdx)=>{
        const mk = state.marked[k] === oIdx;
        const isCorrectOpt = hasKey && correctSet.has(o.label);
        let cls = 'opt';
        if(mk) cls += ' marked';
        if(isRevealed && hasKey){
          if(isCorrectOpt) cls += ' correct-reveal';
          else if(mk) cls += ' incorrect-reveal';
        }
        const showRationale = isRevealed && hasKey && o.rationale;
        const rationaleHtml = showRationale ? `<div class="opt-rationale">${escapeHtml(o.rationale)}</div>` : '';
        return `<div class="${cls}" data-k="${k}" data-oidx="${oIdx}">
          <span class="opt-label">${o.label}</span>
          <div class="opt-body">
            <span>${highlight(o.text, searchTerm)}</span>
            ${rationaleHtml}
          </div>
        </div>`;
      }).join('');

      let answerToggleHtml = '';
      let answerPanelHtml = '';
      if(hasKey){
        answerToggleHtml = `<div class="answer-toggle-row"><button class="answer-toggle${isRevealed?' open':''}" data-k="${k}">${isRevealed?'Hide answer':'Show answer'}</button></div>`;
        answerPanelHtml = `<div class="answer-panel${isRevealed?' show':''}" data-panel="${k}">
          <div class="ans-label">Correct answer</div>
          <div class="ans-value">${q.reviewed_answer.join(', ')}</div>
          <div>${escapeHtml(q.explanation || '')}</div>
        </div>`;
      } else if(q.explanation){
        // placeholder / truncated-question note, no options to grade
        answerToggleHtml = `<div class="answer-toggle-row"><button class="answer-toggle${isRevealed?' open':''}" data-k="${k}">${isRevealed?'Hide note':'Show note'}</button></div>`;
        answerPanelHtml = `<div class="answer-panel${isRevealed?' show':''}" data-panel="${k}">
          <div class="ans-label">Note</div>
          <div>${escapeHtml(q.explanation)}</div>
        </div>`;
      }

      cardsHtml.push(`
        <div class="qcard${isFlagged?' flagged':''}${isReviewed?' reviewed':''}" data-k="${k}">
          <div class="qhead">
            <span class="qnum">Q${q.num}</span>
            <div class="qtext">${highlight(q.text, searchTerm)}</div>
            <div class="qactions">
              <button class="icon-btn review-btn${isReviewed?' review-on':''}" data-k="${k}" title="Mark reviewed">✓</button>
              <button class="icon-btn flag-btn${isFlagged?' flag-on':''}" data-k="${k}" title="Flag for revision">🚩</button>
            </div>
          </div>
          <div class="options">${optsHtml}</div>
          ${answerToggleHtml}
          ${answerPanelHtml}
        </div>
      `);
    });

    if(cardsHtml.length){
      const heading = document.createElement('div');
      heading.className = 'section-heading';
      heading.textContent = s.date;
      container.appendChild(heading);
      const wrap = document.createElement('div');
      wrap.innerHTML = cardsHtml.join('');
      container.appendChild(wrap);
    }
  });

  if(!anyRendered){
    container.innerHTML = '<div class="empty-state">No questions match the current filters.</div>';
  }

  container.querySelectorAll('.review-btn').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      const k = b.dataset.k;
      state.reviewed[k] = !state.reviewed[k];
      saveState();
      renderAll(true);
    });
  });
  container.querySelectorAll('.flag-btn').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      const k = b.dataset.k;
      state.flagged[k] = !state.flagged[k];
      saveState();
      renderAll(true);
    });
  });
  container.querySelectorAll('.answer-toggle').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      const k = b.dataset.k;
      state.revealed[k] = !state.revealed[k];
      saveState();
      renderQuestions();
    });
  });
  container.querySelectorAll('.opt').forEach(o=>{
    o.addEventListener('click', ()=>{
      const k = o.dataset.k;
      const oIdx = parseInt(o.dataset.oidx,10);
      state.marked[k] = (state.marked[k] === oIdx) ? undefined : oIdx;
      saveState();
      renderQuestions();
    });
  });
}

function renderAll(keepScroll){
  const scrollPos = keepScroll ? window.scrollY : 0;
  renderTopicList();
  renderTopbar();
  renderQuestions();
  renderFooter();
  if(keepScroll) window.scrollTo(0, scrollPos);
}

// ---------- Controls ----------
document.getElementById('session-filter').addEventListener('change', (e)=>{
  currentSession = e.target.value;
  renderTopbar();
  renderQuestions();
});
document.querySelectorAll('#controls .pill-btn[data-filter]').forEach(b=>{
  b.addEventListener('click', ()=>{
    currentFilter = b.dataset.filter;
    renderTopbar();
    renderQuestions();
  });
});

let searchDebounce;
document.getElementById('search').addEventListener('input', (e)=>{
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(()=>{
    searchTerm = e.target.value.trim();
    if(searchTerm){
      // search across all topics: find first topic with a match, switch if current has none
      const hasMatch = DATA[currentTopic].sections.some(s=>s.questions.some(q=>questionMatchesSearch(q, searchTerm)));
      if(!hasMatch){
        for(let i=0;i<DATA.length;i++){
          if(DATA[i].sections.some(s=>s.questions.some(q=>questionMatchesSearch(q, searchTerm)))){
            currentTopic = i;
            break;
          }
        }
      }
    }
    renderAll();
  }, 200);
});

document.getElementById('menu-btn').addEventListener('click', ()=>{
  document.getElementById('sidebar').classList.toggle('open');
});

window.addEventListener('scroll', ()=>{
  document.getElementById('jump-top').classList.toggle('show', window.scrollY > 500);
});
document.getElementById('jump-top').addEventListener('click', ()=>{
  window.scrollTo({top:0, behavior:'smooth'});
});

renderAll();
</script>
