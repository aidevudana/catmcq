"False — a drowsy patient post-status epilepticus needs airway protection and close monitoring, not NIV, and reduced consciousness is typically a contraindication to NIV."},{"label":"C","text":"Unconscious adult with a GCS of 4/15","rationale":"False — an unconscious patient (GCS 4/15) cannot protect their airway or cooperate with NIV — this is a contraindication, requiring invasive ventilation instead."},{"label":"D","text":"Used in severe left ventricular failure with pulmonary oedema","rationale":"True — NIV (CPAP) is standard treatment in severe cardiogenic pulmonary oedema/acute LVF."},{"label":"E","text":"Acute exacerbation of COPD leading to respiratory failure","rationale":"True — NIV (BiPAP) is a classic, evidence-based treatment for acute exacerbations of COPD with type 2 respiratory failure."}],"reviewed_answer":["D","E"],"explanation":"Correct answer(s): D, E — see the reasoning under each option below."},{"num":"18","text":"A 56-year-old man presented with acute onset shortness of breath. On examination there are end inspiratory B/L basal crepts. Which of the following is/are indicated in the acute management?","options":[{"label":"A","text":"Morphine","rationale":"True — morphine is used in acute pulmonary oedema for symptomatic relief and mild vasodilation (used cautiously)."},{"label":"B","text":"GTN infusion","rationale":"True — GTN infusion (vasodilator, reduces preload) is standard acute treatment for pulmonary oedema."},{"label":"C","text":"Salbutamol nebulization","rationale":"False — salbutamol nebulisation is for bronchospasm/wheeze, not indicated here since there's no mention of wheeze — this is a cardiac (pulmonary oedema), not bronchospastic, picture."},{"label":"D","text":"Spironolactone","rationale":"False — spironolactone is a chronic HF therapy, not an acute treatment."},{"label":"E","text":"Bisoprolol","rationale":"False — starting a beta-blocker acutely during decompensation is inappropriate; it's introduced once the patient is stabilised."}],"reviewed_answer":["A","B"],"explanation":"Correct answer(s): A, B — see the reasoning under each option below."},{"num":"28","text":"A 55 old male presented with 6-month duration of a progressive early morning cough, along with white scanty sputum production. There is no history of asthma, DM nor HT. He has been a chronic smoker for 20 years, but has quit smoking 5 years ago.He consumes 3 units of alcohol per week. His blood investigations revealed - Hb 19,WBC- 6000, ALT 68, CRP-30 and all other blood investigations were normal.On examination PR-78 bpm, BP-160/80, RR-14/min and temperature was 37 Celcius. The chest Xray was also normal and the ECG - showed RBBB. Lung function test results are as follows ; FVC - low, FEV1- low, FEV1/FVC – normal . What is the most probable diagnosis?","options":[{"label":"A","text":"Recurrent pulmonary embolism","rationale":"False — recurrent PE doesn't classically cause this progressive restrictive pattern with elevated Hb (secondary polycythaemia from chronic hypoxia)."},{"label":"B","text":"Asthma","rationale":"False — asthma would show an obstructive (not restrictive) pattern."},{"label":"C","text":"Idiopathic Pulmonary Fibrosis","rationale":"True — progressive restrictive lung function (low FVC, low FEV1, normal ratio) with secondary polycythaemia (Hb 19, from chronic hypoxia) and a chronic dry cough fits idiopathic pulmonary fibrosis."},{"label":"D","text":"Congestive cardiac failure","rationale":"False — CCF would more likely show other cardiac signs, and the restrictive pattern here fits a primary lung process better."},{"label":"E","text":"COPD","rationale":"False — COPD classically shows an obstructive (reduced ratio), not restrictive, pattern."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"29","text":"A 55-year male who was an ex smoker, came with, SOB, haemoptysis, LOW and LOA. Examination revealed stony dullness on the right lung and his chest X ray showed right sided hilar mass and right sided pleural effusion. Best investigation to confirm the diagnosis?","options":[{"label":"A","text":"Fiberoptic bronchoscopy","rationale":"True — fiberoptic bronchoscopy allows direct visualisation and biopsy of a hilar mass, providing tissue diagnosis."},{"label":"B","text":"PET scan","rationale":"False — PET scanning helps with staging, not initial tissue diagnosis."},{"label":"C","text":"CT scan","rationale":"False — CT scan characterises the mass/effusion but doesn't provide histological confirmation."},{"label":"D","text":"Sputum for acid fast bacilli","rationale":"False — sputum AFB looks for TB, which isn't the leading diagnosis given the hilar mass and weight loss picture."},{"label":"E","text":"Adenosine deaminase assay of aspirated pleural fluid","rationale":"False — pleural fluid ADA supports a TB diagnosis, not the malignancy suggested here."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2020 June","questions":[{"num":"15","text":"Causes for type 2 respiratory failure,","options":[{"label":"A","text":"GBS","rationale":"True — GBS causes neuromuscular respiratory failure (hypoventilation), a type 2 pattern."},{"label":"B","text":"Myasthenia gravis","rationale":"True — myasthenia gravis similarly causes neuromuscular hypoventilation."},{"label":"C","text":"COPD","rationale":"True — COPD is a classic cause of type 2 (hypercapnic) respiratory failure."},{"label":"D","text":"Pulmonary embolism","rationale":"False — PE typically causes type 1 (hypoxaemic) respiratory failure via V/Q mismatch, not classically type 2, unless massive/end-stage."},{"label":"E","text":"Kyphoscoliosis","rationale":"True — kyphoscoliosis causes a restrictive chest wall defect leading to hypoventilation (type 2 failure)."}],"reviewed_answer":["A","B","C","E"],"explanation":"Correct answer(s): A, B, C, E — see the reasoning under each option below."},{"num":"18","text":"In chest X ray, findings are predominantly seen at the lung apex in following,","options":[{"label":"A","text":"Aspiration pneumonia","rationale":"False — aspiration pneumonia typically affects dependent (lower/posterior) lung zones, not the apex."},{"label":"B","text":"Milliary TB","rationale":"False — miliary TB shows a diffuse, not specifically apical, pattern."},{"label":"C","text":"Idiopathic pulmonary fibrosis","rationale":"False — idiopathic pulmonary fibrosis predominantly affects the lower zones/bases."},{"label":"D","text":"Bronchiectasis","rationale":"False — bronchiectasis is more commonly a lower-zone disease (except in cystic fibrosis, which favours upper zones)."},{"label":"E","text":"Ankylosing fibrosis","rationale":"True — ankylosing spondylitis is classically associated with apical pulmonary fibrosis."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"24","text":"45 years old man who was diagnosed to have community acquired pneumonia was unable to respond 5 days treatment of co-amoxiclave 1.2g tds. What is the next management step?","options":[{"label":"A","text":"Change to co-amoxiclave to merapenam","rationale":"False — escalating to meropenem is a large step up and not the standard first response to non-improvement at day 5."},{"label":"B","text":"Take CT chest to exclude abscess","rationale":"False — CT chest to exclude an abscess/complication is reasonable but broadening antibiotic cover for atypical organisms is typically tried first."},{"label":"C","text":"Add clarithromycin","rationale":"True — adding a macrolide (clarithromycin) covers atypical organisms (e.g. Mycoplasma, Legionella), a common reason for non-response to a beta-lactam alone."},{"label":"D","text":"Sputum for cytology","rationale":"False — sputum cytology looks for malignancy, not the immediate next step for a non-resolving infection."},{"label":"E","text":"Arrange a Monteux test","rationale":"False — a Mantoux test evaluates for TB exposure, not the most immediate next step for presumed bacterial CAP not responding to treatment."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"27","text":"38 years old female presented with cough, fever & chest pain. On examination there were left lower lobe consolidation. Other findings were normal. What is the best management?","options":[{"label":"A","text":"IV clarithromycin","rationale":"False — IV clarithromycin alone omits cover for typical organisms (e.g. Streptococcus pneumoniae)."},{"label":"B","text":"Oral co-amoxiclav","rationale":"False — co-amoxiclav alone omits atypical cover."},{"label":"C","text":"Oral amoxicillin + clarithromycin","rationale":"True — oral amoxicillin plus clarithromycin covers both typical and atypical CAP organisms, appropriate for this presentation."},{"label":"D","text":"","rationale":"(Option text missing/illegible in the original source PDF.)"},{"label":"E","text":"","rationale":"(Option text missing/illegible in the original source PDF.)"}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"31","text":"A 56 old woman presented with fever for 6 days. It was low grade fever and has had headache and myalgia. She also had dry cough. On examination, she was mildly icteric and had bilateral mild crepitation. Chest X ray revealed B/L diffuse opacity of the lower lobes of the lungs. What could be the possible causative oraganism?","options":[{"label":"A","text":"Scrub typhus","rationale":"False — scrub typhus doesn't classically cause bilateral diffuse lower lobe opacity with jaundice in this exact combination as strongly as leptospirosis."},{"label":"B","text":"Legionella pneumonia","rationale":"False — Legionella is possible but the mild jaundice (icterus) points more specifically towards leptospirosis."},{"label":"C","text":"Leptospirosis","rationale":"True — fever, headache, myalgia, mild icterus, and bilateral lower lobe opacities together fit leptospirosis (Weil's disease-type presentation with pulmonary involvement)."},{"label":"D","text":"Mycoplasma pneumonia","rationale":"False — mycoplasma doesn't typically cause icterus."},{"label":"E","text":"H1N1 Influenza","rationale":"False — H1N1 influenza doesn't classically cause icterus as a leading feature."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2019 November","questions":[{"num":"8","text":"Regarding pneumonia,","options":[{"label":"A","text":"streptococcus is the commenst organism for HAP","rationale":"False — Streptococcus pneumoniae (not generic 'streptococcus') is the classic CAP organism; Gram-negative organisms/Staph aureus/Pseudomonas are more typical causes of hospital-acquired pneumonia (HAP)."},{"label":"B","text":"Absence of neutropenic leukocytosis more favourable mycoplasma pneumonia","rationale":"True — a less pronounced neutrophilic leukocytosis is more in keeping with atypical organisms like Mycoplasma, compared to the marked neutrophilia typical of bacterial pneumonia."},{"label":"C","text":"","rationale":"(Option text is blank/illegible in the original source PDF.)"},{"label":"D","text":"xray features settle before the improvement of clinical features","rationale":"False — clinical improvement typically PRECEDES radiological resolution; X-ray changes lag behind (settle after) clinical improvement, not before it."},{"label":"E","text":"can change antibiotics after fever settles","rationale":"False — antibiotic courses should be completed for the appropriate duration rather than simply changed/stopped once fever settles."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"9","text":"Prolonged inhaled corticosteroids use cause,","options":[{"label":"A","text":"Hoarseness of voice","rationale":"True — hoarseness (dysphonia) is a recognised local side effect of inhaled steroids."},{"label":"B","text":"IUGR","rationale":"False — IUGR is not a recognised association with standard-dose inhaled corticosteroid use."},{"label":"C","text":"Oropharyngeal candidiasis","rationale":"True — oropharyngeal candidiasis is a classic local side effect of inhaled steroids."},{"label":"D","text":"Diabetes mellitus","rationale":"False — diabetes mellitus is a systemic corticosteroid effect at high (usually oral) doses, not typically from standard inhaled dosing."},{"label":"E","text":"Sleep disturbances","rationale":"False — sleep disturbance is not a classic recognised inhaled corticosteroid side effect."}],"reviewed_answer":["A","C"],"explanation":"Correct answer(s): A, C — see the reasoning under each option below."},{"num":"12","text":"Regarding tuberculosis","options":[{"label":"A","text":"BCG given at birth protects majority of adults","rationale":"False — BCG at birth mainly protects against severe childhood TB (miliary/meningeal disease); it is not reliably protective against pulmonary TB in the majority of adults."},{"label":"B","text":"………","rationale":"(Option text is blank/illegible in the original source PDF.)"},{"label":"C","text":"Organisms isolation by sputum culture is essential for the diagnosis","rationale":"False — diagnosis doesn't require waiting for sputum culture; clinical, radiological and smear/molecular findings can establish a diagnosis, with culture used for confirmation/sensitivity."},{"label":"D","text":"TB spine have to be treated up to 9 months","rationale":"True — TB spine (bone/joint TB) is typically treated for a longer duration (up to ~9 months), compared to the standard 6 months for pulmonary TB."},{"label":"E","text":"TB is a notifiable disease in Sri Lanka","rationale":"True — TB is a notifiable disease in Sri Lanka."}],"reviewed_answer":["D","E"],"explanation":"Correct answer(s): D, E — see the reasoning under each option below."},{"num":"24","text":"35-year-old man presented with shortness of breath and productive cough for 4 days duration, who is on long acting bronchodilator and high dose inhaled corticosteroid for few months without improvement. He has smoked 5 cigarettes per day for 25 years and stopped recently after medical advices. ESR CRP normal. WBC high (N – 58%, L – 38 % and E – 12%). Haemoglobin is normal. HRCT show dilated right main bronchus and another bronchiole. What is the most probable diagnosis?","options":[{"label":"A","text":"Asthma","rationale":"False — asthma shows reversible airway obstruction, not the fixed dilated bronchus seen on HRCT here."},{"label":"B","text":"Pulmonary TB","rationale":"False — nothing points specifically to TB here (normal ESR/CRP, no typical TB pattern)."},{"label":"C","text":"COPD","rationale":"False — COPD doesn't typically show localised bronchial dilatation on HRCT."},{"label":"D","text":"Allergic broncho-pulmonary aspergillosis","rationale":"False — ABPA classically shows central bronchiectasis with eosinophilia and characteristic allergic features, which isn't emphasised here (though eosinophil count of 12% could suggest this — still, HRCT-confirmed dilated bronchus points more directly to bronchiectasis itself as the diagnosis)."},{"label":"E","text":"Bronchiectasis","rationale":"True — dilated right main bronchus and a bronchiole on HRCT, with poor response to bronchodilators/ICS, fits a diagnosis of bronchiectasis."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"50","text":"A 30 year old male admitted to the hospital with fever and dry cough for one week. He also complained of headache, myalgia and chest discomfort on breathing. There is no haemoptysis. On examination he is febrile, respiratory rate is 24/min and on auscultation there are wide spread crepitations. He was previously well with no comorbidities. On initial investigations, WBC 8.7, Neutrophils 55%, lymphocytes 35%, Na+ 130 (low) K+ 4.5, CRP 56 (high), ALT 70 (high). Chest X-ray revealed bilateral interstitial opacities. UFR - 6-8 RBC/hpf. What is the most likely organism causing this presentation?","options":[{"label":"A","text":"Pseudomonas aeruginosa","rationale":"False — Pseudomonas doesn't classically cause this systemic picture (hyponatraemia, deranged LFTs) in a previously well patient."},{"label":"B","text":"Haemophilus influenzae","rationale":"False — H. influenzae doesn't classically cause hyponatraemia/deranged LFTs."},{"label":"C","text":"Legionella pneumophila","rationale":"True — fever, headache, myalgia, dry cough with hyponatraemia and deranged LFTs is a classic picture for Legionella pneumonia."},{"label":"D","text":"Mycoplasma pneumoniae","rationale":"False — Mycoplasma can cause some atypical features but hyponatraemia and LFT derangement are more classically emphasised with Legionella."},{"label":"E","text":"Pneumocystis jeroveci","rationale":"False — Pneumocystis is an opportunistic infection in immunocompromised patients, not fitting a previously well patient with this systemic picture."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2019 March","questions":[{"num":"5","text":"Regarding bronchial asthma,","options":[{"label":"A","text":"Air way inflammation is mainly neutrophilic","rationale":"False — asthma airway inflammation is predominantly eosinophilic, not neutrophilic (neutrophilic inflammation is more typical of COPD)."},{"label":"B","text":"Has diurnal variation","rationale":"True — diurnal variation (morning dipping) in peak flow is a classic asthma feature."},{"label":"C","text":"PaCO2 is usually elevated in exacerbation","rationale":"False — PaCO2 is typically LOW in an asthma exacerbation (from hyperventilation); a normal or rising PaCO2 is an ominous sign of impending respiratory failure, not the 'usual' finding."},{"label":"D","text":"Salmeterol is added in step two","rationale":"False — a long-acting beta-agonist (salmeterol) is typically added at step 3 of the stepwise approach, not step 2."},{"label":"E","text":"SABA has more bronchodilator effect than antimuscarinics","rationale":"True — short-acting beta-agonists generally provide greater bronchodilation than antimuscarinics in asthma."}],"reviewed_answer":["B","E"],"explanation":"Correct answer(s): B, E — see the reasoning under each option below."},{"num":"6","text":"T/F regarding legionella pneumonia","options":[{"label":"A","text":"diarrhea is a feature","rationale":"True — diarrhoea (GI symptoms) is a recognised feature of Legionella pneumonia."},{"label":"B","text":"Lymphocytosis 3","rationale":"False — Legionella typically causes lymphopenia, not lymphocytosis."},{"label":"C","text":"treated with IV ceftriaxone","rationale":"False — Legionella is treated with macrolides or fluoroquinolones (it's an intracellular organism not covered by beta-lactams like ceftriaxone)."},{"label":"D","text":"hypernatremia is a feature","rationale":"False — Legionella causes HYPOnatraemia, not hypernatraemia."},{"label":"E","text":"Can be detected by urine","rationale":"True — a urinary antigen test is a standard, widely-used diagnostic test for Legionella."}],"reviewed_answer":["A","E"],"explanation":"Correct answer(s): A, E — see the reasoning under each option below."},{"num":"28","text":"55 year old man presented with progressive breathlessness and intermittent cough. O/E- clubbing, central cyanosis, B/L fine crepitation present. Diagnosis?","options":[{"label":"A","text":"allergic aspergillosis","rationale":"False — allergic bronchopulmonary aspergillosis doesn't classically present with central cyanosis/clubbing in this pattern; it's more associated with asthma and eosinophilia."},{"label":"B","text":"chronic bronchitis","rationale":"False — chronic bronchitis wouldn't classically cause clubbing."},{"label":"C","text":"bronchiectasis","rationale":"False — bronchiectasis is possible but the combination of progressive breathlessness, clubbing, central cyanosis and fine (not coarse) crepitations is more classic for IPF."},{"label":"D","text":"Extrinsic allergic alveolitis","rationale":"False — extrinsic allergic alveolitis (hypersensitivity pneumonitis) is possible but less classically presents with clubbing."},{"label":"E","text":"idiopathic pulmonary fibrosis.","rationale":"True — progressive breathlessness, clubbing, central cyanosis and bilateral fine crepitations is the classic picture of idiopathic pulmonary fibrosis."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"29","text":"45 y old male presented with high fever, myalgia and productive cough for 2 days... On ex he is ill , febrile , coarse crepitaion hear on right side of upper lung. Hb - 13.5 Wbc - 20000 N - 85% plt- 380 CRP - 280 CXR - lung cavitation seen on right side upper and middle zone with surrounding consolida tions What is the causative organism?","options":[{"label":"A","text":"legionella pneumonia","rationale":"False — Legionella doesn't classically cause cavitating pneumonia with this marked neutrophilia."},{"label":"B","text":"Mycoplasma pneumonia","rationale":"False — Mycoplasma doesn't cause cavitation."},{"label":"C","text":"Staphylococcus aureus","rationale":"True — high fever, marked neutrophilia, very high CRP, and cavitating consolidation in the upper/middle zones is classic for Staphylococcus aureus pneumonia."},{"label":"D","text":"pneumocystis jiroveci","rationale":"False — Pneumocystis doesn't cause cavitating consolidation with marked neutrophilia in an immunocompetent-appearing patient."},{"label":"E","text":"Streptococcus pneumonia","rationale":"False — while Streptococcus pneumoniae is the most common CAP organism, it less classically causes cavitation compared with Staph aureus."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2018 November","questions":[{"num":"5","text":"Non metastatic features of small cell type bronchial carcinoma","options":[{"label":"A","text":"Cerebellar ataxia","rationale":"True — cerebellar ataxia is a recognised paraneoplastic feature of small cell lung cancer."},{"label":"B","text":"Polyneuropathy","rationale":"True — paraneoplastic polyneuropathy is recognised with small cell lung cancer."},{"label":"C","text":"Clubbing","rationale":"False — clubbing is more classically associated with non-small cell (especially squamous) lung cancer, not small cell."},{"label":"D","text":"Horner syndrome","rationale":"False — Horner's syndrome results from local invasion (Pancoast tumour), typically non-small cell, rather than being a paraneoplastic ('non-metastatic') feature of small cell cancer."},{"label":"E","text":"Proximal muscle weakness","rationale":"True — Lambert-Eaton myasthenic syndrome (causing proximal muscle weakness) is a classic small cell lung cancer paraneoplastic feature."}],"reviewed_answer":["A","B","E"],"explanation":"Correct answer(s): A, B, E — see the reasoning under each option below."},{"num":"27","text":"29 years old woman who is a known patient with Bronchial asthma, presented to the practise. She was using her reliever inhaler frequently during night time. She is currently on Beclametasone 800 microgram inhaler twice a day and still getting frequent wheezing episodes and persistent cough. What is the best management option to this patient?","options":[{"label":"A","text":"Add Long acting Beta-2-Agonist.","rationale":"True — with persistent nocturnal symptoms despite high-dose ICS, adding a long-acting beta-2-agonist is the standard next step."},{"label":"B","text":"Add leukotrine receptor antogonist.","rationale":"False — a leukotriene receptor antagonist is a reasonable alternative but LABA is the standard first add-on at this stage."},{"label":"C","text":"Start Oral corticosteroid therapy.","rationale":"False — starting oral corticosteroids is a bigger step reserved for more severe/uncontrolled disease, not the next standard step here."},{"label":"D","text":"Increase the inhaled corticosteroid dose.","rationale":"False — increasing the ICS dose further is less preferred than adding a LABA at this stage per standard stepwise management."},{"label":"E","text":"Add Monteleucast.","rationale":"False — montelukast (same class as option B) is an alternative, not the standard first choice over LABA."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"29","text":"A patient presented with high grade fever and productive cough for 1 week duration. On examination, he is ill looking tachycardic and tachypnoiec. On chest examination, there is reduced breath sounds, reduced vocal resonance and stony dull percussion note upto the right middle zone. What is the most likely reason for this presentation,","options":[{"label":"A","text":"Connective tissue disease","rationale":"False — connective tissue disease doesn't explain this acute febrile presentation as well as an infective process."},{"label":"B","text":"Empyema","rationale":"True — high fever with marked toxicity, reduced breath sounds/vocal resonance and stony dullness up to the mid zone suggests a complicated (infected) pleural collection — empyema."},{"label":"C","text":"Tuberculosis","rationale":"False — TB would usually have a more subacute course, not this acute high-grade fever with marked toxicity."},{"label":"D","text":"Pulmonary Fibrosis","rationale":"False — pulmonary fibrosis doesn't cause stony dullness or acute high fever."},{"label":"E","text":"Uncomplicated parapneumotic effusion","rationale":"False — an uncomplicated parapneumonic effusion is less likely given the degree of toxicity and stony dullness suggesting a larger/complicated collection."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"43","text":"35 man presented with fever, non purulent cough and difficulty of breathing for 10 days duration. On examination, Sp02 - 88% on Air, Respiratory rate 35/min, Pulse rate - 1 18bpm, Blood pressure - 90/60 mmHg. He is dyspnoeic at rest. Chest X ray shows Bilateral hilar white opacities. What is the most likely diagnosis?","options":[{"label":"A","text":"Pneumocystis pneumonia","rationale":"True — significant hypoxia (SpO2 88%) disproportionate to a relatively non-toxic clinical picture, with bilateral hilar/perihilar opacities and a non-productive cough over days, is classic for Pneumocystis pneumonia."},{"label":"B","text":"Mycoplasma pneumonia","rationale":"False — Mycoplasma doesn't typically cause this degree of hypoxia so acutely."},{"label":"C","text":"Legionella pneumonia","rationale":"False — Legionella typically causes a more toxic picture with additional systemic features (GI symptoms, deranged LFTs/electrolytes) rather than this pattern alone."},{"label":"D","text":"Klebsiella pneumonia","rationale":"False — Klebsiella classically causes cavitating consolidation, not this bilateral hilar opacity pattern."},{"label":"E","text":"Staphylococcal pneumonia","rationale":"False — Staphylococcal pneumonia similarly causes a more focal/cavitating picture, not this bilateral hilar pattern."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2017 May","questions":[{"num":"13","text":"T/F regarding bronchiectasis","options":[{"label":"A","text":"Childhood measles is a recognized cause","rationale":"True — childhood measles is a recognised post-infective cause of bronchiectasis."},{"label":"B","text":"Often no cause is found","rationale":"True — in a significant proportion of cases, no specific cause is identified (idiopathic bronchiectasis)."},{"label":"C","text":"A normal chest radiograph at presentation excludes the diagnosis","rationale":"False — a normal chest radiograph does NOT exclude bronchiectasis; HRCT is needed for reliable diagnosis."},{"label":"D","text":"Long term prophylactic antibiotics are indicated to prevent infections","rationale":"True — long-term prophylactic antibiotics are used in patients with frequent exacerbations."},{"label":"E","text":"Is associated with AA amyloidosis","rationale":"True — chronic suppurative bronchiectasis is a recognised cause of secondary (AA) amyloidosis."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."},{"num":"18","text":"A 50 year old man presented with haemoptysis. His chest radiograph shows an apical opacity. A diagnosis of bronchial carcinoma rather than pulmonary tuberculosis is suggested by the presence of","options":[{"label":"A","text":"Superior vena cava obstruction","rationale":"True — SVC obstruction suggests mediastinal involvement from malignancy."},{"label":"B","text":"Loss of weight","rationale":"False — weight loss is nonspecific and occurs in both TB and malignancy."},{"label":"C","text":"Clubbing","rationale":"False — clubbing can occur with both TB-related bronchiectasis and malignancy, making it less discriminating."},{"label":"D","text":"Hypercalcaemia","rationale":"True — hypercalcaemia (e.g. from PTHrP in squamous cell carcinoma) is a paraneoplastic feature pointing towards malignancy."},{"label":"E","text":"Hyponatraemia","rationale":"True — hyponatraemia (paraneoplastic SIADH, especially with small cell carcinoma) points towards malignancy."}],"reviewed_answer":["A","D","E"],"explanation":"Correct answer(s): A, D, E — see the reasoning under each option below."},{"num":"22","text":"A 55 year old woman is being elevated for effort dyspnea Her spirometry and arterial blood gas results are as follows. FEV1………….... 2.0 liters FVC …………….. 2.2 liters (predicted 4 litres) PaO2……………… 80 mmHg PaCO2……………. 24 mmHg SaO2………………. The condition that fit these findings best is","options":[{"label":"A","text":"Obesity hypoventilation syndrome","rationale":"False — obesity hypoventilation syndrome doesn't typically show this restrictive spirometric pattern with such a low PaCO2."},{"label":"B","text":"Chronic obstructive airway disease","rationale":"False — COPD shows an obstructive (not restrictive) pattern."},{"label":"C","text":"Neuromuscular weakness","rationale":"False — neuromuscular weakness can cause a restrictive pattern but doesn't classically explain this specific combination as well as ILD."},{"label":"D","text":"Interstitial lung disease","rationale":"True — a restrictive spirometric pattern (FEV1 and FVC both reduced proportionally) with hypoxaemia and a low PaCO2 (from hyperventilation) fits interstitial lung disease."},{"label":"E","text":"Psychogenic hyperventilation","rationale":"False — psychogenic hyperventilation wouldn't explain the restrictive spirometry findings."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"41","text":"A 56 year old man bronchial asthma who is taking inhaled steroids with beclomethasone dippronate 400μg twice daily presets with nocturnal cough and wheezing. His respiratory rate is 20 cycles per minute and peak flow is 60% predicted. What is the most appropriate next step to manage this patient?","options":[{"label":"A","text":"Oral prednisolone","rationale":"False — oral prednisolone is a bigger step reserved for more severe exacerbations, not the standard next step here."},{"label":"B","text":"Oral heophylline","rationale":"False — oral theophylline is an older, less preferred option with more side effects."},{"label":"C","text":"Oral montelukast","rationale":"False — oral montelukast is an alternative add-on but LABA is the more standard next step at this point."},{"label":"D","text":"Inhaled salmeterol","rationale":"True — with nocturnal symptoms and reduced peak flow (60% predicted) despite moderate-dose ICS, adding an inhaled long-acting beta-agonist (salmeterol) is the appropriate next step."},{"label":"E","text":"Inhaled ipratropium","rationale":"False — inhaled ipratropium (an antimuscarinic) is not the standard next step in asthma management at this stage."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"48","text":"A 45 year old man is admitted to the hospital with high fever, myalgia and productive cough for 2 days. On Ex, he was ill with high fever and coarse crepitations over the right upper zone lx, Hb-13.5g/dl WBC-20x109/L (N-85%, L-12%, M-3%) Plt count- 358x109/L (<6) CRP- 360mg/L(<6) Chest radiograph shows cavitative lesions in the right upper and middle zones with surrounding consolidations. What is the most likely causative organism of this condition?","options":[{"label":"A","text":"Sterptococcus pneumonia","rationale":"False — Streptococcus pneumoniae doesn't classically cause cavitation."},{"label":"B","text":"Staphylococcus aurius","rationale":"True — high fever, marked neutrophilia, very high CRP, and cavitating consolidation in the upper/middle zones is classic for Staphylococcus aureus pneumonia."},{"label":"C","text":"Legionella pneumophilla","rationale":"False — Legionella doesn't classically cause cavitation."},{"label":"D","text":"Mycobacterium tuberculosis","rationale":"False — TB typically has a more subacute/chronic course, not this acute 2-day presentation."},{"label":"E","text":"Pneumocystis jiroveci (pneumocysitis carinii)","rationale":"False — Pneumocystis doesn't cause cavitating consolidation with marked neutrophilia."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2016 May","questions":[{"num":"04","text":"Features of life threatning asthma","options":[{"label":"A","text":"spo2 of 93%","rationale":"False — SpO2 93% is just above the more concerning threshold (<92%) used to define life-threatening asthma; it doesn't itself meet the life-threatening criterion."},{"label":"B","text":"increased pa co2","rationale":"True — a normal or rising PaCO2 during an asthma attack is an ominous, classic marker of life-threatening asthma (patients should be hyperventilating and hypocapnic if less severe)."},{"label":"C","text":"3>predicted PEFR < 60%","rationale":"True — a PEFR less than 33% predicted is a recognised marker of life-threatening asthma."},{"label":"D","text":"pH of 7.6","rationale":"False — a pH of 7.6 (alkalosis) reflects hyperventilation, more in keeping with a milder/earlier stage rather than life-threatening deterioration (which trends towards acidosis as CO2 rises)."},{"label":"E","text":"pao282.5mmhg/11kpa","rationale":"True — significant hypoxaemia (low PaO2) is a recognised marker of life-threatening asthma."}],"reviewed_answer":["B","C","E"],"explanation":"Correct answer(s): B, C, E — see the reasoning under each option below."},{"num":"09","text":"Mycoplasma pneumonia","options":[{"label":"A","text":"Sputum culture helpful in diagnosis","rationale":"False — Mycoplasma is difficult to culture; diagnosis relies more on serology/PCR, not routine sputum culture."},{"label":"B","text":"Lung cavities are seen","rationale":"False — Mycoplasma does not typically cause lung cavitation."},{"label":"C","text":"Ceftriaxone is the drug of choice","rationale":"False — Mycoplasma lacks a cell wall, so beta-lactams like ceftriaxone are ineffective; macrolides/tetracyclines are the drugs of choice."},{"label":"D","text":"Causes haemolytic anaemia","rationale":"True — Mycoplasma is classically associated with cold-agglutinin-mediated haemolytic anaemia."},{"label":"E","text":"Nephrotic syndrome is a recognized complication.","rationale":"False — nephrotic syndrome is not a recognised complication of Mycoplasma infection."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"SBA 4","text":"28 yrs old man presented with fvr and cough for 3 days..on examination alert and rational RR- 12 ...Ix - FBC - nl , urea less than 7...best management option","options":[{"label":"A","text":"manage in out patient basic","rationale":"True — a well, alert patient with normal respiratory rate, normal FBC and low urea (CURB-65 score of 0) can be safely managed as an outpatient."},{"label":"B","text":"admit to icu","rationale":"False — ICU admission is excessive for this low-severity presentation."},{"label":"C","text":"Manage inward with oral antibiotics.","rationale":"False — inpatient management isn't needed given the low severity score."},{"label":"D","text":"Manage inward with IV antibiotics.","rationale":"False — IV antibiotics/inpatient care aren't needed for this low-severity presentation."},{"label":"E","text":"manage in icu with ventilatory support","rationale":"False — ICU with ventilatory support is grossly excessive for this presentation."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2015 November","questions":[{"num":"5","text":"Which is/are correct","options":[{"label":"A","text":"Tidal percussion is positive in a pneumothorax.","rationale":"False — 'tidal percussion' relates to detecting shifting dullness in pleural effusion, not pneumothorax; this is an incorrect pairing."},{"label":"B","text":"Vocal resonance is reduced in a pleural effusion.","rationale":"True — vocal resonance is reduced in pleural effusion, as fluid dampens sound transmission."},{"label":"C","text":"Cracked pot sign is seen in large lung cavities.","rationale":"True — the 'cracked pot' sign (a cracked-pot resonance on percussion) is classically described over large lung cavities."},{"label":"D","text":"Coin sign is seen in a pneumothorax.","rationale":"False — 'coin sign' isn't a standard clinical percussion/auscultation sign for pneumothorax; 'coin lesion' refers to a radiological round opacity, an unrelated concept."},{"label":"E","text":"High pitched bronchial breathing is heard over a consolidation.","rationale":"True — high-pitched bronchial breathing is a classic auscultation finding over an area of consolidation."}],"reviewed_answer":["B","C","E"],"explanation":"Correct answer(s): B, C, E — see the reasoning under each option below."},{"num":"6","text":"Exudative pleural effusions are seen in","options":[{"label":"A","text":"Hypothyroidism","rationale":"False — hypothyroidism-related effusions are typically transudative."},{"label":"B","text":"Meig syndrome","rationale":"False — Meig's syndrome classically causes a transudative pleural effusion (with ascites and an ovarian fibroma), not exudative."},{"label":"C","text":"Nephrotic syndrome","rationale":"False — nephrotic syndrome causes a transudative effusion (from hypoalbuminaemia)."},{"label":"D","text":"Pancreatitis","rationale":"True — pancreatitis-associated pleural effusion is exudative (often left-sided, with high amylase)."},{"label":"E","text":"Pulmonary infarction.","rationale":"True — pulmonary infarction (from PE) causes an exudative, often haemorrhagic, effusion."}],"reviewed_answer":["D","E"],"explanation":"Correct answer(s): D, E — see the reasoning under each option below."},{"num":"27","text":"A chronic smoker developed cough and progressive SOB over 10 years. He presented with exacerbation of symptoms for 1 week with productive cough. Physician ordered O2 via a face mask. What is the O2 percentage, which you would give via the face mask?","options":[{"label":"A","text":"35%","rationale":"True — for a COPD patient at risk of CO2 retention, controlled lower-concentration oxygen (in this context, the lowest option given, 35%) is the safer starting choice to avoid suppressing hypoxic respiratory drive."},{"label":"B","text":"45%","rationale":"False — 45% risks more CO2 retention than the lower, safer option."},{"label":"C","text":"60%","rationale":"False — 60% carries a greater risk of precipitating hypercapnic respiratory failure in a CO2 retainer."},{"label":"D","text":"80%","rationale":"False — 80% is inappropriately high oxygen for a COPD patient at risk of CO2 retention."},{"label":"E","text":"100%","rationale":"False — 100% oxygen is inappropriate and risky in a chronic CO2 retainer."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"28","text":"A 23 year old man presented with mild fever for 2 weeks. CXR shows a right sided pleural effusion. Full blood count was done. WBC -8000/mm3 Neutrophils-60% Lymphocytes-40% Pleural fluid aspiration shows predominant lymphocytosis. What is the most likely diagnosis?","options":[{"label":"A","text":"TB","rationale":"True — a lymphocyte-predominant pleural effusion in a young, otherwise well patient with mild fever is classic for TB pleural effusion."},{"label":"B","text":"Connective tissue disease","rationale":"False — connective tissue disease is possible but TB is the more classic cause of a lymphocytic exudate in this demographic/context."},{"label":"C","text":"Lymphoma","rationale":"False — lymphoma is possible but less likely as the first diagnosis to consider in a young patient with this presentation."},{"label":"D","text":"Empyema","rationale":"False — empyema would show a neutrophil-predominant, grossly purulent fluid, not lymphocytic predominance."},{"label":"E","text":"Parapneumonic effusion","rationale":"False — parapneumonic effusion is typically neutrophil-predominant (acute infective process), not lymphocytic."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"47","text":"A 20 year old girl presented with acute exacerbation of bronchial asthma. Oxygen was given and was nebulized with salbutamol. But no improvement. Next step in management?","options":[{"label":"A","text":"Repeat salbutamol","rationale":"False — simply repeating salbutamol alone, without escalating therapy, is inadequate once initial nebulisation has failed to improve the patient."},{"label":"B","text":"CXR","rationale":"False — a CXR doesn't address the ongoing bronchospasm and isn't the priority next therapeutic step."},{"label":"C","text":"CPAP","rationale":"False — CPAP isn't the standard next step for bronchospasm-driven acute severe asthma."},{"label":"D","text":"IV aminophylline","rationale":"False — IV aminophylline is an option but IV magnesium sulfate is the standard evidence-based next step per BTS guidelines when nebulised bronchodilators fail."},{"label":"E","text":"IV MgSO4","rationale":"True — IV magnesium sulfate is the recommended next step in acute severe/life-threatening asthma not responding to initial nebulised bronchodilator therapy."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."}]},{"date":"2015 May","questions":[{"num":"05","text":"Causative agents of community acquired pneumonia","options":[{"label":"A","text":"Leigonella haemophilia","rationale":"True — Legionella (option text shows a typo) is a recognised CAP pathogen."},{"label":"B","text":"Streptococcus pneumonia","rationale":"True — Streptococcus pneumoniae is the most common CAP organism."},{"label":"C","text":"Haemophilus influenza","rationale":"True — Haemophilus influenzae is a recognised CAP pathogen, especially in COPD patients."},{"label":"D","text":"Pseudomonas aureginosa","rationale":"False — Pseudomonas aeruginosa is more a hospital-acquired/bronchiectasis-associated pathogen, not a classic CAP cause."},{"label":"E","text":"Pneumocystis jinueaii","rationale":"False — Pneumocystis jirovecii is an opportunistic pathogen in immunocompromised patients, not a typical CAP cause."}],"reviewed_answer":["A","B","C"],"explanation":"Correct answer(s): A, B, C — see the reasoning under each option below."},{"num":"27","text":"30 year old male are investigated for SOB. His FEV1 & FVC are normal with FVV1/FVC of 88%. What is the most likely diagnosis?","options":[{"label":"A","text":"Asthma","rationale":"False — asthma would show an obstructive pattern (reduced FEV1/FVC ratio), not normal spirometry as described."},{"label":"B","text":"COPD","rationale":"False — COPD similarly would show an obstructive pattern."},{"label":"C","text":"Fibrosing alveolitis","rationale":"False — fibrosing alveolitis would show a restrictive pattern (reduced FVC), not normal values."},{"label":"D","text":"Thyroid compressing trachea","rationale":"True — with normal FEV1 and FVC values, an extrathoracic large-airway obstruction (like a compressing thyroid mass) can present with dyspnoea while standard spirometric ratios remain relatively preserved (typically identified instead by flow-volume loop flattening)."},{"label":"E","text":"Obstruction of the left main bronchi","rationale":"False — obstruction of a main bronchus would generally show more clearly abnormal, asymmetric spirometry/imaging findings, less consistent with 'normal' FEV1 and FVC as described."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"29","text":"68 year old man presented with 3 month history of haemoptysis & cough. He has LOA,LOW. O/E, trachea deviated to L/S, bronchial breathing & lower zone crepitations. What is the most likely diagnosis?","options":[{"label":"A","text":"Acute collapse of L/upper lobe","rationale":"Possible — tracheal deviation towards the affected side can occur with lobar collapse, though bronchial breathing/crepitations are more typical of consolidation than pure collapse."},{"label":"B","text":"Consolidation of L/upper lobe","rationale":"Possible — bronchial breathing and crepitations are classic consolidation findings; if there's associated volume loss from bronchial obstruction (e.g. by a tumour), this could also explain the tracheal shift — this is the better fit for the auscultation findings described, though the vignette (chronic course, weight loss) leaves genuine ambiguity between collapse and consolidation."},{"label":"C","text":"Emphysematous bulla in R/S","rationale":"False — an emphysematous bulla wouldn't cause bronchial breathing/crepitations or explain the tracheal shift as described."},{"label":"D","text":"Fibrosis of L/lung","rationale":"False — fibrosis would cause tracheal deviation towards the affected side but doesn't typically produce bronchial breathing."},{"label":"E","text":"R/S pneumothorax","rationale":"False — a pneumothorax would cause reduced (not bronchial) breath sounds and tracheal deviation AWAY from (not towards) the affected side."}],"reviewed_answer":["B"],"explanation":"Genuinely ambiguous vignette: bronchial breathing and crepitations point more towards consolidation (with possible volume loss from an obstructing lesion) than pure collapse, but the tracheal-shift description leaves real uncertainty — worth cross-checking against your lecture notes."}]},{"date":"2014 November","questions":[{"num":"6","text":"Which of the following conditions characteristically cause exudative suppurative pleural effusions?","options":[{"label":"A","text":"Congestive cardiac failure","rationale":"False — CCF causes a transudative effusion."},{"label":"B","text":"Rheumatoid arthritis","rationale":"True — rheumatoid arthritis-associated effusions are exudative and can occasionally appear turbid/suppurative."},{"label":"C","text":"Mesothelioma","rationale":"True — mesothelioma causes an exudative (often haemorrhagic) effusion."},{"label":"D","text":"Pulmonary infarction","rationale":"True — pulmonary infarction causes an exudative (often haemorrhagic) effusion."},{"label":"E","text":"Dengue hemorrhagic fever","rationale":"Uncertain/borderline — dengue-associated effusions occur mainly via plasma leakage (more transudative-like physiology), so labelling this specifically 'exudative suppurative' is debatable."}],"reviewed_answer":["B","C","D"],"explanation":"Correct answer(s): B, C, D — see the reasoning under each option below."},{"num":"27","text":"68-year-old man presented with 3-month history of hemoptysis and cough. He has LOW and LOA O/E trachea deviated to L/S, L/upper zone - bronchial breathing and lower zone crepitations. What is the most likely diagnosis?","options":[{"label":"A","text":"Acute collapse of left upper lobe","rationale":"Possible — tracheal deviation towards the affected side can occur with lobar collapse, though bronchial breathing/crepitations are more typical of consolidation."},{"label":"B","text":"Consolidation of left upper lobe","rationale":"Possible — this is the better fit for bronchial breathing/crepitations, though genuine ambiguity remains given the chronic course with weight loss suggesting an obstructing lesion causing both collapse and distal changes."},{"label":"C","text":"Emphysematous bulla in R/S","rationale":"False — an emphysematous bulla wouldn't explain these auscultation findings or the tracheal shift."},{"label":"D","text":"Fibrosis of L/lung","rationale":"False — fibrosis doesn't typically produce bronchial breathing."},{"label":"E","text":"R/S pneumothorax","rationale":"False — pneumothorax causes reduced breath sounds and shift away from (not towards) the affected side."}],"reviewed_answer":["B"],"explanation":"Same ambiguity as the earlier repeated version of this question — consolidation (option B) is the better fit for the auscultation findings, but this call isn't fully certain given the vignette."},{"num":"28","text":"25-year-old female presented with 3 day history of high fever and R/s pleuritic type chest pain. She has produced rusty sputum. FBC- Hb. PLT - NL WBC- 19,000 (N-85%). ESR-100 What is the most likely diagnosis?","options":[{"label":"A","text":"Tuberculosis","rationale":"False — TB has a more subacute course, not this 3-day acute high fever presentation."},{"label":"B","text":"Streptococcus pneumonia","rationale":"True — 'rusty' sputum with high fever and marked neutrophilia is the classic teaching picture of Streptococcus pneumoniae pneumonia."},{"label":"C","text":"Klebsiella pneumonia","rationale":"False — Klebsiella classically causes 'redcurrant jelly' sputum and cavitation, a different classic description."},{"label":"D","text":"Aspergillosis","rationale":"False — aspergillosis doesn't cause this acute high-fever presentation with rusty sputum."},{"label":"E","text":"Staphylococcal pneumonia","rationale":"False — staphylococcal pneumonia doesn't classically cause rusty sputum (more associated with post-viral/cavitating pneumonia)."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"29","text":"68 year old male presented with past history of TB (completed Treatment with bronchiectasis, this time presented with fever and cough. Temp - 38.3 C. SpO2 - 88%.what is the best empirical antibiotic for this man?","options":[{"label":"A","text":"Benzyl penicillin","rationale":"False — benzylpenicillin doesn't cover the likely Gram-negative organisms (e.g. Pseudomonas) implicated in bronchiectasis exacerbations."},{"label":"B","text":"Oseltamivir","rationale":"False — oseltamivir treats influenza, not a bacterial bronchiectasis exacerbation."},{"label":"C","text":"Clarithromycin","rationale":"False — clarithromycin doesn't provide adequate cover for Pseudomonas, a common bronchiectasis pathogen."},{"label":"D","text":"Tetracycline","rationale":"False — tetracycline similarly doesn't provide reliable anti-pseudomonal cover."},{"label":"E","text":"Ceftazidime","rationale":"True — ceftazidime (an anti-pseudomonal cephalosporin) is an appropriate empirical choice for a bronchiectasis exacerbation with significant hypoxia, given the recognised risk of Pseudomonas and other resistant organisms in bronchiectasis."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."}]},{"date":"2014 May","questions":[{"num":"3","text":"40 yr old patient presented with fevel & cough for 5 days. WOF will suggest the diagnose of atypical pneumonia.","options":[{"label":"A","text":"Neutrophil leukocytosis","rationale":"False — marked neutrophilic leukocytosis is more typical of bacterial (not atypical) pneumonia."},{"label":"B","text":"Positive cold agglutination test","rationale":"True — a positive cold agglutination test supports a diagnosis of Mycoplasma (atypical) pneumonia."},{"label":"C","text":"Haematuric granular casts","rationale":"False — haematuric granular casts are unrelated to atypical pneumonia (more a renal finding)."},{"label":"D","text":"Hyponatremia","rationale":"True — hyponatraemia is a classic feature of atypical pneumonias (e.g. Legionella, Mycoplasma), often via SIADH."},{"label":"E","text":"Pleural effusion","rationale":"False — pleural effusion is nonspecific and can occur with typical bacterial pneumonias too."}],"reviewed_answer":["B","D"],"explanation":"Correct answer(s): B, D — see the reasoning under each option below."},{"num":"5","text":"T/F regarding COPD","options":[{"label":"A","text":"Can be due to atopy","rationale":"False — COPD is not related to atopy; that association belongs to asthma."},{"label":"B","text":"Is due to smoking","rationale":"True — smoking is the principal cause of COPD."},{"label":"C","text":"Poorly respond to bronchodilators","rationale":"True — COPD shows relatively poor/limited response to bronchodilators compared with asthma."},{"label":"D","text":"Neutrophil leukocytosis in bronchial washing is a feature.","rationale":"True — neutrophilic inflammation in bronchial washings is characteristic of COPD (versus eosinophilic in asthma)."},{"label":"E","text":"Steroids can be given","rationale":"True — steroids (inhaled, and sometimes oral for exacerbations) are used in COPD management."}],"reviewed_answer":["B","C","D","E"],"explanation":"Correct answer(s): B, C, D, E — see the reasoning under each option below."},{"num":"12","text":"Extra pulmonary manifestation of tuberculosis include,","options":[{"label":"A","text":"Ascitis","rationale":"True — TB peritonitis can cause ascites."},{"label":"B","text":"Sixth cranial nerve palsy","rationale":"True — TB meningitis can cause cranial nerve palsies, including CN VI, from raised ICP or basal exudates."},{"label":"C","text":"Erythema multiform","rationale":"False — TB is classically associated with erythema NODOSUM, not erythema multiforme."},{"label":"D","text":"Wedge fracture of the spine","rationale":"True — spinal (Pott's disease) TB classically causes vertebral wedge fractures/collapse."},{"label":"E","text":"Hyponatraemia","rationale":"True — TB meningitis can cause SIADH, leading to hyponatraemia."}],"reviewed_answer":["A","B","D","E"],"explanation":"Correct answer(s): A, B, D, E — see the reasoning under each option below."},{"num":"24","text":"A 59 year old lady, diagnosed with congestive heart failure, presented with severe SOB for 1 week. She has good controlled heart failure with normal ejection fraction. CXR shows bilateral lung fibrosis. Which of the following drug is best responsible for her lung fibrosis?","options":[{"label":"A","text":"Amiadarone","rationale":"True — amiodarone is a well-recognised cause of drug-induced pulmonary fibrosis, and is commonly used in heart failure/arrhythmia patients."},{"label":"B","text":"Atenolol","rationale":"False — atenolol is not associated with pulmonary fibrosis."},{"label":"C","text":"Atovastatin","rationale":"False — atorvastatin (a statin) is not classically associated with pulmonary fibrosis."},{"label":"D","text":"Dyoxine","rationale":"False — digoxin is not associated with pulmonary fibrosis."},{"label":"E","text":"Spironolactone","rationale":"False — spironolactone is not associated with pulmonary fibrosis."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"27","text":"A 23 years university student has SOB for 1 week, fever and chest discomfort for 2 weeks. On examination left side lower lobe dullness and breath sound significantly reduced. ESR 100 mm/hr, WBC normal. Most probable diagnosis?","options":[{"label":"A","text":"Lung collapse","rationale":"False — lung collapse doesn't explain the elevated ESR with this subacute febrile course as well as an infective/inflammatory effusion."},{"label":"B","text":"Mesothelioma","rationale":"False — mesothelioma is rare in a young patient without an asbestos exposure history."},{"label":"C","text":"Parapneumonic effusion","rationale":"False — a parapneumonic effusion typically follows a more acute pneumonic illness with a raised WBC, which isn't seen here (normal WBC)."},{"label":"D","text":"Pulmonary embolism","rationale":"False — PE doesn't classically cause this subacute febrile presentation with such a markedly raised ESR."},{"label":"E","text":"TB effusion","rationale":"True — a young patient with a subacute febrile illness, unilateral dullness/reduced breath sounds, markedly raised ESR but normal WBC is the classic picture of TB pleural effusion."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"28","text":"80 year old male patient presented with fever and cough for 3 days duration. His RR 32/min and he is cyanosed. Has coarse crepitation over right lower and mid zones. Most appropriate Mx?","options":[{"label":"A","text":"IV cefotaxime 1g BD","rationale":"False — cefotaxime alone omits atypical cover needed in a severe CAP presentation."},{"label":"B","text":"IV cefuroxime 1g TDS + clarythromicin 500g BD","rationale":"False — cefuroxime+clarithromycin is reasonable but among the options, the co-amoxiclav+erythromycin combination is the more classic pairing taught for severe CAP requiring both typical and atypical cover."},{"label":"C","text":"IV cefuroxime 1g TDS","rationale":"False — cefuroxime alone omits atypical cover."},{"label":"D","text":"IV co-amoxyclav 1.2g TDS","rationale":"False — co-amoxiclav alone omits atypical cover, which is important in a severe, hypoxic, cyanosed CAP presentation."},{"label":"E","text":"IV co-amoxyclav 1.2g TDS + oral erythromycin 500mg BD","rationale":"True — combining co-amoxiclav (typical cover) with a macrolide (atypical cover) is appropriate for this severe CAP presentation."}],"reviewed_answer":["E"],"explanation":"Correct answer(s): E — see the reasoning under each option below."},{"num":"29","text":"A 32 year male with sudden onset dyspnoea and chest tightness, has BP 70/50 mmHg, PR 120 bpm. On examination right side hyper resonant and reduced air entry. WOF is the first step in Mx?","options":[{"label":"A","text":"Incubate and ventilate","rationale":"False — intubation and ventilation doesn't address the underlying tension physiology directly and delays the immediate life-saving step."},{"label":"B","text":"Insert wide bore cannula on right chest","rationale":"True — sudden dyspnoea, hypotension, tachycardia, hyperresonance and reduced air entry indicate tension pneumothorax; immediate needle decompression (wide-bore cannula) is the first step, before imaging."},{"label":"C","text":"Stat dopamine infusion","rationale":"False — dopamine doesn't address the underlying mechanical problem causing the shock."},{"label":"D","text":"Give O2","rationale":"False — oxygen is supportive but doesn't address the life-threatening tension physiology."},{"label":"E","text":"CXR","rationale":"False — a CXR would delay life-saving treatment in this haemodynamically unstable, clinically-diagnosed emergency."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2013 November","questions":[{"num":"SBA 8","text":"A 26 year old male presented with dry cough and difficuity in breathing for 1 week duration. ESR-40. Fever + WBC 9000 Chest Xraybilateral infiltrates. What is the most likely diagnosiş? (department)","options":[{"label":"A","text":"Mycoplasma pneumonia","rationale":"True — a 1-week history of dry cough and breathlessness with fever, a raised ESR but only mild WBC elevation, and bilateral infiltrates fits an atypical (Mycoplasma) pneumonia picture better than an acute bacterial process."},{"label":"B","text":"Strep. Pneumonie pneumonia","rationale":"False — Streptococcus pneumoniae typically causes a more acute, toxic, often lobar picture, less in keeping with this subacute atypical presentation."},{"label":"C","text":"TB \"*","rationale":"False — TB usually has a more chronic (weeks-to-months) course rather than this acute 1-week presentation."},{"label":"D","text":"ldiopathic fibrosing alveolitis","rationale":"False — idiopathic fibrosing alveolitis (IPF) has a chronic progressive course; it doesn't present acutely with fever over 1 week."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"SBA 9","text":"32 yr old pt with 4 days cough and fever 4 days prior to illness visited a friend in hospital he has minimal lung signs chest X ray B/L patchy shadows, most likely etiological agent? (department)","options":[{"label":"A","text":"Pneumococcus","rationale":"False — Mycoplasma doesn't specifically fit the water-source exposure context implied by the hospital visit."},{"label":"B","text":"Pseudomonas","rationale":"False — Pseudomonas is more a hospital-acquired/structural lung disease pathogen, not typically linked to a brief visit exposure."},{"label":"C","text":"Staphaureus","rationale":"False — Staph aureus doesn't fit this exposure context or presentation as well."},{"label":"D","text":"Legionella","rationale":"True — Legionella is classically linked to exposure to contaminated water sources (e.g. hospital water systems), fitting the recent hospital visit history."},{"label":"E","text":"Mycoplasma","rationale":"False — Mycoplasma doesn't have this specific water-source exposure link."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"10","text":"70 year old male, known pt with asthma presents with SOB, bilateral rhonchi, crepts. He had undergone a CABG3 years back and an echo 1 month back. EF 35% (department) Ix of choice to differentiate asthma from acute LVF","options":[{"label":"A","text":"BNP","rationale":"True — BNP is elevated in heart failure and helps differentiate a cardiac cause of wheeze/dyspnoea from a primary respiratory (asthma) cause, especially relevant given his reduced EF (35%) and CABG history."},{"label":"B","text":"CXR","rationale":"False — CXR gives supportive information but BNP is the more specific test to differentiate the two conditions."},{"label":"C","text":"Echo","rationale":"False — echo assesses cardiac function generally but isn't the acute bedside test used to differentiate the two in this scenario as directly as BNP."},{"label":"D","text":"ECG","rationale":"False — ECG doesn't reliably differentiate acute LVF from asthma."},{"label":"E","text":"PEFR","rationale":"False — PEFR assesses airway obstruction severity but doesn't differentiate the underlying cause (cardiac vs respiratory)."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"14","text":"Respiratory distress, restless, tachycardia, tachypnea, low bp, stridor with cyanosis","options":[{"label":"A","text":"Acute severe asthma","rationale":"False — acute severe asthma causes wheeze, not stridor."},{"label":"B","text":"Hysterical hyperventilation","rationale":"False — hysterical hyperventilation doesn't cause stridor or true hypoxic cyanosis."},{"label":"C","text":"Foreign body","rationale":"True — stridor (an upper airway sound) with acute respiratory distress and cyanosis is classic for foreign body airway obstruction."},{"label":"D","text":"Pneumonia","rationale":"False — pneumonia doesn't cause stridor."},{"label":"E","text":"Pneumothorax","rationale":"False — pneumothorax causes reduced breath sounds/hyperresonance, not stridor."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."}]},{"date":"2013 Eastern","questions":[{"num":"BOF 5","text":"57 year old male known COPD patient presented with fever, shortness of breath and cough.SpO2-70%, RR- 24bpm, 28% O2 given by venture mask. Antibiotic cefuroxime given.2 hours later his symptoms have improved.RR- 12bpm, Po2-50mmhg, PCO2-75mmhg, what is the appropriate next step?","options":[{"label":"1","text":"Increase o2 up to 35%","rationale":"False — increasing oxygen further would worsen hypercapnia by further blunting hypoxic respiratory drive, given the ABG is worsening (PCO2 rising, PO2 falling)."},{"label":"2","text":"Sedate intubate and ventilate","rationale":"Most consistent with the severity here — the clinical 'improvement' (falling RR) alongside worsening ABG (PCO2 75, PO2 50) actually reflects CO2 narcosis/respiratory exhaustion, a dangerous sign requiring controlled ventilation; this should be interpreted with appropriate caution given the risks of sedating a hypercapnic patient."},{"label":"3","text":"Ventilate with CPAP","rationale":"Less appropriate — CPAP alone doesn't provide the ventilatory support (CO2 clearance) needed for this degree of hypercapnia; BiPAP or invasive ventilation is more appropriate."},{"label":"4","text":"Give doxapram","rationale":"False — doxapram (a respiratory stimulant) is a largely outdated option and insufficient for this degree of respiratory failure."},{"label":"5","text":"","rationale":"(Option text missing/illegible in the original source PDF.)"}],"reviewed_answer":["2"],"explanation":"This one carries real clinical nuance: the falling respiratory rate looks like improvement but the worsening ABG (rising CO2, falling O2) signals respiratory exhaustion/CO2 narcosis — a dangerous combination that usually mandates controlled ventilation, even though sedating a hypercapnic patient must be done with caution."},{"num":"BOF 6","text":"50year old male presented with productive cough for 2 months. On CXR fluid level seen in right side mid zone. What is the least possible diagnosis?","options":[{"label":"1","text":"Achalasia cardiac","rationale":"Possible cause — achalasia can rarely show a widened mediastinal air-fluid level from a dilated oesophagus, though this is less typically described as a 'right mid zone' lung finding."},{"label":"2","text":"Hernia of oesophagus","rationale":"Possible cause — a hiatus hernia can mimic a chest fluid level."},{"label":"3","text":"Hydro pneumothorax","rationale":"Possible cause — hydropneumothorax by definition produces an air-fluid level."},{"label":"4","text":"Lung abscess","rationale":"Possible cause — a lung abscess classically shows an air-fluid level."},{"label":"5","text":"Pneumothorax","rationale":"Least likely — an isolated pneumothorax (without accompanying fluid) does not produce a fluid level; a fluid level specifically requires both air AND fluid together (as in hydropneumothorax), making pneumothorax alone the least likely explanation for this specific finding."}],"reviewed_answer":["5"],"explanation":"The question asks for the LEAST likely diagnosis. An isolated pneumothorax cannot produce a fluid level (that needs both air and fluid together, as in hydropneumothorax), making pneumothorax the correct answer to 'least possible diagnosis' here."}]},{"date":"2012 November","questions":[{"num":"6","text":"Restrictive pattern of lung functions are seen in","options":[{"label":"A","text":"Ankylosing spondylitis","rationale":"True — ankylosing spondylitis causes chest wall restriction from spinal/costovertebral rigidity."},{"label":"B","text":"Asbestosis","rationale":"True — asbestosis is a classic restrictive interstitial lung disease."},{"label":"C","text":"Fibrosingalveolitis","rationale":"True — fibrosing alveolitis is a classic restrictive interstitial lung disease."},{"label":"D","text":"Emphysema","rationale":"False — emphysema causes an obstructive, not restrictive, pattern."},{"label":"E","text":"Tracheal obstruction","rationale":"False — tracheal obstruction causes a characteristic flow-volume loop abnormality, not the classic restrictive spirometric pattern."}],"reviewed_answer":["A","B","C"],"explanation":"Correct answer(s): A, B, C — see the reasoning under each option below."},{"num":"SBR 7","text":"25 year old presenting with fever, headache, myalgia, dry cough and progressive difficulty in breathing for 1 week duration. On examination there are bilateral crepitations, liver is palpable 1cm below costal margin and tender. WBC 4500 N-50% L-40%, ESR- 84, Na- 130, creatinine- normal, ALT- 300. Likely diagnosis?","options":[{"label":"A","text":"Chronic bronchitis","rationale":"False — chronic bronchitis doesn't explain this acute febrile systemic illness with deranged LFTs."},{"label":"B","text":"Community acquired pneumonia","rationale":"False — typical CAP doesn't classically cause this degree of systemic derangement (hyponatraemia, markedly deranged LFTs, tender hepatomegaly)."},{"label":"C","text":"Bronchopneumonia","rationale":"False — bronchopneumonia doesn't classically explain the hepatic/electrolyte findings."},{"label":"D","text":"Atypical pneumonia","rationale":"True — fever, headache, myalgia, dry cough with tender hepatomegaly, deranged LFTs (ALT 300) and hyponatraemia (Na 130) fits an atypical pneumonia (e.g. Legionella-type picture with hepatic involvement)."},{"label":"E","text":"Disseminated T8","rationale":"False — disseminated TB would usually have a more prolonged/chronic course, not this acute 1-week illness."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."}]}],"count":73},{"topic":"Hepatobiliary Disorders","sections":[{"date":"2024 January","questions":[{"num":"2","text":"Regarding alcohol-related liver disease:","options":[{"label":"A","text":"AST > ALT.","rationale":"True — an AST:ALT ratio greater than 2 (AST>ALT) is a classic pattern in alcohol-related liver disease."},{"label":"B","text":"Acute hepatitis is not seen.","rationale":"False — acute alcoholic hepatitis is a well-recognised acute presentation of alcohol-related liver disease."},{"label":"C","text":"Abstinence from alcohol will not improve the prognosis of decompensated liver.","rationale":"False — abstinence from alcohol does improve prognosis, even in decompensated liver disease."},{"label":"D","text":"Cause lymphocytic leucocytosis","rationale":"False — alcoholic hepatitis classically causes a NEUTROPHIL (not lymphocytic) leucocytosis."},{"label":"E","text":"Steatohepatitis is reversible","rationale":"True — early alcoholic steatohepatitis is reversible with abstinence."}],"reviewed_answer":["A","E"],"explanation":"Correct answer(s): A, E — see the reasoning under each option below."},{"num":"32","text":"58 year old man diagnosed patient with chronic liver cell disease presented with abdominal discomfort and distention for 3 days duration.He is afebrile not pale.blood pressure 90/70 PR 110. What is the next most important investigation to be done?","options":[{"label":"A","text":"Ascitic fluid analysis","rationale":"True — with new abdominal discomfort/distension and haemodynamic changes in a cirrhotic patient, ascitic fluid analysis is the key investigation to look for spontaneous bacterial peritonitis."},{"label":"B","text":"FBC","rationale":"False — FBC gives supportive information but doesn't directly diagnose the likely SBP."},{"label":"C","text":"CRP","rationale":"False — CRP is nonspecific and doesn't replace ascitic fluid analysis for diagnosis."},{"label":"D","text":"Serum albumin","rationale":"False — serum albumin doesn't diagnose the acute presentation here."},{"label":"E","text":"USS abdomen","rationale":"False — USS can assess ascites volume/liver but doesn't diagnose SBP, which needs fluid analysis."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2023 February","questions":[{"num":"7","text":"SAAG > 11 g/l is seen in,","options":[{"label":"A","text":"TB peritonitis.","rationale":"False — TB peritonitis is an exudative process with a LOW SAAG (<1.1)."},{"label":"B","text":"Portal hypertension.","rationale":"True — portal hypertension classically gives a HIGH SAAG (>1.1)."},{"label":"C","text":"Acute pancreatitis.","rationale":"False — pancreatitis-related ascites is exudative with a low SAAG."},{"label":"D","text":"Right heart failure.","rationale":"True — right heart failure (cardiac ascites) gives a high SAAG."},{"label":"E","text":"Peritoneal carcinomatosis.","rationale":"False — peritoneal carcinomatosis is exudative with a low SAAG."}],"reviewed_answer":["B","D"],"explanation":"Correct answer(s): B, D — see the reasoning under each option below."},{"num":"8","text":"Features suggestive of hemochromatosis in a patient with cirrhosis are,","options":[{"label":"A","text":"Cardiomegaly","rationale":"True — cardiac iron deposition causes cardiomyopathy/cardiomegaly in hemochromatosis."},{"label":"B","text":"Diabetes mellitus","rationale":"True — pancreatic iron deposition causes diabetes ('bronze diabetes') in hemochromatosis."},{"label":"C","text":"Splenomegaly","rationale":"True — splenomegaly occurs secondary to cirrhosis/portal hypertension."},{"label":"D","text":"Bronchiectasis","rationale":"False — bronchiectasis is not a feature of hemochromatosis."},{"label":"E","text":"Vitiligo","rationale":"False — hemochromatosis causes bronze/slate-grey skin HYPERpigmentation, not vitiligo (which is depigmentation)."}],"reviewed_answer":["A","B","C"],"explanation":"Correct answer(s): A, B, C — see the reasoning under each option below."},{"num":"30","text":"A 56-year-old female presented with pruritus for 2 years. Other than that, she was asymptomatic and had no past medical history and was not on any routine drugs. On examination xanthelasma and scratch marks were observed. Her investigation findings are as follows. WBC: 5.7 x 109 /l Hb: 13.8 g/dl Na+: 138 mmol/l K+: 4.2 mmol/l Serum creatinine: 88 µmol/l ALT: 90 U/l AST: 80 U/l IgM: positive ANA: negative Serum bilirubin: 48 µmol/l ALP: 358 U/l (39 - 117) INR: 3 Albumin: 18 g/l Total cholesterol: 350 mg/dl On USS, there was evidence of chronic liver cell disease. What is the most probable cause for her pruritus?","options":[{"label":"A","text":"Autoimmune hepatitis","rationale":"False — autoimmune hepatitis doesn't classically present with this degree of isolated cholestasis (high ALP) with xanthelasma and this demographic."},{"label":"B","text":"Hepatitis B","rationale":"False — Hepatitis B doesn't classically cause this pruritus/xanthelasma/cholestatic pattern."},{"label":"C","text":"NASH","rationale":"False — NASH doesn't typically cause severe pruritus or such a markedly elevated ALP/IgM pattern."},{"label":"D","text":"Primary biliary cirrhosis","rationale":"True — chronic pruritus with xanthelasma, a cholestatic LFT pattern (high ALP), elevated IgM and CLCD on USS in a middle-aged woman is the classic picture of primary biliary cirrhosis."},{"label":"E","text":"Sclerosing cholangitis","rationale":"False — sclerosing cholangitis is more associated with young males and inflammatory bowel disease, not fitting this demographic as well as PBC."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"32","text":"A 65-year-old man with a history of heavy consumption of alcohol presented with confusion and imbalance with bilateral lateral rectus palsy. His investigations are listed below. WBC: 11 700 /µl Hb: 14.2 mg/dl Platelets: 120 000 /µl INR: 1.3 AST: 140 U/l ALT: 100 U/l RBS: 60 mg/dl What is the first step in his management?","options":[{"label":"A","text":"IV 50% dextrose bolus","rationale":"False — giving glucose before thiamine risks precipitating or worsening Wernicke's encephalopathy by consuming remaining thiamine stores."},{"label":"B","text":"IV thiamine","rationale":"True — in a chronic alcoholic with confusion, ataxia and bilateral lateral rectus palsy (the Wernicke's triad-type picture) and low glucose, IV thiamine must be given first/alongside glucose correction to prevent precipitating Wernicke's."},{"label":"C","text":"Oral Chlordiazepoxide","rationale":"False — chlordiazepoxide would help alcohol withdrawal but doesn't address the immediate Wernicke's risk."},{"label":"D","text":"IV diazepam","rationale":"False — diazepam similarly doesn't address the thiamine deficiency."},{"label":"E","text":"IV Ig","rationale":"False — IVIG is not relevant to this presentation."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"33","text":"A 27-year-old female with viral hepatitis is in acute liver failure with severe loss of appetite and persistent vomiting. Her pulse rate was 110 bpm and blood pressure 80/60 mmHg. The following investigation findings are available. Hb: 16 mg/dl PCV: 58 % INR: 2.2 Serum creatinine: 1.1 mg/dl What is the best option to prevent the development of acute kidney injury in this patient?","options":[{"label":"A","text":"Repeated hydration with crystalloid boluses","rationale":"True — with vomiting, dehydration, tachycardia and hypotension in acute liver failure, careful crystalloid hydration addresses the pre-renal state and helps prevent progression to acute kidney injury."},{"label":"B","text":"IV dobutamine infusion","rationale":"False — dobutamine isn't the first-line measure for preventing AKI in this volume-depleted state; correcting volume status comes first."},{"label":"C","text":"Plasmapheresis","rationale":"False — plasmapheresis isn't a standard first measure to prevent AKI in this context."},{"label":"D","text":"Fresh frozen plasma","rationale":"False — FFP corrects coagulopathy but doesn't address the volume depletion driving AKI risk."},{"label":"E","text":"Use of a NAC infusion","rationale":"False — NAC is used specifically in paracetamol-induced liver failure, not indicated here without that specific history."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."}]},{"date":"2022 March","questions":[{"num":"25","text":"45Y Male, DM, CLCD presents with Haematemesis for 2 days. Previous UGIE reveals oesophageal varices and banding was done. PR=110bpm BP=80/50mmHg, cold peripheries, icterus, flapping tremors and ankle oedema. What is the next management option?","options":[{"label":"A","text":"Blood transfusion","rationale":"False — blood transfusion may be needed depending on Hb trend, but the question is asking about the next KEY step given her overall decompensated state including encephalopathy signs."},{"label":"B","text":"IV Ceftriaxone","rationale":"True — prophylactic IV antibiotics (e.g. ceftriaxone) are standard in cirrhotic patients presenting with GI bleeding, reducing infection risk (SBP) and improving mortality — highly relevant given her flapping tremor/encephalopathy and ascites."},{"label":"C","text":"IV Vitamin K","rationale":"False — IV vitamin K addresses coagulopathy from vitamin K deficiency/cholestasis but isn't the standout 'next management' step highlighted by this vignette."},{"label":"D","text":"Oral Metronidazole","rationale":"False — oral metronidazole isn't the standard antibiotic prophylaxis choice here."},{"label":"E","text":"Subcutaneous insulin injection","rationale":"False — subcutaneous insulin addresses his diabetes but isn't the priority in this acute GI bleed/decompensation scenario."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"44","text":"65 year old man known with DM and cirrhosis complicated with moderate ascites on loop diuretics, on top diagnosis of hepato-renal syndrome was made. What is the best treatment option?","options":[{"label":"A","text":"Reduce the dose of diuretics","rationale":"False — reducing diuretics is a supportive step but not the definitive trea
