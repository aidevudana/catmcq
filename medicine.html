ationale":"True — small kidneys on imaging is the best, most specific structural indicator of CKD."},{"label":"C","text":"Normochromic normocytic anemia","rationale":"False — reduced creatinine clearance is nonspecific, occurring in both AKI and CKD."},{"label":"D","text":"Raised urea with normal S.cr","rationale":"False — proteinuria is nonspecific and can occur in many acute or chronic renal conditions."},{"label":"E","text":"Osteodystrophy","rationale":"False — an elevated serum potassium is nonspecific and can occur in AKI as well as CKD."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"33","text":"32 year old male with HTN presented to ward. His father died due to SAH. UFR - Alb RBC 4050. S.Cr- 112. Na+ -","options":[],"reviewed_answer":null,"explanation":"Source text is truncated here (the question cuts off after 'Na+ -' with no options surviving in the original PDF) — there's nothing to answer for this fragment."},{"num":"139","text":"K+ - 4.2 Hb - 16 g/dl. HCT-45. WBC- 7000. pH - 7.4. ESR -5 24 hour protein excretion - 900 mg what is the most likely diagnosis?","options":[{"label":"A","text":"Renal artery stenosis","rationale":"False — renal artery stenosis doesn't explain the normal potassium and the polycythaemia-type Hb/HCT seen here."},{"label":"B","text":"Nephrotic Xd","rationale":"False — nephrotic syndrome would show heavier proteinuria (this is only 900mg/24h, sub-nephrotic) and doesn't explain the elevated Hb/HCT."},{"label":"C","text":"Polyarteritis nodosa","rationale":"False — polyarteritis nodosa doesn't specifically fit this biochemical picture, and there's no elevated ESR/systemic vasculitic markers here (ESR is actually low/normal)."},{"label":"D","text":"PCKD","rationale":"True — if read as a continuation of the earlier vignette (young hypertensive man whose father died of SAH — a classic ADPKD association via berry aneurysm rupture), an elevated Hb/HCT (rather than the anaemia typical of most CKD) together with mild sub-nephrotic proteinuria fits ADPKD, which characteristically causes relative polycythaemia from increased cyst-related erythropoietin production."},{"label":"E","text":"CRF","rationale":"False — chronic renal failure (CRF) would typically cause anaemia, not this elevated Hb/HCT."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."},{"num":"34","text":"16 yr old boy presented with facial puffiness, ankle oedema. Urine dipstick +++, 24 hr urine protein- 4.5g. what is the most likely diagnosis?","options":[{"label":"A","text":"Ig A nephropathy","rationale":"False — IgA nephropathy classically causes haematuria as the presenting feature, not this pattern of heavy proteinuria/oedema alone."},{"label":"B","text":"Polycystic kidney disease","rationale":"False — polycystic kidney disease doesn't typically present with facial puffiness and heavy proteinuria in a child this way."},{"label":"C","text":"Minimal change nephrotic Xd","rationale":"True — facial puffiness, ankle oedema and heavy (nephrotic-range, 4.5g/24h) proteinuria in a child is the classic presentation of minimal change nephrotic syndrome, the most common cause of nephrotic syndrome in children."},{"label":"D","text":"Post infectious GN","rationale":"False — post-infectious GN classically presents with a nephritic (haematuria-predominant), not this nephrotic, picture."},{"label":"E","text":"RPGN","rationale":"False — RPGN would typically show more acute renal impairment, not fitting this relatively straightforward nephrotic presentation."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"35","text":"Which of the following is the best indicator of chronic kidney disease?","options":[{"label":"A","text":"Blood urea > 110","rationale":"False — blood urea >110 is nonspecific and can be elevated in AKI too."},{"label":"B","text":"Bilateral shrunken kidneys","rationale":"True — bilateral shrunken kidneys is the best, most specific structural indicator of chronic kidney disease."},{"label":"C","text":"Creatinine clearance - low","rationale":"False — low creatinine clearance is nonspecific, occurring in both AKI and CKD."},{"label":"D","text":"proteinuria","rationale":"False — proteinuria is nonspecific, seen in many acute or chronic renal conditions."},{"label":"E","text":"serum K+ - 6.5 mmol/L","rationale":"False — serum K+ 6.5 is nonspecific and can occur in AKI as well as CKD."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."}]},{"date":"2014 May","questions":[{"num":"17","text":"Kidney secretes,","options":[{"label":"A","text":"Renin","rationale":"True — the kidney (juxtaglomerular apparatus) secretes renin."},{"label":"B","text":"Angiotensin II","rationale":"False — angiotensin II is generated by ACE (mainly in the lungs) from angiotensin I, not directly secreted by the kidney."},{"label":"C","text":"ADH","rationale":"False — ADH is produced in the hypothalamus and released from the posterior pituitary, not the kidney."},{"label":"D","text":"ANP","rationale":"False — ANP is secreted by cardiac atria, not the kidney."},{"label":"E","text":"Erythropoietin","rationale":"True — the kidney is the primary source of erythropoietin production."}],"reviewed_answer":["A","E"],"explanation":"Correct answer(s): A, E — see the reasoning under each option below."},{"num":"33","text":"Patient complaint of reduce urine output. On examination no palpable bladder, what is your next step of Mx?","options":[{"label":"A","text":"Increase oral fluid","rationale":"False — increasing oral fluid alone doesn't address the underlying cause or allow rapid assessment of response."},{"label":"B","text":"Catheterize the patient","rationale":"False — catheterisation isn't useful here since there's no palpable bladder (retention has been excluded)."},{"label":"C","text":"Give 500cc N/saline bolus","rationale":"True — with no evidence of obstruction (no palpable bladder), a fluid challenge is a reasonable next step to assess for and treat a likely prerenal cause of reduced urine output."},{"label":"D","text":"Give IV frusemide 40 mg","rationale":"False — furosemide isn't the appropriate next step without first assessing/addressing volume status, especially if the underlying cause is prerenal (hypovolaemic)."},{"label":"E","text":"Restrict fluid intake","rationale":"False — fluid restriction would be inappropriate if the underlying cause is hypovolaemia."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"34","text":"24 yr old male presented with proteinurea, hypercholesterolaemia & edema; He as low albumin level, his blood pressure was 90/70 Hgmm. PR 145/min. What is the best option in Mx?","options":[{"label":"A","text":"0.9% normal saline","rationale":"False — normal saline could worsen oedema/fluid overload without correcting the underlying low oncotic pressure problem."},{"label":"B","text":"Frusemide","rationale":"False — furosemide could worsen the intravascular volume depletion causing her hypotension/tachycardia."},{"label":"C","text":"IV albumin","rationale":"True — hypotension and marked tachycardia in nephrotic syndrome reflects intravascular volume depletion from low oncotic pressure (fluid shifted into the interstitium); IV albumin corrects intravascular volume by restoring oncotic pressure."},{"label":"D","text":"Ringer lactate","rationale":"False — Ringer's lactate, like saline, doesn't address the underlying low oncotic pressure problem specifically."},{"label":"E","text":"Prednisolone","rationale":"False — while prednisolone treats the underlying nephrotic syndrome longer-term, it doesn't address the immediate haemodynamic instability."}],"reviewed_answer":["C"],"explanation":"Correct answer(s): C — see the reasoning under each option below."},{"num":"35","text":"15 yr old male presented with markedly reduced UOP for 3 days. What is the most helpful information to make the diagnosis of IgA nephropathy,","options":[{"label":"A","text":"BP 160/100","rationale":"False — reduced urine output (oliguria/anuria) is nonspecific and doesn't specifically point to IgA nephropathy."},{"label":"B","text":"Haematuria","rationale":"False — haematuria alone is nonspecific (occurs in many glomerular diseases) without the characteristic temporal relationship to infection."},{"label":"C","text":"Impetigo","rationale":"False — impetigo (a skin infection) is more classically linked to post-streptococcal glomerulonephritis, not IgA nephropathy."},{"label":"D","text":"Preceeding history of respiratory tract infection","rationale":"True — a preceding (synpharyngitic) history of respiratory tract infection closely preceding or coinciding with haematuria is the most helpful and classic clue pointing to IgA nephropathy."},{"label":"E","text":"Pulmonary edema","rationale":"False — pulmonary oedema is nonspecific and doesn't specifically point to IgA nephropathy."}],"reviewed_answer":["D"],"explanation":"Correct answer(s): D — see the reasoning under each option below."}]},{"date":"2013 November","questions":[{"num":"4","text":"t/f which of the following inhibit K+ secretion?","options":[{"label":"A","text":"High K\" levels in biood","rationale":"False — high blood potassium actually STIMULATES (not inhibits) distal K+ secretion as a homeostatic mechanism to excrete the excess."},{"label":"B","text":"Aldosterone inhibitors","rationale":"True — aldosterone antagonists (e.g. spironolactone) reduce distal K+ secretion, which is why they are 'potassium-sparing'."},{"label":"C","text":"Diuretics","rationale":"False — most diuretics (loop/thiazide) actually INCREASE distal K+ secretion (causing hypokalaemia) by increasing distal sodium delivery, rather than inhibiting secretion."},{"label":"D","text":"Metabolic alkalosis","rationale":"False — metabolic alkalosis actually INCREASES K+ secretion, contributing to hypokalaemia, rather than inhibiting it."},{"label":"E","text":"High Na intake","rationale":"False — high sodium intake increases distal sodium delivery, which INCREASES (not inhibits) K+ secretion."}],"reviewed_answer":["B"],"explanation":"Correct answer(s): B — see the reasoning under each option below."},{"num":"7","text":"T/F. Glomerular pathology should be suspected when?","options":[{"label":"A","text":"SLE+,with hematuria","rationale":"True — haematuria in a patient with known SLE strongly raises suspicion of lupus nephritis (glomerular pathology)."},{"label":"B","text":"S0yr DM sterile payuria","rationale":"False — sterile pyuria in a diabetic more classically suggests an interstitial/tubular process (e.g. renal TB, papillary necrosis), not primarily glomerular pathology."},{"label":"C","text":"male with colic","rationale":"False — renal colic in a male points towards stone disease, not glomerular pathology."},{"label":"D","text":"i","rationale":"(Option text missing/illegible in the original source PDF.)"},{"label":"E","text":"14 yr, 2days hx of painful hematuria","rationale":"False — painful haematuria (as opposed to painless) more classically suggests a stone or infective cause, not glomerular pathology (which typically causes painless haematuria)."}],"reviewed_answer":["A"],"explanation":"Correct answer(s): A — see the reasoning under each option below."},{"num":"11","text":"Distal convoluted tubular K+ secretion is reduced by","options":[{"label":"A","text":"Hyperkalemia","rationale":"Actually increases secretion — hyperkalaemia stimulates (rather than reduces) distal K+ secretion as a homeostatic response."},{"label":"B","text":"A diuretic acting on proximal tubule to reduce Na+ absorption","rationale":"Actually increases secretion — a diuretic reducing proximal Na+ reabsorption increases the amount of sodium delivered to the distal nephron, which increases (not reduces) distal K+ secretion."},{"label":"C","text":"Tremor","rationale":"Not a recognised physiological regulator of distal K+ secretion as described."},{"label":"D","text":"Diabetes insipidus","rationale":"Actually increases secretion — the polyuria/increased distal flow rate of diabetes insipidus enhances (rather than reduces) K+ secretion."},{"label":"E","text":"Cardiac arrhythmia","rationale":"Not a direct recognised physiological regulator of distal K+ secretion."}],"reviewed_answer":[],"explanation":"This question appears to have a wording issue or missing correct option — standard nephron physiology doesn't support any of the given options as something that REDUCES distal K+ secretion (each either increases it or is unrelated). Worth double-checking this one against your own lecture notes rather than trusting a forced answer here."}]},{"date":"2013 Eastern","questions":[{"num":"BOF 17","text":"An 18 year old boy present with severe vomiting and diarrhoea for 2 days. He has not passed urine for the last 24 hours. He is dehydrated febrile and ill. His BP is 90/60 mmHg and PR 100bpm. No distended bladder. Which of the following investigations is useful to decide on the type of renal failure in this patient?","options":[{"label":"1","text":"Blood urea","rationale":"Supportive but nonspecific — blood urea rises in AKI generally but doesn't distinguish the type (prerenal vs intrinsic)."},{"label":"2","text":"Serum creatinine","rationale":"Supportive but nonspecific — serum creatinine confirms renal impairment but not the type."},{"label":"3","text":"Serum potassium","rationale":"Supportive but nonspecific — serum potassium reflects severity/complications, not the type of failure."},{"label":"4","text":"USS kidney","rationale":"Useful for structural assessment (e.g. excluding obstruction/chronicity) but doesn't specifically classify prerenal vs intrinsic failure the way urine sodium does."},{"label":"5","text":"Urine sodium level","rationale":"True — urine sodium is the key test to differentiate prerenal AKI (low urine Na, <20, reflecting appropriate sodium avidity) from intrinsic renal (e.g. ATN) failure (higher urine Na, reflecting tubular dysfunction)."}],"reviewed_answer":["5"],"explanation":"Correct answer(s): 5 — see the reasoning under each option below."},{"num":"TOF 20","text":"36 year old male has facial and ankle swelling for 3 weeks. Which is more suggestive of nephritic syndrome?","options":[{"label":"1","text":"UFR +++ protein","rationale":"Nonspecific — heavy proteinuria on dipstick can occur in both nephrotic and nephritic syndromes depending on severity."},{"label":"2","text":"Serum albumin 2.8","rationale":"More suggestive of NEPHROTIC syndrome — hypoalbuminaemia is a hallmark nephrotic finding."},{"label":"3","text":"24 hour urine protein 4g","rationale":"More suggestive of NEPHROTIC syndrome — nephrotic-range proteinuria (4g/24h) is a defining nephrotic feature."},{"label":"4","text":"Serum cholesterol 328","rationale":"More suggestive of NEPHROTIC syndrome — hypercholesterolaemia (dyslipidaemia) is a classic nephrotic feature."},{"label":"5","text":"Serum creatinine 1.6","rationale":"True — of the options given, an elevated creatinine (renal impairment) is more characteristic of nephritic syndrome, where active glomerular inflammation impairs filtration, compared with nephrotic syndrome which classically preserves renal function, at least early on."}],"reviewed_answer":["5"],"explanation":"Correct answer(s): 5 — see the reasoning under each option below."}]}],"count":72},{"topic":"Endocrinology","sections":[{"date":"2024 January","questions":[{"num":"12","text":"Regarding oral hypoglycemic drugs","options":[{"label":"A","text":"Dpp4 monotherapy can cause hypoglycaemia"},{"label":"B","text":"Overweight patients preferred to start with pioglitazons"},{"label":"C","text":"In a patient with obesity, GLP-1 agonists are preferred."},{"label":"D","text":"Insulin glargine is used to maintain the basal glucose level."},{"label":"E","text":"Metformin is contraindicated in patients with lactic acidosis"}]},{"num":"27","text":"In diagnosing Diabetes Mellitus, which of the following confirmatory tests is not used?","options":[{"label":"A","text":"HbA1c"},{"label":"B","text":"Fasting Plasma Glucose"},{"label":"C","text":"Oral Glucose Tolerance Test"},{"label":"D","text":"Random Plasma Glucose"},{"label":"E","text":"Fructosamine"}]},{"num":"37","text":"28 year old female who is 2 months post partum presents with loss of weight, tremor and palpitations. On examination she is tachycardic, fine finger tremor and lid retraction. Her investigation fT4 - 35 (10 - 24) fT3 - 12 (3.8 - 6.8) TSH < 0.01mIU/L Uss thyroid - diffuse enlargement of thyroid Radio iodine uptake – reduces Anti thyroperoxidase Ab positive Most likely cause for thyrotoxicosis is","options":[{"label":"A","text":"Graves’ disease"},{"label":"B","text":"Thyroiditis"},{"label":"C","text":"Secondary thyrotoxicosis"},{"label":"D","text":"Toxic adenoma"},{"label":"E","text":"Toxic MNG"}]},{"num":"38","text":"A 60-year-old male diagnosed with type 2 diabetes mellitus is on metformin 500 mg bd, empagliflozin 10 mg mane, and atorvastatin 20 mg nocte. His blood pressure is 145/85 mmHg. Rest of the examination is normal. Investigations are as follows. HbA1c - 7.0%, eGFR - 50 mL/min/1.73 m², Urine albumin/creatinine ratio - 98 mg/g (<30) on two separate occasions. The next most appropriate management step is:","options":[{"label":"A","text":""},{"label":"B","text":"Increase dose of empagliflozin to 25 mg once daily"},{"label":"C","text":"Increase dose of metformin 1g tds"},{"label":"D","text":"Increase dose of pioglitazone 45mg once daily"},{"label":"E","text":""}]}]},{"date":"2023 February","questions":[{"num":"11","text":"Regarding hypoglycaemia,","options":[{"label":"A","text":"Symptoms appear around 60-70 mg/dl."},{"label":"B","text":"Circulating insulin is responsible for neuroglycopaenic symptoms."},{"label":"C","text":"Recovery is due to glucagon release."},{"label":"D","text":"Concurrent hypopituitarism increases the risk."},{"label":"E","text":"The threshold for the release of counter-regulatory hormones are similar."}]},{"num":"12","text":"Regarding Grave’s disease,","options":[{"label":"A","text":"It is due to IgM antibodies."},{"label":"B","text":"Unilateral eye signs are seen."},{"label":"C","text":"IV hydrocortisone is given in thyrotoxic crisis."},{"label":"D","text":"Commonly present as a multinodular goiter."},{"label":"E","text":"Eye signs worsen with radioiodine ablation."}]},{"num":"18","text":"Hormones that increase in stressful situations are,","options":[{"label":"A","text":"Cortisol"},{"label":"B","text":"Thyroxine"},{"label":"C","text":"Insulin"},{"label":"D","text":"Prolactin"},{"label":"E","text":"Growth hormone"}]},{"num":"36","text":"A 40-year-old male with type 2 diabetes mellitus for 22 years, on metformin, gliclazide and sitagliptin at their maximum tolerable doses, came to the medical clinic with the following blood sugar series results. Her HbA1C level was 9.5%. Fasting            Post-breakfast       Pre- Lunch           Post-Lunch         Pre-Dinner            Post-Dinner 185mg/dl           182mg/dl             192mg/dl             357mg/dl           187mg/dl              186mg/dl 180mg/dl           185mg/dl             183mg/dl             344mg/dl           189mg/dl              180mg/dl Her serum creatinine was 84 µmol/l. What is the best intervention to improve his glycaemic control?","options":[{"label":"A","text":"Acarbose before lunch"},{"label":"B","text":"Once daily isophane insulin"},{"label":"C","text":"Lunch time rapid acting insulin"},{"label":"D","text":"Adding an SGLT-2 inhibitor"},{"label":"E","text":"Lunch time soluble insulin"}]},{"num":"37","text":"A 45-year-old female presented with confusion, abdominal pain and vomiting. She is on treatment with thyroxine for hypothyroidism for 5 years with recent weight loss. She is unwell and her blood pressure is 90/50 mmHg. Her investigations are listed below. Na+: 129 mmol/l K+: 5.9 mmol/l Serum creatinine: 103 µmol/l Blood urea: 7.6 mmol/l (1.8 – 7.1) TSH: 3.5 mIU/l T4: 7 µg/dl (5 – 11) CT brain was normal. What is the first step in her management?","options":[{"label":"A","text":"IV normal saline bolus"},{"label":"B","text":"IV dextrose infusion"},{"label":"C","text":"IM glucagon"},{"label":"D","text":"IV hydrocortisone"},{"label":"E","text":"IV calcium gluconate"}]},{"num":"38","text":"A 56-year-old patient with type 2 diabetes mellitus, on metformin 500 mg tds, presented with an extensive anterior myocardial infarction. His HbA1c was found to be 7.9%. What is the most important step at this point to improve his survival?","options":[{"label":"A","text":"Strict diabetes control"},{"label":"B","text":"Start soluble insulin."},{"label":"C","text":"Start gliclazide."},{"label":"D","text":"Start empagliflozin."},{"label":"E","text":"Start sitagliptin."}]}]},{"date":"2022 March","questions":[{"num":"07","text":"Which of answers are true regarding empagliflozin?","options":[{"label":"A","text":"Causes euglycemic ketoacidosis"},{"label":"B","text":"Cannot be given in stage 3 CKD"},{"label":"C","text":"Reduces weight"},{"label":"D","text":"Angiotensin converting enzyme inhibitor improves the prognosis."},{"label":"E","text":"Cardiac resynchronization treatment is a treatment option SBA"}]},{"num":"22","text":"Female patient came with weight gain, hypertension. Deposition of fat at back of the neck. Round face, hirsutism. Blood glucose below 130. TSH normal. What is the next investigation to diagnose the condition?","options":[{"label":"A","text":"ACTH measurement"},{"label":"B","text":"1mg Overnight Dexamethasone suppression test"},{"label":"C","text":"8mg 72hrs Dexamethasone suppression test"},{"label":"D","text":"MRI pituitary"},{"label":"E","text":"Random cortisol level"}]},{"num":"26","text":"22yr old woman Diagnosed with T1DM and adrenal insufficiency is now coming with RIF pain, diagnosed with  to confirm the clinical diagnosis?","options":[{"label":"A","text":"Chest X ray"},{"label":"B","text":"Echocardiogram"},{"label":"C","text":"HLA B 27"},{"label":"D","text":"Serum calcium"},{"label":"E","text":"ALP"}]}]},{"date":"2019 November","questions":[{"num":"6","text":"Regarding giant cell arteritis,","options":[{"label":"A","text":"It's a large vessel vasculitis"},{"label":"B","text":"Visual loss is a complication"},{"label":"C","text":"Is treated with high dose prednisolone"},{"label":"D","text":"Is associated with polymyalgia rheumatica"},{"label":"E","text":"ESR <50/1st hour in the majority"}]},{"num":"43","text":"45-year-old female complains of low grade fever, early morning joint stiffness and pain more than 1-hour duration. She also complains of pain and stiffness in neck, hip joint and pelvic girdle.","options":[{"label":"A","text":"Infective endocarditis"},{"label":"B","text":"Polymyalgia rheumatic"},{"label":"C","text":"Rheumatoid arthritis"},{"label":"D","text":"SLE"},{"label":"E","text":"Tuberculous polyarthritis"}]},{"num":"46","text":"A patient with rheumatoid arthritis on DMARDs presents with anaemia. Hb = 10.1, MCV = 102, WBC normal. Which of the following is the cause for anaemia?","options":[{"label":"A","text":"Sulphursalazine"},{"label":"B","text":"Methotrexate"},{"label":"C","text":"Ibuprofen"},{"label":"D","text":"Steroids"},{"label":"E","text":"Hydroxychoroquinine"}]},{"num":"47","text":"A 40 years old male presented with back pain, this time presented with painful knee joint that has persisting morning stiffness for more than 2 hours’ duration. Which of the following mostly describes the condition?","options":[{"label":"A","text":"Ankylosing spondylitis"},{"label":"B","text":"Psoriatic arthritis"},{"label":"C","text":"…….."},{"label":"D","text":"Reiter’s syndrome"},{"label":"E","text":"Rheumatoid arthritis"}]}]},{"date":"2019 March","questions":[{"num":"15","text":"gout","options":[{"label":"A","text":"subcutaneous nodule"},{"label":"B","text":"B/L symmetrical arthritis in small & large joint"},{"label":"C","text":"increase with alcohol"},{"label":"D","text":"commoner with metabolic syndrome"},{"label":"E","text":"monosodium crystals in synovial fluid"}]},{"num":"41","text":"52 years old women presented with bilateral symmetrical polyarthritis involving both large and small joints. Also has morning stiffness which is lasting more than 2 hours. During this time she also had intermittent fever, loss of appetite and lethargy. FBC, X ray of hand & feet, LFT are normal. ESR 90mm/1st hr CRP – 24. Which of the following combination will you prefer?","options":[{"label":"A","text":"NSAIDS, methotrexate, prednisolone"},{"label":"B","text":"NSAIDS, Prednisolone, Omeperazole"},{"label":"C","text":"Penicillamine, NSAIDS, Omeperazole"},{"label":"D","text":"Prednisolone, Hydroxychloroquine, NSAIDS"},{"label":"E","text":"sulfasalazine, Methotrexate, NSAIDS"}]},{"num":"42","text":"32 years old male presented with worsening back pain early in morning for last 6 months. On examination limited flexion and extension noted. ESR - 70mm/1st hour. Which of the following investigation will best help you to arrive at a diagnosis?","options":[{"label":"A","text":"HLA B27"},{"label":"B","text":"serum calcium"},{"label":"C","text":"serum ALP"},{"label":"D","text":"x ray hand"},{"label":"E","text":"rheumatoid factor"}]}]},{"date":"2018 November","questions":[{"num":"12","text":"Lab investigation results characteristic in osteomalacia,","options":[{"label":"A","text":"Raised ALP"},{"label":"B","text":"Reduced Ca2+ levels"},{"label":"C","text":"Normal phosphate levels"},{"label":"D","text":"Normal parathyroid hormone levels"},{"label":"E","text":"Low serum calcium"}]},{"num":"14","text":"Conditions in Overlap Syndrome,","options":[{"label":"A","text":"Rheumatoid arthritis"},{"label":"B","text":"Takayasu arteritis"},{"label":"C","text":"Antiphospholipid syndrome"},{"label":"D","text":"Kawasaki disease"},{"label":"E","text":"Sjogren’s syndrome"}]},{"num":"15","text":"Serum Creatinine Phosphokinase Level is elevated in, (CPK Level)","options":[{"label":"A","text":"Rheumatoid arthritis"},{"label":"B","text":"Polimyositis"},{"label":"C","text":"Rhabdomyolysis"},{"label":"D","text":"Polymyalgia rheumatica"},{"label":"E","text":"Scleroderma"}]},{"num":"41","text":"A 70 years old male patient complains of headache which is worsened on mastication, generalized tiredness and multiple body aches mainly on neck and shoulders. Serum K- 4.5 mmol/ltr Serum Na 145mmol/l ESR -98/ 1st hour WBC - 6000/mm3, platelets 200,OOO/mm3, HB - 9g/dl","options":[{"label":"A","text":"Hyperkaleamic polymyopathy"},{"label":"B","text":"Still's disease"},{"label":"C","text":"Polymyalgia rheumatica"},{"label":"D","text":"Polymyositis"},{"label":"E","text":"Steroid Induced myopathy"}]},{"num":"42","text":"35 year old man presented with pain, swelling and erythema over the right knee joint for two days duration. On examination, Right knee joint inflammatory arthritis, Bilateral metatarsophalangeal joint arthrits, Severe tenderness over the back of the leg above the heel, left heel pain and Oral ulcer were detected. He has had a recent onset gastroenteritis one week age. FBC: WBC 1 03/mm a , Hb 1 og/dl, platelets 300,000/mm Serum ferritin 2501U What is the most likely diagnosis,","options":[{"label":"A","text":"Inflammatory bowel disease related arthritis"},{"label":"B","text":"Reactive arthritis"},{"label":"C","text":"Rheumatic fever"},{"label":"D","text":"Still disease"},{"label":"E","text":"Typhoid fever"}]}]},{"date":"2017 May","questions":[{"num":"17","text":"Recognized risk factors for osteoporosis include","options":[{"label":"A","text":"Advanced age"},{"label":"B","text":"Positive family history"},{"label":"C","text":"Excessive alcohol intake"},{"label":"D","text":"Excessive smoking"},{"label":"E","text":"Excessive caffeine intake"}]},{"num":"23","text":"A 30 year old female attends the outpatient department of a tertiary care hospital complaining of pain and swelling of multiple small and large joints for 3 months.On examination she has mild pallor with tender swollen joints in the proximal interphalangeal , metacarpophalangeal and metatarsophalangeal joints, wrists, elbows, knee and ankles. Ix ESR………………………………. 90 mm in 1st hour WBC…………………………….. 12×109/L (N 75%, L 20%) Hb………………………………….10g/dl Platelets…………………………450×109/ L Rheumatoid factor titre and anti CCP antibodies are positive at high titre What is the most appropriate combination of drug she should receive?","options":[{"label":"A","text":"Coamoxyclav, paracetamol, tramadol"},{"label":"B","text":"Diclofenac sodium, aluminium hydroxide, and omeprazole"},{"label":"C","text":"Infliximab, steroids and methotrexate"},{"label":"D","text":"Methotrexate, steroids, hydroxychloroquine, and sulphasalazine"},{"label":"E","text":"Ferrous sulphate, vitamin C, vitamin B complex and folic acid"}]},{"num":"43","text":"29 yr old lady presented with fever, arthralgis & oral ulcers. Investigations found Hb of 10, WBC 3.3, platelets 114, & ESR 102. What is the best diagnostic test for her?","options":[{"label":"A","text":"24 hr urinary proteins"},{"label":"B","text":"ANCA"},{"label":"C","text":"Blood cultures"},{"label":"D","text":"ANA"},{"label":"E","text":"Abdominal USS"}]}]},{"date":"2016 May","questions":[{"num":"01","text":"Patient presented with headache, which of the following features are supporting the diagnosis of temporal arteritis","options":[{"label":"A","text":"Scalp tenderness on combing hair"},{"label":"B","text":"Shoulder girdle pain on awakening"},{"label":"C","text":"Jaw pain on eating"},{"label":"D","text":"Leg weakness while walking"},{"label":"E","text":"Weight loss"}]},{"num":"08","text":"Regarding side effects of drugs used in rheumatoid arthritis","options":[{"label":"A","text":"Methotrexate – pneumonitis"},{"label":"B","text":"Leflunamide – hypertension"},{"label":"C","text":"Sulphasalazine – reactivation of TB"},{"label":"D","text":"Hydroxychloroquine – retinopathy"},{"label":"E","text":"Steroids – osteoporosis"}]},{"num":"SBA 11","text":"27 year old male presented with hip pain and back pain, pain and swelling of right knee joint no past history oral ulceration present. 2 weeks before he experienced blood and mucous diarrhea. He has painless superficial ulceration in glans penis","options":[{"label":"A","text":"Gonococcal arthritis"},{"label":"B","text":"Reactive arthritis"},{"label":"C","text":"Ankylosing spondylitis"},{"label":"D","text":"Inflammatory bowel disease and arthritis"},{"label":"E","text":""}]}]},{"date":"2015 November","questions":[{"num":"13","text":"Regarding acute gout","options":[{"label":"A","text":"Low dose aspirin lowers uric acid excretion"},{"label":"B","text":"Uric acid concentration reduces after an acute attack"},{"label":"C","text":"Allopurinol should be given within the 1st week of an acute attack"},{"label":"D","text":"Common in 1st metratarsophalangeal joint"},{"label":"E","text":"Responds well to NSAIDs"}]}]},{"date":"2014 November","questions":[{"num":"5","text":"Pulmonary finding in rheumatoid arthritis,","options":[{"label":"A","text":"Chronic obstructive airway disease"},{"label":"B","text":"Fibrosing alveolitis"},{"label":"C","text":"Pleural effusions"},{"label":"D","text":"Caplan syndrome"},{"label":"E","text":"Bronchoalveolar carcinoma"}]},{"num":"13","text":"Characteristic features of rheumatoid arthritis,","options":[{"label":"A","text":"Involvement of DIP"},{"label":"B","text":"Plantar fasciitis"},{"label":"C","text":"Atlanto axial sublaxuation"},{"label":"D","text":"Scleritis"},{"label":"E","text":"Subcutaneous nodules"}]},{"num":"41","text":"56 year old man presented with tender swollen 1\" metatarsophalangeal joint. He was on frusemide for ankle oedema, Investigation revealed Hb - 10.1g/dl, WBC - 19,000, ESR - 95, Scr - 3.42. what is the most likely diagnosis,","options":[{"label":"A","text":"Gouty arthropathy"},{"label":"B","text":"Cellulitis"},{"label":"C","text":"TB arthropathy"},{"label":"D","text":"Rheumatoid arthritis"},{"label":"E","text":"Septic arthritis"}]}]},{"date":"2014 May","questions":[{"num":"14","text":"Characteristic features of RA","options":[{"label":"A","text":"Anlanto axial subluxation"},{"label":"B","text":"Bone cyst formation"},{"label":"C","text":"Jaxta articular osteopenia"},{"label":"D","text":"Calcification of the spinal ligament"},{"label":"E","text":"Periarticular bone erosions"}]},{"num":"41","text":"A 25 yrs old male presented with right knee joint pain & dysuria. 2 weeks back he had severe diarrhea episode, What could be the most appropriate diagnosis?","options":[{"label":"A","text":"Berchar’s disease"},{"label":"B","text":"Non-gonococcal infection"},{"label":"C","text":"Reactive arthritis"},{"label":"D","text":"Rheumatoid arthritis"},{"label":"E","text":"Ulcerative colitis"}]}]},{"date":"2013 November","questions":[{"num":"1","text":"osteoarthritis occurs as a complication of","options":[{"label":"A","text":"rheumatoid arthritis"},{"label":"B","text":"perthes disease"},{"label":"C","text":"Rheumatic fever"},{"label":"D","text":"Haemarthrosis"},{"label":"E","text":"Septic arthritis"}]},{"num":"SBA 7","text":"70 yr old DM, HT,RA, on several oral drugs, knee joint pain and swelling, obese+, Ex – mildly swollen, mild joint effusion, non-tender, no warmth, H8-9, wbc-NL, ESR- 40.most likely cause for presentation?","options":[{"label":"A","text":"Gout"},{"label":"B","text":"OA"},{"label":"C","text":"Prepatellar bursitis"},{"label":"D","text":"Septic arthritis"},{"label":"E","text":"Synovial seroma"}]}]},{"date":"2013 Eastern","questions":[{"num":"BOF 13","text":"A 32 year old male presented with fever and swollen knee joint. SOB and chest pain for 2 weeks. Investigations reveal. WBC 21000/mm3, neutrophil-88%, lymphocytes-9%, CXR-R sided pleural effusion, blood culture (-)ve. ANA and rheumatoid factor (-)ve. Serum ferritin 1300(18-270). What is the probable diagnosis?","options":[{"label":"1","text":"Septic arthritis"},{"label":"2","text":"Stills disease"},{"label":"3","text":"Reiter’s disease"},{"label":"4","text":"SLE"},{"label":"5","text":"Rheumatic fever"}]}]}],"count":39},{"topic":"Zoonotic & Infectious Diseases + Snakebites","sections":[{"date":"2024 January","questions":[{"num":"7","text":"Regarding Clostridium defficile","options":[{"label":"A","text":"Is a Gram Negative Spore forming bacillus"},{"label":"B","text":"Cause pseudomembranous colitis"},{"label":"C","text":"Diarrhea is due to toxins"},{"label":"D","text":"Associated with Ab treatment"},{"label":"E","text":"Oral Ciprofloxacin is a effective tx"}]},{"num":"15","text":"Which of the following drugs are effective against MRSA?","options":[{"label":"A","text":"Flucloxacillin"},{"label":"B","text":"Co-amoxiclav"},{"label":"C","text":"Vancomycin"},{"label":"D","text":"Cotrimoxazole"},{"label":"E","text":"Meropenem"}]},{"num":"30","text":"Regarding Tetanus?","options":[{"label":"A","text":"Most commonly presents with generalized muscle weakness"},{"label":"B","text":"Caused by Clostridium botulinum"},{"label":"C","text":"Opisthotonus is a late sign"},{"label":"D","text":"Incubation period usually <1 week"},{"label":"E","text":"Bacillus Calmette-Guérin vaccine is protective"}]},{"num":"31","text":"25y old, male presented with fever for 1 week duration. Fever was associated with chills in the first 4 days. He has taken PCM 2 tablets 3 times a day for the past week duration and fever settled with that. When fever was settling he noticed yellowish discoloration of eyes and dark urine for 1 day duration. There was no rash, enlarged lymph nodes (thwa dekak thibba). He is a vegetable farmer. On examination, he is ill looking, icteric but not pale. Abdominal examination there's tender hepatomegaly of 2cm Hb - 12.9 g/dl            WBC - 3.8         Plt – 140              AST – 1100     ALT – 1350                ALP – 350 GGT – 75 UFR - Bile +ve            Pus Cells - +2 Red cells - +2            Protein nil What is the most likely diagnosis?","options":[{"label":"A","text":"Hepatitis A"},{"label":"B","text":"Hepatitis B"},{"label":"C","text":"IMN"},{"label":"D","text":"Leptospirosis"},{"label":"E","text":"Dengue"}]},{"num":"42","text":"Female patient with sepsis was treated with IV antibiotics and 3 bolus of crystalloids which is more than 40ml/kg. Her blood pressure still was 82/65. BP-80/60 PR-120 RR-24 WBC-22000, Hb-11 Next step in the Mx? F.   Colloids G.   Dopamine H.   Another crystalloid bolus I.   Noradrenaline J.   Packed red cell","options":[]},{"num":"43","text":"A 40 years old male developed fever with chills and rigors for 7 days associated with headache, arthralgia and myalgia. He has a history of camping in the jungle 10 days before the onset of these symptoms, where he has bathed in a river. On examination there was a maculo-papular rash and a generalized lymphadenopathy with abdominal pain. What is the most probable diagnosis?","options":[{"label":"B","text":"Leptospirosis"},{"label":"C","text":"Malaria"},{"label":"D","text":"Typhus"},{"label":"E","text":"Typhoid"}]},{"num":"44","text":"40 years old man presented with fever for 7 days with headache, severe body aches, vomiting. He has gone to a camping trip to a jungle. Had a bath in a river. O/E there was generalized lymphadenopathy, red eyes and maculopapular rash. What is the diagnosis?","options":[{"label":"A","text":"EBV"},{"label":"B","text":"Leptospirosis"},{"label":"C","text":"Typhus"},{"label":"D","text":"Typhoid"},{"label":"E","text":"Malaria"}]},{"num":"49","text":"16 yr old boy with suspeted snake bite but no identifiable fang mark devoloped bi lateral eye muscle paralysis and respi muscle paralysis, During ICU stay he devoloped 2 anaphylactic shock .WBCT <20 min .What is the next step of management","options":[{"label":"A","text":"Dont give ASV, but observe the patient."},{"label":"B","text":"Give ASV and observe the patient for interactions"},{"label":"C","text":"Asv with neostagmine and wait for response"},{"label":"D","text":"Give midazolam and sedate"},{"label":"E","text":"ASV and hydrocortisone for both arms"}]},{"num":"51","text":"Nursing officer working in a medical ward accidentally got a needle prick injury while drawing blood from a hepatitis B positive patient. She has completed course of vaccination for hep B before. What is the next step of management?","options":[{"label":"A","text":"Post exposure prophylaxis of Hb"},{"label":"B","text":"Check HBs Ag status of nurse"},{"label":"C","text":"Check HBs Ag status of patient"},{"label":"D","text":"Check HBs Ab Status of nurse"},{"label":"E","text":"Reassure ask her to continue work"}]}]},{"date":"2023 February","questions":[{"num":"15","text":"Regarding bacterial meningitis,","options":[{"label":"A","text":"Antibiotics should not be started before lumbar puncture."},{"label":"B","text":"Haemophilus influenzae infection is associated with hearing loss."},{"label":"C","text":"Presence of a maculopapular rash is suggestive of meningococcal infection."},{"label":"D","text":"IV dexamethasone improves the clinical outcome."},{"label":"E","text":"Hydrocephalus is a complication."}]},{"num":"16","text":"Regarding leptospirosis,","options":[{"label":"A","text":"Neck stiffness is a clinical feature."},{"label":"B","text":"?"},{"label":"C","text":"Conjunctival suffusion is a feature."},{"label":"D","text":"An active urinary sediment is a common feature."},{"label":"E","text":"Disproportionate increase in serum urea than that of creatinine is common"}]},{"num":"43","text":"A 54-year-old diagnosed patient with diabetes mellitus presented with fever, dry cough, frontal headache, and myalgia for 5 days. On examination, he had a pulse rate of 110 bpm and a temperature of 102 0F. His lungs were clear. His investigation findings are listed below. WBC: 12.2 x 109 /l Neutrophils: 45 % Lymphocytes: 53 % Platelets: 152 000 /µl What is the most likely causative organism?","options":[{"label":"A","text":"Dengue virus"},{"label":"B","text":"Influenza virus"},{"label":"C","text":"Leptospira interrogans"},{"label":"D","text":"Salmonella typhi"},{"label":"E","text":"Streptococcus pneumoniae"}]},{"num":"46","text":"A 40-year-old fisherman from Jaffna presented with a snake bite on his right foot 3 hours ago. There was swelling at the bite site. There was no overt bleeding, however, the 20 minutes whole blood clotting time was prolonged. No neurological symptoms were present. What is the most likely snake that he had got bitten by?","options":[{"label":"A","text":"Cobra"},{"label":"B","text":"Common krait"},{"label":"C","text":"Russel’s viper"},{"label":"D","text":"Sea snake"},{"label":"E","text":"Saw-scaled viper"}]}]},{"date":"2022 March","questions":[{"num":"16","text":"Which of the following are best suggestive of tuberculoid leprosy","options":[{"label":"A","text":"Acid fast bacilli from skin biopsy"},{"label":"B","text":"Peripheral neuropathy"},{"label":"C","text":"Spread to lungs and testes"},{"label":"D","text":"Thickening of nerves"},{"label":"E","text":"involvement of eyes, bones and testes SBA"}]},{"num":"34","text":"5 year old farmer from dry zone presented to the ward with fever for 2 weeks. He is a diagnosed patient with Diabetes mellitus previously.On examination there was cervical lymphadenopathy .Investigation findings were, WBC - 11000(upper normal) Platelets- 140000(just below lower margin) Hb- within normal range ESR-80 CRP -60 HBA1c - 8% USS- multiple cystic lesion in the spleen. What is the most likely diagnosis?","options":[{"label":"A","text":"Brusellosis"},{"label":"B","text":"HIV"},{"label":"C","text":"Typhus"},{"label":"D","text":"Typhoid"},{"label":"E","text":"Melioidosis"}]},{"num":"38","text":"40 year old police officer presented with fever, headache, athralgia,myalgia, for 1 week duration. On examination there was low pulse volume with a pulse rate of 120. BP 100/80. On auscultation there was reduced breath sounds on B/L lung bases with dullness on percussion. WBC 4800 Hb - 16.1 PLT 45,000 PCV 54% CRP - 12 Covid 19 RAT - negative Dengue NS1 antigen negative What is the most appropriate next step in the management?","options":[{"label":"A","text":"IV dexamethasone 6 mg stat dose"},{"label":"B","text":"iv 100ml dextrone"},{"label":"C","text":"packed cell volume transfer"},{"label":"D","text":"IV N/S 500ml bolus"},{"label":"E","text":"Transfuse 6 units of platelets"}]}]},{"date":"2021 March","questions":[{"num":"02","text":"Which of the following are manifestations of leptospirosis?","options":[{"label":"A","text":"Myocarditis"},{"label":"B","text":"Pyelonephritis"},{"label":"C","text":"Meningitis"},{"label":"D","text":"Septic arthritis"},{"label":"E","text":"Acute renal failure"}]},{"num":"04","text":"Regarding Dengue Infection,","options":[{"label":"A","text":"Abdominal pain is a warning sign"},{"label":"B","text":"Incubation period is 3-7 days"},{"label":"C","text":"Once immunity develops for one serotype it gives immunity for other serotypes as well"},{"label":"D","text":"Patients become non infective during the recovery phase"},{"label":"E","text":"Main vector in Sri Lanka is Aedes albopictus"}]},{"num":"42","text":"A 55 year old farmer with diabetes mellitus, presents with fever for 2 weeks duration. Physical examination was normal. Investigations revealed WBC 12,500, N 80%, Hb 12.5, Plt 145,000, CRP 220, USS abdomen shows liver and splenic abscesses. He is resistant to parenteral gentamicin, ampicillin and metronidazole. What is the most likely infection?","options":[{"label":"A","text":"Invasive amoebiasis"},{"label":"B","text":"Typhoid"},{"label":"C","text":"Leptospirosis"},{"label":"D","text":"Melioidosis"},{"label":"E","text":"Tuberculosis"}]},{"num":"43","text":"A 21 year old previously healthy male presented on D4 of DF with PR 80bpm, BP 100/70mmHg, Platelet count 90000, PCV 44% ,CRFT < 2s.USS showed gallbladder edema and no signs of fluid collection.Critical phase management was started and he was given 100ml/hr of normal saline. Next day - PR 110bpm, BP 80/60 mmHg, platelets 20000, PCV 44%, CRFT >2s. USS revealed- Hepatorenal pouch fluid, pleural effusion. UOP for the last hour was 10ml. What is the most likely cause for this hemodynamic instability in this patient?","options":[{"label":"A","text":"Plasma leakage"},{"label":"B","text":"Acute pericarditis"},{"label":"C","text":"Dehydration due to reduced oral intake and vomiting"},{"label":"D","text":"Plasma leakage and occult bleeding"},{"label":"E","text":"Occult bleeding"}]},{"num":"46","text":"A 34-year-old farmer following a snake bite in a paddy field at 8pm, presented 2 hours later with bilateral ptosis and right lower limb swelling up to the knee. WBCT >20 sec. What is the likely snake?","options":[{"label":"A","text":"Cobra"},{"label":"B","text":"Hump nosed viper"},{"label":"C","text":"Common krait"},{"label":"D","text":"Russel’s viper"},{"label":"E","text":"Green pit viper"}]}]},{"date":"2020 June","questions":[{"num":"17","text":"Regarding Leprosy,","options":[{"label":"A","text":"Isolation of organism from slit skin biopsy from lesion is essential for diagnosis"},{"label":"B","text":"Is a cause for peripheral neuropathy"},{"label":"C","text":"Is highly contagious disease"},{"label":"D","text":"lepromatous leprosy is associated with impaired cell mediated immunity"},{"label":"E","text":"Flattening of the nose occurs due to obliteration of nasal septum"}]},{"num":"19","text":"Which of the following infections respond to tetracycline treatment?","options":[{"label":"A","text":"Scrub typhus"},{"label":"B","text":"Chlamydia"},{"label":"C","text":"Leptospirosis"},{"label":"D","text":"Chlamydia urethritis"},{"label":"E","text":"TB"}]},{"num":"25","text":"Sri Lanka is in malaria eradicated status. What is the most effective way to prevent Malaria in Sri Lanka at present?","options":[{"label":"A","text":"Case detection and treatment"},{"label":"B","text":"Use nets with permethrin"},{"label":"C","text":"Pregnant women should be treated with chloroquine"},{"label":"D","text":"Use insecticide to prevent malaria"},{"label":"E","text":"Start empirical chloroquine in suspected patients of malaria"}]},{"num":"28","text":"A 35 years old female presented with 5 days history of fever. Hemoglobin – 17.4 Platelet – 11 000 PCV – 54% After admission she collapsed & blood pressure was unrecordable. What is the next management option?","options":[{"label":"A","text":"IV dextran bolus"},{"label":"B","text":"IV Hartman bolus over 1 hour"},{"label":"C","text":"IV methylprednisolone"},{"label":"D","text":"Urgent blood transfusion"},{"label":"E","text":"Free flow intravenous normal saline"}]},{"num":"32","text":"15 year old boy presented with reduced hearing in left ear. On examination there were cervical lymphadenopathy & generalized macular papular rash in body. WBC – 6600 Neutrophil – 53% Lymphocyte – 38% Monocyte – 5% Eosinophil – 3% Blood picture – normochromic normocytic anemia (There was another investigation) What is the diagnosis?","options":[{"label":"A","text":"Infectious mononucleosis"},{"label":"B","text":"Typhoid"},{"label":"C","text":"Typhus"},{"label":"D","text":"HIV"},{"label":"E","text":""}]},{"num":"47","text":"28 years old famer presented following a snake bite. His upper limb is inflamed without bleeding manifestations. 20 min WBCT is normal, pulse 100bpm, BP 110/80mH, ptosis present in examination. Anti-venom is given. After one hour his respiratory rate became 6 per minute, BP was 90/60 mmHg. What is the next step in management?","options":[{"label":"A","text":"Fast normal saline bolus"},{"label":"B","text":"IM adrenalin"},{"label":"C","text":"Repeat atropine"},{"label":"D","text":"Non-invasive ventilation (BiPAP)"},{"label":"E","text":"Intubation and ventilation"}]}]},{"date":"2019 November","questions":[{"num":"11","text":"Regarding scrub typhus","options":[{"label":"A","text":"Causative organism is Rickettsia Prowazekii."},{"label":"B","text":"Presence of eschar is helpful for the diagnosis"},{"label":"C","text":"Causes meningoencephalitis"},{"label":"D","text":"Weekly doxycycline can prevent the disease."},{"label":"E","text":"Causes thrombocytopenia"}]},{"num":"27","text":"35yr old returning from a trip from India after 2 days comes with fever with chills and rigors , red colour urine. Pallor, mild icterus. Ix- hb 8.8, increased AST, ALT. Test to diagnose this condition,","options":[{"label":"1","text":"blood culture"},{"label":"2","text":"Dengue ns1 antigen"},{"label":"3","text":"Typhus ab"},{"label":"4","text":"Test for typhoid"},{"label":"5","text":"Blood smear for malaria"}]},{"num":"44","text":"18-year-old man, presented following hump nosed viper bite. No systemic envenomation features noted. Only 2 fang marks are there. What is the next step in the management?","options":[{"label":"A","text":"Arrange WBCT"},{"label":"B","text":"Arrange renal function test"},{"label":"C","text":"Start antivenom serum"},{"label":"D","text":"Monitor for 24 hours"},{"label":"E","text":"Haemodialysis"}]},{"num":"49","text":"24 year old female presented with fever for four days duration. She was diagnosed to have dengue.Her Blood pressure was 70/90 mmhg, pulse rate 110 bpm and capillary refilling time was more than 3seconds and a right sides pleural effusion was noted. But there was no overt bleeding. Her weight is 50 kg. Platelet count =40, Hct=51, Hb=16, What is the next immediate step in management?","options":[{"label":"A","text":"FFP"},{"label":"B","text":"500 ml Norma saline"},{"label":"C","text":"500 ml Dextran"},{"label":"D","text":"250 ml normal saline"},{"label":"E","text":"red cell concentrate"}]}]},{"date":"2019 March","questions":[{"num":"17","text":"Complications of leptospirosis","options":[{"label":"A","text":"pyogenic meningitis"},{"label":"B","text":"myocarditis"},{"label":"C","text":"Hemorrhagic pneumonitis"},{"label":"D","text":"pyelonephritis"},{"label":"E","text":"acalculus cholecystitis"}]},{"num":"37","text":"30 year old male presented with a unknown snake bite. His right leg is swollen & also he is having signs & symptoms of acute renal failure. Whole blood clotting time is normal. What is the most likely snake that has caused his symptoms & signs?","options":[{"label":"A","text":"Cobra"},{"label":"B","text":"Russel’s viper"},{"label":"C","text":"Hump nosed viper"},{"label":"D","text":"Common krait"},{"label":"E","text":"Saw scaled viper"}]},{"num":"43","text":"45 year old man presented with 4 day hx of fever myalgia headache. BP 120/80 and PR 88bpm. WBC 10.5 Plt 130 ALT 135 AST 140 S.Cr – raised UFR - 20rcc/hpf What is the most probable diagnosis?","options":[{"label":"A","text":"Dengue"},{"label":"B","text":"Infective endocarditis"},{"label":"C","text":"Leptospirosis"},{"label":"D","text":"Typhoid"},{"label":"E","text":"Viral hepatitis"}]},{"num":"44","text":"23 year old female women presented with severe headache. There is erythematous face and neck rash, for 2day duration her BP is 80/50mmHg, what is the probable diagnosis a) DHF","options":[{"label":"B","text":"Hanta viral infection"},{"label":"C","text":"Meningococcal meningitis"},{"label":"D","text":"Rubella"},{"label":"E","text":"spotted fever ricketsiosis"}]},{"num":"47","text":"52 year old farmer presents with unknown snake bite while going to the paddy field. He has progressive slurring of speech and bilateral ptosis. There’s a fang mark on his left ankle. His urine output is satisfactory. Urinalysis showed 12-20 on moderate field. What can be the snake?","options":[{"label":"A","text":"Common krait"},{"label":"B","text":"Cobra"},{"label":"C","text":"Ceylon krait"},{"label":"D","text":"Hump nosed viper"},{"label":"E","text":"Russell’s viper"}]},{"num":"48","text":"Middle age man presented with one hour after a snake bite. He has difficulty in breathing & saturation is normal. Also having past history of 2 episodes of anaphylaxis. On examination patient is anxious, tachycardic, tachypneic, no local swelling or fang marks. But ptosis is there. WBCT , 20. What is the best management option.","options":[{"label":"A","text":"Give AVS with neostigmine"},{"label":"B","text":"Give half dose AVS"},{"label":"C","text":"Give full dose AVS"},{"label":"D","text":"Monitor without giving AVS"},{"label":"E","text":"Immediate ventilation."}]}]},{"date":"2018 November","questions":[{"num":"16","text":"Following features are more in favour of Typhus Fever than Leptospirosis,","options":[{"label":"A","text":"Axillary lymphadenopathy"},{"label":"B","text":"Tinnitus"},{"label":"C","text":"Pulmonary haemorrhage"},{"label":"D","text":"Splenomegaly"},{"label":"E","text":"Meningism"}]},{"num":"17","text":"Melioidosis","options":[{"label":"A","text":"Causes splenic abscesses."},{"label":"B","text":"Is caused by Burkholderia spp."},{"label":"C","text":"Is transmitted through contaminated soil."},{"label":"D","text":"Presents with large joint monoarthritis."},{"label":"E","text":"Is treated with IV Metranidazole"}]},{"num":"47","text":"A farmer was brought to the ward with ptosis, dysphagia and abdominal pain WBCT <20 mins. There is no local swelling or pain at the bite site. Most likely Snake?","options":[{"label":"A","text":"Saw scaled viper"},{"label":"B","text":"Common krait"},{"label":"C","text":"Hump nosed viper"},{"label":"D","text":"Russels viper"},{"label":"E","text":"Cobra"}]}]},{"date":"2017 May","questions":[{"num":"12","text":"T/F regarding Dengue","options":[{"label":"A","text":"Encephalitis is a recognized presentation"},{"label":"B","text":"Negative NS-1 antigen within first 3 days of the fever excludes dengue infection"},{"label":"C","text":"A platelet count of <100 ×109 /L can predict the development of plasma leakage"},{"label":"D","text":"Best fluid during critical phase is Dextran 40 solution"},{"label":"E","text":"In dengue haemorrhagic fever, the usual cause of death is bleeding"}]},{"num":"24","text":"A 55 year old farmer was bitten on the left foot by an unidentified snake one hour before hospital admission . On admission , he was anxious and complained of pain over the site of the bite. His respiratory rate was 24 beats per minute, pulse rate was 95 beats per minute and blood pressure was 110/80mmHg. He had no ptosis or ophthalmoplegia. He passed clear urine. The 20 minute whole blood clotting test showed coagulable blood. What is the next step in the management?","options":[{"label":"A","text":"Administer polyvalent antivenom"},{"label":"B","text":"Observe for 24 hours"},{"label":"C","text":"Administer oral ibuprofen For pain relief"},{"label":"D","text":"Intramuscular tetanus toxoid administration0"},{"label":"E","text":"Reassure and discharge"}]}]},{"date":"2016 May","questions":[{"num":"SBA 12","text":"45 year old man present with a snake bite and treated with 20 vials of AVS. Next day his urine output was 60 ml /day. What is the most appropriate management?","options":[{"label":"A","text":"Start slow infusion of dopamine"},{"label":"B","text":"Start iv normal saline"},{"label":"C","text":"Ask him to drink lots of fruit juices"},{"label":"D","text":"Repeat another dose of AVS"},{"label":"E","text":"Peritoneal dialysis"}]}]},{"date":"2015 May","questions":[{"num":"15","text":"Regarding malaria in Sri Lanka,","options":[{"label":"A","text":"Is currently an endemic disease in Sri Lanka"},{"label":"B","text":"Vivax malaria is known as tertian malaria"},{"label":"C","text":"Falciparum malaria can cause nephritic syndrome"},{"label":"D","text":"Pathology of cerebral malaria is encephalopathy"},{"label":"E","text":"Artemisinin is the most effective drug"}]},{"num":"35","text":"A 60 year old patient presented to medical unit due to an unidentified snake bite. Then he was diagnosed to have acute kidney injury. His urine output was 600ml/24h. What is the best management option?","options":[{"label":"A","text":"Restrict protein intake up to 40g/day."},{"label":"B","text":"Restrict fluid intake to daily loss"},{"label":"C","text":"Start 0.9% saline daily maintainance solution"},{"label":"D","text":"Give low caloric and low protein diet"},{"label":"E","text":"Give high caloric and high protein diet."}]},{"num":"48","text":"A 55 year old male presented to the medical ward after being bitten by an unidentified snake. He was having right leg swelling up to the knee joint and blackish discoloration at ankle joint with an oozing puncture mark. No other physical signs present. Clotting test is normal. What would be the immediate decision?","options":[{"label":"A","text":"Antivenom and surgical referral"},{"label":"B","text":"Surgical referral"},{"label":"C","text":"Limb elevation & antibiotic"},{"label":"D","text":"Antibiotics, antivenom and surgical referral"},{"label":"E","text":"Antibiotics and antivenom"}]}]},{"date":"2015 May","questions":[{"num":"44","text":"35 year old man is brought to casualty ward following 8hrs after a snake bite. On examination patient has B/L ptosis. APTT is normal. There was no local swelling, tissue necrosis or respiratory distress. The most likely snake","options":[{"label":"A","text":"Cobra"},{"label":"B","text":"Hump nose viper"},{"label":"C","text":"Russell viper"},{"label":"D","text":"Saw scaled viper"},{"label":"E","text":"Ceylon krait"}]},{"num":"47","text":"45 year old female presented with fever, body ache, severe muscle pain & mild neck stiffness. On examination kernigs sign is negative & fundi are normal. Ix results are as follows. WBC - 1,2800 , PLT - 60,000, N - 78%. Most likely diagnosis","options":[{"label":"A","text":"Pyeogenic meningitis"},{"label":"B","text":"Dengue fever"},{"label":"C","text":"Leptospirosis"},{"label":"D","text":"Atypical pneumonia"}]}]},{"date":"2014 November","questions":[{"num":"14","text":"Which of the following disease – vector combinations are correct?","options":[{"label":"A","text":"Chikungunya – Aedes albopictus"},{"label":"B","text":"Plasmodium falciparum – Aedes albopictus"},{"label":"C","text":"Japanese encephalitis – Culex faginux"},{"label":"D","text":"Leishmaniasis – Riduvid bug"},{"label":"E","text":"Rocky mountain spotted fever – Thrombogulamide mite"}]},{"num":"15","text":"Leptospirosis,","options":[{"label":"A","text":"Is a zoonosis"},{"label":"B","text":"Treated by penicillin"},{"label":"C","text":"Causes neutropenia"},{"label":"D","text":"Leads to pulmonary hemorrhages"},{"label":"E","text":"Is diagnosed by microscopic agglutination test (MAT)"}]},{"num":"42","text":"21-year-old boy from kataragama presented with fever, myalgia, headache and tinnitus for2 days, ONE- conjunctival injection, maculopapular rash, cervical lymphadenopathy and hepatomegaly was present. PLT -low. AST, ALT- elevated. What is the most appropriate antibiotic?","options":[{"label":"A","text":"Benzyl penicillin"},{"label":"B","text":"Ciprofloxacin"},{"label":"C","text":"Clarithromycin"},{"label":"D","text":"doxycycline"},{"label":"E","text":"metronidazole"}]},{"num":"43","text":"24 year old male presented with headache, myalgia, arthralgia, Intermittent fever with chills for 1 week. He has returned from India 2 weeks back. O/E - mild hepatomegaly with no LN enlargement. FBC-Hb-10.8 g/dl WCC- NL, PLT - 120,000 (150,000-450,000).What is the most appropriate Initial investigation to come into a diagnosis?","options":[{"label":"A","text":"Blood culture"},{"label":"B","text":"HIV antibody level"},{"label":"C","text":"Urine microscopy"},{"label":"D","text":"Thick blood film for malaria parasite"},{"label":"E","text":"Standard agglutination test (SAT)"}]},{"num":"46","text":"27 yr old male was bitten by a unknown snake at 8 pm in the night. His R/ leg is swollen where the bitten mark is present. He complains of pain in the leg. He is conscious and rational. PR 90 , BP - 110/70 mm Hg. What is most appropriate the first step in management","options":[{"label":"A","text":"Administer antivenom immediately"},{"label":"B","text":"NSAIDs for pain"},{"label":"C","text":"Administer tetanus toxoid"},{"label":"D","text":"Treat with oral cloxacillin"},{"label":"E","text":"20min WBCT"}]}]},{"date":"2014 May","questions":[{"num":"43","text":"A 21 year old male presented with fever, arthralgia, myelgia, tinnitus, conjunctival injesion, cervical lymphadenopathy and hepatomegaly. Ix Plt -134, AST – 54, ALT – 72, SCr-normal. What is the best Mx?","options":[{"label":"A","text":"Doxycyclin 100mg BD"},{"label":"B","text":"Ciprofloxacin 500mg bd"},{"label":"C","text":"Amoxycillin 500mg tds"},{"label":"D","text":"Penicillin 500mg tds"},{"label":"E","text":"Erythromycin 500mg bd"}]},{"num":"46","text":"A 45 years old farmer presented following an unknown snake bite. He had diplopia, abdominal pain and marked swelling at the site of bite. WBCT is <20 minutes. What is the snake?","options":[{"label":"A","text":"Cobra"},{"label":"B","text":"Russell’s viper"},{"label":"C","text":"Krait"},{"label":"D","text":"Hump nosed viper"},{"label":"E","text":"Saw scaled viper"}]}]},{"date":"2013 November","questions":[{"num":"2","text":"Malaria","options":[{"label":"A","text":"primaquine is essential for p.vivax"},{"label":"B","text":"Artemathazine is given in pregnancy"},{"label":"C","text":"Antigen detection is more specific than"}]}]},{"date":"2013 Eastern","questions":[{"num":"BOF 1","text":"Malaria suspected patient blood film is positive for Falciparum malariae. He was treated with Artemether lumifantrin for 1 week. After that he was asymptomatic. Repeat blood film was positive for gametocytes. What is the next step?","options":[{"label":"1","text":"Oral quinine"},{"label":"2","text":"IV quinine"},{"label":"3","text":"2nd dose artemether lumifantrin"},{"label":"4","text":"Reassurance"},{"label":"5","text":"Treat with sulfadoxine-pyrametharine"}]},{"num":"BOF 11","text":"A 40 year old patient came with a history of snake bite.no local envenomation. He has bilateral ptosis. WBCT-normal. What is the most probable snake?","options":[{"label":"1","text":"Cobra"},{"label":"2","text":"Sir Lankan krait"},{"label":"3","text":"Russell’s viper"},{"label":"4","text":"Common krait"},{"label":"5","text":"Sea snake"}]}]}],"count":58},{"topic":"Dermatology","sections":[{"date":"2024 January","questions":[{"num":"48","text":"50-Year-Old lady presented with hypopigmented patches for 8 weeks, No sensory over the patches 3 patches Skin biopsy no organism growth, She was started on treatments. What are the treatments?","options":[{"label":"A","text":"Rifampicine monthly. Dapsone weekly for 3 months"},{"label":"B","text":"Rifampicine monthly, Dapsone weekly for 6 months"},{"label":"C","text":"Rifampicine monthly, Dapsone weekly, clofazime weekly for 3 months"},{"label":"D","text":"Rifampicine monthly, dapsone weekly , clofazime weekly for 6 months"},{"label":"E","text":"Rifampicine weekly, dapsone monthly, clofazime weekly"}]}]},{"date":"2023 February","questions":[{"num":"49","text":"A 45-year-old female, presented to the dermatology clinic with a right-side wrist drop and a hypopigmented patch over the forearm for which she was started on rifampicin. One month later, she again came with erythema and induration of the previous lesions, severe pain and worsening of the weakness. What is most likely reason for her current complaint?","options":[{"label":"A","text":"Cellulitis"},{"label":"B","text":"Delayed hypersensitivity reaction"},{"label":"C","text":"Drug eruption"},{"label":"D","text":"Herpes zoster infection"},{"label":"E","text":"Thrombophlebitis"}]}]},{"date":"2022 March","questions":[{"num":"SBA 46","text":"30 year old woman presented with itchy, annular and scaly patch over both groins. She visited a GP and prescribed steroid ointment. Symptoms was relieved few days but patch extended peripherally. What is the diagnosis?","options":[{"label":"A","text":"Erythema annularae centrifugum"},{"label":"B","text":"Granuloma annularae"},{"label":"C","text":"Annularae lichen planus"},{"label":"D","text":"Tenia Cruris"},{"label":"E","text":"Cutaneous Candidiasis"}]}]},{"date":"2021 March","questions":[{"num":"47","text":"A 26 years old male with a history of coeliac disease presented with a skin rash which is intensely itchy and blistering on the back of the elbow. He gives a history of unprotected sexual intercourse with a commercial sex worker one week ago. What is the likely diagnosis?","options":[{"label":"A","text":"Dermatitis herpetiformis"},{"label":"B","text":"Lichen planus"},{"label":"C","text":"Urticaria"},{"label":"D","text":"Bullous pemphigoid"},{"label":"E","text":"Herpes simplex virus"}]}]},{"date":"2020 June","questions":[{"num":"23","text":"65 years old male presented with 4 days history of rash over limbs and trunk. Two weeks before he felt sensation of itching but no obvious rash except short lasted few wheals & hives. He is a known patient with DM & hypertension & currently on metformin, losartan & tamsulosin for five years. On examination there was bullous eruptions predominantly over limbs & trunk. Bullous lesions are tense. Face & mucosal membranes are spired. What is the most suggestive skin condition?","options":[{"label":"A","text":"Bullous pemphigoid"},{"label":"B","text":"herpetiform dermatitis"},{"label":"C","text":"SLE"},{"label":"D","text":"EKE"},{"label":"E","text":"Toxic epidermal necrolysis"}]}]},{"date":"2019 November","questions":[{"num":"7","text":"Regarding erysipelas","options":[{"label":"A","text":"Edges are discrete and merge in to the skin"},{"label":"B","text":"Group A beta haemolytic Streptococcus is the commonest cause"},{"label":"C","text":"Affect dermis and superficial subcutaneous tissue"},{"label":"D","text":"Can lead to sepsis"},{"label":"E","text":"Penicillin is the drug of choice"}]},{"num":"45","text":"32-year-old female, presented with swollen lips for 5 days. She is on oral hypoglycaemics for DM which is well controlled. No significant past medical history. No pruritus, no past allergic history. She has recently started a new hair dye one week ago. What is the diagnosis?","opti 's due to enlarged heart. On examination there is hepatomegaly, spider naevi and leukonychia, Investigations, Elevated ALT(121) and elevated ALP(141) Random blood sugar high(220) Most appropriate next investigation,","options":[{"label":"A","text":"Chest X ray"},{"label":"B","text":"serum ferritin"},{"label":"C","text":"Thyroid Function Test"},{"label":"D","text":"Abdominal USS"},{"label":"E","text":"Serum cortisol"}]}]},{"date":"2021 March","questions":[{"num":"06","text":"Hyperkalemia is a feature of,","options":[{"label":"A","text":"Fludrocortisone therapy"},{"label":"B","text":"Addison’s disease"},{"label":"C","text":"Cushing’s disease"},{"label":"D","text":"Spironolactone"},{"label":"E","text":"Pheochromocytoma"}]},{"num":"07","text":"T/F Regarding the following medications,","options":[{"label":"A","text":"Metformin is best avoided in stage 2 CKD"},{"label":"B","text":"Pralidoxime as an antidote for OP poisoning is well established"},{"label":"C","text":"SGLT-2 inhibitors are safe for stage 2 renal failure"},{"label":"D","text":"Penicillamine is used in the treatment of Wilson’s disease"},{"label":"E","text":"Methanol is an antidote for ethanol poisoning"}]},{"num":"49","text":"A 78-year-old woman presents with swelling of lip and tongue for 6 hours. No stridor or difficulty in breathing. PR 80bpm, BP 120/80mmHg. Respiratory examination is normal. No urticaria. She was recently started on enalapril and hydrochlorothiazide. She is on oral hypoglycemic drugs for diabetes and statins for hypercholesterolemia. What is the most important step of the management?","options":[{"label":"A","text":"IM adrenaline"},{"label":"B","text":"Do skin prick test"},{"label":"C","text":"Take a detailed dietary history and make modifications"},{"label":"D","text":"Stop enalapril"},{"label":"E","text":"start antihistamines"}]}]},{"date":"2020 June","questions":[{"num":"2","text":"Hypokalemia and hypertension are the features of,","options":[{"label":"A","text":"Cushing’s disease"},{ ":[{"num":"6","text":"Causes of finger clubbing","options":[{"label":"A","text":"Asthma"},{"label":"B","text":"Bronchiectasis"},{"label":"C","text":"Glioblastoma multiforme"},{"label":"D","text":"Tuberculosis"},{"label":"E","text":"Non-cyanotic congenital heart diseases"}]},{"num":"11","text":"Polycystic ovarian syndrome,","options":[{"label":"A","text":"Irregular menstrual bleeding"},{"label":"B","text":"Associated with Acanthosis nigricans"},{"label":"C","text":"Associated with metabolic syndrome"},{"label":"D","text":"Elevated prolactin level is a feature"},{"label":"E","text":"Is treated with Metformin"}]},{"num":"20","text":"Patient presented with haemoptysis. On examination blood pressure was 70/50mmHg and cold clammy extremities were detected. Which of the following statements are correct physiological responses,","options":[{"label":"A","text":"Parasympathetic system is activated"},{"label":"B","text":"Increased secretion of Anti diuretic hormone"},{"label":"C","text":"Increased levels of Brain Natriuretic Peptide"},{"label":"D","text":""},{"label":"E","text":"Activation of Renin angiotensin aldosterone system"}]},{"num":"30","text":"45 years old female who is on Warfarin for atrial fibrillation presented with acute onset abdominal pain, bloody diarrhea, Vomiting. She developed a sudden onset weakness of the left side of the body after two days while in the hospital What is the most likely diagnosis?","options":[{"label":"A","text":"Campylobacter colitis"},{"label":"B","text":"Crohn's disease."},{"label":"C","text":"Intestinal tuberculosis"},{"label":"D","text":"Ischemic colitis"},{"label":"E","text":"Acute intestinal obstruction"}]}]},{"date":"2017 May","questions":[{"num":"10","text":"Hypercalcaemia is a feature of","options":[{"label":"A","text":"Sarcoidosis"},{"label":"B","text":"Phaeochromocytoma"},{"label":"C","text":"Primary hyper-parathyroidism"},{"label":"D","text":"Secondary hyper-parathyroidism"},{"label":"E","text":"Vitamin D over use"}]},{"num":
